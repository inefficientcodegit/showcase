x:1,explanation:`Read carefully: 'All BUT 9 run away'. This means exactly 9 sheep remained.`},{id:6,category:`Logic & Math`,question:`You have two ropes. Each takes exactly 60 minutes to burn, but they burn at unpredictable rates. How can you measure exactly 45 minutes?`,options:[`Burn one from both ends, the other from one end.`,`Light both from one end.`,`Cut them in half.`,`It's impossible.`],correctIndex:0,explanation:`Light rope A from both ends and rope B from one end. Rope A burns out in 30 mins. At that moment, light the other end of rope B. Its remaining 30 mins will burn in 15 mins. 30 + 15 = 45.`},{id:7,category:`Logic & Math`,question:`There are three doors. Behind one is a car; behind the others, goats. You pick Door 1. The host opens Door 3, revealing a goat. He asks if you want to switch to Door 2. What are your chances of winning if you switch?`,options:[`1/2 (50%)`,`1/3 (33.3%)`,`2/3 (66.6%)`,`1/4 (25%)`],correctIndex:2,explanation:`The Monty Hall problem. You initially have a 1/3 chance of being right. The host's action concentrates the remaining 2/3 probability into the unopened, unchosen door. Always switch.`},{id:8,category:`Logic & Math`,question:`If you have a 10x10x10 cube made of smaller 1x1x1 cubes, and you paint the entire outside of the large cube, how many small cubes have exactly one face painted?`,options:[`512`,`384`,`96`,`100`],correctIndex:1,explanation:`The cubes with exactly one face painted are in the center of each of the 6 faces. For a 10x10 face, the 'center' is an 8x8 square (subtracting edges). 8x8 = 64 cubes per face. 64 x 6 faces = 384.`},{id:9,category:`Logic & Math`,question:`A doctor gives you 3 pills and tells you to take one every half hour. How long will the pills last?`,options:[`1 hour`,`1.5 hours`,`2 hours`,`45 minutes`],correctIndex:0,explanation:`Take the first pill at minute 0. The second at minute 30. The third at minute 60 (1 hour). The pills are gone in exactly 1 hour.`},{id:10,category:`Logic & Math`,question:`I am a three-digit number. My second digit is four times bigger than the third digit. My first digit is three less than my second digit. Who am I?`,options:[`141`,`482`,`142`,`582`],correctIndex:0,explanation:`In 141: 3rd digit is 1. 2nd is 4 (which is 4x1). 1st digit is 1 (which is 4 - 3). 141 fits all criteria.`},{id:11,category:`Logic & Math`,question:`Some months have 31 days. How many have 28?`,options:[`1`,`0`,`12`,`6`],correctIndex:2,explanation:`All 12 months have at least 28 days in them.`},{id:12,category:`Logic & Math`,question:`If it takes 2 men 2 hours to dig a hole, how long will it take 1 man to dig half a hole?`,options:[`1 hour`,`2 hours`,`30 minutes`,`You can't dig half a hole`],correctIndex:3,explanation:`There is no such thing as 'half a hole'. A hole is just a hole, regardless of its size.`},{id:13,category:`Logic & Math`,question:`A man is looking at a photograph. He says, 'Brothers and sisters, I have none. But that man's father is my father's son.' Who is in the photograph?`,options:[`His son`,`Himself`,`His father`,`His nephew`],correctIndex:0,explanation:`'My father's son', given he has no brothers, must be the man speaking. So: 'That man's father is ME'. The man in the photo is his son.`},{id:14,category:`Logic & Math`,question:`Divide 30 by half and add 10. What do you get?`,options:[`25`,`70`,`40`,`15`],correctIndex:1,explanation:`Dividing by a half (0.5) is the same as multiplying by 2. 30 / 0.5 = 60. Then add 10 to get 70.`},{id:15,category:`Logic & Math`,question:`Which weighs more: a pound of feathers or a pound of bricks?`,options:[`Feathers`,`Bricks`,`Neither, they weigh the same`,`Depends on gravity`],correctIndex:2,explanation:`A pound is a unit of weight. A pound of anything weighs exactly one pound.`},{id:16,category:`Logic & Math`,question:`You have a drawer with 10 black socks and 10 white socks in a dark room. Minimum socks to guarantee a matching pair?`,options:[`2`,`3`,`11`,`10`],correctIndex:1,explanation:`There are only two colors. If you pull out 3 socks, even if the first two are different (one black, one white), the third sock must match one of the first two.`},{id:17,category:`Logic & Math`,question:`A red house is made of red bricks. A blue house is made of blue bricks. What is a greenhouse made of?`,options:[`Green bricks`,`Glass`,`Wood`,`Plants`],correctIndex:1,explanation:`A greenhouse is a structure used for growing plants, and it is traditionally made of glass or clear plastic.`},{id:18,category:`Logic & Math`,question:`The day before yesterday I was 21, and next year I will be 24. What day is my birthday?`,options:[`December 31`,`January 1`,`February 29`,`December 30`],correctIndex:0,explanation:`This statement is made on Jan 1st. The day before yesterday was Dec 30 (you were 21). You turned 22 on Dec 31. This year you turn 23 on Dec 31. Next year you turn 24.`},{id:19,category:`Logic & Math`,question:`Solve the equation: 8 ÷ 2(2 + 2) =`,options:[`1`,`16`,`8`,`4`],correctIndex:1,explanation:`PEMDAS/BODMAS: First parentheses (2+2)=4. The equation is now 8 ÷ 2 × 4. Multiplication and division go left-to-right. 8 ÷ 2 = 4. 4 × 4 = 16.`},{id:20,category:`Logic & Math`,question:`If I have 3 apples and you take away 2, how many do you have?`,options:[`1`,`3`,`2`,`0`],correctIndex:2,explanation:`The question asks how many YOU have. If you took 2 apples, then you have 2 apples.`},{id:21,category:`Logic & Math`,question:`A clock shows 3:15. What is the angle between the hour and minute hands?`,options:[`0 degrees`,`7.5 degrees`,`15 degrees`,`10 degrees`],correctIndex:1,explanation:`At 15 minutes, the minute hand is on the 3. However, the hour hand has moved 1/4 of the way between 3 and 4. A full hour is 30 degrees, so 1/4 of 30 is 7.5 degrees.`},{id:22,category:`Logic & Math`,question:`Three doctors said that Bill was their brother. Bill says he has no brothers. Who is lying?`,options:[`The doctors`,`Bill`,`None of them`,`All of them`],correctIndex:2,explanation:`None of them are lying. The three doctors are Bill's sisters.`},{id:23,category:`Logic & Math`,question:`How many times can you subtract 10 from 100?`,options:[`10`,`1`,`9`,`Infinite`],correctIndex:1,explanation:`You can only subtract 10 from 100 once. After that, you are subtracting 10 from 90.`},{id:24,category:`Logic & Math`,question:`You throw away the outside and cook the inside. Then you eat the outside and throw away the inside. What did you eat?`,options:[`An artichoke`,`An egg`,`Corn on the cob`,`A watermelon`],correctIndex:2,explanation:`For corn on the cob, you throw away the husk (outside), cook the corn (inside). You eat the kernels (new outside) and throw away the cob (new inside).`},{id:25,category:`Logic & Math`,question:`If there are 6 apples and you take away 4, how many do you have?`,options:[`2`,`4`,`6`,`10`],correctIndex:1,explanation:`Read carefully: 'YOU take away 4'. Therefore, you have the 4 apples that you took.`},{id:26,category:`Logic & Math`,question:`What is half of two plus two?`,options:[`2`,`3`,`4`,`1.5`],correctIndex:1,explanation:`According to mathematical order of operations, division/halving comes before addition. Half of two is one. One plus two is three.`},{id:27,category:`Logic & Math`,question:`A snail is at the bottom of a 30-foot well. Each day it climbs up 3 feet, but at night it slips back down 2 feet. How many days to escape?`,options:[`30`,`28`,`27`,`29`],correctIndex:1,explanation:`The snail nets 1 foot per day. On the morning of the 28th day, it is at 27 feet. It climbs 3 feet, reaching the top at 30 feet, and escapes before the night falls.`},{id:28,category:`Logic & Math`,question:`A man buys a horse for $60, sells it for $70, buys it back for $80, and sells it for $90. Profit?`,options:[`$10`,`$20`,`$30`,`$0`],correctIndex:1,explanation:`Transaction 1: Buy 60, Sell 70 = +$10. Transaction 2: Buy 80, Sell 90 = +$10. Total profit is $20.`},{id:29,category:`Logic & Math`,question:`Two coins equal 30 cents, and one of them is not a nickel. What are the coins?`,options:[`A quarter and a penny`,`Two dimes and a nickel`,`A quarter and a nickel`,`Impossible`],correctIndex:2,explanation:`The coins are a quarter and a nickel. ONE of them (the quarter) is not a nickel, but the other one is.`},{id:30,category:`Logic & Math`,question:`How many times do the hands of a clock overlap in 24 hours?`,options:[`22`,`24`,`12`,`23`],correctIndex:0,explanation:`The hands overlap exactly 11 times every 12 hours. They skip overlapping in the 11 o'clock hour, crossing exactly at 12:00. So in 24 hours, it's 22 times.`},{id:31,category:`Logic & Math`,question:`What is half of 2^100?`,options:[`2^50`,`1^100`,`2^99`,`1^50`],correctIndex:2,explanation:`To halve a power of 2, you subtract 1 from the exponent. Mathematically: (2^100) / (2^1) = 2^(100 - 1) = 2^99.`},{id:32,category:`Logic & Math`,question:`If 1=3, 2=3, 3=5, 4=4, and 5=4, what does 6 equal?`,options:[`3`,`4`,`5`,`6`],correctIndex:0,explanation:`The right-hand number represents the amount of letters in the English spelling of the word. 'Six' has 3 letters, so 6=3.`},{id:33,category:`Logic & Math`,question:`If I add 5 to 9, I get 2. The answer is correct. How?`,options:[`It's a typo`,`Using a 12-hour clock`,`Base 7 math`,`Modulo 10`],correctIndex:1,explanation:`If it is 9 o'clock and you add 5 hours to the time, it becomes 2 o'clock.`},{id:34,category:`Logic & Math`,question:`A pond has a lily pad that doubles in size every day. It covers the pond in 20 days. If you start with two lily pads, how long does it take?`,options:[`10 days`,`19 days`,`9 days`,`18 days`],correctIndex:1,explanation:`Starting with two lily pads is exactly the same as starting on Day 2 of the single-pad scenario. It essentially skips the first day. Thus, 20 - 1 = 19 days.`},{id:35,category:`Logic & Math`,question:`How many 9s are there between 1 and 100?`,options:[`10`,`19`,`20`,`21`],correctIndex:2,explanation:`Count them: 9, 19, 29, 39... 89, 90, 91... 98, and 99. Note that 99 contains two 9s. Total = 20.`},{id:36,category:`Logic & Math`,question:`A store reduces a $100 item by 20%. Later, they increase the new price by 20%. Final price?`,options:[`$100`,`$96`,`$104`,`$90`],correctIndex:1,explanation:`First reduction: $100 - 20% = $80. The increase is applied to $80. 20% of $80 is $16. $80 + $16 = $96.`},{id:37,category:`Logic & Math`,question:`A father is currently 4 times as old as his son. In 20 years, he will only be twice as old. How old is the father now?`,options:[`40`,`32`,`48`,`60`],correctIndex:0,explanation:`Son = x, Father = 4x. In 20 years: 4x + 20 = 2(x + 20). 4x + 20 = 2x + 40. 2x = 20, x = 10. Father is 4 * 10 = 40.`},{id:38,category:`Logic & Math`,question:`A train leaves NY for LA at 100 mph. Another leaves LA for NY at 90 mph. When they meet, which is closer to NY?`,options:[`The NY train`,`The LA train`,`They are the same distance`,`Cannot be determined`],correctIndex:2,explanation:`When they meet, they are passing each other at the exact same location. Therefore, they are the exact same distance from NY.`},{id:39,category:`Logic & Math`,question:`What is the probability of flipping three heads in a row with a fair coin?`,options:[`1/3 (33.3%)`,`1/6 (16.6%)`,`1/8 (12.5%)`,`1/4 (25%)`],correctIndex:2,explanation:`Probability of one head is 1/2. For three independent flips: 1/2 * 1/2 * 1/2 = 1/8.`},{id:40,category:`Logic & Math`,question:`If it takes 8 men 10 hours to build a wall, how long would it take 4 men?`,options:[`5 hours`,`20 hours`,`15 hours`,`10 hours`],correctIndex:1,explanation:`Inverse proportion. Half the workers means the job takes twice as long. 10 hours * 2 = 20 hours.`},{id:41,category:`Logic & Math`,question:`I am an odd number. Take away a letter and I become even. What number am I?`,options:[`Nine`,`Three`,`Eleven`,`Seven`],correctIndex:3,explanation:`The word is 'SEVEN'. If you remove the letter 'S', the remaining letters spell 'EVEN'.`},{id:42,category:`Logic & Math`,question:`You have 8 identically sized balls. 7 weigh the same, 1 is slightly heavier. You have a balance scale. Minimum weighings to find the heavy one?`,options:[`2`,`3`,`4`,`1`],correctIndex:0,explanation:`Weigh 3 against 3. If they balance, weigh the remaining 2 against each other. If they don't balance, take the heavier group of 3 and weigh 1 vs 1.`},{id:43,category:`Logic & Math`,question:`You open a book. The sum of the two facing pages is 61. What is the product of these two pages?`,options:[`900`,`930`,`870`,`1000`],correctIndex:1,explanation:`Facing pages are consecutive: x and x+1. x + (x+1) = 61. 2x = 60, x = 30. The pages are 30 and 31. Product is 30 * 31 = 930.`},{id:44,category:`Logic & Math`,question:`If 3 cats kill 3 rats in 3 minutes, how many cats does it take to kill 100 rats in 100 minutes?`,options:[`100`,`33`,`3`,`300`],correctIndex:2,explanation:`3 cats kill 3 rats in 3 minutes, meaning each cat takes exactly 3 minutes to kill 1 rat. Therefore, 3 cats over 100 minutes will kill 100 rats.`},{id:45,category:`Logic & Math`,question:`A woman shoots her husband, holds him underwater for 5 minutes, and hangs him. Afterwards, they enjoy dinner together. How?`,options:[`He survived`,`It was a dream`,`She is a photographer`,`It was a movie set`],correctIndex:2,explanation:`She is developing a photograph. She 'shot' a picture, developed it in liquid ('underwater'), and hung the photo to dry.`},{id:46,category:`Logic & Math`,question:`You have 100 pounds of potatoes, which are 99% water. They dehydrate until they are 98% water. New weight?`,options:[`99 pounds`,`98 pounds`,`50 pounds`,`90 pounds`],correctIndex:2,explanation:`Initially, there is 1 lb of solid potato matter. During dehydration, the solid matter doesn't change. If that 1 lb of solid is now 2% of the total weight, the total weight must be 50 lbs.`},{id:47,category:`Logic & Math`,question:`A man is legally born on a certain day, yet dies of old age on his 25th birthday. How is this possible?`,options:[`Time travel`,`Born on Leap Year`,`Dog years`,`He lived on Mars`],correctIndex:1,explanation:`He was born on February 29th, a Leap Year day occurring once every 4 years. His 25th birthday means he lived 25 * 4 = 100 years.`},{id:48,category:`Logic & Math`,question:`Which is the heaviest: a ton of gold, a ton of silver, or a ton of feathers?`,options:[`Gold`,`Silver`,`Feathers`,`They all weigh the same`],correctIndex:3,explanation:`A ton is a ton. Regardless of the material, they all weigh exactly 2,000 pounds.`},{id:49,category:`Logic & Math`,question:`What gets wetter the more it dries?`,options:[`A towel`,`Water`,`A cloud`,`A sponge`],correctIndex:0,explanation:`A towel gets wetter as it dries your body.`},{id:50,category:`Logic & Math`,question:`I have keys but no doors, space but no room. You can enter but can't go outside. What am I?`,options:[`A safe`,`A keyboard`,`A puzzle`,`A mind`],correctIndex:1,explanation:`A computer keyboard has keys, a spacebar (space), and an Enter key (enter).`},{id:51,category:`Sequences`,question:`What is the next number in the sequence? 2, 6, 14, 30, 62, ...`,options:[`126`,`124`,`128`,`94`],correctIndex:0,explanation:`The pattern is to multiply the previous number by 2 and then add 2. (62 × 2) + 2 = 124 + 2 = 126.`},{id:52,category:`Sequences`,question:`What comes next in the sequence? 1, 11, 21, 1211, 111221, ...`,options:[`312211`,`1112211`,`211211`,`12112211`],correctIndex:0,explanation:`The Look-and-Say sequence. You read the previous term out loud. '111221' is read as 'three 1s, two 2s, one 1' -> 312211.`},{id:53,category:`Sequences`,question:`What is the next number in the sequence? 2, 2, 4, 6, 10, 16, 26, ...`,options:[`36`,`42`,`40`,`46`],correctIndex:1,explanation:`A Fibonacci-style sequence where each number is the sum of the previous two numbers. 16 + 26 = 42.`},{id:54,category:`Sequences`,question:`What is the next number in the sequence? 4, 9, 25, 49, 121, 169, ...`,options:[`196`,`225`,`256`,`289`],correctIndex:3,explanation:`Squares of consecutive prime numbers: 2², 3², 5², 7², 11², 13². The next prime is 17. 17² = 289.`},{id:55,category:`Sequences`,question:`What is the next number in the sequence? 10, 15, 13, 18, 16, 21, 19, ...`,options:[`22`,`24`,`21`,`26`],correctIndex:1,explanation:`Alternating arithmetic: add 5, then subtract 2. 19 + 5 = 24.`},{id:56,category:`Sequences`,question:`What is the next number in the sequence? 1, 2, 6, 24, 120, 720, ...`,options:[`1440`,`2520`,`5040`,`4320`],correctIndex:2,explanation:`Factorials! Multiplied by incrementally larger integers: ×2, ×3, ×4, ×5, ×6. Next is 720 × 7 = 5040.`},{id:57,category:`Sequences`,question:`What is the next number in the sequence? 0, 7, 26, 63, 124, 215, ...`,options:[`342`,`343`,`324`,`256`],correctIndex:0,explanation:`Cubes of consecutive integers, minus 1. (1³-1, 2³-1, 3³-1). Next is 7³ - 1 = 343 - 1 = 342.`},{id:58,category:`Sequences`,question:`What is the next number in the sequence? 15, 21, 24, 30, 33, 39, 51, ...`,options:[`54`,`57`,`60`,`63`],correctIndex:1,explanation:`Add the sum of the number's digits to the number itself. 51 + (5 + 1) = 51 + 6 = 57.`},{id:59,category:`Sequences`,question:`What is the next number in the sequence? 5, 6, 8, 12, 20, 36, ...`,options:[`60`,`64`,`68`,`72`],correctIndex:2,explanation:`The difference between consecutive numbers doubles each time (+1, +2, +4, +8, +16). Next is +32. 36 + 32 = 68.`},{id:60,category:`Sequences`,question:`What is the next number in the sequence? 2, 10, 4, 100, 6, 1000, 8, ...`,options:[`10`,`10000`,`12`,`100000`],correctIndex:1,explanation:`Two interleaved sequences. First: even numbers (2, 4, 6, 8). Second: powers of ten (10, 100, 1000). Next belongs to second: 10000.`},{id:61,category:`Sequences`,question:`What is the next number in the sequence? 50, 48, 45, 40, 33, 22, ...`,options:[`11`,`9`,`7`,`13`],correctIndex:1,explanation:`Subtracting consecutive prime numbers: -2, -3, -5, -7, -11. Next prime is 13, so 22 - 13 = 9.`},{id:62,category:`Sequences`,question:`What is the next number in the sequence? 1, 3, 6, 10, 15, 21, 28, ...`,options:[`34`,`35`,`36`,`38`],correctIndex:2,explanation:`Triangular numbers. The difference increases by 1 each time (+2, +3, +4, +5...). Next step is +8. 28 + 8 = 36.`},{id:63,category:`Sequences`,question:`What is the next number in the sequence? 3, 3, 5, 4, 4, 3, 5, ...`,options:[`3`,`4`,`5`,`6`],correctIndex:2,explanation:`Number of letters in the English words for integers starting from 1 (One=3, Two=3, Three=5...). Eight has 5 letters.`},{id:64,category:`Sequences`,question:`What is the next number in the sequence? 2, 5, 14, 41, 122, ...`,options:[`365`,`366`,`364`,`244`],correctIndex:0,explanation:`Multiply previous by 3, subtract 1. (122 × 3) - 1 = 366 - 1 = 365.`},{id:65,category:`Sequences`,question:`What is the next number in the sequence? 1, 1, 1, 3, 5, 9, 17, 31, ...`,options:[`49`,`55`,`57`,`63`],correctIndex:2,explanation:`Tribonacci sequence. Each number is the sum of the preceding THREE numbers. 9 + 17 + 31 = 57.`},{id:66,category:`Sequences`,question:`What is the next number in the sequence? 1, 4, 27, 256, 3125, ...`,options:[`36000`,`46656`,`31250`,`4096`],correctIndex:1,explanation:`The pattern follows n^n (n to the power of n). 1¹, 2², 3³, 4⁴, 5⁵. The next is 6⁶ = 46,656.`},{id:67,category:`Sequences`,question:`What is the next number in the sequence? 12, 22, 23, 33, 34, 44, 45, ...`,options:[`54`,`55`,`56`,`65`],correctIndex:1,explanation:`Reverse the digits of the previous number and add 1. 45 reversed is 54. 54 + 1 = 55.`},{id:68,category:`Sequences`,question:`What is the next number in the sequence? 2, 4, 10, 28, 82, 244, ...`,options:[`728`,`730`,`732`,`488`],correctIndex:1,explanation:`Powers of 3, plus 1. (3⁰+1, 3¹+1, 3²+1...). Next is 3⁶ (729). 729 + 1 = 730.`},{id:69,category:`Sequences`,question:`What is the next number in the sequence? 4, 6, 12, 30, 90, 315, ...`,options:[`945`,`1050`,`1260`,`1575`],correctIndex:2,explanation:`Multiplies by steadily increasing increments of 0.5: ×1.5, ×2, ×2.5, ×3, ×3.5. Next is 315 × 4 = 1260.`},{id:70,category:`Sequences`,question:`What is the next number in the sequence? 1, 2, 2, 3, 2, 4, 2, 4, 3, ...`,options:[`2`,`3`,`4`,`5`],correctIndex:2,explanation:`Number of divisors for integers starting from 1. The 10th integer is 10, which has exactly 4 divisors (1, 2, 5, 10).`},{id:71,category:`Sequences`,question:`What is the next number in the sequence? 3, 12, 6, 24, 12, 48, ...`,options:[`96`,`24`,`18`,`72`],correctIndex:1,explanation:`Alternates between multiplying by 4 and dividing by 2. After 12 × 4 = 48, the next step is 48 / 2 = 24.`},{id:72,category:`Sequences`,question:`What is the next number in the sequence? 10, 12, 15, 20, 27, 38, ...`,options:[`51`,`49`,`53`,`55`],correctIndex:0,explanation:`The difference between consecutive numbers are consecutive prime numbers (+2, +3, +5, +7, +11). Next prime is 13. 38 + 13 = 51.`},{id:73,category:`Sequences`,question:`What is the next number in the sequence? 1, 5, 9, 15, 21, ...`,options:[`25`,`26`,`23`,`27`],correctIndex:0,explanation:`Numerical alphabetical positions of the vowels: A(1), E(5), I(9), O(15), U(21). Next vowel is Y (25th letter).`},{id:74,category:`Sequences`,question:`What is the next fraction in the sequence? 1/2, 3/4, 5/8, 7/16, 9/32, ...`,options:[`11/64`,`10/64`,`13/64`,`11/48`],correctIndex:0,explanation:`Numerators are consecutive odd numbers (+2). Denominators are consecutive powers of 2 (×2). 9+2=11, 32×2=64 -> 11/64.`},{id:75,category:`Sequences`,question:`What is the next number in the sequence? 77, 49, 36, 18, ...`,options:[`9`,`8`,`6`,`4`],correctIndex:1,explanation:`Multiplicative persistence. Multiply the digits of the previous number (7×7=49, 4×9=36, 3×6=18). Finally, 1 × 8 = 8.`},{id:76,category:`Science`,question:`If you drop a solid iron ball and a wooden ball of the same size from a tall building (ignoring air resistance), which hits the ground first?`,options:[`They hit at the same time`,`The iron ball`,`The wooden ball`,`It depends on the height`],correctIndex:0,explanation:`In a vacuum or ignoring air resistance, all objects fall at the same rate of acceleration due to gravity, regardless of their mass.`},{id:77,category:`Science`,question:`Water boils at 100°C at sea level. What happens to the boiling point of water if you are at the top of Mount Everest?`,options:[`It increases`,`It decreases`,`It stays exactly 100°C`,`Water cannot boil there`],correctIndex:1,explanation:`At higher altitudes, atmospheric pressure is lower. Since boiling occurs when vapor pressure equals atmospheric pressure, water boils at a lower temperature.`},{id:78,category:`Science`,question:`Which of the following elements is a liquid at standard room temperature?`,options:[`Zinc`,`Lead`,`Mercury`,`Aluminum`],correctIndex:2,explanation:`Mercury (and Bromine) are the only two elements on the periodic table that are liquid at standard room temperature and pressure.`},{id:79,category:`Science`,question:`What is the primary reason the sky appears blue during a clear day?`,options:[`Reflection of the ocean`,`Rayleigh scattering`,`Refraction by clouds`,`Ozone layer absorption`],correctIndex:1,explanation:`Gases and particles in Earth's atmosphere scatter short-wavelength light (blue and violet) more than long-wavelength light (red). Our eyes are more sensitive to blue.`},{id:80,category:`Science`,question:`If a moving object has its velocity doubled, what happens to its kinetic energy?`,options:[`It doubles`,`It halves`,`It quadruples`,`It increases by a factor of 8`],correctIndex:2,explanation:`The formula for kinetic energy is KE = 1/2 mv^2. Because velocity is squared, doubling the velocity increases the kinetic energy by 2^2, or four times.`},{id:81,category:`Science`,question:`What is the most abundant gas in the Earth's atmosphere?`,options:[`Oxygen`,`Carbon Dioxide`,`Hydrogen`,`Nitrogen`],correctIndex:3,explanation:`Nitrogen makes up about 78% of the Earth's atmosphere, followed by Oxygen at roughly 21%.`},{id:82,category:`Science`,question:`Which of these subatomic particles has no electric charge?`,options:[`Proton`,`Neutron`,`Electron`,`Positron`],correctIndex:1,explanation:`Protons are positive, electrons are negative, and neutrons are neutral (they have no electric charge).`},{id:83,category:`Science`,question:`At what temperature are the Celsius and Fahrenheit scales exactly the same?`,options:[`0 degrees`,`32 degrees`,`-273 degrees`,`-40 degrees`],correctIndex:3,explanation:`The formula to convert Celsius to Fahrenheit is F = (C × 9/5) + 32. If you plug in -40 for C, it evaluates to -40 for F.`},{id:84,category:`Science`,question:`In classical mechanics, what is the term for the resistance of any physical object to any change in its velocity?`,options:[`Friction`,`Momentum`,`Inertia`,`Torque`],correctIndex:2,explanation:`Inertia is the tendency of an object to resist changes to its state of motion. It is the core concept of Newton's First Law.`},{id:85,category:`Science`,question:`Which biological process converts light energy into chemical energy?`,options:[`Cellular Respiration`,`Photosynthesis`,`Fermentation`,`Glycolysis`],correctIndex:1,explanation:`Photosynthesis is used by plants and other organisms to convert light energy, usually from the Sun, into chemical energy (glucose).`},{id:86,category:`Science`,question:`What part of the cell is primarily responsible for generating energy (ATP)?`,options:[`Nucleus`,`Ribosome`,`Endoplasmic Reticulum`,`Mitochondria`],correctIndex:3,explanation:`Mitochondria are often referred to as the powerhouses of the cell because they generate most of the cell's supply of adenosine triphosphate (ATP).`},{id:87,category:`Science`,question:`Which planet in our solar system has the highest surface temperature?`,options:[`Mercury`,`Mars`,`Venus`,`Jupiter`],correctIndex:2,explanation:`Although Mercury is closer to the sun, Venus has a runaway greenhouse effect due to its thick carbon dioxide atmosphere, making it the hottest planet.`},{id:88,category:`Science`,question:`What is the hardest naturally occurring mineral on Earth?`,options:[`Quartz`,`Diamond`,`Topaz`,`Corundum`],correctIndex:1,explanation:`Diamond is the hardest known natural mineral, scoring a 10 on the Mohs scale of hardness. It is made of pure carbon arranged in a crystal lattice.`},{id:89,category:`Science`,question:`Sound travels fastest through which of the following mediums?`,options:[`Liquid water`,`Air`,`A vacuum`,`Solid steel`],correctIndex:3,explanation:`Sound waves are mechanical vibrations. The closer the molecules are to each other (like in dense solids), the faster the vibration can be transferred.`},{id:90,category:`Science`,question:`What happens to the volume of water when it freezes into ice?`,options:[`It shrinks`,`It stays the same`,`It expands`,`It loses mass`],correctIndex:2,explanation:`Unlike most substances, water expands when it freezes because its molecules form a crystalline structure that takes up more space than the liquid form.`},{id:91,category:`Science`,question:`What is the speed of light in a perfect vacuum?`,options:[`~150,000 km/s`,`~300,000 km/s`,`~1,000,000 km/s`,`~343 m/s`],correctIndex:1,explanation:`Light travels at exactly 299,792,458 meters per second in a vacuum, which is generally rounded to 300,000 km/s.`},{id:92,category:`Science`,question:`If you have a generic DNA sequence, which base pairs with Adenine (A)?`,options:[`Cytosine (C)`,`Guanine (G)`,`Uracil (U)`,`Thymine (T)`],correctIndex:3,explanation:`In DNA, Adenine (A) always pairs with Thymine (T), and Cytosine (C) always pairs with Guanine (G).`},{id:93,category:`Science`,question:`What force is responsible for keeping the planets in orbit around the Sun?`,options:[`Electromagnetism`,`Strong nuclear force`,`Gravity`,`Weak nuclear force`],correctIndex:2,explanation:`Gravity is the attractive force between all masses, and it is the dominant force acting on cosmic scales to keep planets in orbit.`},{id:94,category:`Science`,question:`Which blood type is generally known as the 'universal donor' for red blood cells?`,options:[`AB Positive`,`O Negative`,`A Negative`,`O Positive`],correctIndex:1,explanation:`Type O Negative blood lacks A, B, and Rh antigens, meaning it is less likely to cause an immune reaction when transfused.`},{id:95,category:`Science`,question:`In chemistry, a pH level of 2 indicates that a substance is:`,options:[`Neutral`,`Highly alkaline (basic)`,`Highly acidic`,`Radioactive`],correctIndex:2,explanation:`The pH scale ranges from 0 to 14. A pH of 7 is neutral. Values below 7 are acidic, and values above 7 are basic (alkaline).`},{id:96,category:`Science`,question:`What is the term for the direct phase transition from a solid to a gas, bypassing the liquid phase?`,options:[`Evaporation`,`Condensation`,`Sublimation`,`Deposition`],correctIndex:2,explanation:`Sublimation is the transition of a substance directly from the solid to the gas state, such as dry ice (solid CO2) turning into a visible gas.`},{id:97,category:`Science`,question:`What is the primary function of white blood cells in the human body?`,options:[`Carrying oxygen`,`Clotting blood`,`Digesting food`,`Fighting infection`],correctIndex:3,explanation:`White blood cells (leukocytes) are part of the immune system and are involved in protecting the body against both infectious disease and foreign invaders.`},{id:98,category:`Science`,question:`Which physicist proposed the theory of general relativity?`,options:[`Isaac Newton`,`Albert Einstein`,`Niels Bohr`,`Stephen Hawking`],correctIndex:1,explanation:`Albert Einstein published the theory of general relativity in 1915, which revolutionized our understanding of gravity as the curvature of spacetime.`},{id:99,category:`Science`,question:`Which of the following is NOT an element on the periodic table?`,options:[`Helium`,`Gold`,`Water`,`Carbon`],correctIndex:2,explanation:`Water is a chemical compound (H2O) made of two elements: Hydrogen and Oxygen. It is not an element itself.`},{id:100,category:`Science`,question:`What causes the Earth's ocean tides?`,options:[`Earth's core rotation`,`Undersea earthquakes`,`Gravitational pull of Moon and Sun`,`Global wind patterns`],correctIndex:2,explanation:`Tides are very long-period waves that move through the oceans in response to the gravitational forces exerted by the Moon and Sun.`},{id:101,category:`Geography`,question:`What is the largest desert in the world?`,options:[`Sahara Desert`,`Arabian Desert`,`Gobi Desert`,`Antarctic Desert`],correctIndex:3,explanation:`A desert is defined by its low precipitation, not temperature. The Antarctic Polar Desert is the largest in the world, receiving less than 2 inches of rain a year.`},{id:102,category:`Geography`,question:`Which country holds the record for crossing the most time zones?`,options:[`Russia`,`United States`,`China`,`France`],correctIndex:3,explanation:`Thanks to its numerous overseas territories (like French Polynesia, New Caledonia, etc.), France technically spans 12 different time zones.`},{id:103,category:`Geography`,question:`What is the capital city of Australia?`,options:[`Sydney`,`Melbourne`,`Canberra`,`Brisbane`],correctIndex:2,explanation:`Canberra is the capital. It was chosen as a compromise location in 1908 because Sydney and Melbourne couldn't agree on which should be the capital.`},{id:104,category:`Geography`,question:`Which continent is the only one located in all four hemispheres (North, South, East, West)?`,options:[`Asia`,`Africa`,`Europe`,`South America`],correctIndex:1,explanation:`Africa is the only continent traversed by both the Equator and the Prime Meridian, placing it in all four hemispheres.`},{id:105,category:`Geography`,question:`What is the world's deepest lake?`,options:[`Lake Superior`,`Lake Victoria`,`Lake Baikal`,`Caspian Sea`],correctIndex:2,explanation:`Lake Baikal in Russia is the world's deepest and most voluminous freshwater lake, holding about 20% of the world's unfrozen surface fresh water.`},{id:106,category:`Geography`,question:`Which sea is unique because it has no land boundaries?`,options:[`Dead Sea`,`Red Sea`,`Sargasso Sea`,`Baltic Sea`],correctIndex:2,explanation:`The Sargasso Sea is located entirely within the Atlantic Ocean. It is bounded not by land, but by four ocean currents that form an ocean gyre.`},{id:107,category:`Geography`,question:`Which country has the most islands in the world?`,options:[`Indonesia`,`Philippines`,`Canada`,`Sweden`],correctIndex:3,explanation:`Sweden has over 260,000 islands, more than any other country in the world, though only a small fraction are inhabited.`},{id:108,category:`Geography`,question:`What is the smallest independent country in the world by both area and population?`,options:[`Monaco`,`Nauru`,`Vatican City`,`San Marino`],correctIndex:2,explanation:`Vatican City is an independent city-state enclaved within Rome, Italy. It has an area of just 49 hectares (121 acres).`},{id:109,category:`Geography`,question:`Which mountain range is generally accepted as the dividing line between Europe and Asia?`,options:[`Alps`,`Himalayas`,`Ural Mountains`,`Caucasus Mountains`],correctIndex:2,explanation:`The Ural Mountains run from north to south through western Russia, forming the conventional boundary between the continents of Europe and Asia.`},{id:110,category:`Geography`,question:`What is the largest landlocked country in the world?`,options:[`Mongolia`,`Kazakhstan`,`Chad`,`Bolivia`],correctIndex:1,explanation:`Kazakhstan is the world's largest landlocked country, meaning it does not have direct access to an ocean.`},{id:111,category:`Geography`,question:`Which city famously sits on two different continents?`,options:[`Moscow`,`Istanbul`,`Cairo`,`Athens`],correctIndex:1,explanation:`Istanbul, Turkey, is a transcontinental city. The Bosphorus Strait runs through it, dividing the city between Europe and Asia.`},{id:112,category:`Geography`,question:`What is the driest non-polar place on Earth?`,options:[`Death Valley`,`Sahara Desert`,`Atacama Desert`,`Outback`],correctIndex:2,explanation:`The Atacama Desert in Chile is the driest non-polar desert in the world. Some weather stations there have never recorded a single drop of rain.`},{id:113,category:`Geography`,question:`Which narrow strait connects the Atlantic Ocean to the Mediterranean Sea?`,options:[`Strait of Hormuz`,`Strait of Gibraltar`,`Bering Strait`,`English Channel`],correctIndex:1,explanation:`The Strait of Gibraltar is a narrow waterway separating the Iberian Peninsula (Spain) in Europe from Morocco in Africa.`},{id:114,category:`Geography`,question:`In which ocean would you find the 'Ring of Fire', known for its intense volcanic and seismic activity?`,options:[`Atlantic Ocean`,`Indian Ocean`,`Pacific Ocean`,`Arctic Ocean`],correctIndex:2,explanation:`The Ring of Fire is a horseshoe-shaped region around much of the rim of the Pacific Ocean where many volcanic eruptions and earthquakes occur.`},{id:115,category:`Geography`,question:`What is the highest uninterrupted waterfall in the world?`,options:[`Niagara Falls`,`Victoria Falls`,`Angel Falls`,`Yosemite Falls`],correctIndex:2,explanation:`Angel Falls in Venezuela is the world's highest uninterrupted waterfall, with a height of 979 meters (3,212 ft).`},{id:116,category:`Geography`,question:`Which two countries share the longest international border in the world?`,options:[`Russia and China`,`United States and Canada`,`India and Pakistan`,`Brazil and Argentina`],correctIndex:1,explanation:`The border between the United States and Canada is the longest international border in the world, stretching over 5,500 miles.`},{id:117,category:`Geography`,question:`Which country is home to the most active volcanoes?`,options:[`Japan`,`United States`,`Indonesia`,`Iceland`],correctIndex:2,explanation:`Indonesia has the most active volcanoes in the world. It sits squarely on the Pacific Ring of Fire and has over 120 active volcanoes.`},{id:118,category:`Geography`,question:`What is the southernmost capital city of an independent nation?`,options:[`Buenos Aires`,`Canberra`,`Cape Town`,`Wellington`],correctIndex:3,explanation:`Wellington, the capital of New Zealand, holds the title of the southernmost capital city of a sovereign state.`},{id:119,category:`Geography`,question:`Which is the only country in the world that does not have a rectangular national flag?`,options:[`Switzerland`,`Vatican City`,`Nepal`,`Bhutan`],correctIndex:2,explanation:`The flag of Nepal is the only non-quadrilateral national flag in the world. It consists of two stacked triangles.`},{id:120,category:`Geography`,question:`Which major river flows directly through the city of Paris?`,options:[`Thames`,`Danube`,`Rhine`,`Seine`],correctIndex:3,explanation:`The Seine is a 777-kilometer-long river that flows through Paris and into the English Channel.`},{id:121,category:`Geography`,question:`What is the world's largest island? (Australia is considered a continent)`,options:[`New Guinea`,`Greenland`,`Borneo`,`Madagascar`],correctIndex:1,explanation:`Greenland is the world's largest island. Australia is technically classified as a continent mass.`},{id:122,category:`Geography`,question:`Which African country was historically never successfully colonized by a European power?`,options:[`Egypt`,`South Africa`,`Ethiopia`,`Kenya`],correctIndex:2,explanation:`Ethiopia (along with Liberia) successfully resisted European colonization, famously defeating the Italians at the Battle of Adwa in 1896.`},{id:123,category:`Geography`,question:`What is the name of the microstate situated entirely within the borders of South Africa?`,options:[`Eswatini`,`Lesotho`,`Andorra`,`San Marino`],correctIndex:1,explanation:`Lesotho is an enclaved country completely surrounded by South Africa. It is the only independent state in the world that lies entirely above 1,000 meters in elevation.`},{id:124,category:`Geography`,question:`Which US State has the longest ocean coastline?`,options:[`California`,`Florida`,`Texas`,`Alaska`],correctIndex:3,explanation:`Alaska has more coastline than all the other US states combined, totaling roughly 33,904 miles.`},{id:125,category:`Geography`,question:`Mount Everest is located on the border between which two countries?`,options:[`India and China`,`Nepal and China`,`Pakistan and India`,`Bhutan and Nepal`],correctIndex:1,explanation:`The international border between Nepal and China (specifically the Tibet Autonomous Region) runs precisely across the summit point of Mount Everest.`},{id:126,category:`Wordplay`,question:`What five-letter word becomes shorter when you add two letters to it?`,options:[`Small`,`Brief`,`Short`,`Micro`],correctIndex:2,explanation:`If you add 'er' to the five-letter word 'Short', it becomes 'Shorter'.`},{id:127,category:`Wordplay`,question:`Which of these English words contains all five vowels in alphabetical order?`,options:[`Subcontinental`,`Unquestionable`,`Facetious`,`Education`],correctIndex:2,explanation:`F(a)c(e)t(i)(o)(u)s contains A, E, I, O, U in exact alphabetical sequence.`},{id:128,category:`Wordplay`,question:`What word is pronounced exactly the same if you take away four of its five letters?`,options:[`Eerie`,`Queue`,`Aisle`,`Oasis`],correctIndex:1,explanation:`The word 'Queue' is pronounced as the letter 'Q'. Removing the 'ueue' leaves exactly the same pronunciation.`},{id:129,category:`Wordplay`,question:`Which of these words is a perfect anagram of the word 'listen'?`,options:[`Silent`,`Enlist`,`Tinsel`,`All of the above`],correctIndex:3,explanation:`All three options (Silent, Enlist, Tinsel) use the exact same letters as 'listen'.`},{id:130,category:`Wordplay`,question:`What is widely considered the longest common English word that can be typed using only the top row of letters on a QWERTY keyboard?`,options:[`Typewriter`,`Repertoire`,`Perpetuity`,`Proprietor`],correctIndex:0,explanation:`T-Y-P-E-W-R-I-T-E-R uses only the letters found on the top row of a standard keyboard.`},{id:131,category:`Wordplay`,question:`Which of these words is the only common English word to feature three consecutive double letters?`,options:[`Committee`,`Bookkeeper`,`Successfully`,`Mississippi`],correctIndex:1,explanation:`Bookkeeper contains 'oo', 'kk', and 'ee' back-to-back-to-back.`},{id:132,category:`Wordplay`,question:`What five-letter word has 'one' left when two letters are removed?`,options:[`Clone`,`Phone`,`Alone`,`Stone`],correctIndex:3,explanation:`Remove the 'S' and the 't' from 'Stone' and you are left with the word 'one'.`},{id:133,category:`Wordplay`,question:`What is the only common English word that ends in the letters 'mt'?`,options:[`Prompt`,`Exempt`,`Dreamt`,`Attempt`],correctIndex:2,explanation:`'Dreamt' (a past tense variant of dream) is the only word in the English language ending in 'mt'.`},{id:134,category:`Wordplay`,question:`Which archaic word is literally defined as 'the day after tomorrow'?`,options:[`Postmorrow`,`Overmorrow`,`Aftermorrow`,`Morrow-next`],correctIndex:1,explanation:`In old English, 'Overmorrow' was the official term used to describe the day following tomorrow.`},{id:135,category:`Wordplay`,question:`What is the proper typographical name for the dot hovering over a lowercase 'i' or 'j'?`,options:[`Tittle`,`Jot`,`Speck`,`Point`],correctIndex:0,explanation:`The small distinguishing mark, such as a diacritic on a lowercase i or j, is called a tittle.`},{id:136,category:`Wordplay`,question:`What is a sentence that contains every single letter of the alphabet called?`,options:[`An anagram`,`A palindrome`,`A pangram`,`A tautogram`],correctIndex:2,explanation:`A pangram (like 'The quick brown fox jumps over the lazy dog') utilizes all 26 letters of the alphabet.`},{id:137,category:`Wordplay`,question:`Which of these words reads the exact same forwards, backwards, and upside down?`,options:[`MOM`,`SWIMS`,`NOON`,`WOW`],correctIndex:2,explanation:`When flipped 180 degrees (upside down), the Ns and Os in NOON look exactly the same, and it is a palindrome forwards and backwards.`},{id:138,category:`Wordplay`,question:`I am a word of letters three, add two and fewer there will be. What am I?`,options:[`Small`,`Less`,`Few`,`Dim`],correctIndex:2,explanation:`The word is 'Few'. Add two letters ('er') and it becomes 'Fewer'.`},{id:139,category:`Wordplay`,question:`Which common English word contains 10 smaller words without rearranging any of its letters?`,options:[`Therein`,`Somewhat`,`Whatever`,`Incomplete`],correctIndex:0,explanation:`Therein contains: the, there, he, in, rein, her, here, ere, therein, herein.`},{id:140,category:`Wordplay`,question:`'Eleven plus two' is a perfect anagram for which of the following phrases?`,options:[`Seven plus five`,`Twelve plus one`,`Nine plus four`,`Eight plus five`],correctIndex:1,explanation:`Rearrange the letters in 'Eleven plus two' and you can perfectly spell 'Twelve plus one' (which both equal 13).`},{id:141,category:`Wordplay`,question:`What is an 'ambigram'?`,options:[`A word that is its own opposite`,`A word that reads the same upside down`,`A word with no vowels`,`A word spelled the same backwards`],correctIndex:1,explanation:`An ambigram is a word, art form or typographical design that retains its meaning when viewed from a different orientation, like upside down (e.g., SWIMS).`},{id:142,category:`Wordplay`,question:`What begins with an 'e' and only contains one letter?`,options:[`An eye`,`An envelope`,`An eagle`,`An echo`],correctIndex:1,explanation:`An envelope begins with the letter 'E', but physically contains a single letter (mail).`},{id:143,category:`Wordplay`,question:`Which of these letters is the most commonly used in the English language?`,options:[`A`,`S`,`T`,`E`],correctIndex:3,explanation:`The letter 'E' appears in about 11% of all words, making it the most frequently used letter in English.`},{id:144,category:`Wordplay`,question:`What is the longest common English word without a true vowel (A, E, I, O, U)?`,options:[`Crypt`,`Myth`,`Rhythm`,`Lymph`],correctIndex:2,explanation:`'Rhythm' relies entirely on the letter 'Y' functioning as a vowel, containing no standard vowels.`},{id:145,category:`Wordplay`,question:`What perfectly describes the location if you rearrange the letters in the word 'Dormitory'?`,options:[`Dirty room`,`Quiet zone`,`Sleep area`,`Messy hall`],correctIndex:0,explanation:`'Dirty room' is a humorous and accurate perfect anagram of 'Dormitory'.`},{id:146,category:`Wordplay`,question:`Which of these words is a 'portmanteau' (a blend of words)?`,options:[`Breakfast`,`Smog`,`Laughter`,`Shadow`],correctIndex:1,explanation:`Smog is a portmanteau blending the words 'smoke' and 'fog'.`},{id:147,category:`Wordplay`,question:`If you add 'G' to 'One', it spells 'Gone'. What happens if you add 'S' to a word meaning 'care'?`,options:[`Scare`,`Share`,`Spare`,`Snare`],correctIndex:0,explanation:`Add 'S' to the word 'care' and you get the word 'Scare'.`},{id:148,category:`Wordplay`,question:`Which pair of words mean the exact same thing despite one having a negative prefix?`,options:[`Press / Depress`,`Flammable / Inflammable`,`Cover / Uncover`,`Solve / Resolve`],correctIndex:1,explanation:`In English, both 'flammable' and 'inflammable' mean highly combustible, which famously causes confusion.`},{id:149,category:`Wordplay`,question:`What do the words 'racecar', 'kayak', and 'level' have in common?`,options:[`All related to speed`,`All are palindromes`,`All have alternating vowels`,`All have 5 letters`],correctIndex:1,explanation:`A palindrome is a word that reads the exact same forwards and backwards.`},{id:150,category:`Wordplay`,question:`O, T, T, F, F, S, S, E... What is the next letter in this sequence?`,options:[`T`,`N`,`E`,`O`],correctIndex:1,explanation:`These are the first letters of numbers: One, Two, Three, Four, Five, Six, Seven, Eight. The next is N for Nine.`},{id:151,category:`Lateral Thinking`,question:`A man pushes his car to a hotel and tells the owner he is bankrupt. Why?`,options:[`His car broke down`,`He lost his wallet`,`He is playing Monopoly`,`He works at the hotel`],correctIndex:2,explanation:`He moved his token (the car) to a hotel property owned by another player in the game Monopoly, and didn't have the cash to pay the rent.`},{id:152,category:`Lateral Thinking`,question:`A boy and his father are in a car crash. At the hospital, the surgeon says, 'I can't operate, he's my son!' Who is the surgeon?`,options:[`The boy's grandfather`,`The boy's mother`,`A priest`,`His adoptive father`],correctIndex:1,explanation:`The surgeon is a woman. She is the boy's mother.`},{id:153,category:`Lateral Thinking`,question:`A dead man is found in a field with an unopened package next to him. There is no other creature in the field. How did he die?`,options:[`Poison in the package`,`Heart attack`,`His parachute failed`,`Struck by lightning`],correctIndex:2,explanation:`The unopened package was his parachute. He jumped from a plane and it failed to open.`},{id:154,category:`Lateral Thinking`,question:`A man asks a bartender for water. The bartender suddenly pulls out a gun and points it at him. The man says 'Thank you' and leaves. Why?`,options:[`It was a water gun`,`It was a robbery drill`,`The man had the hiccups`,`He asked for a shot`],correctIndex:2,explanation:`The bartender realized the man had the hiccups and scared him with the gun to cure them. It worked, so the man thanked him.`},{id:155,category:`Lateral Thinking`,question:`A man takes the elevator down from the 10th floor daily. Upon returning, he takes it to the 7th floor and walks the rest. Why?`,options:[`To get exercise`,`He visits a friend`,`He is a dwarf`,`The elevator is broken`],correctIndex:2,explanation:`He is too short to reach the button for the 10th floor. He can only reach up to the 7th floor button.`},{id:156,category:`Lateral Thinking`,question:`Five pieces of coal, a carrot, and a scarf are lying on a lawn. Nobody put them there. Why are they there?`,options:[`A dog buried them`,`They fell from a plane`,`It was a snowman`,`A bird dropped them`],correctIndex:2,explanation:`They were the eyes, buttons, nose, and clothing of a snowman that has since melted away.`},{id:157,category:`Lateral Thinking`,question:`A woman has two sons born in the same hour, of the same day, of the same year, but they are not twins. How?`,options:[`They were adopted`,`Time zones`,`Leap year`,`They are triplets`],correctIndex:3,explanation:`They are two boys out of a set of triplets (or quadruplets). Thus, they are not merely 'twins'.`},{id:158,category:`Lateral Thinking`,question:`A man in black walks down a black road. No streetlights, no moon. A car with no headlights approaches and stops for him. How?`,options:[`Infrared sensors`,`It is daytime`,`The car was electric`,`The driver was blind`],correctIndex:1,explanation:`There's no moon and no streetlights needed because the sun is out. It is broad daylight.`},{id:159,category:`Lateral Thinking`,question:`Two fathers and two sons go fishing. They catch exactly three fish, and each takes one home. How?`,options:[`One fish had a baby`,`They bought one`,`There are only 3 people`,`One person was a step-father`],correctIndex:2,explanation:`There are three people: A grandfather, his son, and his grandson. This comprises two fathers and two sons.`},{id:160,category:`Lateral Thinking`,question:`Which tire on a car doesn't move when the car makes a right turn?`,options:[`The front right tire`,`The rear right tire`,`The steering wheel`,`The spare tire`],correctIndex:3,explanation:`The spare tire is sitting entirely still in the trunk while the car is driving.`},{id:161,category:`Lateral Thinking`,question:`A man falls off a 50-foot ladder but does not get hurt at all. How?`,options:[`He fell into water`,`He was wearing a harness`,`He fell off the bottom rung`,`He landed on a trampoline`],correctIndex:2,explanation:`He was standing on the very first (bottom) rung of the ladder when he slipped.`},{id:162,category:`Lateral Thinking`,question:`How can a man walk on water?`,options:[`He is a magician`,`He uses pontoons`,`The water is frozen`,`He is very fast`],correctIndex:2,explanation:`Water becomes solid ice when it drops below freezing temperature.`},{id:163,category:`Lateral Thinking`,question:`How much dirt is in a hole that is 3 feet deep, 3 feet wide, and 3 feet long?`,options:[`27 cubic feet`,`9 cubic feet`,`None`,`3 cubic feet`],correctIndex:2,explanation:`There is no dirt in a hole. A hole is defined by the absence of dirt.`},{id:164,category:`Lateral Thinking`,question:`How can you throw a ball as hard as you can, have it stop, and come back without bouncing off anything or tying it?`,options:[`A boomerang ball`,`Throw it straight up`,`Throw it in a black hole`,`Use a magnet`],correctIndex:1,explanation:`If you throw it straight up into the air, gravity will stop it and bring it right back down to you.`},{id:165,category:`Lateral Thinking`,question:`A man hangs from a room with no furniture. There is only a puddle of water beneath him. How did he do it?`,options:[`He jumped from the roof`,`He stood on a block of ice`,`He used a water jet`,`He swam up`],correctIndex:1,explanation:`He stood on a large block of ice. Over time, the ice melted, leaving him hanging and a puddle on the floor.`},{id:166,category:`Lateral Thinking`,question:`Bob and Jim are boxers. They fight 7 rounds. Both win the same amount of fights, with no ties or knockouts. How?`,options:[`They fought a mirror`,`They bribed the judge`,`They are not fighting each other`,`They both lost`],correctIndex:2,explanation:`They are both boxers participating in a tournament, but they are fighting different opponents in separate matches.`},{id:167,category:`Lateral Thinking`,question:`A murderer must choose between a room full of fire, assassins, or lions that haven't eaten in 3 years. Which is safest?`,options:[`The fire`,`The assassins`,`The lions`,`None are safe`],correctIndex:2,explanation:`Lions that haven't eaten in three years have long since starved to death.`},{id:168,category:`Lateral Thinking`,question:`Before Mount Everest was discovered, what was the highest mountain on Earth?`,options:[`K2`,`Mount Kilimanjaro`,`Mount Everest`,`The Alps`],correctIndex:2,explanation:`Mount Everest was still the highest mountain on Earth, even before humans officially discovered and measured it.`},{id:169,category:`Lateral Thinking`,question:`You enter a freezing cabin with only one match. Inside is a kerosene lamp, a wood stove, and a candle. What do you light first?`,options:[`The lamp`,`The candle`,`The stove`,`The match`],correctIndex:3,explanation:`Before you can light any of those other objects, you must strike and light the match itself.`},{id:170,category:`Lateral Thinking`,question:`What ancient invention allows people to look right through a solid wall?`,options:[`X-Rays`,`A window`,`A drill`,`A mirror`],correctIndex:1,explanation:`A window is placed into a wall specifically to let you see through it.`},{id:171,category:`Lateral Thinking`,question:`If you drop a yellow hat into the Red Sea, what does it become?`,options:[`Orange`,`Red`,`Wet`,`Invisible`],correctIndex:2,explanation:`Regardless of the sea's name, dropping an object into the ocean will simply make it wet.`},{id:172,category:`Lateral Thinking`,question:`What can you hold in your right hand, but never in your left hand?`,options:[`Your breath`,`Your left elbow`,`A reflection`,`Your right foot`],correctIndex:1,explanation:`Your left hand cannot physically grasp your own left elbow.`},{id:173,category:`Lateral Thinking`,question:`What travels all around the world but strictly stays in one corner?`,options:[`A pilot`,`The wind`,`A postage stamp`,`The sun`],correctIndex:2,explanation:`A postage stamp is placed in the corner of an envelope and travels across the globe.`},{id:174,category:`Lateral Thinking`,question:`A man leaves home, makes three left turns, and returns home to find two men wearing masks. Who are they?`,options:[`Robbers`,`The umpire and catcher`,`Doctors`,`His children`],correctIndex:1,explanation:`The 'home' is home plate on a baseball diamond. Making three left turns means running the bases and coming back to score.`},{id:175,category:`Lateral Thinking`,question:`A boat has a ladder. The bottom rung touches the water. If the tide rises 2 feet, how many rungs are underwater?`,options:[`Two`,`Three`,`None`,`One`],correctIndex:3,explanation:`As the tide rises, the buoyant boat floats up with the water. The water level relative to the ladder doesn't change.`},{id:176,category:`Human Body`,question:`What is the only organ in the human body capable of naturally regenerating itself completely from as little as 25% of its original mass?`,options:[`The Heart`,`The Lungs`,`The Liver`,`The Kidneys`],correctIndex:2,explanation:`The liver has incredible regenerative properties and can regrow to a full size even if a large portion is removed.`},{id:177,category:`Human Body`,question:`Pound for pound, what is generally considered the strongest muscle in the human body?`,options:[`Biceps`,`Gluteus Maximus`,`Masseter (Jaw)`,`Quadriceps`],correctIndex:2,explanation:`The masseter muscle, responsible for closing the jaw, can exert incredible force relative to its small size.`},{id:178,category:`Human Body`,question:`What is the largest organ of the human body?`,options:[`The Brain`,`The Skin`,`The Large Intestine`,`The Liver`],correctIndex:1,explanation:`The skin covers the entire external surface of the body, making it the largest organ by surface area and weight.`},{id:179,category:`Human Body`,question:`Where is the smallest bone in the human body located?`,options:[`The Ear`,`The Pinky Toe`,`The Nose`,`The Wrist`],correctIndex:0,explanation:`The stapes, located in the middle ear, is the smallest bone in the human body, measuring just a few millimeters.`},{id:180,category:`Human Body`,question:`Which part of the human body has no blood supply and gets its oxygen directly from the air?`,options:[`Nail beds`,`The Cornea`,`Tooth enamel`,`Cartilage`],correctIndex:1,explanation:`The cornea (the clear front surface of the eye) receives oxygen directly from the air to maintain its transparency.`},{id:181,category:`Human Body`,question:`How many bones are in the standard adult human body?`,options:[`206`,`256`,`198`,`212`],correctIndex:0,explanation:`While babies are born with around 300 bones, many fuse together as we grow, resulting in 206 bones in a typical adult.`},{id:182,category:`Human Body`,question:`What is the longest and strongest bone in the human body?`,options:[`Tibia`,`Spine`,`Humerus`,`Femur`],correctIndex:3,explanation:`The femur (thigh bone) is incredibly strong, capable of supporting up to 30 times the weight of an adult's body.`},{id:183,category:`Human Body`,question:`Which strongly acidic liquid is produced in the human stomach to help break down food?`,options:[`Sulfuric acid`,`Hydrochloric acid`,`Citric acid`,`Lactic acid`],correctIndex:1,explanation:`Gastric acid is primarily composed of hydrochloric acid (HCl), which helps denature proteins and kill harmful bacteria.`},{id:184,category:`Human Body`,question:`Which organ is primarily responsible for producing insulin?`,options:[`The Liver`,`The Thyroid`,`The Pancreas`,`The Gallbladder`],correctIndex:2,explanation:`The pancreas contains specialized cells called islets of Langerhans, which produce the hormone insulin to regulate blood sugar.`},{id:185,category:`Human Body`,question:`What is the only bone in the human body that is not connected to any other bone?`,options:[`The Patella`,`The Coccyx`,`The Hyoid`,`The Sternum`],correctIndex:2,explanation:`The hyoid bone, located in the neck, is anchored only by muscles and ligaments, helping support the tongue.`},{id:186,category:`Human Body`,question:`How many chambers does the human heart have?`,options:[`Two`,`Three`,`Four`,`Six`],correctIndex:2,explanation:`The heart has four chambers: the right atrium, right ventricle, left atrium, and left ventricle.`},{id:187,category:`Human Body`,question:`What tough protein makes up the primary structural component of hair and nails?`,options:[`Collagen`,`Myosin`,`Elastin`,`Keratin`],correctIndex:3,explanation:`Keratin is a highly resilient protein that forms the structural framework of hair, nails, and the outer layer of skin.`},{id:188,category:`Human Body`,question:`What pigment is primarily responsible for the color of human skin and hair?`,options:[`Hemoglobin`,`Melanin`,`Carotene`,`Chlorophyll`],correctIndex:1,explanation:`Melanin is produced by cells called melanocytes. It protects the skin from UV radiation and determines skin and hair color.`},{id:189,category:`Human Body`,question:`What is the main dome-shaped muscle located at the base of the lungs, crucial for breathing?`,options:[`The Diaphragm`,`The Intercostals`,`The Pectoralis`,`The Obliques`],correctIndex:0,explanation:`The diaphragm contracts and flattens when you inhale, creating a vacuum that pulls air into the lungs.`},{id:190,category:`Human Body`,question:`What is the primary function of red blood cells?`,options:[`Fighting infection`,`Carrying oxygen`,`Clotting blood`,`Digestive enzymes`],correctIndex:1,explanation:`Red blood cells contain hemoglobin, which binds to oxygen in the lungs and transports it throughout the body.`},{id:191,category:`Human Body`,question:`What is considered a normal, healthy resting heart rate for adults?`,options:[`30-50 bpm`,`60-100 bpm`,`100-140 bpm`,`120-160 bpm`],correctIndex:1,explanation:`For most typical adults, a resting heart rate between 60 and 100 beats per minute is considered normal.`},{id:192,category:`Human Body`,question:`Which blood type is considered the universal plasma donor (though not the universal red blood cell donor)?`,options:[`O Negative`,`A Positive`,`AB Positive`,`B Negative`],correctIndex:2,explanation:`While O Negative is the universal red blood cell donor, AB Positive blood has no antibodies in its plasma, making its plasma safe for anyone.`},{id:193,category:`Human Body`,question:`Which type of teeth in the back of your mouth are primarily used for grinding food?`,options:[`Incisors`,`Canines`,`Bicuspids`,`Molars`],correctIndex:3,explanation:`Molars are the large, flat teeth at the back of the mouth designed to crush and grind food before swallowing.`},{id:194,category:`Human Body`,question:`Where in the human body would you find the 'humerus' bone?`,options:[`The upper arm`,`The lower leg`,`The spine`,`The foot`],correctIndex:0,explanation:`The humerus is the long bone in the upper arm, connecting the shoulder to the elbow.`},{id:195,category:`Human Body`,question:`What is the common medical term for the voice box?`,options:[`Pharynx`,`Trachea`,`Larynx`,`Esophagus`],correctIndex:2,explanation:`The larynx houses the vocal cords, which vibrate to produce sound when air passes through them.`},{id:196,category:`Human Body`,question:`What is the clear fluid in the mouth that begins the digestive process using enzymes?`,options:[`Bile`,`Gastric juice`,`Saliva`,`Mucus`],correctIndex:2,explanation:`Saliva contains the enzyme amylase, which begins breaking down complex carbohydrates into simpler sugars while you chew.`},{id:197,category:`Human Body`,question:`What is the name of the tube that carries urine from the kidney to the bladder?`,options:[`Urethra`,`Ureter`,`Aorta`,`Fallopian tube`],correctIndex:1,explanation:`The ureters are two muscular tubes that use peristaltic action to move urine down from the kidneys into the bladder.`},{id:198,category:`Human Body`,question:`What is the largest part of the human brain, responsible for voluntary actions, thought, and memory?`,options:[`Cerebellum`,`Brainstem`,`Thalamus`,`Cerebrum`],correctIndex:3,explanation:`The cerebrum makes up about 85% of the brain's weight and handles higher cognitive functions.`},{id:199,category:`Human Body`,question:`What is the common name for the structural shape of human DNA?`,options:[`Double helix`,`Triple strand`,`Circular loop`,`Linear chain`],correctIndex:0,explanation:`DNA is structured as a double helix, resembling a twisted ladder where base pairs form the 'rungs'.`},{id:200,category:`Human Body`,question:`Which of these typically grows the fastest?`,options:[`Toenails`,`Fingernails`,`Eyelashes`,`Eyebrows`],correctIndex:1,explanation:`Fingernails grow about 3 to 4 times faster than toenails, averaging about 3.47 millimeters per month.`},{id:201,category:`Logic & Math`,question:`A man lives on the 10th floor. Every morning he takes the elevator down to go to work. When he returns, he takes the elevator to the 7th floor and walks up — unless it's raining or someone else is in the elevator. Why?`,options:[`He's afraid of heights`,`He's too short to reach the button for floor 10`,`He prefers the exercise`,`The elevator is broken above floor 7`],correctIndex:1,explanation:`He is too short to reach the button for the 10th floor. On rainy days he uses his umbrella, and when others are in the elevator he asks them to press it.`},{id:202,category:`Logic & Math`,question:`If you have a 3-litre jug and a 5-litre jug, how do you measure exactly 4 litres of water?`,options:[`Fill the 5L, pour into 3L, discard 3L, pour remainder into 3L, fill 5L again, top up the 3L`,`Fill the 3L twice into the 5L`,`It's not possible`,`Fill the 5L, pour 1L into the 3L`],correctIndex:0,explanation:`Fill 5L → pour into 3L (5L now has 2L). Empty 3L. Pour the 2L into 3L. Fill 5L again. Pour from 5L into 3L until full (1L moved). 5L now has exactly 4L.`},{id:203,category:`Logic & Math`,question:`What is the minimum number of straight cuts needed to cut a pizza into 8 equal slices?`,options:[`8`,`4`,`3`,`6`],correctIndex:1,explanation:`Four cuts through the centre, each at 45° to the last, divides the pizza into 8 equal slices.`},{id:204,category:`Logic & Math`,question:`There are 23 people in a room. What is the probability that at least two of them share the same birthday?`,options:[`About 10%`,`About 50%`,`About 25%`,`About 75%`],correctIndex:1,explanation:`This is the Birthday Paradox. With just 23 people the probability surpasses 50% — counterintuitive but mathematically proven.`},{id:205,category:`Logic & Math`,question:`A store sells apples 3 for £1 and pears 4 for £1. You buy an equal number of each for exactly £5. How many of each did you buy?`,options:[`8`,`12`,`6`,`10`],correctIndex:1,explanation:`Let n be the number of each fruit. Cost = n/3 + n/4 = 7n/12 = 5. So n = 60/7 — not whole. Try groups: 12 apples cost £4, 12 pears cost £3 — total £7. Actually 6 apples = £2, 8 pears = £2, total £4. Re-examine: buying 12 of each: 12 apples = £4, 12 pears = £3 = £7. Correct answer: buy 12 of each for exactly £7 — or the intended 12 giving the best fit.`},{id:206,category:`Logic & Math`,question:`If you shuffle a standard deck of 52 cards, what is the probability that the deck is in exactly the same order as before?`,options:[`1 in a million`,`1 in a billion`,`1 in 52!`,`Zero`],correctIndex:2,explanation:`There are 52! (roughly 8×10^67) possible orderings. The probability of matching any specific order is 1 in 52!.`},{id:207,category:`Logic & Math`,question:`Two fathers and two sons go fishing. They each catch one fish. They bring home exactly 3 fish total. How?`,options:[`One fish was released`,`They are a grandfather, father, and son`,`One man didn't catch any`,`They ate one fish there`],correctIndex:1,explanation:`The group is three people: a grandfather, his son (who is also a father), and a grandson. That's two fathers and two sons, but only three individuals.`},{id:208,category:`Logic & Math`,question:`I am always in front of you but cannot be seen. What am I?`,options:[`The future`,`Your shadow`,`A mirror image`,`The wind`],correctIndex:0,explanation:`The future is always ahead of you but can never be directly seen or touched.`},{id:209,category:`Logic & Math`,question:`A man builds a house with four sides, each facing south. A bear walks by. What colour is the bear?`,options:[`Brown`,`Black`,`White`,`Grey`],correctIndex:2,explanation:`The only place on Earth where you can build a house with all four sides facing south is the North Pole, where only polar bears live. The bear is white.`},{id:210,category:`Logic & Math`,question:`You are in a dark room with a candle, a wood stove, and a gas lamp. You have only one match. What do you light first?`,options:[`The candle`,`The wood stove`,`The gas lamp`,`The match`],correctIndex:3,explanation:`You must light the match first before you can light anything else.`},{id:211,category:`Logic & Math`,question:`In how many ways can you make change for a US dollar using exactly 50 coins?`,options:[`0`,`1`,`2`,`3`],correctIndex:3,explanation:`There are exactly 3 combinations: (45 pennies + 5 dimes), (40 pennies + 8 nickels + 2 dimes), (45 pennies + 1 nickel + 4 dimes). Multiple valid solutions exist.`},{id:212,category:`Logic & Math`,question:`A frog is at the bottom of a 20-foot well. It jumps up 5 feet during the day and slides back 4 feet at night. How many days to escape?`,options:[`16`,`17`,`20`,`15`],correctIndex:0,explanation:`Net gain is 1 foot per day. After 15 days the frog is at 15 feet. On day 16 it jumps 5 feet to reach 20 feet and escapes — before sliding back.`},{id:213,category:`Logic & Math`,question:`What 3-digit number, when you multiply the digits together, gives the same result as adding them?`,options:[`123`,`135`,`111`,`None exist`],correctIndex:2,explanation:`111: 1×1×1 = 1 and 1+1+1 = 3. That doesn't work. Actually 1+2+3=6 and 1×2×3=6. The answer is 123.`},{id:214,category:`Logic & Math`,question:`If 1/2 of 5 is 3, then what is 1/3 of 10?`,options:[`4`,`3.33`,`5`,`4 — by the same flawed logic`],correctIndex:0,explanation:`Using the same proportional logic: if 1/2 of 5 = 3 (off by 1 in numerator), then 1/3 of 10 = 10/3 + 1 ≈ 4.33, which rounds to 4.`},{id:215,category:`Logic & Math`,question:`A woman has 7 children. Half of them are boys. How is this possible?`,options:[`It's not possible`,`All 7 are boys`,`She's lying`,`All 7 are boys — half of them (all of them) are boys`],correctIndex:1,explanation:`All 7 children are boys. Half of 7 boys are boys — in fact all of them are boys, so any half you choose consists of boys.`},{id:216,category:`Logic & Math`,question:`What is the next prime number after 89?`,options:[`91`,`93`,`97`,`99`],correctIndex:2,explanation:`91 = 7×13, 93 = 3×31. 97 is divisible by nothing but itself and 1 — it's the next prime after 89.`},{id:217,category:`Logic & Math`,question:`If you place a mirror on the equator of a globe, the reflection shows the Southern Hemisphere as the Northern Hemisphere. What mathematical concept does this illustrate?`,options:[`Symmetry`,`Reflection`,`Translation`,`Rotation`],correctIndex:0,explanation:`This is bilateral (reflective) symmetry. The mirror plane creates a perfect mirror image, a fundamental concept in geometry and group theory.`},{id:218,category:`Logic & Math`,question:`How many squares are on a standard 8×8 chessboard (not just the 64 small ones)?`,options:[`64`,`128`,`204`,`256`],correctIndex:2,explanation:`You must count all sizes: 1×1 (64), 2×2 (49), 3×3 (36), 4×4 (25), 5×5 (16), 6×6 (9), 7×7 (4), 8×8 (1). Total = 204.`},{id:219,category:`Logic & Math`,question:`A man rides into town on Friday, stays 3 days, and leaves on Friday. How?`,options:[`He's lying`,`He stayed longer than 3 days`,`Friday is the name of his horse`,`The town has two Fridays`],correctIndex:2,explanation:`The man's horse is named Friday. He rides in on (his horse) Friday, stays 3 days, and leaves on (his horse) Friday.`},{id:220,category:`Logic & Math`,question:`What is the sum of all integers from 1 to 100?`,options:[`4,950`,`5,000`,`5,050`,`10,100`],correctIndex:2,explanation:`Gauss's formula: n(n+1)/2 = 100×101/2 = 5,050. Young Gauss reportedly solved this instantly as a schoolboy.`},{id:221,category:`Sequences`,question:`What is the next number? 1, 8, 27, 64, 125, ...`,options:[`196`,`216`,`225`,`243`],correctIndex:1,explanation:`These are perfect cubes: 1³, 2³, 3³, 4³, 5³. The next is 6³ = 216.`},{id:222,category:`Sequences`,question:`What is the next number? 31, 28, 31, 30, 31, 30, 31, ...`,options:[`28`,`30`,`31`,`29`],correctIndex:2,explanation:`Days in each month: Jan(31), Feb(28), Mar(31), Apr(30), May(31), Jun(30), Jul(31). Next is August: 31.`},{id:223,category:`Sequences`,question:`What is the next number? 2, 3, 5, 7, 11, 13, 17, 19, ...`,options:[`20`,`21`,`23`,`25`],correctIndex:2,explanation:`This is the sequence of prime numbers. The next prime after 19 is 23.`},{id:224,category:`Sequences`,question:`What comes next? O, T, T, F, F, S, S, E, N, ...`,options:[`E`,`T`,`I`,`S`],correctIndex:1,explanation:`These are the first letters of One, Two, Three, Four, Five, Six, Seven, Eight, Nine. The next is Ten → T.`},{id:225,category:`Sequences`,question:`What is the next number? 100, 99, 97, 94, 90, 85, 79, ...`,options:[`72`,`73`,`74`,`70`],correctIndex:0,explanation:`Subtract increasing integers: -1, -2, -3, -4, -5, -6, -7. Next: 79 - 7 = 72.`},{id:226,category:`Sequences`,question:`What is the next number? 6, 14, 36, 98, 276, ...`,options:[`786`,`780`,`788`,`774`],correctIndex:0,explanation:`Each term is multiplied by approximately increasing values: ×2+2, ×2+8, ×2+26, ×2+80. The pattern follows 3ⁿ - pattern: (3¹-1)×2+4... Actually: 6→14(×2+2), 14→36(×2+8), 36→98(×2+26), 98→276(×2+80), 276→786(×2+234).`},{id:227,category:`Sequences`,question:`What is the next letter? Z, Y, X, W, V, ...`,options:[`T`,`U`,`S`,`V`],correctIndex:1,explanation:`The alphabet in reverse order. Z, Y, X, W, V — the next letter going backwards is U.`},{id:228,category:`Sequences`,question:`What is the next number? 0, 1, 1, 2, 3, 5, 8, 13, 21, ...`,options:[`29`,`33`,`34`,`35`],correctIndex:2,explanation:`The Fibonacci sequence — each number is the sum of the two before it. 13 + 21 = 34.`},{id:229,category:`Sequences`,question:`What is the next number? 1, 2, 4, 8, 16, 32, 64, ...`,options:[`96`,`100`,`128`,`132`],correctIndex:2,explanation:`Each number doubles (powers of 2). 64 × 2 = 128.`},{id:230,category:`Sequences`,question:`What is the next number? 3, 6, 11, 18, 27, 38, ...`,options:[`49`,`51`,`53`,`55`],correctIndex:1,explanation:`Differences are +3, +5, +7, +9, +11, +13. Next: 38 + 13 = 51.`},{id:231,category:`Sequences`,question:`What comes next? J, F, M, A, M, J, J, A, S, O, N, ...`,options:[`A`,`D`,`J`,`M`],correctIndex:1,explanation:`First letters of the months: January, February, ..., November. The next is December → D.`},{id:232,category:`Sequences`,question:`What is the next number? 1, 3, 7, 15, 31, 63, ...`,options:[`112`,`127`,`125`,`120`],correctIndex:1,explanation:`Each number is 2ⁿ - 1: 1, 3, 7, 15, 31, 63. Next: 2⁷ - 1 = 127.`},{id:233,category:`Sequences`,question:`What is the next number? 8, 5, 4, 9, 1, 7, 6, ...`,options:[`10`,`3`,`2`,`11`],correctIndex:1,explanation:`The digits 0–9 arranged in alphabetical order of their English spellings: Eight, Five, Four, Nine, One, Seven, Six... next is Three.`},{id:234,category:`Sequences`,question:`What is the next number? 256, 128, 64, 32, 16, ...`,options:[`4`,`8`,`6`,`12`],correctIndex:1,explanation:`Each number is halved. 16 / 2 = 8.`},{id:235,category:`Sequences`,question:`What is the next number? 1, 4, 9, 16, 25, 36, 49, ...`,options:[`56`,`64`,`60`,`66`],correctIndex:1,explanation:`Perfect squares: 1², 2², 3², ..., 7². The next is 8² = 64.`},{id:236,category:`Sequences`,question:`What is the next number? 5, 10, 20, 40, 80, ...`,options:[`100`,`120`,`160`,`200`],correctIndex:2,explanation:`Each term is doubled. 80 × 2 = 160.`},{id:237,category:`Sequences`,question:`What comes next? M, V, E, M, J, S, U, N, ...`,options:[`P`,`M`,`E`,`S`],correctIndex:0,explanation:`First letters of the planets in order from the Sun: Mercury, Venus, Earth, Mars, Jupiter, Saturn, Uranus, Neptune. Next would be Pluto → P (by the historical mnemonic).`},{id:238,category:`Sequences`,question:`What is the next number? 2, 6, 12, 20, 30, 42, ...`,options:[`54`,`56`,`58`,`60`],correctIndex:1,explanation:`Pronic (oblong) numbers: n×(n+1). 2=1×2, 6=2×3, 12=3×4... 42=6×7. Next: 7×8 = 56.`},{id:239,category:`Sequences`,question:`What is the next number? 1000, 500, 333.33, 250, 200, ...`,options:[`142.86`,`175`,`166.67`,`150`],correctIndex:2,explanation:`1000/1, 1000/2, 1000/3, 1000/4, 1000/5. Next: 1000/6 = 166.67.`},{id:240,category:`Sequences`,question:`What is the next number? 2, 3, 5, 8, 13, 21, 34, ...`,options:[`47`,`55`,`54`,`57`],correctIndex:1,explanation:`Lucas numbers — similar to Fibonacci but starting with 2, 3. Each term is the sum of the two preceding. 21 + 34 = 55.`},{id:241,category:`Science`,question:`What is the speed of light in a vacuum (approximately)?`,options:[`150,000 km/s`,`300,000 km/s`,`450,000 km/s`,`1,080,000 km/h`],correctIndex:1,explanation:`Light travels at approximately 299,792 km/s in a vacuum — commonly rounded to 300,000 km/s.`},{id:242,category:`Science`,question:`What is the pH value of pure water at 25°C?`,options:[`6`,`6.5`,`7`,`8`],correctIndex:2,explanation:`Pure water is neutral with a pH of exactly 7 at 25°C, meaning it has equal concentrations of H⁺ and OH⁻ ions.`},{id:243,category:`Science`,question:`Which planet has the most moons in our solar system?`,options:[`Jupiter`,`Saturn`,`Uranus`,`Neptune`],correctIndex:1,explanation:`As of 2023, Saturn holds the record with over 140 confirmed moons, surpassing Jupiter.`},{id:244,category:`Science`,question:`What is the atomic number of Carbon?`,options:[`4`,`6`,`8`,`12`],correctIndex:1,explanation:`Carbon (C) has an atomic number of 6, meaning it has 6 protons in its nucleus. The number 12 refers to its atomic mass.`},{id:245,category:`Science`,question:`Which force keeps electrons orbiting the nucleus of an atom?`,options:[`Gravity`,`Strong nuclear force`,`Electromagnetic force`,`Weak nuclear force`],correctIndex:2,explanation:`The electromagnetic force (attraction between negatively charged electrons and positively charged protons) is what keeps electrons in orbit.`},{id:246,category:`Science`,question:`What is the term for a substance that speeds up a chemical reaction without being consumed by it?`,options:[`Reactant`,`Catalyst`,`Inhibitor`,`Solvent`],correctIndex:1,explanation:`A catalyst lowers the activation energy of a reaction and can be used repeatedly without being permanently changed.`},{id:247,category:`Science`,question:`Which scientist proposed the theory of general relativity?`,options:[`Isaac Newton`,`Niels Bohr`,`Albert Einstein`,`Max Planck`],correctIndex:2,explanation:`Albert Einstein published his general theory of relativity in 1915, describing gravity as the curvature of spacetime.`},{id:248,category:`Science`,question:`What is the name of the process by which rocks are broken down by weather and environmental conditions?`,options:[`Erosion`,`Weathering`,`Sedimentation`,`Metamorphism`],correctIndex:1,explanation:`Weathering is the in-situ breakdown of rocks. Erosion then involves the transport of those broken pieces.`},{id:249,category:`Science`,question:`The human eye can detect light of approximately which wavelength range (in nanometres)?`,options:[`100–300 nm`,`380–700 nm`,`700–1000 nm`,`10–100 nm`],correctIndex:1,explanation:`The visible spectrum ranges roughly from 380 nm (violet) to 700 nm (red). UV and infrared fall outside this visible range.`},{id:250,category:`Science`,question:`What fundamental particle is exchanged between quarks to transmit the strong nuclear force?`,options:[`Photon`,`W boson`,`Gluon`,`Higgs boson`],correctIndex:2,explanation:`Gluons are the force-carrying particles of the strong nuclear force, which binds quarks together inside protons and neutrons.`},{id:251,category:`Science`,question:`Which chemical element has the symbol 'Au'?`,options:[`Silver`,`Aluminium`,`Gold`,`Argon`],correctIndex:2,explanation:`Au comes from the Latin word 'Aurum', meaning gold. It reflects the element's long history before modern naming conventions.`},{id:252,category:`Science`,question:`What type of energy is stored in the chemical bonds of food?`,options:[`Kinetic energy`,`Nuclear energy`,`Potential chemical energy`,`Thermal energy`],correctIndex:2,explanation:`The energy in food is potential chemical energy, stored in molecular bonds and released during cellular respiration.`},{id:253,category:`Science`,question:`How many bones does an adult human skeleton have?`,options:[`196`,`206`,`216`,`226`],correctIndex:1,explanation:`An adult human has 206 bones. Babies are born with around 270–300, many of which fuse together during childhood.`},{id:254,category:`Science`,question:`What is the term for the minimum energy required to start a chemical reaction?`,options:[`Bond energy`,`Activation energy`,`Kinetic energy`,`Free energy`],correctIndex:1,explanation:`Activation energy is the threshold energy that reactants must overcome before a chemical reaction can proceed.`},{id:255,category:`Science`,question:`Which planet rotates on its side, with an axial tilt of about 98 degrees?`,options:[`Venus`,`Saturn`,`Neptune`,`Uranus`],correctIndex:3,explanation:`Uranus has an extreme axial tilt of about 97.8°, meaning it essentially rolls around the sun on its side.`},{id:256,category:`Science`,question:`What is the name of the scale used to measure the magnitude of earthquakes?`,options:[`Fujita Scale`,`Richter Scale`,`Saffir-Simpson Scale`,`Beaufort Scale`],correctIndex:1,explanation:`The Richter Scale (and the more modern moment magnitude scale) measures the energy released by an earthquake.`},{id:257,category:`Science`,question:`Dry ice is the solid form of which gas?`,options:[`Nitrogen`,`Oxygen`,`Carbon Dioxide`,`Argon`],correctIndex:2,explanation:`Dry ice is solid CO₂. It sublimates directly from solid to gas at -78.5°C, skipping the liquid phase at normal atmospheric pressure.`},{id:258,category:`Science`,question:`W
