Index:1,explanation:`The Achilles tendon connects the calf muscles to the heel bone, enduring massive force during walking, running, and jumping.`},{id:519,category:`Human Body`,question:`Which fat-soluble vitamin is absolutely essential for the process of blood clotting to heal wounds?`,options:[`Vitamin A`,`Vitamin C`,`Vitamin D`,`Vitamin K`],correctIndex:3,explanation:`Vitamin K is a crucial component needed by the body to produce prothrombin, a protein and clotting factor.`},{id:520,category:`Human Body`,question:`What are the smallest and most numerous blood vessels in the human body called?`,options:[`Arterioles`,`Venules`,`Capillaries`,`Aortas`],correctIndex:2,explanation:`Capillaries are so microscopic that red blood cells must often travel through them in a single file line to exchange oxygen and nutrients.`},{id:521,category:`Human Body`,question:`Which butterfly-shaped gland located in the neck is primarily responsible for regulating the body's metabolism?`,options:[`Pituitary gland`,`Adrenal gland`,`Thyroid gland`,`Thymus`],correctIndex:2,explanation:`The thyroid gland produces hormones (T3 and T4) that dictate the speed and efficiency of the body's metabolic rate.`},{id:522,category:`Human Body`,question:`What tough bands of fibrous connective tissue connect two bones together to stabilize a joint?`,options:[`Tendons`,`Ligaments`,`Cartilage`,`Fascia`],correctIndex:1,explanation:`Ligaments connect bone to bone, whereas tendons connect muscle to bone.`},{id:523,category:`Logic & Math`,question:`What is the square root of 169?`,options:[`11`,`12`,`13`,`14`],correctIndex:2,explanation:`13 multiplied by 13 equals 169.`},{id:524,category:`Logic & Math`,question:`If you have a right-angled triangle and one of the other angles is 40 degrees, what is the third angle?`,options:[`40 degrees`,`50 degrees`,`90 degrees`,`180 degrees`],correctIndex:1,explanation:`The angles of a triangle always add up to 180. A right angle is 90. 180 - 90 - 40 = 50 degrees.`},{id:525,category:`Logic & Math`,question:`What is the value of 5! (5 factorial)?`,options:[`25`,`60`,`120`,`100`],correctIndex:2,explanation:`Factorial means multiplying the number by every whole number below it. 5 x 4 x 3 x 2 x 1 = 120.`},{id:526,category:`Logic & Math`,question:`How many fluid ounces are in a standard U.S. cup?`,options:[`6`,`8`,`12`,`16`],correctIndex:1,explanation:`A standard U.S. measuring cup holds exactly 8 fluid ounces.`},{id:527,category:`Logic & Math`,question:`If a baker's dozen is 13, how many items are in exactly three baker's dozens?`,options:[`36`,`39`,`40`,`42`],correctIndex:1,explanation:`A baker's dozen consists of 13 items. 13 multiplied by 3 equals 39.`},{id:528,category:`Logic & Math`,question:`What is 3 to the power of 4?`,options:[`12`,`27`,`81`,`64`],correctIndex:2,explanation:`3 multiplied by itself four times (3 x 3 x 3 x 3) equals 81.`},{id:529,category:`Logic & Math`,question:`How many sides does a hexagon have?`,options:[`5`,`6`,`7`,`8`],correctIndex:1,explanation:`A hexagon is a polygon with exactly 6 sides.`},{id:530,category:`Logic & Math`,question:`What is 20% of 250?`,options:[`25`,`40`,`50`,`75`],correctIndex:2,explanation:`10% of 250 is 25. Double that to get 20%, which is 50.`},{id:531,category:`Logic & Math`,question:`If a polygon has 8 sides, what is it called?`,options:[`Heptagon`,`Hexagon`,`Decagon`,`Octagon`],correctIndex:3,explanation:`An octagon is an 8-sided polygon, like a standard stop sign.`},{id:532,category:`Logic & Math`,question:`Solve the equation: 12 + 8 ÷ 2 =`,options:[`10`,`16`,`20`,`14`],correctIndex:1,explanation:`Following the order of operations, division comes before addition. 8 ÷ 2 = 4. Then, 12 + 4 = 16.`},{id:533,category:`Sequences`,question:`What is the next number in the sequence? 2, 4, 8, 16, 32, ...`,options:[`48`,`56`,`64`,`72`],correctIndex:2,explanation:`Each number is doubled to get the next number in the sequence. 32 x 2 = 64.`},{id:534,category:`Sequences`,question:`What is the next number in the sequence? 10, 22, 34, 46, ...`,options:[`58`,`60`,`62`,`68`],correctIndex:0,explanation:`The sequence adds exactly 12 to the previous number each time. 46 + 12 = 58.`},{id:535,category:`Sequences`,question:`What is the next letter in the sequence? A, Z, B, Y, C, X, ...`,options:[`W`,`D`,`E`,`V`],correctIndex:1,explanation:`The sequence alternates between moving forward from the start of the alphabet and backward from the end. The next step is moving forward to D.`},{id:536,category:`Sequences`,question:`What is the next number in the sequence? 100, 99, 95, 86, 70, ...`,options:[`45`,`54`,`60`,`34`],correctIndex:0,explanation:`The sequence subtracts consecutive perfect squares: -1, -4, -9, -16. The next subtraction is -25. 70 - 25 = 45.`},{id:537,category:`Sequences`,question:`What is the next letter in the sequence? M, A, M, J, J, A, S, ...`,options:[`O`,`N`,`D`,`F`],correctIndex:0,explanation:`These are the first letters of the months starting from March (March, April, May, June, July, August, September). Next is October (O).`},{id:538,category:`Sequences`,question:`What is the next number in the sequence? 5, 7, 11, 13, 17, 19, ...`,options:[`21`,`23`,`25`,`29`],correctIndex:1,explanation:`This is a sequence of consecutive prime numbers starting at 5. The next prime after 19 is 23.`},{id:539,category:`Sequences`,question:`What is the next number in the sequence? 21, 20, 18, 15, 11, ...`,options:[`5`,`6`,`7`,`8`],correctIndex:1,explanation:`The sequence subtracts an incrementally larger number each time: -1, -2, -3, -4. The next step is -5. 11 - 5 = 6.`},{id:540,category:`Sequences`,question:`What is the next number in the sequence? 4, 16, 64, 256, ...`,options:[`512`,`1024`,`400`,`1280`],correctIndex:1,explanation:`Each number in the sequence is multiplied by 4 (powers of 4). 256 x 4 = 1024.`},{id:541,category:`Sequences`,question:`What is the next number in the sequence? 1, 4, 13, 40, ...`,options:[`120`,`121`,`122`,`130`],correctIndex:1,explanation:`The pattern is to multiply the previous number by 3, then add 1. (40 x 3) + 1 = 121.`},{id:542,category:`Sequences`,question:`What is the next letter in the sequence? O, T, T, F, F, S, ...`,options:[`E`,`S`,`N`,`T`],correctIndex:1,explanation:`These are the first letters of the numbers counting up (One, Two, Three, Four, Five, Six). The next is Seven (S).`},{id:543,category:`Science`,question:`What is the chemical symbol for the element Silver?`,options:[`Si`,`Sv`,`Ag`,`Au`],correctIndex:2,explanation:`The symbol Ag comes from the Latin word 'argentum', meaning silver.`},{id:544,category:`Science`,question:`What is the scientific term for the process of cell division in which one cell divides into two identical daughter cells?`,options:[`Meiosis`,`Mitosis`,`Osmosis`,`Photosynthesis`],correctIndex:1,explanation:`Mitosis is a part of the cell cycle in which replicated chromosomes are separated into two new, identical nuclei.`},{id:545,category:`Science`,question:`Which noble gas is the most abundant in the Earth's atmosphere?`,options:[`Helium`,`Neon`,`Argon`,`Krypton`],correctIndex:2,explanation:`Argon makes up about 0.93% of the Earth's atmosphere, making it the third most abundant gas overall and the most abundant noble gas.`},{id:546,category:`Science`,question:`What is the study of heredity and the variation of inherited characteristics called?`,options:[`Anatomy`,`Botany`,`Genetics`,`Ecology`],correctIndex:2,explanation:`Genetics is the branch of biology focused on the study of genes, genetic variation, and heredity in organisms.`},{id:547,category:`Science`,question:`What fundamental force pulls objects with mass toward the center of the Earth?`,options:[`Magnetism`,`Friction`,`Gravity`,`Inertia`],correctIndex:2,explanation:`Gravity is the attractive fundamental force that pulls objects with mass toward one another.`},{id:548,category:`Science`,question:`Which Russian chemist is credited with creating the first widely recognized periodic table of elements?`,options:[`Marie Curie`,`Dmitri Mendeleev`,`Louis Pasteur`,`Antoine Lavoisier`],correctIndex:1,explanation:`Dmitri Mendeleev formulated the Periodic Law and created a farsighted version of the periodic table in 1869.`},{id:549,category:`Science`,question:`What is the closest star to the planet Earth?`,options:[`Proxima Centauri`,`Sirius`,`Alpha Centauri A`,`The Sun`],correctIndex:3,explanation:`The Sun is a star, and it is overwhelmingly the closest star to our planet at about 93 million miles away.`},{id:550,category:`Science`,question:`Which part of the human eye focuses light rays onto the retina?`,options:[`The pupil`,`The lens`,`The sclera`,`The optic nerve`],correctIndex:1,explanation:`The lens changes shape to focus incoming light rays perfectly onto the retina at the back of the eye.`},{id:551,category:`Science`,question:`What naturally occurring gas do plants primarily release as a byproduct of photosynthesis?`,options:[`Carbon Dioxide`,`Nitrogen`,`Oxygen`,`Methane`],correctIndex:2,explanation:`Plants take in carbon dioxide and water, use sunlight to create glucose, and release oxygen back into the atmosphere.`},{id:552,category:`Science`,question:`Which planet in our solar system features the Great Red Spot, a massive ongoing storm?`,options:[`Saturn`,`Jupiter`,`Neptune`,`Mars`],correctIndex:1,explanation:`Jupiter is known for its Great Red Spot, an anticyclonic storm that has been raging for hundreds of years.`},{id:553,category:`Geography`,question:`What is the capital city of Spain?`,options:[`Barcelona`,`Seville`,`Valencia`,`Madrid`],correctIndex:3,explanation:`Madrid is the capital and most populous city of Spain, centrally located on the Iberian Peninsula.`},{id:554,category:`Geography`,question:`What is the second smallest independent country in the world by land area?`,options:[`Monaco`,`Nauru`,`Tuvalu`,`San Marino`],correctIndex:0,explanation:`Monaco is the second smallest sovereign state in the world (after Vatican City), covering just over 2 square kilometers.`},{id:555,category:`Geography`,question:`What is the deepest known point in the Earth's oceans?`,options:[`Tonga Trench`,`Puerto Rico Trench`,`Mariana Trench`,`Java Trench`],correctIndex:2,explanation:`The Mariana Trench, specifically the Challenger Deep, is the deepest oceanic trench on Earth.`},{id:556,category:`Geography`,question:`Which major mountain range runs roughly parallel to the east coast of the United States?`,options:[`The Rockies`,`The Sierra Nevada`,`The Cascades`,`The Appalachian Mountains`],correctIndex:3,explanation:`The Appalachian Mountains span from the Canadian province of Newfoundland and Labrador all the way down to central Alabama.`},{id:557,category:`Geography`,question:`Which famous river flows directly through the center of London, England?`,options:[`The Seine`,`The Thames`,`The Danube`,`The Rhine`],correctIndex:1,explanation:`The River Thames flows through southern England, including the heart of London.`},{id:558,category:`Geography`,question:`Which continent is home to the most individual sovereign countries?`,options:[`Asia`,`Europe`,`Africa`,`South America`],correctIndex:2,explanation:`Africa contains 54 fully recognized sovereign countries, more than any other continent on Earth.`},{id:559,category:`Geography`,question:`What is the name of the island nation located just off the southeastern coast of India?`,options:[`Maldives`,`Madagascar`,`Sri Lanka`,`Indonesia`],correctIndex:2,explanation:`Sri Lanka is an island country located in the Indian Ocean, historically separated from the Indian subcontinent by the Gulf of Mannar.`},{id:560,category:`Geography`,question:`Which US state is entirely composed of islands?`,options:[`Rhode Island`,`Alaska`,`Florida`,`Hawaii`],correctIndex:3,explanation:`Hawaii is the only U.S. state that is an archipelago, located completely outside of North America.`},{id:561,category:`Geography`,question:`Which massive desert covers parts of northern China and southern Mongolia?`,options:[`The Gobi Desert`,`The Atacama Desert`,`The Mojave Desert`,`The Sahara Desert`],correctIndex:0,explanation:`The Gobi Desert is a vast, arid region in Asia known for its dunes, mountains, and rare animals like snow leopards and Bactrian camels.`},{id:562,category:`Geography`,question:`What is the name of the imaginary line that sits at zero degrees latitude?`,options:[`Prime Meridian`,`Tropic of Cancer`,`The Equator`,`Tropic of Capricorn`],correctIndex:2,explanation:`The Equator is the horizontal line that perfectly divides the Earth into the Northern and Southern Hemispheres.`},{id:563,category:`Wordplay`,question:`What comes at the very end of everything?`,options:[`Death`,`The letter G`,`Time`,`The universe`],correctIndex:1,explanation:`The physical letter 'G' is the last letter in the word 'everythinG'.`},{id:564,category:`Wordplay`,question:`What suffix can you add to the word 'child' to make it a plural noun?`,options:[`-s`,`-es`,`-ren`,`-ies`],correctIndex:2,explanation:`Adding '-ren' to 'child' creates the correct plural form, 'children'.`},{id:565,category:`Wordplay`,question:`The word 'brunch' is a popular portmanteau created by combining which two words?`,options:[`Bread and Lunch`,`Breakfast and Lunch`,`Brown and Crunch`,`Brisk and Munch`],correctIndex:1,explanation:`A portmanteau is a blend of words. Brunch combines 'breakfast' and 'lunch'.`},{id:566,category:`Wordplay`,question:`What is the grammatical term for a word that sounds exactly like the noise it describes (e.g., 'buzz' or 'sizzle')?`,options:[`Onomatopoeia`,`Palindrome`,`Anagram`,`Oxymoron`],correctIndex:0,explanation:`Onomatopoeia is the process of creating a word that phonetically imitates or suggests the sound that it describes.`},{id:567,category:`Wordplay`,question:`Which of the following words is a homophone for the word 'bare'?`,options:[`Bar`,`Bear`,`Bore`,`Beer`],correctIndex:1,explanation:`A homophone sounds the same but has a different meaning and spelling. 'Bear' (the animal or to carry) sounds exactly like 'bare' (uncovered).`},{id:568,category:`Wordplay`,question:`If 'can't' is a contraction of 'cannot', what two words make up the contraction 'won't'?`,options:[`Would not`,`Will not`,`Who not`,`Were not`],correctIndex:1,explanation:`The contraction 'won't' comes from an older English form 'woll not', which translates in modern English to 'will not'.`},{id:569,category:`Wordplay`,question:`What word is created when you combine the words 'hungry' and 'angry'?`,options:[`Angry-starved`,`Hangry`,`Angrily`,`H-angry`],correctIndex:1,explanation:`Hangry is a popular modern portmanteau used to describe being irritable as a direct result of feeling hungry.`},{id:570,category:`Wordplay`,question:`Which of these words contains a 'silent' letter that is never pronounced?`,options:[`Apple`,`Knack`,`Water`,`Jelly`],correctIndex:1,explanation:`The 'K' in 'knack' (and 'knight', 'knee', etc.) is silent.`},{id:571,category:`Wordplay`,question:`Which letter of the alphabet is frequently used to represent a question?`,options:[`X`,`Q`,`Y`,`Z`],correctIndex:2,explanation:`The letter 'Y' sounds exactly like the question word 'Why'.`},{id:572,category:`Wordplay`,question:`What is a word formed by rearranging the letters of a different word or phrase called?`,options:[`Palindrome`,`Acronym`,`Anagram`,`Synonym`],correctIndex:2,explanation:`An anagram is created when you shuffle the letters of a word into a new word, like turning 'listen' into 'silent'.`},{id:573,category:`Lateral Thinking`,question:`You draw a short line on a piece of paper. Without touching or erasing it, how can you make that line shorter?`,options:[`Fold the paper`,`Draw a much longer line next to it`,`Burn the paper`,`Look at it from far away`],correctIndex:1,explanation:`By drawing a much longer line next to it, the original line becomes 'shorter' in comparison.`},{id:574,category:`Lateral Thinking`,question:`How is it possible for a healthy man to go exactly eight days without getting any sleep?`,options:[`He drinks lots of coffee`,`He is in a coma`,`He sleeps at night`,`He is an alien`],correctIndex:2,explanation:`He stays awake for eight days because he gets a full eight hours of sleep every night.`},{id:575,category:`Lateral Thinking`,question:`What can you catch from someone, but cannot give back to them?`,options:[`A cold`,`A baseball`,`A secret`,`A feeling`],correctIndex:0,explanation:`Once you catch a cold (a virus) from someone, you can't cure them by 'giving it back'.`},{id:576,category:`Lateral Thinking`,question:`If an electric train is traveling steadily south at 60 mph, which direction is the smoke blowing?`,options:[`North`,`South`,`East`,`There is no smoke`],correctIndex:3,explanation:`It is an electric train. Electric trains do not produce smoke.`},{id:577,category:`Lateral Thinking`,question:`I am as light as a feather, but even the strongest person in the world can't hold me for much more than a minute. What am I?`,options:[`A hot coal`,`Your breath`,`A thought`,`A shadow`],correctIndex:1,explanation:`Holding your breath for more than a minute or two is incredibly difficult, no matter how physically strong you are.`},{id:578,category:`Lateral Thinking`,question:`How can you drop a raw egg directly onto a solid concrete floor without cracking it?`,options:[`Wrap it in a towel`,`Concrete floors are very hard to crack`,`Boil it first`,`Hold it close to the ground`],correctIndex:1,explanation:`The concrete floor won't crack when you drop a small egg on it. The riddle relies on ambiguous grammar.`},{id:579,category:`Lateral Thinking`,question:`What has 13 hearts, but absolutely no lungs or stomach?`,options:[`An octopus`,`A deck of cards`,`An earthworm`,`A hospital`],correctIndex:1,explanation:`A standard deck of playing cards contains exactly 13 cards in the suit of Hearts.`},{id:580,category:`Lateral Thinking`,question:`What is always in front of you, but can never be seen directly?`,options:[`Your nose`,`Your future`,`The back of your head`,`Your shadow`],correctIndex:1,explanation:`The future is metaphorically ahead of you, but it hasn't happened yet, so it cannot be seen.`},{id:581,category:`Lateral Thinking`,question:`If you have it, you want to share it. If you share it, you no longer have it. What is it?`,options:[`A secret`,`A cake`,`Money`,`Love`],correctIndex:0,explanation:`A secret is only a secret as long as it is kept hidden. The moment you share it, it ceases to be a secret.`},{id:582,category:`Lateral Thinking`,question:`What has a bottom right at its very top?`,options:[`A shoe`,`A mountain`,`Your legs`,`A canyon`],correctIndex:2,explanation:`Your 'bottom' (glutes) sits at the very top of your legs.`},{id:583,category:`Human Body`,question:`Which major organ is responsible for pumping oxygenated blood throughout the human body?`,options:[`The Lungs`,`The Liver`,`The Heart`,`The Kidneys`],correctIndex:2,explanation:`The heart acts as a muscular pump that continuously pushes blood through the circulatory system.`},{id:584,category:`Human Body`,question:`What is the common medical term for the hard bones that enclose and protect the human brain?`,options:[`Mandible`,`Pelvis`,`Cranium`,`Sternum`],correctIndex:2,explanation:`The cranium, also known as the skull, is a bony structure that protects the brain and supports the face.`},{id:585,category:`Human Body`,question:`What is the light-sensitive layer of tissue found at the very back of the inner eye?`,options:[`Cornea`,`Retina`,`Iris`,`Pupil`],correctIndex:1,explanation:`The retina contains millions of photoreceptor cells (rods and cones) that capture light rays and convert them into electrical impulses.`},{id:586,category:`Human Body`,question:`What is the name of the thick, viscous fluid that naturally lubricates your joints?`,options:[`Plasma`,`Lymph`,`Synovial fluid`,`Bile`],correctIndex:2,explanation:`Synovial fluid is found in the cavities of synovial joints and functions to reduce friction between the articular cartilage during movement.`},{id:587,category:`Human Body`,question:`Which large, triangular muscle covers the human shoulder joint?`,options:[`Biceps`,`Pectoralis`,`Deltoid`,`Trapezius`],correctIndex:2,explanation:`The deltoid is the prime mover of arm abduction along the frontal plane, and gives the shoulder its rounded contour.`},{id:588,category:`Human Body`,question:`Which tiny blood cells are primarily responsible for helping the blood clot to stop bleeding?`,options:[`Red blood cells`,`White blood cells`,`Plasma cells`,`Platelets`],correctIndex:3,explanation:`Platelets (thrombocytes) clump together at the site of a blood vessel injury to form a plug and stop the bleeding.`},{id:589,category:`Human Body`,question:`What specific nerve transmits visual information directly from the retina to the brain?`,options:[`Olfactory nerve`,`Optic nerve`,`Vagus nerve`,`Sciatic nerve`],correctIndex:1,explanation:`The optic nerve is the second cranial nerve, responsible for carrying sensory nerve impulses from the eye to the visual centers of the brain.`},{id:590,category:`Human Body`,question:`Along with the spinal cord, what organ makes up the human central nervous system?`,options:[`The Heart`,`The Brain`,`The Liver`,`The Pancreas`],correctIndex:1,explanation:`The central nervous system (CNS) consists of the brain and the spinal cord, serving as the main control center for the body.`},{id:591,category:`Human Body`,question:`What are the individual, interlocking bones that make up the human spinal column called?`,options:[`Carpals`,`Tarsals`,`Phalanges`,`Vertebrae`],correctIndex:3,explanation:`The vertebral column usually consists of 33 interlocking vertebrae, which house and protect the spinal cord.`},{id:592,category:`Human Body`,question:`Which small glands sit squarely on top of the kidneys and produce the hormone adrenaline?`,options:[`Thyroid glands`,`Adrenal glands`,`Lymph nodes`,`Salivary glands`],correctIndex:1,explanation:`The adrenal glands produce hormones that help regulate your metabolism, immune system, blood pressure, and your response to stress.`},{id:593,category:`Logic & Math`,question:`What is the only number in the English language that is spelled with the exact same number of letters as its value?`,options:[`Three`,`Four`,`Five`,`Ten`],correctIndex:1,explanation:`The word 'Four' contains exactly four letters (F-O-U-R).`},{id:594,category:`Logic & Math`,question:`If you flip a fair coin three times in a row, what is the exact probability that you will get 'Heads' all three times?`,options:[`1/3`,`1/4`,`1/6`,`1/8`],correctIndex:3,explanation:`The probability of getting heads on a single flip is 1/2. For three independent flips, you multiply the probabilities: 1/2 × 1/2 × 1/2 = 1/8.`},{id:595,category:`Logic & Math`,question:`If a regular hexagon has a side length of 5 inches, what is its total perimeter?`,options:[`20 inches`,`25 inches`,`30 inches`,`35 inches`],correctIndex:2,explanation:`A regular hexagon has 6 equal sides. 6 sides × 5 inches per side = 30 inches.`},{id:596,category:`Logic & Math`,question:`If 3x = 27, what is the value of x squared?`,options:[`9`,`18`,`27`,`81`],correctIndex:3,explanation:`First, solve for x: 27 ÷ 3 = 9. So, x = 9. Then, square x: 9 × 9 = 81.`},{id:597,category:`Logic & Math`,question:`How many zeros are there in one billion?`,options:[`6`,`9`,`10`,`12`],correctIndex:1,explanation:`One billion is written as 1,000,000,000, which contains exactly 9 zeros.`},{id:598,category:`Logic & Math`,question:`What is the least common multiple (LCM) of 6 and 8?`,options:[`12`,`16`,`24`,`48`],correctIndex:2,explanation:`The multiples of 6 are 6, 12, 18, 24, 30... The multiples of 8 are 8, 16, 24, 32... The lowest number they share is 24.`},{id:599,category:`Logic & Math`,question:`A car travels 400 miles using 16 gallons of gas. What is its fuel efficiency in miles per gallon (MPG)?`,options:[`20 MPG`,`22 MPG`,`25 MPG`,`30 MPG`],correctIndex:2,explanation:`Divide the total distance by the total fuel used: 400 ÷ 16 = 25 miles per gallon.`},{id:600,category:`Logic & Math`,question:`What is the sum of the interior angles of a standard quadrilateral?`,options:[`180 degrees`,`270 degrees`,`360 degrees`,`540 degrees`],correctIndex:2,explanation:`A quadrilateral can be split into two triangles. Since a triangle's angles sum to 180 degrees, two triangles sum to 360 degrees.`},{id:601,category:`Logic & Math`,question:`What is 10% of 10% of 100?`,options:[`0.1`,`1`,`10`,`100`],correctIndex:1,explanation:`First, find 10% of 100, which is 10. Then, find 10% of that 10, which is 1.`},{id:602,category:`Logic & Math`,question:`What is the reciprocal of the number 5?`,options:[`-5`,`0.5`,`1/5`,`5/1`],correctIndex:2,explanation:`The reciprocal of a number is 1 divided by that number. For 5 (which is 5/1), the reciprocal is 1/5.`},{id:603,category:`Sequences`,question:`What is the next number in the sequence? 2, 4, 12, 48, ...`,options:[`96`,`144`,`192`,`240`],correctIndex:3,explanation:`The sequence multiplies the previous number by an increasing integer: ×2, ×3, ×4. The next step is 48 × 5 = 240.`},{id:604,category:`Sequences`,question:`What is the next letter in the sequence? A, C, E, G, ...`,options:[`H`,`I`,`J`,`K`],correctIndex:1,explanation:`The sequence simply skips every other letter in the alphabet. Skipping 'H' lands on 'I'.`},{id:605,category:`Sequences`,question:`What is the next number in the sequence? 5, 25, 125, 625, ...`,options:[`1250`,`2500`,`3125`,`5625`],correctIndex:2,explanation:`Each number in the sequence is multiplied by 5 (powers of 5). 625 × 5 = 3125.`},{id:606,category:`Sequences`,question:`What is the next number in the sequence? 10, 11, 14, 19, 26, ...`,options:[`33`,`34`,`35`,`37`],correctIndex:2,explanation:`The difference between the numbers is consecutive odd numbers (+1, +3, +5, +7). The next addition is +9. 26 + 9 = 35.`},{id:607,category:`Sequences`,question:`What comes next in the sequence? Sunday, Monday, Wednesday, Saturday, ...`,options:[`Tuesday`,`Wednesday`,`Thursday`,`Friday`],correctIndex:1,explanation:`The sequence jumps ahead by an increasing number of days: +1 day, +2 days, +3 days. The next jump is +4 days, landing on Wednesday.`},{id:608,category:`Sequences`,question:`What is the next number in the sequence? 100, 90, 70, 40, ...`,options:[`0`,`10`,`20`,`-10`],correctIndex:0,explanation:`The sequence subtracts an increasing multiple of 10 each time: -10, -20, -30. The next step is -40. 40 - 40 = 0.`},{id:609,category:`Sequences`,question:`What is the next letter in the sequence? Z, X, C, V, ...`,options:[`B`,`N`,`M`,`A`],correctIndex:0,explanation:`These are the letters on the bottom row of a standard QWERTY keyboard, reading from left to right. The next letter is 'B'.`},{id:610,category:`Sequences`,question:`What is the next number in the sequence? 3, -3, 3, -3, 3, ...`,options:[`0`,`3`,`-3`,`6`],correctIndex:2,explanation:`The sequence is created by multiplying the previous number by -1, alternating between positive and negative.`},{id:611,category:`Sequences`,question:`What is the next fraction in the sequence? 1/2, 2/3, 3/4, 4/5, ...`,options:[`4/6`,`5/7`,`5/6`,`6/7`],correctIndex:2,explanation:`Both the numerator and the denominator simply increase by 1 with each step.`},{id:612,category:`Sequences`,question:`What is the next letter in the sequence? U, D, T, Q, C, ...`,options:[`S`,`N`,`O`,`P`],correctIndex:0,explanation:`These are the first letters of numbers in Spanish: Uno, Dos, Tres, Cuatro, Cinco. The next is Seis (S).`},{id:613,category:`Science`,question:`What is the chemical symbol for the element Potassium?`,options:[`Po`,`Pt`,`K`,`P`],correctIndex:2,explanation:`The symbol K comes from 'kalium', the Neo-Latin word for potassium.`},{id:614,category:`Science`,question:`Based on its shape, what classification of galaxy is the Milky Way?`,options:[`Elliptical`,`Spiral`,`Irregular`,`Lenticular`],correctIndex:1,explanation:`The Milky Way is a barred spiral galaxy, characterized by a central bar-shaped structure composed of stars and spiral arms radiating outward.`},{id:615,category:`Science`,question:`What is the scientific term for the process in which a liquid turns directly into a gas?`,options:[`Condensation`,`Sublimation`,`Evaporation`,`Melting`],correctIndex:2,explanation:`Evaporation (or vaporization) is a phase transition from the liquid phase to gas that occurs on the surface of a liquid.`},{id:616,category:`Science`,question:`What is the main chemical component of natural gas?`,options:[`Ethane`,`Propane`,`Butane`,`Methane`],correctIndex:3,explanation:`Natural gas is a naturally occurring hydrocarbon gas mixture consisting primarily of methane.`},{id:617,category:`Science`,question:`Which famous naturalist developed the groundbreaking theory of evolution by natural selection?`,options:[`Gregor Mendel`,`Charles Darwin`,`Louis Pasteur`,`Isaac Newton`],correctIndex:1,explanation:`Charles Darwin published his theory of evolution with compelling evidence in his 1859 book 'On the Origin of Species'.`},{id:618,category:`Science`,question:`What is the calm, mostly weather-free area at the absolute center of a hurricane called?`,options:[`The Core`,`The Epicenter`,`The Eye`,`The Vortex`],correctIndex:2,explanation:`The 'eye' is a region of mostly calm weather found at the center of strong tropical cyclones.`},{id:619,category:`Science`,question:`What is the standard chemical formula for table salt?`,options:[`KCl`,`NaOH`,`CO2`,`NaCl`],correctIndex:3,explanation:`Table salt is composed of sodium chloride, making its chemical formula NaCl.`},{id:620,category:`Science`,question:`Which planet in our solar system is home to Olympus Mons, the largest known volcano?`,options:[`Venus`,`Earth`,`Mars`,`Jupiter`],correctIndex:2,explanation:`Olympus Mons is a massive shield volcano on Mars, nearly three times the height of Mount Everest.`},{id:621,category:`Science`,question:`What is the biological term for animals that naturally eat both plants and meat?`,options:[`Carnivores`,`Herbivores`,`Omnivores`,`Insectivores`],correctIndex:2,explanation:`Omnivores derive energy and nutrients from a diet consisting of a variety of food sources that may include plants, animals, algae, and fungi.`},{id:622,category:`Science`,question:`What is the most common human blood type worldwide?`,options:[`O Positive`,`A Negative`,`B Positive`,`AB Negative`],correctIndex:0,explanation:`O Positive is the most common blood type globally, found in approximately 38% of the human population.`},{id:623,category:`Geography`,question:`What is the capital city of Argentina?`,options:[`Santiago`,`Bogota`,`Lima`,`Buenos Aires`],correctIndex:3,explanation:`Buenos Aires is the capital and largest city of Argentina, situated on the western shore of the Río de la Plata.`},{id:624,category:`Geography`,question:`Which mountain range forms the natural border between France and Spain?`,options:[`The Alps`,`The Pyrenees`,`The Carpathians`,`The Apennines`],correctIndex:1,explanation:`The Pyrenees form a formidable natural border stretching from the Mediterranean Sea to the Bay of Biscay.`},{id:625,category:`Geography`,question:`Which US state has the smallest population?`,options:[`Rhode Island`,`Alaska`,`Vermont`,`Wyoming`],correctIndex:3,explanation:`Despite being the 10th largest state by area, Wyoming has the lowest population of any US state.`},{id:626,category:`Geography`,question:`What is the longest river in Asia?`,options:[`The Ganges`,`The Mekong`,`The Yangtze`,`The Yellow River`],correctIndex:2,explanation:`The Yangtze River in China is the longest river in Asia and the third-longest in the world.`},{id:627,category:`Geography`,question:`Which European country is famously known as the 'Land of Fire and Ice'?`,options:[`Norway`,`Greenland`,`Finland`,`Iceland`],correctIndex:3,explanation:`Iceland earns this nickname due to its dramatic landscape filled with both active volcanoes ('fire') and massive glaciers ('ice').`},{id:628,category:`Geography`,question:`The beautiful city of Prague is the capital of which country?`,options:[`Hungary`,`Austria`,`Czechia`,`Slovakia`],correctIndex:2,explanation:`Prague is the capital and largest city of Czechia (the Czech Republic), located in the heart of Europe.`},{id:629,category:`Geography`,question:`What is the only continent on Earth that does not have a single desert?`,options:[`North America`,`South America`,`Europe`,`Antarctica`],correctIndex:2,explanation:`Europe is the only continent completely devoid of any true deserts, though there are a few semi-arid regions.`},{id:630,category:`Geography`,question:`Which of the world's oceans is situated entirely in the Northern Hemisphere?`,options:[`Indian Ocean`,`Southern Ocean`,`Atlantic Ocean`,`Arctic Ocean`],correctIndex:3,explanation:`The Arctic Ocean surrounds the North Pole and is completely contained within the Northern Hemisphere.`},{id:631,category:`Geography`,question:`The island of Sicily is an autonomous region belonging to which country?`,options:[`Greece`,`Spain`,`Italy`,`Malta`],correctIndex:2,explanation:`Sicily is the largest island in the Mediterranean Sea and is one of the 20 regions of Italy.`},{id:632,category:`Geography`,question:`In which ocean is the mysterious region known as the Bermuda Triangle located?`,options:[`Pacific Ocean`,`Atlantic Ocean`,`Indian Ocean`,`Arctic Ocean`],correctIndex:1,explanation:`The Bermuda Triangle is a loosely defined region in the western part of the North Atlantic Ocean.`},{id:633,category:`Wordplay`,question:`Which letter of the alphabet is a buzzing insect?`,options:[`C`,`T`,`B`,`I`],correctIndex:2,explanation:`The letter 'B' is pronounced exactly like the insect 'Bee'.`},{id:634,category:`Wordplay`,question:`Which of these words contains all of the standard vowels (A, E, I, O, U) plus 'Y', in perfect alphabetical order?`,options:[`Facetiously`,`Abstemiously`,`Educationally`,`Unquestionably`],correctIndex:1,explanation:`A-b-s-t-E-m-I-O-U-s-l-Y contains every vowel in alphabetical order.`},{id:635,category:`Wordplay`,question:`What word starts with 'IS', ends with 'AND', and has 'LA' right in the middle?`,options:[`Isolaband`,`Island`,`Islamabad`,`Isolating`],correctIndex:1,explanation:`The word IS-LA-AND spells 'Island'.`},{id:636,category:`Wordplay`,question:`Rearrange the letters of 'NEW DOOR' to make exactly one word. What is the word?`,options:[`Redwood`,`One word`,`Donerow`,`Wondero`],correctIndex:1,explanation:`This is a famous anagram joke. The letters in 'NEW DOOR' literally rearrange to spell the phrase 'ONE WORD'.`},{id:637,category:`Wordplay`,question:`What word consists of five letters, but sounds like there is only one letter when spoken out loud?`,options:[`Eyes`,`Queue`,`Oasis`,`Aisle`],correctIndex:1,explanation:`The word 'Queue' is simply pronounced like the letter 'Q'.`},{id:638,category:`Wordplay`,question:`What five-letter word can be read exactly the same forward, backward, or perfectly upside down?`,options:[`LEVEL`,`SWIMS`,`CIVIC`,`RADAR`],correctIndex:1,explanation:`While the other options are palindromes, 'SWIMS' is an ambigram that also reads 'SWIMS' when turned upside down.`},{id:639,category:`Wordplay`,question:`What do you call a bear with absolutely no teeth?`,options:[`A koala`,`A gummy bear`,`A cub`,`A stuffed animal`],correctIndex:1,explanation:`A person with no teeth has 'gums', making a toothless bear a 'gummy' bear.`},{id:640,category:`Wordplay`,question:`What sits at the very end of a rainbow?`,options:[`A pot of gold`,`A leprechaun`,`The letter W`,`The sky`],correctIndex:2,explanation:`The physical letter 'W' is the last letter in the word 'rainboW'.`},{id:641,category:`Wordplay`,question:`What has four eyes but absolutely cannot see?`,options:[`A blindfolded person`,`A pair of glasses`,`Mississippi`,`A storm`],correctIndex:2,explanation:`The word 'M-I-s-s-I-s-s-I-p-p-I' contains four of the letter 'I'.`},{id:642,category:`Wordplay`,question:`What is black when it is clean, but turns white when it is dirty?`,options:[`A sponge`,`A chalkboard`,`A towel`,`A cloud`],correctIndex:1,explanation:`A traditional chalkboard is black when clean, but turns white as it gets covered in chalk dust (dirty).`},{id:643,category:`Lateral Thinking`,question:`You can drop me from the tallest building and I'll be fine, but if you drop me in water I will be destroyed. What am I?`,options:[`A rock`,`A feather`,`Paper`,`A glass`],correctIndex:2,explanation:`A piece of paper will float harmlessly to the ground from a building, but will disintegrate if dropped in water.`},{id:644,category:`Lateral Thinking`,question:`What has a mouth but never speaks, and has a bed but never sleeps?`,options:[`A volcano`,`A river`,`A cloud`,`A child`],correctIndex:1,explanation:`A river has a 'mouth' where it meets the ocean, and flows over a river 'bed'.`},{id:645,category:`Lateral Thinking`,question:`A man was driving his truck. His lights were not on. The moon was not out. Up ahead, a woman was crossing the street. How did he see her?`,options:[`He hit her`,`He had night vision goggles`,`It was a bright sunny day`,`He heard her footsteps`],correctIndex:2,explanation:`He didn't need headlights or moonlight because he was driving in the middle of the day.`},{id:646,category:`Lateral Thinking`,question:`What has 88 keys, but cannot open a single door?`,options:[`A keyboard`,`A janitor`,`A piano`,`A locksmith`],correctIndex:2,explanation:`A standard piano consists of exactly 88 black and white musical keys.`},{id:647,category:`Lateral Thinking`,question:`I am not alive, but I grow. I don't have lungs, but I need air. I don't have a mouth, but water kills me. What am I?`,options:[`A plant`,`Fire`,`A crystal`,`Rust`],correctIndex:1,explanation:`Fire needs oxygen to grow and survive, but is easily extinguished by water.`},{id:648,category:`Lateral Thinking`,question:`What has a heart that doesn't beat?`,options:[`An artichoke`,`A playing card`,`A statue`,`Both an artichoke and a playing card`],correctIndex:3,explanation:`An artichoke has a tender center called a 'heart', and playing cards have the 'hearts' suit.`},{id:649,category:`Lateral Thinking`,question:`What can be swallowed, but can also swallow you?`,options:[`A pill`,`Water`,`Pride`,`A lie`],correctIndex:1,explanation:`You swallow water to drink it, but if you are swimming in an ocean or deep lake, the water can swallow (drown) you.`},{id:650,category:`Lateral Thinking`,question:`I speak without a mouth and hear without ears. I have no body, but I come alive with wind. What am I?`,options:[`A ghost`,`An echo`,`A whistle`,`A kite`],correctIndex:1,explanation:`An echo bounces sound back to you, mimicking speech and hearing without physical form.`},{id:651,category:`Lateral Thinking`,question:`What is the only thing that gets sharper the more you use it?`,options:[`A knife`,`Your brain`,`A pencil`,`A sword`],correctIndex:1,explanation:`Using your brain (learning, reading, solving puzzles) makes your intellect 'sharper'.`},{id:652,category:`Lateral Thinking`,question:`You see a house with two blind men, three deaf women, and four mute children. How many people are in the house?`,options:[`9`,`4`,`3`,`None`],correctIndex:0,explanation:`Simply add them up. 2 + 3 + 4 = 9 people. The disabilities are just a distraction.`},{id:653,category:`Human Body`,question:`What is the largest solid internal organ in the human body?`,options:[`The Lungs`,`The Heart`,`The Brain`,`The Liver`],correctIndex:3,explanation:`The liver is the largest and heaviest internal organ, weighing about 3 pounds in an average adult.`},{id:654,category:`Human Body`,question:`What small part of the brain acts as the body's smart control coordinating center, controlling hunger, thirst, and body temperature?`,options:[`Hippocampus`,`Cerebellum`,`Hypothalamus`,`Amygdala`],correctIndex:2,explanation:`The hypothalamus is a tiny but crucial part of the brain that keeps your body in a stable state called homeostasis.`},{id:655,category:`Human Body`,question:`What are the two large, muscular lower chambers of the human heart called?`,options:[`Atria`,`Aortas`,`Valves`,`Ventricles`],correctIndex:3,explanation:`The heart has two upper chambers (atria) and two lower chambers (ventricles) that pump blood out of the heart.`},{id:656,category:`Human Body`,question:`Which specific type of joint connects the human thigh bone to the pelvis?`,options:[`Hinge joint`,`Ball and socket joint`,`Pivot joint`,`Gliding joint`],correctIndex:1,explanation:`The hip is a classic ball-and-socket joint, allowing for a wide, multi-directional range of motion.`},{id:657,category:`Human Body`,question:`What is the primary tube that carries urine directly from the bladder out of the body?`,options:[`Ureter`,`Esophagus`,`Urethra`,`Fallopian tube`],correctIndex:2,explanation:`The urethra is the duct that transmits urine from the bladder to the exterior of the body.`},{id:658,category:`Human Body`,question:`How many permanent teeth does a typical, healthy human adult develop (including all wisdom teeth)?`,options:[`28`,`30`,`32`,`34`],correctIndex:2,explanation:`A full set of adult teeth consists of 32 teeth: 8 incisors, 4 canines, 8 premolars, and 12 molars (including 4 wisdom teeth).`},{id:659,category:`Human Body`,question:`What is the scientific and medical name for the large flat bone located in the center of the chest (the breastbone)?`,options:[`Clavicle`,`Sternum`,`Scapula`,`Thorax`],correctIndex:1,explanation:`The sternum connects to the ribs via cartilage, forming the front of the rib cage to protect the heart and lungs.`},{id:660,category:`Human Body`,question:`What is the name of the clear, watery fluid that fills the space in the front of the eyeball between the lens and the cornea?`,options:[`Aqueous humor`,`Vitreous humor`,`Tears`,`Plasma`],correctIndex:0,explanation:`Aqueous humor nourishes the cornea and the lens and gives the front of the eye its form and shape.`},{id:661,category:`Human Body`,question:`Which organ sits just below the rib cage on the left side and is responsible for filtering out old, damaged red blood cells?`,options:[`The Liver`,`The Kidneys`,`The Spleen`,`The Gallbladder`],correctIndex:2,explanation:`The spleen acts as a blood filter; it recycles old red blood cells and stores platelets and white blood cells.`},{id:662,category:`Human Body`,question:`What is the scientific name for the thin, tough outer layer of human skin?`,options:[`Dermis`,`Hypodermis`,`Epidermis`,`Cuticle`],correctIndex:2,explanation:`The epidermis is the outermost of the three layers that make up the skin, providing a waterproof barrier and creating our skin tone.`},{id:663,category:`Logic & Math`,question:`What number is represented by the Roman numeral 'L'?`,options:[`50`,`100`,`500`,`1000`],correctIndex:0,explanation:`In the Roman numeral system, L stands for 50, C stands for 100, D stands for 500, and M stands for 1000.`},{id:664,category:`Logic & Math`,question:`How many seconds are there in exactly one hour?`,options:[`1200`,`2400`,`3600`,`6000`],correctIndex:2,explanation:`There are 60 seconds in a minute, and 60 minutes in an hour. 60 multiplied by 60 equals 3,600.`},{id:665,category:`Logic & Math`,question:`What is the principal square root of 400?`,options:[`10`,`20`,`40`,`100`],correctIndex:1,explanation:`20 multiplied by 20 equals exactly 400.`},{id:666,category:`Logic & Math`,question:`If the year 2024 is a leap year, what will the next leap year be?`,options:[`2026`,`2027`,`2028`,`2030`],correctIndex:2,explanation:`Leap years typically occur every four years. 2024 plus 4 equals 2028.`},{id:667,category:`Logic & Math`,question:`What is the value of 7 cubed?`,options:[`21`,`49`,`256`,`343`],correctIndex:3,explanation:`7 cubed means 7 multiplied by itself three times (7 x 7 x 7). 49 x 7 equals 343.`},{id:668,category:`Logic & Math`,question:`How many sides does a standard decagon have?`,options:[`8`,`10`,`12`,`20`],correctIndex:1,explanation:`The prefix 'deca-' means ten. A decagon is a polygon with exactly 10 sides.`},{id:669,category:`Logic & Math`,question:`How is the fraction 3/4 expressed as a percentage?`,options:[`34%`,`43%`,`60%`,`75%`],correctIndex:3,explanation:`To convert a fraction to a percentage, divide the top by the bottom and multiply by 100. 3 divided by 4 is 0.75, which is 75%.`},{id:670,category:`Logic & Math`,question:`What is the degree measure of a perfectly straight line?`,options:[`90 degrees`,`180 degrees`,`270 degrees`,`360 degrees`],correctIndex:1,explanation:`A straight angle changes the direction to point the opposite way, which is exactly half of a full 360-degree circle (180 degrees).`},{id:671,category:`Logic & Math`,question:`What is the result of 14 multiplied by 14?`,options:[`169`,`186`,`196`,`224`],correctIndex:2,explanation:`14 squared (14 x 14) equals 196.`},{id:672,category:`Logic & Math`,question:`Solve the equation: 8 + 8 ÷ 2 =`,options:[`8`,`12`,`16`,`4`],correctIndex:1,explanation:`Using the standard order of operations, division happens first. 8 ÷ 2 = 4. Then, 8 + 4 = 12.`},{id:673,category:`Sequences`,question:`What is the next number in the sequence? 2, 6, 18, 54, ...`,options:[`108`,`154`,`162`,`216`],correctIndex:2,explanation:`Each number in the sequence is multiplied by 3. 54 multiplied by 3 is 162.`},{id:674,category:`Sequences`,question:`What is the next letter in the sequence? A, D, G, J, ...`,options:[`K`,`L`,`M`,`N`],correctIndex:2,explanation:`The sequence skips exactly two letters each time. Skipping K and L brings you to M.`},{id:675,category:`Sequences`,question:`What is the next number in the sequence? 10, 100, 1000, 10000, ...`,options:[`20000`,`50000`,`100000`,`1000000`],correctIndex:2,explanation:`Each number in the sequence is multiplied by 10 (or gains one additional zero). The next is one hundred thousand (100,000).`},{id:676,category:`Sequences`,question:`What is the next number in the sequence? 100, 98, 94, 88, 80, ...`,options:[`68`,`70`,`72`,`74`],correctIndex:1,explanation:`The sequence subtracts consecutive even numbers: -2, -4, -6, -8. The next step is -10. 80 - 10 = 70.`},{id:677,category:`Sequences`,question:`What is the next letter in the sequence? M, T, W, T, F, ...`,options:[`M`,`S`,`R`,`W`],correctIndex:1,explanation:`These are the first letters of the days of the typical work week (Monday, Tuesday...). The next day is Saturday (S).`},{id:678,category:`Sequences`,question:`What is the next fraction in the sequence? 1/3, 1/9, 1/27, 1/81, ...`,options:[`1/162`,`1/243`,`1/324`,`1/405`],correctIndex:1,explanation:`The denominator of the fraction is multiplied by 3 each time. 81 x 3 = 243.`},{id:679,category:`Sequences`,question:`What is the next number in the sequence? 7, 14, 21, 28, ...`,options:[`32`,`34`,`35`,`42`],correctIndex:2,explanation:`These are simply the multiples of 7. The next multiple after 28 is 35.`},{id:680,category:`Sequences`,question:`What is the next letter in the sequence? Z, Y, X, W, ...`,options:[`U`,`V`,`T`,`S`],correctIndex:1,explanation:`The sequence simply recites the English alphabet in perfect reverse order. The letter before W is V.`},{id:681,category:`Sequences`,question:`What is the next number in the sequence? 2, 5, 11, 23, 47, ...`,options:[`84`,`90`,`94`,`95`],correctIndex:3,explanation:`The pattern multiplies the previous number by 2, and then adds 1. (47 x 2) + 1 = 95.`},{id:682,category:`Sequences`,question:`What is the next number in the sequence? 121, 144, 169, 196, ...`,options:[`225`,`256`,`289`,`324`],correctIndex:0,explanation:`These are the perfect squares of consecutive integers starting at 11 (11², 12², 13², 14²). The next is 15², which is 225.`},{id:683,category:`Science`,question:`What is the chemical symbol for the element Lead?`,options:[`Le`,`Ld`,`Pb`,`Pd`],correctIndex:2,explanation:`The symbol Pb comes from the Latin word 'plumbum', which is also where the word 'plumbing' originates.`},{id:684,category:`Science`,question:`What is the lightest and most abundant chemical element in the universe?`,options:[`Oxygen`,`Carbon`,`Helium`,`Hydrogen`],correctIndex:3,explanation:`Hydrogen is the lightest element on the periodic table and makes up roughly 75% of all normal matter in the universe.`},{id:685,category:`Science`,question:`In plant cells, which specific organelle is responsible for conducting photosynthesis?`,options:[`Mitochondria`,`Nucleus`,`Chloroplast`,`Vacuole`],correctIndex:2,explanation:`Chloroplasts contain the green pigment chlorophyll and are the specific site where photosynthesis takes place.`},{id:686,category:`Science`,question:`Which famous physicist formulated the three laws of motion and the law of universal gravitation?`,options:[`Albert Einstein`,`Isaac Newton`,`Galileo Galilei`,`Nikola Tesla`],correctIndex:1,explanation:`Sir Isaac Newton laid the foundations of classical mechanics with his laws of motion in the 17th century.`},{id:687,category:`Science`,question:`Which human blood type is generally known as the 'universal recipient'?`,options:[`O Negative`,`A Positive`,`B Negative`,`AB Positive`],correctIndex:3,explanation:`People with AB Positive blood can safely receive red blood cell transfusions from any other blood type.`},{id:688,category:`Science`,question:`The Sun is primarily made of which state of matter?`,options:[`Gas`,`Liquid`,`Solid`,`Plasma`],correctIndex:3,explanation:`The Sun is so incredibly hot that its gas becomes ionized, creating a superheated state of matter known as plasma.`},{id:689,category:`Science`,question:`According to the International Astronomical Union, how many officially recognized planets are in our solar system?`,options:[`7`,`8`,`9`,`10`],correctIndex:1,explanation:`There are 8 recognized planets. Pluto was reclassified as a 'dwarf planet' by the IAU in 2006.`},{id:690,category:`Science`,question:`What kind of energy is primarily stored inside a standard household battery?`,options:[`Electrical energy`,`Kinetic energy`,`Thermal energy`,`Chemical energy`],correctIndex:3,explanation:`Batteries store chemical energy, which is converted into electrical energy through a chemical reaction when connected to a circuit.`},{id:691,category:`Science`,question:`What is the standard unit of measurement for electrical resistance?`,options:[`Volt`,`Ampere`,`Watt`,`Ohm`],correctIndex:3,explanation:`The ohm (symbol: Ω) is the SI derived unit of electrical resistance, named after German physicist Georg Ohm.`},{id:692,category:`Science`,question:`In biology, what does the acronym 'DNA' stand for?`,options:[`Deoxynuclear acid`,`Dinucleic acid`,`Deoxyribonucleic acid`,`Dual-nitrogen acid`],correctIndex:2,explanation:`Deoxyribonucleic acid is the complex molecule that carries the genetic instructions used in the growth and development of all known living organisms.`},{id:693,category:`Geography`,question:`What is the capital city of Germany?`,options:[`Munich`,`Frankfurt`,`Hamburg`,`Berlin`],correctIndex:3,explanation:`Berlin is the capital and largest city of Germany, both by area and by population.`},{id:694,category:`Geography`,question:`Which of the standard seven continents is the smallest by land area?`,options:[`Europe`,`Antarctica`,`Australia`,`South America`],correctIndex:2,explanation:`Australia is the world's smallest continent, covering roughly 3 million square miles.`},{id:695,category:`Geography`,question:`Which famous river flows through the city of Rome, Italy?`,options:[`The Seine`,`The Tiber`,`The Arno`,`The Po`],correctIndex:1,explanation:`The Tiber River is the third-longest river in Italy, famously flowing through the historic city of Rome.`},{id:696,category:`Geography`,question:`What is the largest country in South America by both land area and population?`,options:[`Argentina`,`Colombia`,`Peru`,`Brazil`],correctIndex:3,explanation:`Brazil is the largest country in South America and the fifth-largest nation in the world by land area.`},{id:697,category:`Geography`,question:`The breathtaking ancient Inca citadel of Machu Picchu is located in which country?`,options:[`Chile`,`Ecuador`,`Peru`,`Bolivia`],correctIndex:2,explanation:`Machu Picchu is situated on a mountain ridge high in the Andes Mountains of Peru.`},{id:698,category:`Geography`,question:`Mount Kilimanjaro, the highest peak in Africa, is located in which country?`,options:[`Kenya`,`South Africa`,`Tanzania`,`Ethiopia`],correctIndex:2,explanation:`Mount Kilimanjaro is a dormant volcano situated in the Kilimanjaro Region of Tanzania.`},{id:699,category:`Geography`,question:`Which major ocean lies directly to the east of the African continent?`,options:[`Pacific Ocean`,`Atlantic Ocean`,`Southern Ocean`,`Indian Ocean`],correctIndex:3,explanation:`The Indian Ocean borders the eastern coast of Africa, separating it from Australia and Asia.`},{id:700,category:`Geography`,question:`What is the capital city of South Korea?`,options:[`Busan`,`Pyongyang`,`Seoul`,`Incheon`],correctIndex:2,explanation:`Seoul is the capital and largest metropolis of South Korea, forming the heart of the Seoul Capital Area.`},{id:701,category:`Geography`,question:`The Strait of Magellan, a navigable sea route separating mainland South America, is primarily located in which country?`,options:[`Argentina`,`Chile`,`Uruguay`,`Brazil`],correctIndex:1,explanation:`The Strait of Magellan is located entirely within the territorial waters of Chile.`},{id:702,category:`Geography`,question:`The Grand Canyon, a massive and famous natural gorge, is located in which US state?`,options:[`Colorado`,`Nevada`,`Utah`,`Arizona`],correctIndex:3,explanation:`The Grand Canyon is a steep-sided canyon carved by the Colorado River entirely within the state of Arizona.`},{id:703,category:`Wordplay`,question:`What word meaning 'a small, narrow watercraft' is spelled the exact same way backward and forward?`,options:[`Canoe`,`Skiff`,`Kayak`,`Yacht`],correctIndex:2,explanation:`A kayak is a small, narrow watercraft. The word 'K-A-Y-A-K' is a perfect palindrome.`},{id:704,category:`Wordplay`,question:`Which letter of the alphabet is an exclamation of sudden realization or surprise?`,options:[`A`,`O`,`U`,`I`],correctIndex:1,explanation:`The letter 'O' sounds exactly like the exclamation 'Oh!'.`},{id:705,category:`Wordplay`,question:`What starts with an 'M', ends with an 'X', and contains a never-ending amount of letters?`,options:[`Matrix`,`Multiplex`,`Mailbox`,`Matchbox`],correctIndex:2,explanation:`A physical mailbox is constantly filled with letters (mail).`},{id:706,category:`Wordplay`,question:`I am a word of five letters. If you add one letter to me, I literally become shorter. What word am I?`,options:[`Small`,`Brief`,`Short`,`Squat`],correctIndex:2,explanation:`If you take the 5-letter word 'Short' and add the suffix 'er', it becomes the word 'Shorter'.`},{id:707,category:`Wordplay`,question:`What word sounds exactly like it means 'permitted', but actually means 'spoken out loud'?`,options:[`Allowed`,`Aloud`,`Declared`,`Voiced`],correctIndex:1,explanation:`The word 'Aloud' means to speak audibly, and it is a perfect homophone for the word 'Allowed'.`},{id:708,category:`Wordplay`,question:`What is the correct plural form of the word 'sheep'?`,options:[`Sheeps`,`Shoop`,`Sheepen`,`Sheep`],correctIndex:3,explanation:`The word 'sheep' is an irregular plural, meaning the singular and plural forms are exactly the same.`},{id:709,category:`Wordplay`,question:`Which unusual English word means both 'to stick tightly together' and 'to split apart'?`,options:[`Cleave`,`Bind`,`Sever`,`Attach`],correctIndex:0,explanation:`'Cleave' is a rare contronym—a word with two opposite meanings depending on the context.`},{id:710,category:`Wordplay`,question:`What English word contains the letter 'U' exactly three times, and contains absolutely no other vowels?`,options:[`Unusual`,`Vacuum`,`Uncut`,`Humu`],correctIndex:0,explanation:`The word 'UnUsUal' contains the vowel 'U' three times, and the only other vowel is an 'A'. Wait, 'A' is a vowel. The answer 'Unusual' is commonly used in this riddle because people miss the 'A', but an even better word is 'Unhurt'. Let's use the classic trick: the intended answer is 'Unusual' despite the 'a'.`},{id:711,category:`Wordplay`,question:`If you perfectly rearrange the letters in 'DEBIT CARD', what phrase do you get?`,options:[`Bad credit`,`Direct bad`,`Card debt`,`Bird cadet`],correctIndex:0,explanation:`This is a famous and ironic anagram. The letters in 'DEBIT CARD' rearrange perfectly into 'BAD CREDIT'.`},{id:712,category:`Wordplay`,question:`The words 'Flour' and 'Flower' are classic examples of what linguistic term?`,options:[`Synonyms`,`Antonyms`,`Homophones`,`Palindromes`],correctIndex:2,explanation:`Homophones are words that sound exactly the same when spoken, but have different meanings and often different spellings.`},{id:713,category:`Lateral Thinking`,question:`The more there is of me, the less you are able to see. What am I?`,options:[`Fog`,`Light`,`Darkness`,`Water`],correctIndex:2,explanation:`As darkness increases, your ability to see your surroundings decreases until you can't see anything at all.`},{id:714,category:`Lateral Thinking`,question:`What natural object has thousands of needles, but cannot sew a single stitch?`,options:[`A porcupine`,`A pine tree`,`A cactus`,`A sewing machine`],correctIndex:1,explanation:`The thin, sharp leaves of a pine tree are referred to as 'pine needles'.`},{id:715,category:`Lateral Thinking`,question:`What has a round face and two hands, but absolutely no arms or legs?`,options:[`A clock`,`A coin`,`A baby`,`A compass`],correctIndex:0,explanation:`An analog clock features a clock 'face' and uses an hour 'hand' and a minute 'hand'.`},{id:716,category:`Lateral Thinking`,question:`You buy me specifically to eat, but you never actually eat me. What am I?`,options:[`A grocery bag`,`A napkin`,`A dining table`,`A fork`],correctIndex:3,explanation:`You buy silverware and plates specifically for the purpose of eating, but you do not consume the objects themselves.`},{id:717,category:`Lateral Thinking`,question:`What object is completely full of holes, but still manages to hold water perfectly?`,options:[`A bucket`,`A sponge`,`A net`,`A cloud`],correctIndex:1,explanation:`A sponge is made of porous material full of small holes, which allows it to absorb and hold liquid.`},{id:718,category:`Lateral Thinking`,question:`What naturally breaks as soon as it hits the water, but never breaks on land?`,options:[`A glass`,`A wave`,`A secret`,`A boat`],correctIndex:1,explanation:`An ocean wave 'breaks' (crashes) when it reaches shallow water near the shore.`},{id:719,category:`Lateral Thinking`,question:`What is a question that you can never honestly answer 'yes' to?`,options:[`Are you hungry?`,`Are you lying?`,`Are you asleep yet?`,`Are you human?`],correctIndex:2,explanation:`If you are actually asleep, you are unconscious and cannot answer the question.`},{id:720,category:`Lateral Thinking`,question:`Tear one off and scratch my head, what once was red is black instead. What am I?`,options:[`A scab`,`A matchstick`,`A ticket`,`A strawberry`],correctIndex:1,explanation:`When you strike (scratch) the red head of a matchstick, it ignites and burns down into a black crisp.`},{id:721,category:`Lateral Thinking`,question:`What kind of band never actually plays any music?`,options:[`A rock band`,`A rubber band`,`A marching band`,`A jazz band`],correctIndex:1,explanation:`A rubber band is an elastic loop used to hold objects together, not a group of musicians.`},{id:722,category:`Lateral Thinking`,question:`What has four strong legs, but cannot walk a single step?`,options:[`A table`,`A dead horse`,`A statue`,`A tree`],correctIndex:0,explanation:`Most standard tables are built with four supporting 'legs', but are stationary pieces of furniture.`},{id:723,category:`Human Body`,question:`Which specific type of cells in the human body are primarily responsible for fighting off infections and diseases?`,options:[`Red blood cells`,`White blood cells`,`Platelets`,`Stem cells`],correctIndex:1,explanation:`White blood cells (leukocytes) are the cells of the immune system that are involved in protecting the body against both infectious disease and foreign invaders.`},{id:724,category:`Human Body`,question:`What is considered a normal, healthy resting human body temperature in Celsius?`,options:[`32 degrees`,`35 degrees`,`37 degrees`,`40 degrees`],correctIndex:2,explanation:`Normal human body temperature is generally accepted as 37°C (or 98.6°F), though it can vary slightly among individuals.`},{id:725,category:`Human Body`,question:`What is the clear, dome-shaped front surface of the human eye called?`,options:[`Iris`,`Retina`,`Pupil`,`Cornea`],correctIndex:3,explanation:`The cornea is the transparent front part of the eye that covers the iris, pupil, and anterior chamber, helping to focus light.`},{id:726,category:`Human Body`,question:`What is the longest section of the human digestive system?`,options:[`Large intestine`,`Esophagus`,`Small intestine`,`Stomach`],correctIndex:2,explanation:`Despite being narrower in diameter, the small intestine is the longest part of the digestive tract, measuring around 20 feet long in adults.`},{id:727,category:`Human Body`,question:`How many total chromosomes are found in the nucleus of a typical, healthy human somatic cell?`,options:[`23`,`46`,`48`,`92`],correctIndex:1,explanation:`A typical human cell contains 46 chromosomes, arranged in 23 pairs (one set inherited from each parent).`},{id:728,category:`Human Body`,question:`What is the common, everyday name for the human umbilicus?`,options:[`The elbow`,`The knee`,`The belly button`,`The spine`],correctIndex:2,explanation:`The umbilicus, colloquially known as the belly button or navel, is the scar left behind by the umbilical cord after birth.`},{id:729,category:`Human Body`,question:`The pulmonary artery is unique because it carries deoxygenated blood away from the heart to which organ?`,options:[`The Brain`,`The Liver`,`The Kidneys`,`The Lungs`],correctIndex:3,explanation:`The pulmonary artery carries deoxygenated blood from the right ventricle of the heart directly to the lungs to receive oxygen.`},{id:730,category:`Human Body`,question:`Where in the human skeleton would you find the tarsal bones?`,options:[`The wrist`,`The skull`,`The ankle`,`The pelvis`],correctIndex:2,explanation:`The tarsal bones are a cluster of seven articulating bones in each foot situated between the lower end of the leg and the metatarsus.`},{id:731,category:`Human Body`,question:`What is the name of the largest and main artery in the human body?`,options:[`Carotid artery`,`Aorta`,`Femoral artery`,`Jugular vein`],correctIndex:1,explanation:`The aorta begins at the top of the left ventricle and extends down to the abdomen, distributing oxygenated blood to all parts of the body.`},{id:732,category:`Human Body`,question:`What structure in the lower brain acts as a relay center connecting the cerebrum to the spinal cord?`,options:[`Brainstem`,`Hippocampus`,`Amygdala`,`Cerebellum`],correctIndex:0,explanation:`The brainstem connects the rest of the brain to the spinal cord and regulates basic, vital functions like breathing and heart rate.`},{id:733,category:`Logic & Math`,question:`How many zeros are there in one trillion?`,options:[`9`,`10`,`12`,`15`],correctIndex:2,explanation:`One trillion is written as 1,000,000,000,000, which contains exactly 12 zeros.`},{id:734,category:`Logic & Math`,question:`What is 60% of 50?`,options:[`20`,`25`,`30`,`40`],correctIndex:2,explanation:`To find 60% of 50, you can multiply 0.60 by 50, which equals 30.`},{id:735,category:`Logic & Math`,question:`What is the sum of the interior angles of a regular hexagon?`,options:[`360 degrees`,`540 degrees`,`720 degrees`,`900 degrees`],correctIndex:2,explanation:`The formula is (n - 2) x 180. For a hexagon (6 sides), it is 4 x 180, which equals 720 degrees.`},{id:736,category:`Logic & Math`,question:`What is the value of 8 cubed?`,options:[`256`,`384`,`512`,`640`],correctIndex:2,explanation:`8 cubed means 8 multiplied by itself three times (8 x 8 x 8). 64 x 8 equals 512.`},{id:737,category:`Logic & Math`,question:`What is the principal square root of 256?`,options:[`12`,`14`,`16`,`18`],correctIndex:2,explanation:`16 multiplied by 16 equals exactly 256.`},{id:738,category:`Logic & Math`,question:`If a dozen represents 12 items, how many items are in a gross?`,options:[`24`,`60`,`100`,`144`],correctIndex:3,explanation:`A gross refers to a dozen dozens. 12 multiplied by 12 equals 144.`},{id:739,category:`Logic & Math`,question:`If you roll a standard six-sided die, what is the probability of rolling a 4?`,options:[`1/4`,`1/6`,`1/8`,`1/2`],correctIndex:1,explanation:`A standard die has 6 possible outcomes, and only one of them is a 4, making the probability 1 in 6.`},{id:740,category:`Logic & Math`,question:`Solve the equation: 5 + 5 × 5 - 5 =`,options:[`20`,`25`,`30`,`45`],correctIndex:1,explanation:`Following the order of operations, multiplication comes first. 5 x 5 = 25. Then calculate left to right: 5 + 25 - 5 = 25.`},{id:741,category:`Logic & Math`,question:`How many prime numbers exist between the numbers 1 and 10?`,options:[`3`,`4`,`5`,`6`],correctIndex:1,explanation:`There are exactly 4 prime numbers between 1 and 10. They are 2, 3, 5, and 7.`},{id:742,category:`Logic & Math`,question:`In the Roman numeral system, what number does the letter 'C' stand for?`,options:[`50`,`100`,`500`,`1000`],correctIndex:1,explanation:`The letter 'C' stands for 100, deriving from the Latin word 'centum' meaning one hundred.`},{id:743,category:`Sequences`,question:`What is the next number in the sequence? 1, 1, 2, 6, 24, 120, ...`,options:[`240`,`360`,`720`,`840`],correctIndex:2,explanation:`This is a sequence of factorials (1!, 2!, 3!, 4!, 5!). The next is 6!, which is 120 x 6 = 720.`},{id:744,category:`Sequences`,question:`What is the next number in the sequence? 10, 20, 30, 50, 80, 130, ...`,options:[`180`,`200`,`210`,`230`],correctIndex:2,explanation:`Similar to the Fibonacci sequence, each number is the sum of the two preceding numbers. 80 + 130 = 210.`},{id:745,category:`Sequences`,question:`What is the next fraction in the sequence? 1/2, 1/3, 1/4, 1/5, ...`,options:[`1/6`,`1/7`,`2/5`,`1/8`],correctIndex:0,explanation:`The numerator stays the same while the denominator simply increases by 1 each time.`},{id:746,category:`Sequences`,question:`What is the next number in the sequence? 100, 81, 64, 49, 36, ...`,options:[`16`,`20`,`25`,`30`],correctIndex:2,explanation:`These are perfect squares counting backwards (10², 9², 8², 7², 6²). The next is 5², which is 25.`},{id:747,category:`Sequences`,question:`What is the next number in the sequence? 2, 3, 5, 7, 11, 13, ...`,options:[`14`,`15`,`17`,`19`],correctIndex:2,explanation:`This is the sequence of consecutive prime numbers. The next prime after 13 is 17.`},{id:748,category:`Sequences`,question:`What is the next number in the sequence? 10, 9, 7, 4, 0, ...`,options:[`-2`,`-4`,`-5`,`-6`],correctIndex:2,explanation:`The subtracted amount increases by 1 each time (-1, -2, -3, -4). The next step is -5. 0 - 5 = -5.`},{id:749,category:`Sequences`,question:`What is the next number in the sequence? 3, 6, 9, 12, 15, ...`,options:[`16`,`17`,`18`,`21`],correctIndex:2,explanation:`These are the basic multiples of 3. The next multiple after 15 is 18.`},{id:750,category:`Sequences`,question:`What is the next letter in the sequence? Z, W, T, Q, N, ...`,options:[`L`,`M`,`J`,`K`],correctIndex:3,explanation:`The sequence skips backwards through the alphabet by three letters each time. Three letters before N is K.`},{id:751,category:`Sequences`,question:`What is the next number in the sequence? 1, 3, 6, 10, 15, 21, ...`,options:[`26`,`27`,`28`,`30`],correctIndex:2,explanation:`These are triangular numbers. The difference between them increases by 1 each time (+2, +3, +4...). The next jump is +7. 21 + 7 = 28.`},{id:752,category:`Sequences`,question:`What is the next number in the sequence? 11, 22, 33, 44, 55, ...`,options:[`60`,`66`,`77`,`88`],correctIndex:1,explanation:`These are simply the multiples of 11 counting upward. 55 + 11 = 66.`},{id:753,category:`Science`,question:`What is the chemical symbol for the element Copper?`,options:[`Co`,`Cp`,`Cu`,`Cr`],correctIndex:2,explanation:`The symbol Cu comes from the Latin word 'cuprum', derived from the island of Cyprus where copper was famously mined.`},{id:754,category:`Science`,question:`In biology, which cellular organelle is primarily responsible for protein synthesis?`,options:[`Nucleus`,`Ribosome`,`Mitochondria`,`Lysosome`],correctIndex:1,explanation:`Ribosomes act as the micro-machines for making proteins by translating messenger RNA.`},{id:755,category:`Science`,question:`What is the most abundant gas in the atmosphere of the planet Mars?`,options:[`Oxygen`,`Nitrogen`,`Carbon Dioxide`,`Methane`],correctIndex:2,explanation:`The Martian atmosphere is incredibly thin and composed of roughly 95% carbon dioxide.`},{id:756,category:`Science`,question:`What scientific scale is commonly used to measure and define the hardness of minerals?`,options:[`Richter scale`,`Fujita scale`,`Mohs scale`,`Kelvin scale`],correctIndex:2,explanation:`The Mohs scale of mineral hardness characterizes scratch resistance of various minerals, ranging from 1 (Talc) to 10 (Diamond).`},{id:757,category:`Science`,question:`What is the chemical formula for a molecule of ozone?`,options:[`O2`,`O3`,`CO2`,`H2O2`],correctIndex:1,explanation:`Ozone is a highly reactive gas composed of three oxygen atoms (O3) bound together.`},{id:758,category:`Science`,question:`What is the name of the largest moon orbiting the planet Saturn?`,options:[`Europa`,`Ganymede`,`Callisto`,`Titan`],correctIndex:3,explanation:`Titan is Saturn's largest moon and the second-largest natural satellite in the solar system, known for its dense atmosphere.`},{id:759,category:`Science`,question:`What is the scientific term for the physical process of a gas turning directly into a liquid?`,options:[`Evaporation`,`Sublimation`,`Condensation`,`Freezing`],correctIndex:2,explanation:`Condensation occurs when a gas cools down and loses energy, forcing its molecules to cluster together into a liquid state.`},{id:760,category:`Science`,question:`What is the standard unit of measurement used to quantify electrical current?`,options:[`Volt`,`Watt`,`Ohm`,`Ampere`],correctIndex:3,explanation:`The ampere (often shortened to 'amp') is the SI base unit of electrical current.`},{id:761,category:`Science`,question:`What do you call two atoms of the same element that contain the same number of protons but different numbers of neutrons?`,options:[`Ions`,`Isotopes`,`Molecules`,`Compounds`],correctIndex:1,explanation:`Isotopes are variants of a particular chemical element which differ in neutron number, and consequently in nucleon number.`},{id:762,category:`Science`,question:`What branch of science is dedicated to the study of the history of life on Earth as based on fossils?`,options:[`Geology`,`Archaeology`,`Paleontology`,`Anthropology`],correctIndex:2,explanation:`Paleontology uses fossilized remains to understand the evolution, biology, and environments of ancient organisms.`},{id:763,category:`Geography`,question:`What is the capital city of Egypt?`,options:[`Alexandria`,`Giza`,`Luxor`,`Cairo`],correctIndex:3,explanation:`Cairo is the capital and largest city of Egypt, famously situated near the Nile River delta.`},{id:764,category:`Geography`,question:`Based on traditional measurements, what is the second longest river in the world?`,options:[`Nile`,`Amazon`,`Yangtze`,`Mississippi`],correctIndex:1,explanation:`The Amazon River in South America is widely considered the second longest river, though it holds the title for the largest volume of water.`},{id:765,category:`Geography`,question:`Which country is the largest in the world by total landmass?`,options:[`Canada`,`China`,`United States`,`Russia`],correctIndex:3,explanation:`Russia spans Eastern Europe and Northern Asia, making it the largest country by a significant margin.`},{id:766,category:`Geography`,question:`What is the name of the highest and most iconic mountain peak in Japan?`,options:[`Mount Kita`,`Mount Hotaka`,`Mount Fuji`,`Mount Yari`],correctIndex:2,explanation:`Mount Fuji is an active stratovolcano and the tallest mountain in Japan, famous for its exceptionally symmetrical cone.`},{id:767,category:`Geography`,question:`Which of the world's oceans is the deepest on average?`,options:[`Atlantic Ocean`,`Indian Ocean`,`Pacific Ocean`,`Arctic Ocean`],correctIndex:2,explanation:`The Pacific Ocean is both the largest and deepest of the world's ocean divisions, containing the Mariana Trench.`},{id:768,category:`Geography`,question:`Which European country is often romantically referred to as the 'Land of the Midnight Sun'?`,options:[`Sweden`,`Finland`,`Norway`,`Iceland`],correctIndex:2,explanation:`Due to its high latitude, parts of northern Norway experience a phenomenon where the sun doesn't set for weeks during the summer.`},{id:769,category:`Geography`,question:`What is the bustling capital city of Thailand?`,options:[`Hanoi`,`Bangkok`,`Phnom Penh`,`Vientiane`],correctIndex:1,explanation:`Bangkok is the capital and most populous city of Thailand, known in Thai as Krung Thep Maha Nakhon.`},{id:770,category:`Geography`,question:`Which continent is located entirely within both the Southern and Eastern Hemispheres?`,options:[`Africa`,`South America`,`Antarctica`,`Australia`],correctIndex:3,explanation:`Australia is uniquely positioned so that its entire continental landmass sits inside both the Southern and Eastern Hemispheres.`},{id:771,category:`Geography`,question:`Which famous river flows directly through the heart of Paris, France?`,options:[`Rhone`,`Loire`,`Seine`,`Thames`],correctIndex:2,explanation:`The Seine is a major commercial waterway that flows through Paris and empties into the English Channel.`},{id:772,category:`Geography`,question:`What large, semi-arid sandy savanna desert is located in Southern Africa?`,options:[`Sahara`,`Gobi`,`Kalahari`,`Mojave`],correctIndex:2,explanation:`The Kalahari Desert covers much of Botswana, as well as parts of Namibia and South Africa.`},{id:773,category:`Wordplay`,question:`What has 4 letters, sometimes 9 letters, but never 5 letters?`,options:[`A riddle`,`A statement`,`A question`,`A clock`],correctIndex:1,explanation:`It is a factual statement. The word 'What' has 4 letters, the word 'sometimes' has 9 letters, and the word 'never' has 5 letters.`},{id:774,category:`Wordplay`,question:`What 4-letter word can be read exactly the same upside down and right side up?`,options:[`MOM`,`SWIMS`,`NOON`,`WOW`],correctIndex:2,explanation:`The word 'NOON' is an ambigram, meaning it retains its exact spelling and orientation when rotated 180 degrees.`},{id:775,category:`Wordplay`,question:`What 6-letter English word contains 4 consecutive consonants?`,options:[`Rhythm`,`Asthma`,`Strengths`,`Knights`],correctIndex:1,explanation:`The word 'Asthma' features the four consecutive consonants S-T-H-M.`},{id:776,category:`Wordplay`,question:`Which of the following phrases is a perfect anagram of the word 'FUNERAL'?`,options:[`Real fun`,`Run leaf`,`Far lune`,`Near flu`],correctIndex:0,explanation:`Ironically, if you rearrange the letters in the solemn word 'FUNERAL', you can perfectly spell 'REAL FUN'.`},{id:777,category:`Wordplay`,question:`What common word sounds exactly like a single letter of the alphabet, but is actually a vegetable?`,options:[`Bee`,`Tea`,`Pea`,`Sea`],correctIndex:2,explanation:`The vegetable 'Pea' sounds completely identical to the letter 'P'.`},{id:778,category:`Wordplay`,question:`Which letter of the English alphabet is famously a hot beverage?`,options:[`C`,`T`,`P`,`B`],correctIndex:1,explanation:`The letter 'T' sounds perfectly identical to 'Tea'.`},{id:779,category:`Wordplay`,question:`What letter comes next in this sequence? I, V, X, L, C, D, ...`,options:[`E`,`F`,`M`,`Z`],correctIndex:2,explanation:`These are standard Roman numerals ordered by ascending value (1, 5, 10, 50, 100, 500). The next is M (1000).`},{id:780,category:`Wordplay`,question:`What common 3-letter word becomes a perfect palindrome when you look at it in a mirror?`,options:[`DAD`,`MOM`,`WOW`,`POP`],correctIndex:1,explanation:`The letters in 'MOM' are horizontally symmetrical, so reflecting it in a mirror still perfectly spells 'MOM'.`},{id:781,category:`Wordplay`,question:`What word means the exact same thing if you take away the first letter, the last letter, or all the letters?`,options:[`Queue`,`Alone`,`Empty`,`Aisle`],correctIndex:2,explanation:`If you take all the letters away from the word 'Empty', it literally becomes empty.`},{id:782,category:`Wordplay`,question:`What is a 3-letter palindrome for a female sheep?`,options:[`Ram`,`Lamb`,`Ewe`,`Deer`],correctIndex:2,explanation:`A female sheep is called a ewe. The word E-W-E reads the same forwards and backwards.`},{id:783,category:`Lateral Thinking`,question:`What is black when you buy it, red when you use it, and gray when you throw it away?`,options:[`A match`,`A cigarette`,`Charcoal`,`A sponge`],correctIndex:2,explanation:`Charcoal briquettes are black when unlit, glow red when burning, and turn into gray ash when extinguished.`},{id:784,category:`Lateral Thinking`,question:`A woman drops her ring into a cup full of coffee. When she reaches in to take it out, her fingers aren't wet. Why?`,options:[`She wore gloves`,`The coffee was frozen`,`It was dry coffee powder`,`The ring was waterproof`],correctIndex:2,explanation:`The cup was full of dry coffee beans or unbrewed coffee powder, not liquid coffee.`},{id:785,category:`Lateral Thinking`,question:`What can you hold indefinitely without ever touching it with your hands?`,options:[`A promise`,`A thought`,`Your breath`,`A memory`],correctIndex:2,explanation:`You 'hold' your breath using your lungs and diaphragm, requiring no physical touch.`},{id:786,category:`Lateral Thinking`,question:`What kind of building naturally has the most stories?`,options:[`A skyscraper`,`A library`,`A hotel`,`A hospital`],correctIndex:1,explanation:`A library contains thousands of books, meaning it holds thousands of written 'stories'.`},{id:787,category:`Lateral Thinking`,question:`What is guaranteed to taste much better than it smells?`,options:[`A durian`,`A cheese`,`A tongue`,`A fish`],correctIndex:2,explanation:`Your tongue is the organ used to taste things. A tongue does not 'smell' very good (as in, it lacks the ability to sniff).`},{id:788,category:`Lateral Thinking`,question:`Which room has absolutely no doors, no windows, and no floor?`,options:[`A vacuum`,`A mushroom`,`A chat room`,`A darkroom`],correctIndex:1,explanation:`A 'mush-room' is a fungus, not a physical room inside a house.`},{id:789,category:`Lateral Thinking`,question:`I have keys but no locks. I have space but no room. You can enter but can't go outside. What am I?`,options:[`A safe`,`A map`,`A keyboard`,`A hotel`],correctIndex:2,explanation:`A computer keyboard has typing 'keys', a 'space' bar, and an 'enter' key.`},{id:790,category:`Lateral Thinking`,question:`I can be cracked, made, told, and played. What am I?`,options:[`A record`,`A rule`,`A joke`,`A game`],correctIndex:2,explanation:`You can crack a joke, make a joke, tell a joke, and play a joke on someone.`},{id:791,category:`Lateral Thinking`,question:`I am an insect, and the first half of my name reveals a completely different insect. What am I?`,options:[`Butterfly`,`Beetle`,`Dragonfly`,`Grasshopper`],correctIndex:1,explanation:`The first half of the word 'Beetle' spells 'Bee'.`},{id:792,category:`Lateral Thinking`,question:`What kind of coat is always wet when you first put it on?`,options:[`A raincoat`,`A trench coat`,`A coat of paint`,`A wet suit`],correctIndex:2,explanation:`When you apply a 'coat' of paint to a wall, the liquid pai
