nt is inherently wet.`},{id:793,category:`Human Body`,question:`What part of the human eye gives it its distinct, recognizable color?`,options:[`Pupil`,`Cornea`,`Iris`,`Sclera`],correctIndex:2,explanation:`The iris contains pigmentation that determines eye color, and its muscles control the diameter of the pupil.`},{id:794,category:`Human Body`,question:`What highly mineralized substance covers the visible crown of human teeth?`,options:[`Dentin`,`Plaque`,`Enamel`,`Cementum`],correctIndex:2,explanation:`Tooth enamel is the hardest and most highly mineralized substance in the human body, protecting the teeth from decay.`},{id:795,category:`Human Body`,question:`What are the two upper chambers of the human heart officially called?`,options:[`Ventricles`,`Aortas`,`Valves`,`Atria`],correctIndex:3,explanation:`The heart has two upper receiving chambers known as the left and right atria (singular: atrium).`},{id:796,category:`Human Body`,question:`What gland is known as the 'master gland' because it controls the functions of many other endocrine glands?`,options:[`Thyroid gland`,`Adrenal gland`,`Pituitary gland`,`Pineal gland`],correctIndex:2,explanation:`The pea-sized pituitary gland sits at the base of the brain and secretes hormones that control many other vital glands.`},{id:797,category:`Human Body`,question:`What is widely considered the rarest blood type in the human population?`,options:[`O Negative`,`A Negative`,`B Negative`,`AB Negative`],correctIndex:3,explanation:`AB Negative is extremely rare, found in less than 1% of the global population.`},{id:798,category:`Human Body`,question:`What is the medical term for the opaque, tough white part of the human eye?`,options:[`Retina`,`Iris`,`Cornea`,`Sclera`],correctIndex:3,explanation:`The sclera is the white outer coating of the eye that provides structure and protection for the inner workings.`},{id:799,category:`Human Body`,question:`What is the anatomical name for the cartilaginous part of the ear that is visible on the outside of the head?`,options:[`Cochlea`,`Pinna`,`Stapes`,`Tympanic membrane`],correctIndex:1,explanation:`The pinna (or auricle) is the external part of the ear designed to collect sound waves and funnel them into the ear canal.`},{id:800,category:`Human Body`,question:`Where in the human body are the phalanges specifically located?`,options:[`Wrists and ankles`,`Fingers and toes`,`Spine and neck`,`Ribs and chest`],correctIndex:1,explanation:`The phalanges are the individual small bones that make up the fingers of the hand and the toes of the foot.`},{id:801,category:`Human Body`,question:`What muscular tubes carry urine downward from the kidneys to the bladder?`,options:[`Urethras`,`Fallopian tubes`,`Ureters`,`Bronchi`],correctIndex:2,explanation:`The ureters use peristaltic action (muscle contractions) to actively move urine from the kidneys into the bladder.`},{id:802,category:`Human Body`,question:`What structure connects the back of the throat to the middle ear to help equalize air pressure?`,options:[`Trachea`,`Esophagus`,`Eustachian tube`,`Pharynx`],correctIndex:2,explanation:`The Eustachian tube opens when you swallow or yawn to equalize pressure, which is why your ears 'pop' on airplanes.`},{id:803,category:`History`,question:`Who served as the first officially elected President of the United States?`,options:[`Thomas Jefferson`,`John Adams`,`George Washington`,`Abraham Lincoln`],correctIndex:2,explanation:`George Washington served as the first President of the United States from 1789 to 1797.`},{id:804,category:`History`,question:`What famous ancient civilization built the sprawling Machu Picchu complex high in the Andes?`,options:[`Maya`,`Aztecs`,`Incas`,`Olmecs`],correctIndex:2,explanation:`The Inca Empire built Machu Picchu in the 15th century as a royal estate for the Inca emperor Pachacuti.`},{id:805,category:`History`,question:`In what year did the RMS Titanic tragically sink during its maiden voyage?`,options:[`1905`,`1912`,`1918`,`1923`],correctIndex:1,explanation:`The Titanic sank in the early morning hours of April 15, 1912, after striking an iceberg in the North Atlantic Ocean.`},{id:806,category:`History`,question:`Which famous barrier divided a major German city geographically and ideologically from 1961 to 1989?`,options:[`Great Wall`,`Hadrian's Wall`,`Berlin Wall`,`Western Wall`],correctIndex:2,explanation:`The Berlin Wall was built by the German Democratic Republic during the Cold War to separate West Berlin from East Berlin.`},{id:807,category:`History`,question:`Who was the pioneering first woman to fly a plane solo across the Atlantic Ocean?`,options:[`Bessie Coleman`,`Harriet Quimby`,`Amelia Earhart`,`Sally Ride`],correctIndex:2,explanation:`Amelia Earhart achieved this historic milestone in 1932, flying a Lockheed Vega 5B from Canada to Northern Ireland.`},{id:808,category:`History`,question:`The Great Pyramid of Giza, one of the Seven Wonders of the Ancient World, was built as a tomb for which Egyptian Pharaoh?`,options:[`Ramses II`,`Tutankhamun`,`Khufu`,`Cleopatra`],correctIndex:2,explanation:`The Great Pyramid was commissioned by Pharaoh Khufu during the 4th dynasty of the Old Kingdom.`},{id:809,category:`History`,question:`What massive ancient empire was famously led by military general and dictator Julius Caesar?`,options:[`Greek Empire`,`Roman Empire`,`Ottoman Empire`,`Persian Empire`],correctIndex:1,explanation:`Julius Caesar was a Roman general and statesman who played a critical role in the events that led to the demise of the Roman Republic and the rise of the Roman Empire.`},{id:810,category:`History`,question:`Who was the primary author tasked with drafting the United States Declaration of Independence?`,options:[`George Washington`,`Benjamin Franklin`,`John Adams`,`Thomas Jefferson`],correctIndex:3,explanation:`While a committee of five was appointed, Thomas Jefferson wrote the original draft of the historic document in 1776.`},{id:811,category:`History`,question:`Which major war was fought between the Northern and Southern regions of the United States from 1861 to 1865?`,options:[`The Revolutionary War`,`The War of 1812`,`The American Civil War`,`The Spanish-American War`],correctIndex:2,explanation:`The American Civil War was fought between the Union (North) and the Confederacy (South), primarily over the institution of slavery.`},{id:812,category:`History`,question:`Who was the famous last active ruler of the Ptolemaic Kingdom of Ancient Egypt, known for her alliances with Rome?`,options:[`Nefertiti`,`Hatshepsut`,`Cleopatra`,`Sobekneferu`],correctIndex:2,explanation:`Cleopatra VII is historically famous for her political brilliance and romantic relationships with Julius Caesar and Mark Antony.`},{id:813,category:`Pop Culture`,question:`Which iconic sci-fi movie franchise features the famous line 'May the Force be with you'?`,options:[`Star Trek`,`Star Wars`,`The Matrix`,`Lord of the Rings`],correctIndex:1,explanation:`The line is the most famous catchphrase in the Star Wars universe, used to wish someone good luck.`},{id:814,category:`Pop Culture`,question:`What is the name of the magical, hidden boarding school in the Harry Potter series?`,options:[`Durmstrang`,`Beauxbatons`,`Hogwarts`,`Ilvermorny`],correctIndex:2,explanation:`Hogwarts School of Witchcraft and Wizardry is the primary setting for the first six books in the series.`},{id:815,category:`Pop Culture`,question:`Who is the wildly successful pop singer known for her incredibly devoted fan base called 'Swifties'?`,options:[`Ariana Grande`,`Selena Gomez`,`Katy Perry`,`Taylor Swift`],correctIndex:3,explanation:`Taylor Swift's fans adopted the moniker 'Swifties' as her career exploded over the last decade.`},{id:816,category:`Pop Culture`,question:`What is the highest-grossing film of all time at the worldwide box office (unadjusted for inflation)?`,options:[`Avengers: Endgame`,`Titanic`,`Avatar`,`Star Wars: The Force Awakens`],correctIndex:2,explanation:`James Cameron's sci-fi epic 'Avatar' (2009) remains the highest-grossing film globally, reclaiming its spot after a few re-releases.`},{id:817,category:`Pop Culture`,question:`Which DC Comics superhero is known as the 'Caped Crusader' and protects Gotham City?`,options:[`Superman`,`Spider-Man`,`Batman`,`Iron Man`],correctIndex:2,explanation:`Batman (Bruce Wayne) is often referred to by this nickname due to his iconic dark cape and vigilante mission.`},{id:818,category:`Pop Culture`,question:`In the hit 90s TV sitcom 'Friends', what is the name of the coffee shop where the main characters always hang out?`,options:[`Monk's Diner`,`Central Perk`,`MacLaren's Pub`,`The Peach Pit`],correctIndex:1,explanation:`Central Perk is the fictional Greenwich Village coffee house where Rachel famously worked and Phoebe played guitar.`},{id:819,category:`Pop Culture`,question:`What classic 1994 Disney animated film features a young lion cub named Simba?`,options:[`Madagascar`,`The Jungle Book`,`Tarzan`,`The Lion King`],correctIndex:3,explanation:`The Lion King follows Simba's journey from a young cub to reclaiming his throne at Pride Rock.`},{id:820,category:`Pop Culture`,question:`Which massive video game and media franchise involves catching fictional creatures in 'Poké Balls'?`,options:[`Digimon`,`Monster Hunter`,`Pokémon`,`Animal Crossing`],correctIndex:2,explanation:`Pokémon (short for Pocket Monsters) revolves around catching, training, and battling these unique creatures.`},{id:821,category:`Pop Culture`,question:`Who played the lead character of Jack Dawson in the 1997 blockbuster movie 'Titanic'?`,options:[`Brad Pitt`,`Tom Cruise`,`Johnny Depp`,`Leonardo DiCaprio`],correctIndex:3,explanation:`Leonardo DiCaprio starred alongside Kate Winslet in James Cameron's record-breaking romance epic.`},{id:822,category:`Pop Culture`,question:`What major streaming platform originally produced and released the hit sci-fi horror series 'Stranger Things'?`,options:[`Hulu`,`Amazon Prime`,`Netflix`,`HBO Max`],correctIndex:2,explanation:`Stranger Things is a flagship original series for Netflix, premiering on the platform in 2016.`},{id:823,category:`Sports`,question:`How many players from a single team are allowed on the field at one time in a standard soccer (football) match?`,options:[`9`,`10`,`11`,`12`],correctIndex:2,explanation:`A standard soccer team fields 11 players, typically comprising one goalkeeper and ten outfield players.`},{id:824,category:`Sports`,question:`In which fast-paced sport would a player leap into the air to perform a 'slam dunk'?`,options:[`Volleyball`,`Basketball`,`Tennis`,`Baseball`],correctIndex:1,explanation:`A slam dunk is a spectacular basketball move where a player forcefully thrusts the ball directly down through the hoop.`},{id:825,category:`Sports`,question:`What is the absolute highest possible score a player can achieve in a single game of traditional ten-pin bowling?`,options:[`200`,`250`,`300`,`350`],correctIndex:2,explanation:`A perfect game in bowling is a 300, achieved by rolling 12 consecutive strikes in a single game.`},{id:826,category:`Sports`,question:`The immensely popular FIFA World Cup is the premier international tournament for which sport?`,options:[`Rugby`,`Cricket`,`Basketball`,`Soccer`],correctIndex:3,explanation:`The FIFA World Cup is the most widely viewed and followed sporting event in the world, crowning the global champion of soccer.`},{id:827,category:`Sports`,question:`Which prestigious tennis tournament is uniquely played on natural grass courts in London?`,options:[`US Open`,`French Open`,`Australian Open`,`Wimbledon`],correctIndex:3,explanation:`Wimbledon is the oldest tennis tournament in the world and the only Grand Slam event still played on traditional grass.`},{id:828,category:`Sports`,question:`How many total bases are there on a standard baseball diamond (including home plate)?`,options:[`3`,`4`,`5`,`6`],correctIndex:1,explanation:`A baseball diamond has four bases: first base, second base, third base, and home plate.`},{id:829,category:`Sports`,question:`What outdoor sport features specific scoring terms like 'birdie', 'bogey', and 'albatross'?`,options:[`Tennis`,`Badminton`,`Golf`,`Croquet`],correctIndex:2,explanation:`These terms relate to a golfer's score relative to the expected 'par' for a specific hole.`},{id:830,category:`Sports`,question:`In standard American Football, how many points is a touchdown worth (before the extra point is kicked)?`,options:[`3`,`5`,`6`,`7`],correctIndex:2,explanation:`A touchdown awards the scoring team exactly 6 points, after which they can attempt a 1-point or 2-point conversion.`},{id:831,category:`Sports`,question:`What is the official, exact length of a standard marathon race in miles?`,options:[`13.1`,`20.5`,`26.2`,`30.0`],correctIndex:2,explanation:`A marathon is officially 26.2 miles (or 42.195 kilometers), a standard set by the IAAF in 1921.`},{id:832,category:`Sports`,question:`In the sport of boxing, what does the common acronym 'KO' stand for?`,options:[`Keep Out`,`Knockout`,`Kick Out`,`King Of`],correctIndex:1,explanation:`A knockout (KO) occurs when a boxer is knocked down and unable to stand up before the referee counts to ten.`},{id:833,category:`Logic & Math`,question:`What is the value of 15 squared?`,options:[`150`,`225`,`250`,`300`],correctIndex:1,explanation:`15 multiplied by 15 equals 225.`},{id:834,category:`Logic & Math`,question:`If a triangle has two angles that measure 90 degrees and 45 degrees, what is the measure of the third angle?`,options:[`30 degrees`,`45 degrees`,`60 degrees`,`90 degrees`],correctIndex:1,explanation:`The interior angles of a triangle always add up to 180 degrees. 180 - 90 - 45 = 45 degrees.`},{id:835,category:`Logic & Math`,question:`How many vertices (corners) does a standard three-dimensional cube have?`,options:[`6`,`8`,`10`,`12`],correctIndex:1,explanation:`A cube has 6 faces, 12 edges, and exactly 8 vertices where the edges meet.`},{id:836,category:`Logic & Math`,question:`In the Roman numeral system, which single letter is used to represent the number 1,000?`,options:[`C`,`D`,`L`,`M`],correctIndex:3,explanation:`The letter 'M' stands for 1,000, deriving from the Latin word 'mille'.`},{id:837,category:`Logic & Math`,question:`What is the absolute value of -100?`,options:[`-100`,`0`,`1`,`100`],correctIndex:3,explanation:`The absolute value is a number's distance from zero on a number line, so it is always a positive number.`},{id:838,category:`Logic & Math`,question:`How many sides does a dodecagon have?`,options:[`10`,`12`,`14`,`20`],correctIndex:1,explanation:`The prefix 'dodeca-' means twelve. A dodecagon is a 12-sided polygon.`},{id:839,category:`Logic & Math`,question:`If you buy an antique chair for $20 and sell it for $25, what is your percentage of profit?`,options:[`5%`,`20%`,`25%`,`50%`],correctIndex:2,explanation:`The profit is $5. $5 is exactly one-quarter (or 25%) of your original $20 investment.`},{id:840,category:`Logic & Math`,question:`What is the value of 2 to the power of 6?`,options:[`12`,`32`,`64`,`128`],correctIndex:2,explanation:`2 multiplied by itself six times (2 x 2 x 2 x 2 x 2 x 2) equals 64.`},{id:841,category:`Logic & Math`,question:`What is the lowest common multiple (LCM) of the numbers 4 and 6?`,options:[`10`,`12`,`24`,`36`],correctIndex:1,explanation:`The multiples of 4 are 4, 8, 12, 16... The multiples of 6 are 6, 12, 18... The lowest number they share is 12.`},{id:842,category:`Logic & Math`,question:`How many ounces are in a standard US pound?`,options:[`8`,`12`,`14`,`16`],correctIndex:3,explanation:`There are exactly 16 standard ounces in one avoirdupois pound.`},{id:843,category:`Sequences`,question:`What is the next number in the sequence? 1, 1, 2, 3, 5, 8, 13, ...`,options:[`18`,`21`,`24`,`26`],correctIndex:1,explanation:`This is the famous Fibonacci sequence, where each number is the sum of the two preceding numbers. 8 + 13 = 21.`},{id:844,category:`Sequences`,question:`What is the next number in the sequence? 0.1, 0.01, 0.001, ...`,options:[`0.0001`,`0.0011`,`0.0101`,`0.1001`],correctIndex:0,explanation:`The sequence divides the previous number by 10 each time, adding an additional zero after the decimal point.`},{id:845,category:`Sequences`,question:`What is the next number in the sequence? 10, 22, 36, 52, ...`,options:[`68`,`70`,`72`,`76`],correctIndex:1,explanation:`The sequence adds an increasing even number each time: +12, +14, +16. The next jump is +18. 52 + 18 = 70.`},{id:846,category:`Sequences`,question:`What is the next number in the sequence? 100, 50, 25, ...`,options:[`10`,`12.5`,`15`,`5`],correctIndex:1,explanation:`Each number in the sequence is exactly half of the preceding number. Half of 25 is 12.5.`},{id:847,category:`Sequences`,question:`What is the next number in the sequence? 3, 7, 11, 15, ...`,options:[`17`,`18`,`19`,`21`],correctIndex:2,explanation:`The sequence simply adds 4 to the previous number each time. 15 + 4 = 19.`},{id:848,category:`Sequences`,question:`What is the next letter in the sequence? M, V, E, M, J, S, U, ...`,options:[`P`,`N`,`E`,`N`],correctIndex:1,explanation:`These are the first letters of the planets in our solar system, in order from the Sun (Mercury, Venus, Earth...). The next is Neptune (N).`},{id:849,category:`Sequences`,question:`What is the next number in the sequence? 5, 10, 20, 40, ...`,options:[`60`,`70`,`80`,`100`],correctIndex:2,explanation:`Each number in the sequence is multiplied by 2. 40 x 2 = 80.`},{id:850,category:`Sequences`,question:`What is the next letter in the sequence? N, E, S, ...`,options:[`W`,`E`,`N`,`S`],correctIndex:0,explanation:`These represent the four cardinal directions on a compass (North, East, South). The final direction is West (W).`},{id:851,category:`Sequences`,question:`What is the next number in the sequence? 2, 9, 28, 65, 126, ...`,options:[`215`,`216`,`217`,`218`],correctIndex:2,explanation:`These are the cubes of consecutive integers, plus one (1³+1, 2³+1, 3³+1...). The next is 6³ + 1, which equals 217.`},{id:852,category:`Sequences`,question:`What is the next fraction in the sequence? 1/2, 1/4, 1/8, 1/16, ...`,options:[`1/20`,`1/24`,`1/32`,`1/64`],correctIndex:2,explanation:`The denominator of the fraction doubles each time. The next denominator is 16 x 2 = 32.`},{id:853,category:`Science`,question:`What is the chemical symbol for the element Gold?`,options:[`Go`,`Gl`,`Ag`,`Au`],correctIndex:3,explanation:`The symbol Au comes from the Latin word 'aurum', which means shining dawn or gold.`},{id:854,category:`Science`,question:`Which force famously acts as a resistance to the movement of an object across a surface?`,options:[`Magnetism`,`Gravity`,`Friction`,`Inertia`],correctIndex:2,explanation:`Friction is the force resisting the relative motion of solid surfaces, fluid layers, and material elements sliding against each other.`},{id:855,category:`Science`,question:`What specific cellular organelle is universally known as the 'powerhouse of the cell'?`,options:[`Nucleus`,`Ribosome`,`Chloroplast`,`Mitochondria`],correctIndex:3,explanation:`Mitochondria generate most of the chemical energy needed to power the cell's biochemical reactions.`},{id:856,category:`Science`,question:`What is the scientific term for the process by which moisture is carried through plants from roots to small pores on the underside of leaves, where it changes to vapor and is released?`,options:[`Transpiration`,`Condensation`,`Osmosis`,`Photosynthesis`],correctIndex:0,explanation:`Transpiration is essentially evaporation of water from plant leaves, which helps cool the plant and pump water and minerals to the leaves.`},{id:857,category:`Science`,question:`What is the scientific study of insects called?`,options:[`Arachnology`,`Entomology`,`Botany`,`Ichthyology`],correctIndex:1,explanation:`Entomology is a specialized branch of zoology that focuses exclusively on the study of insects.`},{id:858,category:`Science`,question:`What is the extremely hot, solid, and dense sphere at the very center of the Earth called?`,options:[`The Mantle`,`The Outer Core`,`The Inner Core`,`The Lithosphere`],correctIndex:2,explanation:`The inner core is a solid ball of iron and nickel sitting at the absolute center of our planet, subjected to immense pressure.`},{id:859,category:`Science`,question:`What is widely recognized as the hardest naturally occurring substance on Earth?`,options:[`Titanium`,`Diamond`,`Graphene`,`Quartz`],correctIndex:1,explanation:`A diamond's carbon atoms are arranged in a rigid tetrahedral structure, making it the hardest known natural material on the Mohs scale.`},{id:860,category:`Science`,question:`Which gas makes up the overwhelming majority (about 78%) of Earth's atmosphere?`,options:[`Oxygen`,`Carbon Dioxide`,`Hydrogen`,`Nitrogen`],correctIndex:3,explanation:`Nitrogen gas (N2) is the most abundant element in our atmosphere, far surpassing Oxygen which sits at around 21%.`},{id:861,category:`Science`,question:`At standard atmospheric pressure, what is the exact freezing point of water on the Fahrenheit scale?`,options:[`0 degrees`,`32 degrees`,`100 degrees`,`212 degrees`],correctIndex:1,explanation:`Water freezes at 0° Celsius, which converts perfectly to 32° on the Fahrenheit scale.`},{id:862,category:`Science`,question:`Which famous scientist developed the famous mass-energy equivalence formula E=mc²?`,options:[`Niels Bohr`,`Stephen Hawking`,`Albert Einstein`,`Marie Curie`],correctIndex:2,explanation:`Albert Einstein introduced the formula in 1905 as part of his groundbreaking theory of special relativity.`},{id:863,category:`Geography`,question:`What is the capital city of Australia?`,options:[`Sydney`,`Melbourne`,`Brisbane`,`Canberra`],correctIndex:3,explanation:`Canberra is the capital city, entirely planned and built in the early 20th century to serve as the seat of government.`},{id:864,category:`Geography`,question:`Which European country holds the title for having the most islands in the world?`,options:[`Greece`,`Indonesia`,`Sweden`,`Philippines`],correctIndex:2,explanation:`Sweden has an estimated 267,570 islands, more than any other country on Earth, though most are uninhabited.`},{id:865,category:`Geography`,question:`By total volume, what is the largest and deepest freshwater lake in the world?`,options:[`Lake Superior`,`Lake Victoria`,`Lake Baikal`,`Caspian Sea`],correctIndex:2,explanation:`Located in Russia, Lake Baikal contains more water than all the North American Great Lakes combined.`},{id:866,category:`Geography`,question:`What is officially the smallest recognized sovereign country in the world?`,options:[`Monaco`,`San Marino`,`Liechtenstein`,`Vatican City`],correctIndex:3,explanation:`Vatican City is an independent city-state enclaved within Rome, Italy, covering just 49 hectares (121 acres).`},{id:867,category:`Geography`,question:`What is the capital city of Canada?`,options:[`Toronto`,`Vancouver`,`Montreal`,`Ottawa`],correctIndex:3,explanation:`Ottawa, located in the province of Ontario, serves as the political center and capital city of Canada.`},{id:868,category:`Geography`,question:`Which major river famously flows northward through Egypt to empty into the Mediterranean Sea?`,options:[`The Congo`,`The Niger`,`The Nile`,`The Zambezi`],correctIndex:2,explanation:`The Nile River was the lifeblood of ancient Egypt and continues to be the primary water source for the country today.`},{id:869,category:`Geography`,question:`Which massive, incredibly dry desert spans across a large coastal strip of South America, primarily in Chile?`,options:[`The Mojave Desert`,`The Atacama Desert`,`The Gobi Desert`,`The Kalahari Desert`],correctIndex:1,explanation:`The Atacama Desert is one of the driest places on Earth, with some weather stations never having recorded a single drop of rain.`},{id:870,category:`Geography`,question:`The geographically diverse Galapagos Islands are an official province of which country?`,options:[`Ecuador`,`Peru`,`Colombia`,`Chile`],correctIndex:0,explanation:`The Galapagos Islands, famous for their unique endemic species, lie about 600 miles off the coast of Ecuador.`},{id:871,category:`Geography`,question:`Which two continents are located entirely and completely within the Southern Hemisphere?`,options:[`South America and Africa`,`Australia and Antarctica`,`Africa and Australia`,`South America and Antarctica`],correctIndex:1,explanation:`Both Australia and Antarctica sit completely below the Equator, making them the only two continents entirely in the Southern Hemisphere.`},{id:872,category:`Geography`,question:`The native Māori people refer to which country as 'Aotearoa', meaning the land of the long white cloud?`,options:[`Fiji`,`Hawaii`,`New Zealand`,`Samoa`],correctIndex:2,explanation:`Aotearoa is the Māori name for New Zealand, famously known for its stunning natural landscapes and indigenous culture.`},{id:873,category:`Wordplay`,question:`What is the longest commonly used English word that contains only one vowel?`,options:[`Strengths`,`Rhythms`,`Syzygy`,`Scratched`],correctIndex:0,explanation:`The word 'Strengths' contains nine letters, but only a single vowel ('e').`},{id:874,category:`Wordplay`,question:`What word's first two letters signify a male, its first three a female, its first four a great man, and its entirety a great woman?`,options:[`Heroine`,`Manager`,`Countess`,`Hostess`],correctIndex:0,explanation:`He (male), Her (female), Hero (great man), Heroine (great woman).`},{id:875,category:`Wordplay`,question:`Which of the following phrases is a perfect anagram of the word 'LISTEN'?`,options:[`Ten lips`,`Silent`,`Inlets`,`Enlist`],correctIndex:1,explanation:`If you rearrange the letters in the word 'LISTEN', you can perfectly spell the word 'SILENT'.`},{id:876,category:`Wordplay`,question:`What is the grammatical term for a word, phrase, or sequence that reads exactly the same backward as forward?`,options:[`Anagram`,`Palindrome`,`Oxymoron`,`Acronym`],correctIndex:1,explanation:`Palindromes are words like 'racecar', 'level', or 'radar' that maintain their spelling when reversed.`},{id:877,category:`Wordplay`,question:`I am a five-letter word. If you take away two of my letters, you are left with exactly one. What word am I?`,options:[`Stone`,`Alone`,`Money`,`Phone`],correctIndex:1,explanation:`If you take the first two letters ('A' and 'L') off the word 'ALONE', you are left with the word 'ONE'.`},{id:878,category:`Wordplay`,question:`What is the only common English word that contains three consecutive double letters?`,options:[`Committee`,`Bookkeeper`,`Successfully`,`Mississippi`],correctIndex:1,explanation:`The word 'B-O-O-K-K-E-E-P-E-R' features the double-letter sequence OO, KK, and EE right in a row.`},{id:879,category:`Wordplay`,question:`The English word 'alphabet' originates from the first two letters of which ancient language's alphabet?`,options:[`Latin`,`Aramaic`,`Phoenician`,`Greek`],correctIndex:3,explanation:`The word comes from 'alpha' and 'beta', the first two letters of the Greek alphabet.`},{id:880,category:`Wordplay`,question:`What starts with an 'E', ends with an 'E', but usually only contains a single letter?`,options:[`Eye`,`Edge`,`Envelope`,`Eagle`],correctIndex:2,explanation:`A physical envelope is used to send a single piece of mail (a letter).`},{id:881,category:`Wordplay`,question:`I am a 7-letter word. Curiously, I become physically longer when my third letter is removed. What word am I?`,options:[`Shorter`,`Lounger`,`Stretch`,`Lengthy`],correctIndex:1,explanation:`If you take the third letter ('U') out of the word 'LOUNGER', it spells the word 'LONGER'.`},{id:882,category:`Wordplay`,question:`Which specific word in the English dictionary is always spelled incorrectly?`,options:[`Weird`,`Misspell`,`Incorrectly`,`Embarrass`],correctIndex:2,explanation:`The word 'Incorrectly' is always spelled I-N-C-O-R-R-E-C-T-L-Y. It's a literal pun.`},{id:883,category:`Lateral Thinking`,question:`A man was walking outside in the pouring rain without an umbrella or a hat. However, not a single hair on his head got wet. How is this possible?`,options:[`He was standing under a tree`,`He was completely bald`,`It was raining very lightly`,`He wore a hoodie`],correctIndex:1,explanation:`He didn't get any hair wet because he didn't have any hair to begin with—he was bald.`},{id:884,category:`Lateral Thinking`,question:`What item gets wetter and wetter the more it dries?`,options:[`A towel`,`A sponge`,`A cloud`,`A mop`],correctIndex:0,explanation:`As a towel dries your body, the towel itself absorbs the water and becomes wet.`},{id:885,category:`Lateral Thinking`,question:`A cowboy rode into town on Friday. He stayed for exactly three days, and then he rode out of town on Friday. How is this possible?`,options:[`He used a time machine`,`Friday is the name of a town`,`His horse was named Friday`,`He walked out of town`],correctIndex:2,explanation:`Friday wasn't the day of the week, it was the name of the horse he was riding.`},{id:886,category:`Lateral Thinking`,question:`I am a very odd number. But if you take away just one of my letters, I suddenly become even. What number am I?`,options:[`Three`,`Seven`,`Eleven`,`Nine`],correctIndex:1,explanation:`The word 'SEVEN' is an odd number. Take away the 'S' and you are left with the word 'EVEN'.`},{id:887,category:`Lateral Thinking`,question:`What travels entirely around the world, yet manages to stay in one single corner the entire time?`,options:[`The sun`,`A pilot`,`A postage stamp`,`A satellite`],correctIndex:2,explanation:`A postage stamp sits in the corner of an envelope, but the letter can travel across the globe.`},{id:888,category:`Lateral Thinking`,question:`A man looking at a photograph says: 'Brothers and sisters, I have none. But that man's father is my father's son.' Who is in the photograph?`,options:[`The man himself`,`His uncle`,`His grandfather`,`His son`],correctIndex:3,explanation:`Since he has no siblings, 'my father's son' is the man speaking. Therefore, the man in the photo has a father who is the speaker. The photo is of his son.`},{id:889,category:`Lateral Thinking`,question:`What is something that you can easily hold in your right hand, but can absolutely never hold in your left hand?`,options:[`Your right elbow`,`Your left hand`,`Your left shoulder`,`A right-handed glove`],correctIndex:1,explanation:`It is physically impossible to grab or hold your own left hand using your left hand.`},{id:890,category:`Lateral Thinking`,question:`If you have a large bowl containing six apples, and you take away four of them, how many apples do you have?`,options:[`Two`,`Four`,`Six`,`Ten`],correctIndex:1,explanation:`You literally took away four apples, so the number of apples *you* currently have in your hands is four.`},{id:891,category:`Lateral Thinking`,question:`Some months on the calendar have 31 days, and some months have 30 days. How many months have 28 days?`,options:[`One`,`Two`,`Six`,`All twelve of them`],correctIndex:3,explanation:`Every single month of the year has at least 28 days in it.`},{id:892,category:`Lateral Thinking`,question:`A rooster lays an egg perfectly balanced on the peak of a barn roof. Which way will the egg roll?`,options:[`Left`,`Right`,`It will stay balanced`,`Nowhere`],correctIndex:3,explanation:`The egg won't roll anywhere because roosters are male and cannot lay eggs.`},{id:893,category:`Human Body`,question:`What is the longest, heaviest, and strongest single bone in the human body?`,options:[`Tibia`,`Humerus`,`Femur`,`Fibula`],correctIndex:2,explanation:`The femur (thigh bone) extends from the hip joint to the knee joint and endures incredible weight and force.`},{id:894,category:`Human Body`,question:`What naturally occurring pigment is primarily responsible for determining human skin, hair, and eye color?`,options:[`Melatonin`,`Keratin`,`Melanin`,`Hemoglobin`],correctIndex:2,explanation:`Melanin is produced by cells called melanocytes; individuals with darker skin have melanocytes that produce more melanin.`},{id:895,category:`Human Body`,question:`By surface area and weight, what is considered the absolute largest organ of the human body?`,options:[`The Liver`,`The Skin`,`The Intestines`,`The Lungs`],correctIndex:1,explanation:`The skin is a massive organ that covers the entire body, protecting internal structures and regulating temperature.`},{id:896,category:`Human Body`,question:`How many distinct chambers are there inside a normal, healthy human heart?`,options:[`Two`,`Three`,`Four`,`Six`],correctIndex:2,explanation:`The heart has four chambers: two upper atria (to receive blood) and two lower ventricles (to pump blood out).`},{id:897,category:`Human Body`,question:`Which specific part of the brain is tucked under the cerebrum and is crucial for controlling balance, posture, and coordination?`,options:[`Cerebellum`,`Brainstem`,`Thalamus`,`Hypothalamus`],correctIndex:0,explanation:`The cerebellum (Latin for 'little brain') coordinates voluntary movements to ensure smooth and balanced muscular activity.`},{id:898,category:`Human Body`,question:`Which specific type of blood cells are primarily responsible for carrying oxygen from the lungs to the rest of the body?`,options:[`White blood cells`,`Platelets`,`Plasma cells`,`Red blood cells`],correctIndex:3,explanation:`Red blood cells (erythrocytes) contain the protein hemoglobin, which binds to oxygen allowing it to be transported through the bloodstream.`},{id:899,category:`Human Body`,question:`What is the smallest bone in the entire human body?`,options:[`The patella`,`The stapes`,`The distal phalanx`,`The coccyx`],correctIndex:1,explanation:`The stapes (or stirrup) is a tiny bone in the middle ear that helps transmit sound vibrations. It is roughly the size of a grain of rice.`},{id:900,category:`Human Body`,question:`Which major organ, located behind the stomach, is responsible for producing the hormone insulin?`,options:[`The Liver`,`The Spleen`,`The Pancreas`,`The Gallbladder`],correctIndex:2,explanation:`The pancreas serves dual roles, aiding in digestion and producing essential hormones like insulin to regulate blood sugar levels.`},{id:901,category:`Human Body`,question:`What is the scientific and medical name for the human voice box?`,options:[`Pharynx`,`Larynx`,`Trachea`,`Esophagus`],correctIndex:1,explanation:`The larynx houses the vocal cords, manipulating pitch and volume, and protecting the trachea from aspirated food.`},{id:902,category:`Human Body`,question:`What type of blood vessels are primarily responsible for carrying deoxygenated blood back toward the heart?`,options:[`Arteries`,`Veins`,`Capillaries`,`Aortas`],correctIndex:1,explanation:`Veins generally carry deoxygenated blood back to the heart, containing one-way valves to keep blood flowing in the correct direction.`},{id:903,category:`History`,question:`Which famous Italian Renaissance polymath painted the 'Mona Lisa'?`,options:[`Michelangelo`,`Raphael`,`Donatello`,`Leonardo da Vinci`],correctIndex:3,explanation:`Leonardo da Vinci painted the Mona Lisa in the early 16th century, and it is widely considered the most famous painting in the world.`},{id:904,category:`History`,question:`In what year did World War II officially come to an end?`,options:[`1941`,`1943`,`1945`,`1947`],correctIndex:2,explanation:`World War II concluded in 1945 following the surrender of Germany in May and the subsequent surrender of Japan in September.`},{id:905,category:`History`,question:`Who was the pioneering scientist that became the very first woman to win a Nobel Prize?`,options:[`Rosalind Franklin`,`Marie Curie`,`Ada Lovelace`,`Florence Nightingale`],correctIndex:1,explanation:`Marie Curie won the Nobel Prize in Physics in 1903, and later won a second Nobel Prize in Chemistry in 1911.`},{id:906,category:`History`,question:`Which ancient civilization is credited with constructing the magnificent Pyramids of Giza?`,options:[`The Maya`,`The Sumerians`,`The Ancient Egyptians`,`The Babylonians`],correctIndex:2,explanation:`The Pyramids of Giza were built by the Ancient Egyptians during the Old Kingdom as massive, elaborate tombs for their pharaohs.`},{id:907,category:`History`,question:`Which Italian explorer completed four historic voyages across the Atlantic Ocean starting in 1492, opening the Americas to European colonization?`,options:[`Ferdinand Magellan`,`Vasco da Gama`,`Marco Polo`,`Christopher Columbus`],correctIndex:3,explanation:`Christopher Columbus, sailing under the flag of Spain, arrived in the Americas in 1492 while searching for a western sea route to Asia.`},{id:908,category:`History`,question:`Which revered U.S. President successfully led the nation through the American Civil War and issued the Emancipation Proclamation?`,options:[`George Washington`,`Thomas Jefferson`,`Abraham Lincoln`,`Theodore Roosevelt`],correctIndex:2,explanation:`Abraham Lincoln served as the 16th President of the United States, preserving the Union and abolishing slavery.`},{id:909,category:`History`,question:`The thriving ancient Roman city of Pompeii was famously destroyed and buried by the catastrophic eruption of which volcano?`,options:[`Mount Etna`,`Mount Vesuvius`,`Mount Olympus`,`Mount Stromboli`],correctIndex:1,explanation:`Mount Vesuvius erupted violently in 79 AD, burying Pompeii under meters of volcanic ash and pumice.`},{id:910,category:`History`,question:`Who was the adopted heir of Julius Caesar who went on to become the very first emperor of the Roman Empire?`,options:[`Nero`,`Marcus Aurelius`,`Constantine`,`Augustus Caesar`],correctIndex:3,explanation:`Born Octavian, he was granted the title Augustus by the Roman Senate and founded the Roman Principate.`},{id:911,category:`History`,question:`What was the name of the famous ship that transported the English Puritans (Pilgrims) to the New World in 1620?`,options:[`The Santa Maria`,`The Mayflower`,`The Discovery`,`The Victoria`],correctIndex:1,explanation:`The Mayflower completed a grueling 66-day voyage across the Atlantic, landing at what is now Plymouth, Massachusetts.`},{id:912,category:`History`,question:`The historic Magna Carta, establishing the principle that everyone is subject to the law, was signed in 1215 in which country?`,options:[`France`,`Spain`,`England`,`Italy`],correctIndex:2,explanation:`King John of England was pressured by rebellious barons into sealing the Magna Carta at Runnymede.`},{id:913,category:`Pop Culture`,question:`Which iconic DC Comics superhero is widely known by the nickname 'The Man of Steel'?`,options:[`Batman`,`Iron Man`,`Captain America`,`Superman`],correctIndex:3,explanation:`Superman is frequently referred to as the Man of Steel, highlighting his near-indestructible physical nature.`},{id:914,category:`Pop Culture`,question:`In the 1999 sci-fi classic 'The Matrix', what color pill does Neo choose to take in order to learn the truth about the world?`,options:[`Blue pill`,`Red pill`,`Green pill`,`Yellow pill`],correctIndex:1,explanation:`Morpheus offers Neo a choice: take the blue pill to remain in ignorance, or the red pill to escape the Matrix.`},{id:915,category:`Pop Culture`,question:`Who is the British author that famously created and wrote the 'Harry Potter' fantasy book series?`,options:[`J.R.R. Tolkien`,`George R.R. Martin`,`J.K. Rowling`,`C.S. Lewis`],correctIndex:2,explanation:`J.K. Rowling wrote the incredibly successful seven-book series following the life of the young wizard Harry Potter.`},{id:916,category:`Pop Culture`,question:`In the classic Disney animated universe, what is the name of Mickey Mouse's loyal pet dog?`,options:[`Goofy`,`Snoopy`,`Odie`,`Pluto`],correctIndex:3,explanation:`Pluto is Mickey's cheerful, non-anthropomorphic yellow-orange dog, first appearing in 1930.`},{id:917,category:`Pop Culture`,question:`The vigilante superhero Batman protects and operates out of which fictional, crime-ridden city?`,options:[`Metropolis`,`Star City`,`Central City`,`Gotham City`],correctIndex:3,explanation:`Gotham City is the dark, gritty fictional metropolis heavily associated with the Batman mythos.`},{id:918,category:`Pop Culture`,question:`Which record-breaking 1997 movie features the massively popular theme song 'My Heart Will Go On' by Celine Dion?`,options:[`The Bodyguard`,`Titanic`,`Ghost`,`Armageddon`],correctIndex:1,explanation:`The song served as the main theme for James Cameron's 'Titanic' and became one of the best-selling singles in history.`},{id:919,category:`Pop Culture`,question:`Which legendary musician and performer was widely crowned the 'King of Pop' throughout his career?`,options:[`Prince`,`Elvis Presley`,`Elton John`,`Michael Jackson`],correctIndex:3,explanation:`Michael Jackson earned the title through his revolutionary music videos, unmatched dance moves, and record-breaking albums like 'Thriller'.`},{id:920,category:`Pop Culture`,question:`Which actor launched the massive Marvel Cinematic Universe by taking on the role of Tony Stark / Iron Man?`,options:[`Chris Evans`,`Chris Hemsworth`,`Robert Downey Jr.`,`Mark Ruffalo`],correctIndex:2,explanation:`Robert Downey Jr.'s charismatic performance in the 2008 film 'Iron Man' became the foundation of the entire MCU.`},{id:921,category:`Pop Culture`,question:`Which long-running animated TV show features the famous yellow family of Homer, Marge, Bart, Lisa, and Maggie?`,options:[`Family Guy`,`The Simpsons`,`Futurama`,`South Park`],correctIndex:1,explanation:`The Simpsons debuted in 1989 and holds the record for the longest-running American animated series.`},{id:922,category:`Pop Culture`,question:`Which legendary science fiction film franchise features characters like Luke Skywalker, Princess Leia, and Darth Vader?`,options:[`Star Trek`,`Dune`,`Doctor Who`,`Star Wars`],correctIndex:3,explanation:`Created by George Lucas, Star Wars is a sprawling space opera that redefined blockbuster cinema.`},{id:923,category:`Sports`,question:`How many interlocking rings make up the official symbol of the Olympic Games?`,options:[`3`,`4`,`5`,`6`],correctIndex:2,explanation:`The five interlocking rings represent the unity of the five inhabited continents participating in the Olympic Games.`},{id:924,category:`Sports`,question:`Which fast-paced racket sport is played using a uniquely shaped, feathered projectile called a shuttlecock?`,options:[`Tennis`,`Squash`,`Badminton`,`Pickleball`],correctIndex:2,explanation:`Badminton players hit the aerodynamic shuttlecock (or 'birdie') back and forth over a high net.`},{id:925,category:`Sports`,question:`In the sport of golf, what specific scoring term is used when a player completes a hole in exactly one stroke under par?`,options:[`Eagle`,`Bogey`,`Birdie`,`Albatross`],correctIndex:2,explanation:`A 'birdie' is a score of 1-under par, an 'eagle' is 2-under par, and a 'bogey' is 1-over par.`},{id:926,category:`Sports`,question:`During a standard inning of baseball, how many players from the defensive team are positioned on the field at one time?`,options:[`8`,`9`,`10`,`11`],correctIndex:1,explanation:`A defensive baseball team fields exactly 9 players: a pitcher, catcher, four infielders, and three outfielders.`},{id:927,category:`Sports`,question:`What full-contact heavyweight sport is widely considered to be the national sport of Japan?`,options:[`Judo`,`Karate`,`Sumo wrestling`,`Kendo`],correctIndex:2,explanation:`Sumo is a traditional Japanese style of wrestling where the goal is to force the opponent out of a circular ring or touch the ground.`},{id:928,category:`Sports`,question:`Which national men's soccer team holds the record for winning the most FIFA World Cup tournaments in history?`,options:[`Germany`,`Italy`,`Argentina`,`Brazil`],correctIndex:3,explanation:`Brazil has won the men's FIFA World Cup a record five times (1958, 1962, 1970, 1994, and 2002).`},{id:929,category:`Sports`,question:`In a standard game of tennis, what unique term is used by the umpire to represent a score of zero?`,options:[`Nil`,`Zero`,`Naught`,`Love`],correctIndex:3,explanation:`The term 'love' is used for zero points. It is believed to have originated from the French word 'l'oeuf' (the egg), resembling a zero.`},{id:930,category:`Sports`,question:`In outdoor track and field, what is the exact distance of one full lap around the innermost lane of a standard running track?`,options:[`200 meters`,`300 meters`,`400 meters`,`500 meters`],correctIndex:2,explanation:`A standard Olympic-sized running track is exactly 400 meters in length in lane 1.`},{id:931,category:`Sports`,question:`The massive and prestigious championship trophy known as the Stanley Cup is awarded in which major sport?`,options:[`Basketball`,`Baseball`,`American Football`,`Ice Hockey`],correctIndex:3,explanation:`The Stanley Cup is the championship trophy awarded annually to the playoff winner in the National Hockey League (NHL).`},{id:932,category:`Sports`,question:`In what extremely popular American sport do two teams compete in the Super Bowl to win the Vince Lombardi Trophy?`,options:[`Baseball`,`Basketball`,`American Football`,`Soccer`],correctIndex:2,explanation:`The Vince Lombardi Trophy is awarded each year to the winning team of the NFL's championship game, the Super Bowl.`},{id:933,category:`History`,question:`Which 14th-century ruler of the Mali Empire is widely considered by historians to be the wealthiest person in recorded human history?`,options:[`Sundiata Keita`,`Mansa Musa`,`Sonni Ali`,`Askia the Great`],correctIndex:1,explanation:`Mansa Musa's immense wealth came from Mali's vast gold and salt reserves. His famous pilgrimage to Mecca lavishly distributed so much gold it disrupted regional economies.`},{id:934,category:`History`,question:`During the early 15th century, which Chinese admiral led seven epic maritime expeditions across the Indian Ocean, reaching as far as East Africa?`,options:[`Zheng He`,`Sun Tzu`,`Kublai Khan`,`Emperor Yongle`],correctIndex:0,explanation:`Zheng He commanded the massive 'Treasure Fleet' of the Ming Dynasty, decades before European explorers began their major oceanic voyages.`},{id:935,category:`History`,question:`After witnessing the immense suffering of the Kalinga War, which ancient Indian emperor famously renounced armed conquest and embraced Buddhism?`,options:[`Chandragupta`,`Akbar`,`Ashoka the Great`,`Harsha`],correctIndex:2,explanation:`Ashoka of the Maurya Empire shifted his policy from military conquest to 'Dhamma' (righteousness), spreading Buddhist principles across Asia.`},{id:936,category:`History`,question:`What was the capital city of the Aztec Empire, built on an island in Lake Texcoco and known for its complex canal system?`,options:[`Cusco`,`Tenochtitlan`,`Chichen Itza`,`Tikal`],correctIndex:1,explanation:`Tenochtitlan was one of the largest and most advanced cities in the world before the Spanish conquest. Modern Mexico City is built over its ruins.`},{id:937,category:`History`,question:`Which legendary 14th-century Moroccan scholar and explorer traveled further than any other explorer in pre-modern history, covering the Islamic world, Africa, and Asia?`,options:[`Ibn Battuta`,`Ibn Sina`,`Al-Khwarizmi`,`Marco Polo`],correctIndex:0,explanation:`Ibn Battuta traveled an estimated 75,000 miles over 30 years, documenting his journeys in his famous book, the 'Rihla'.`},{id:938,category:`History`,question:`Who was the founder and first Great Khan of the Mongol Empire, which became the largest contiguous land empire in history?`,options:[`Attila the Hun`,`Timur`,`Genghis Khan`,`Ogedei Khan`],correctIndex:2,explanation:`Genghis Khan united the nomadic tribes of the Mongolian plateau in the early 13th century before launching massive campaigns across Eurasia.`},{id:939,category:`History`,question:`The city of Timbuktu became a global center of Islamic scholarship, trade, and learning under which major West African empire?`,options:[`The Zulu Kingdom`,`The Songhai Empire`,`The Kingdom of Aksum`,`The Mali Empire`],correctIndex:3,explanation:`Under the Mali Empire (and later Songhai), Timbuktu's Sankore University held hundreds of thousands of manuscripts, drawing scholars from across the world.`},{id:940,category:`History`,question:`Which historic South American leader, known as 'El Libertador', led the independence of what are now Venezuela, Bolivia, Colombia, Ecuador, Peru, and Panama?`,options:[`José de San Martín`,`Simón Bolívar`,`Miguel Hidalgo`,`Bernardo O'Higgins`],correctIndex:1,explanation:`Simón Bolívar was a visionary military and political leader who played the central role in Latin America's successful struggle for independence from the Spanish Empire.`},{id:941,category:`History`,question:`In the 15th century, King Sejong the Great personally directed the creation of what scientific and cultural advancement for his people?`,options:[`The compass`,`The Hangul alphabet`,`Moveable type printing`,`Gunpowder`],correctIndex:1,explanation:`King Sejong created Hangul, the Korean alphabet, specifically to increase literacy among commoners who struggled with complex Chinese characters.`},{id:942,category:`History`,question:`Who led the only successful slave uprising in history, which eventually resulted in the founding of the independent state of Haiti?`,options:[`Toussaint Louverture`,`Jean-Jacques Dessalines`,`Nat Turner`,`Marcus Garvey`],correctIndex:0,explanation:`Toussaint Louverture was a brilliant military strategist who transformed a slave rebellion into a revolutionary movement that defeated European powers.`},{id:943,category:`History`,question:`What ancient civilization, located in modern-day Pakistan and northwest India, is famous for its highly planned cities like Mohenjo-Daro?`,options:[`Sumerian`,`Indus Valley Civilization`,`Minoan`,`Olmec`],correctIndex:1,explanation:`The Indus Valley (Harappan) Civilization featured advanced urban planning, baked brick houses, and complex drainage systems around 2500 BCE.`},{id:944,category:`History`,question:`Which powerful female pharaoh of Ancient Egypt successfully expanded trade routes and oversaw an era of massive architectural achievements?`,options:[`Cleopatra`,`Nefertiti`,`Hatshepsut`,`Sobekneferu`],correctIndex:2,explanation:`Hatshepsut ruled during the 18th Dynasty. She is renowned for establishing vital trade networks, most notably the expedition to the Land of Punt.`},{id:945,category:`History`,question:`The Meiji Restoration of 1868 was a political and social revolution that rapidly modernized and industrialized which nation?`,options:[`China`,`Korea`,`Vietnam`,`Japan`],correctIndex:3,explanation:`The Meiji Restoration restored practical imperial rule to Japan, ending the era of the samurai and transforming Japan into a modern world power.`},{id:946,category:`History`,question:`Who is the only female emperor in the over 3,000-year history of China to rule in her own right?`,options:[`Empress Dowager Cixi`,`Wu Zetian`,`Empress Wei`,`Borte Ujin`],correctIndex:1,explanation:`Wu Zetian ruled during the Tang Dynasty (and her own brief Zhou Dynasty), drastically expanding the empire and supporting Buddhism and education.`},{id:947,category:`History`,question:`Which ancient African kingdom, located in modern-day Ethiopia and Eritrea, was a major naval and trading power that adopted Christianity in the 4th century?`,options:[`Kingdom of Kush`,`Kingdom of Aksum`,`Carthage`,`Nubia`],correctIndex:1,explanation:`The Kingdom of Aksum (Axum) was a deeply influential empire that controlled Red Sea trade and minted its own currency.`},{id:948,category:`History`,question:`Who was the founder of the Achaemenid Empire, recognized for his respect for the customs and religions of the lands he conquered?`,options:[`Darius the Great`,`Xerxes I`,`Cyrus the Great`,`Hammurabi`],correctIndex:2,explanation:`Cyrus the Great established the first Persian Empire and is famous for creating the 'Cyrus Cylinder', often called the first declaration of human rights.`},{id:949,category:`History`,question:`The Dahomey Amazons were an all-female military regiment known for their fierce combat skills. What modern-day country encompasses the Kingdom of Dahomey?`,options:[`Nigeria`,`Ghana`,`Benin`,`Senegal`],correctIndex:2,explanation:`The 'Mino' (meaning 'our mothers' in the Fon language) were the frontline soldiers for the Kingdom of Dahomey in present-day Benin.`},{id:950,category:`History`,question:`Which massive stone complex in southern Africa served as the royal palace for the local monarch and capital of a vast trading empire from the 11th to 15th centuries?`,options:[`Lalibela`,`Great Zimbabwe`,`Meroë`,`Kilwa Kisiwani`],correctIndex:1,explanation:`Great Zimbabwe was a sophisticated stone city built by the Shona people, acting as the heart of a prosperous gold-trading empire.`},{id:951,category:`History`,question:`Who was the Sultan of the Ayyubid dynasty who famously recaptured Jerusalem from the Crusaders in 1187 but was known for his chivalry?`,options:[`Mehmed the Conqueror`,`Saladin`,`Harun al-Rashid`,`Suleiman the Magnificent`],correctIndex:1,explanation:`Saladin (Salah ad-Din) was respected by both Muslim and Christian historians for his tactical brilliance and noble treatment of defeated enemies.`},{id:952,category:`History`,question:`The Trung Sisters are national heroes in which country, famous for leading a major rebellion against the Chinese Han dynasty in 40 AD?`,options:[`Thailand`,`Vietnam`,`Cambodia`,`Laos`],correctIndex:1,explanation:`Trung Trac and Trung Nhi raised an army (including many female generals) to drive out Chinese forces, ruling an independent state for three years.`},{id:953,category:`History`,question:`In 1453, the Byzantine Empire finally collapsed when the city of Constantinople was conquered by which rising empire?`,options:[`The Seljuk Turks`,`The Mongol Empire`,`The Ottoman Empire`,`The Safavid Empire`],correctIndex:2,explanation:`Under the command of Sultan Mehmed II, the Ottoman Empire captured Constantinople, effectively ending the remnants of the Roman Empire.`},{id:954,category:`History`,question:`Which Filipino nationalist and polymath wrote the novel 'Noli Me Tángere', sparking the Philippine Revolution against Spanish colonial rule?`,options:[`Andrés Bonifacio`,`Emilio Aguinaldo`,`José Rizal`,`Apolinario Mabini`],correctIndex:2,explanation:`José Rizal's writings exposed the abuses of Spanish colonizers. His execution in 1896 cemented his status as the Philippines' greatest national hero.`},{id:955,category:`History`,question:`The incredible temple complex of Angkor Wat was originally constructed in the 12th century by the Khmer Empire in which modern-day country?`,options:[`Thailand`,`Vietnam`,`Cambodia`,`Indonesia`],correctIndex:2,explanation:`Angkor Wat in Cambodia is the largest religious monument in the world, initially built as a Hindu temple before gradually transforming into a Buddhist site.`},{id:956,category:`History`,question:`Which brilliant military tactician revolutionized Southern African warfare with the 'buffalo horns' formation and the short stabbing spear (iklwa)?`,options:[`Nelson Mandela`,`Shaka Zulu`,`Cetshwayo`,`Moshoeshoe I`],correctIndex:1,explanation:`King Shaka transformed the Zulu tribe into a formidable warrior nation in the early 19th century through strict discipline and innovative tactics.`},{id:957,category:`History`,question:`During the 16th century, which Mughal Emperor of India was known for his policy of religious tolerance, inviting scholars of all faiths to debate in his court?`,options:[`Babur`,`Shah Jahan`,`Akbar the Great`,`Aurangzeb`],correctIndex:2,explanation:`Akbar the Great vastly expanded the Mughal Empire and fostered a culture of inclusivity, even attempting to create a syncretic religion called Din-i Ilahi.`},{id:958,category:`History`,question:`What was the capital of the Inca Empire, considered by the Incas to be the 'Navel of the World'?`,options:[`Machu Picchu`,`Lima`,`Cusco`,`Quito`],correctIndex:2,explanation:`Cusco, located high in the Peruvian Andes, was the historic, cultural, and political center of the vast Inca Empire.`},{id:959,category:`History`,question:`What ancient maritime empire, based in modern-day Indonesia, dominated the Strait of Malacca and controlled Southeast Asian spice trade from the 7th to 13th centuries?`,options:[`Majapahit Empire`,`Srivijaya Empire`,`Khmer Empire`,`Chola Dynasty`],correctIndex:1,explanation:`Srivijaya was a powerful Buddhist thalassocracy (maritime empire) centered on the island of Sumatra.`},{id:960,category:`History`,question:`Who was the longest-reigning sultan of the Ottoman Empire, under whom the empire reached its peak of military, political, and economic power in the 16th century?`,options:[`Osman I`,`Suleiman the Magnificent`,`Selim the Grim`,`Murad IV`],correctIndex:1,explanation:`Suleiman the Magnificent (also known as 'The Lawgiver') expanded the empire deep into Europe, the Middle East, and North Africa.`},{id:961,category:`History`,question:`Which of the following was a highly advanced pre-Columbian civilization known for its complex writing system, mathematics, and astronomical calendars in Mesoamerica?`,options:[`Inca`,`Maya`,`Nazca`,`Mapuche`],correctIndex:1,explanation:`The Maya civilization, located in southern Mexico and Central America, is famous for having the only fully developed writing system of the pre-Columbian Americas.`},{id:962,category:`History`,question:`Who unified Japan in the early 17th century and established a powerful shogunate that brought over 250 years of relative peace and isolation?`,options:[`Oda Nobunaga`,`Toyotomi Hideyoshi`,`Tokugawa Ieyasu`,`Emperor Meiji`],correctIndex:2,explanation:`Tokugawa Ieyasu established the Tokugawa shogunate in Edo (modern Tokyo), leading to the culturally rich but heavily isolated Edo period.`},{id:963,category:`History`,question:`The Golden Age of Islam, a period of immense scientific and cultural flourishing, was largely centered in which Abbasid capital city?`,options:[`Damascus`,`Cairo`,`Baghdad`,`Cordoba`],correctIndex:2,explanation:`Baghdad was home to the 'House of Wisdom', where scholars from various cultures gathered to translate and advance global knowledge.`},{id:964,category:`History`,question:`Which powerful South Indian dynasty built an empire that engaged in massive maritime trade and naval campaigns across Southeast Asia in the 11th century?`,options:[`The Chola Dynasty`,`The Maurya Empire`,`The Gupta Empire`,`The Maratha Empire`],correctIndex:0,explanation:`The Cholas were one of the longest-ruling dynasties in history, establishing deep cultural and trade ties across the Indian Ocean.`},{id:965,category:`History`,question:`The ancient city of Petra, famous for its rock-cut architecture and water conduit system, was the capital of which Arab kingdom?`,options:[`The Nabataean Kingdom`,`The Parthian Empire`,`The Kingdom of Judah`,`The Sasanian Empire`],correctIndex:0,explanation:`The Nabataeans controlled the incense trade routes through the Arabian desert, making their hidden capital of Petra incredibly wealthy.`},{id:966,category:`History`,question:`Which African nation successfully defeated Italian forces at the Battle of Adwa in 1896, ensuring it remained uncolonized during the 'Scramble for Africa'?`,options:[`Liberia`,`Ethiopia`,`Morocco`,`Egypt`],correctIndex:1,explanation:`Under the leadership of Emperor Menelik II, Ethiopian forces secured a stunning victory that preserved the country's independence and sovereignty.`},{id:967,category:`Pop Culture`,question:`The vibrant and massively prolific Indian Hindi-language film industry is globally known by what portmanteau?`,options:[`Tollywood`,`Nollywood`,`Bollywood`,`Kollywood`],correctIndex:2,explanation:`Bollywood blends 'Bombay' (now Mumbai) with 'Hollywood', and is famous for its colorful aesthetics and elaborate musical numbers.`},{id:968,category:`Pop Culture`,question:`Which South Korean music group became the first K-pop act to ever be nominated for a Grammy Award and reach #1 on the US Billboard Hot 100?`,options:[`EXO`,`BLACKPINK`,`BTS`,`BIGBANG`],correctIndex:2,explanation:`BTS (Bangtan Sonyeondan) broke global barriers, turning K-pop into an unprecedented worldwide cultural phenomenon.`},{id:969,category:`Pop Culture`,question:`Nollywood, the second-largest film industry in the world by sheer volume of movies produced, is based in which country?`,options:[`South Africa`,`Kenya`,`Nigeria`,`Ghana`],correctIndex:2,explanation:`Nigeria's film industry, Nollywood, produces thousands of films annually, massively influencing culture across the African continent and the diaspora.`},{id:970,category:`Pop Culture`,question:`In 2020, which South Korean film made history by becoming the first non-English language film to win the Academy Award for Best Picture?`,options:[`Train to Busan`,`Oldboy`,`Minari`,`Parasite`],correctIndex:3,explanation:`Directed by Bong Joon-ho, 'Parasite' swept the Oscars with its brilliant, dark exploration of class inequality.`},{id:971,category:`Pop Culture`,question:`Which legendary Jamaican musician brought reggae music and the Rastafari movement to a worldwide audience in the 1970s?`,options:[`Peter Tosh`,`Jimmy Cliff`,`Bob Marley`,`Desmond Dekker`],correctIndex:2,explanation:`Bob Marley's music, with hits like 'One Love' and 'No Woman, No Cry', made him an enduring global icon for peace and resistance.`},{id:972,category:`Pop Culture`,question:`Which acclaimed Japanese animation studio, co-founded by Hayao Miyazaki, produced classics like 'Spirited Away' and 'My Neighbor Totoro'?`,options:[`Toei Animation`,`Kyoto Animation`,`Studio Ghibli`,`Madhouse`],correctIndex:2,explanation:`Studio Ghibli is globally revered for its stunning hand-drawn animation, emotional depth, and environmental themes.`},{id:973,category:`Pop Culture`,question:`Originating in Puerto Rico, what musical genre blends Latin music, Caribbean rhythms, and hip-hop, popularized globally by artists like Daddy Yankee and Bad Bunny?`,options:[`Salsa`,`Reggaeton`,`Bachata`,`Cumbia`],correctIndex:1,explanation:`Reggaeton has dominated global music charts over the last decade, evolving from an underground scene into mainstream pop.`},{id:974,category:`Pop Culture`,question:`The infectious song 'Naatu Naatu', which won the Academy Award for Best Original Song in 2023, comes from which blockbuster Indian film?`,options:[`Dangal`,`Baahubali`,`RRR`,`Pathaan`],correctIndex:2,explanation:`The high-energy Telugu-language track from S.S. Rajamouli's 'RRR' became a global dance sensation.`},{id:975,category:`Pop Culture`,question:`Which famous 11th-century Japanese work by Murasaki Shikibu is widely considered by historians to be the world's first novel?`,options:[`The Pillow Book`,`The Tale of Genji`,`Romance of the Three Kingdoms`,`Journey to the West`],correctIndex:1,explanation:`'The Tale of Genji' vividly depicts the lifestyles of high courtiers during the Heian period of ancient Japan.`},{id:976,category:`Pop Culture`,question:`What Latin American television format, characterized by highly dramatic, fast-paced continuing storylines, is watched by hundreds of millions globally?`,options:[`K-Dramas`,`Telenovelas`,`Anime`,`Sitcoms`],correctIndex:1,explanation:`Telenovelas, primarily produced in Mexico, Brazil, and Colombia, are cultural staples that are widely exported and dubbed worldwide.`},{id:977,category:`Pop Culture`,question:`What is the highest-selling manga series in history, created by Eiichiro Oda, which follows the adventures of Monkey D. Luffy?`,options:[`Naruto`,`Dragon Ball`,`One Piece`,`Bleach`],correctIndex:2,explanation:`'One Piece' has sold over 500 million copies globally since 1997, outselling many mainstream Western comic books like Batman.`},{id:978,category:`Pop Culture`,question:`Which Colombian singer-songwriter is famously known as the 'Queen of Latin Music' and popularized hits like 'Hips Don't Lie' and 'Waka Waka'?`,options:[`Selena`,`Thalia`,`Gloria Estefan`,`Shakira`],correctIndex:3,explanation:`Shakira's unique blend of Latin, Arabic, and rock influences made her one of the best-selling music artists of all time.`},{id:979,category:`Pop Culture`,question:`The Afrobeats genre, which has taken the global music scene by storm, traces its modern roots primarily to which two African countries?`,options:[`South Africa & Zimbabwe`,`Nigeria & Ghana`,`Kenya & Tanzania`,`Senegal & Mali`],correctIndex:1,explanation:`Afrobeats (not to be confused with Fela Kuti's Afrobeat) originated in Nigeria and Ghana, producing massive global stars like Burna Boy and Wizkid.`},{id:980,category:`Pop Culture`,question:`Which iconic Mexican painter, known for her brilliant self-portraits and uncompromising depiction of the female experience, became a global pop culture and feminist icon?`,options:[`Remedios Varo`,`Leonora Carrington`,`Frida Kahlo`,`Diego Rivera`],correctIndex:2,explanation:`Frida Kahlo's striking unibrow, traditional Tehuana clothing, and surrealistic art style have made her instantly recognizable worldwide.`},{id:981,category:`Pop Culture`,question:`What term describes the massive global increase in popularity of South Korean culture, encompassing K-pop, K-dramas, skincare, and cinema?`,options:[`The K-Boom`,`Hallyu`,`Seoul Surge`,`Hanguk Wave`],correctIndex:1,explanation:`'Hallyu', or the Korean Wave, is a cultural phenomenon actively supported by the South Korean government as soft power.`},{id:982,category:`Pop Culture`,question:`Which Netflix survival drama from South Korea became the platform's most-watched series of all time globally in 2021?`,options:[`Alice in Borderland`,`Money Heist`,`Squid Game`,`Hellbound`],correctIndex:2,explanation:`'Squid Game' captivated the world with its deadly take on children's games and sharp critique of capitalism.`},{id:983,category:`Pop Culture`,question:`Known as 'Mama Africa', which South African singer and civil rights activist was internationally famous for her music and opposition to apartheid?`,options:[`Brenda Fassie`,`Yvonne Chaka Chaka`,`Miriam Makeba`,`Angelique Kidjo`],correctIndex:2,explanation:`Miriam Makeba's hit song 'Pata Pata' made her a global star, using her platform to campaign tirelessly against the South African apartheid regime.`},{id:984,category:`Pop Culture`,question:`Which fictional giant monster, created by Toho Studios in 1954, serves as an allegory for nuclear weapons and birthed the 'tokusatsu' genre?`,options:[`Mothra`,`King Kong`,`Gamera`,`Godzilla`],correctIndex:3,explanation:`Godzilla (Gojira) is an iconic symbol of Japanese pop culture, deeply rooted in the post-WWII trauma of the atomic bombings.`},{id:985,category:`Pop Culture`,question:`In Mexican Lucha Libre wrestling, what is the most important and sacred piece of equipment worn by the luchadores?`,options:[`The cape`,`The boots`,`The championship belt`,`The mask`],correctIndex:3,explanation:`The mask (máscara) holds deep historical and cultural significance in Mexico. Being unmasked in a match is considered the ultimate disgrace.`},{id:986,category:`Pop Culture`,question:`Which annual international music competition, famous for its campy performances and political voting, launched the careers of ABBA and Celine Dion?`,options:[`The Voice Global`,`Eurovision Song Contest`,`World Idol`,`Sanremo Music Festival`],correctIndex:1,explanation:`Eurovision is a massive cultural event across Europe and beyond, drawing nearly 200 million television viewers every year.`},{id:987,category:`Pop Culture`,question:`Which famous novel by Gabriel García Márquez established the fictional town of Macondo and popularized the genre of magical realism globally?`,options:[`Love in the Time of Cholera`,`The House of the Spirits`,`One Hundred Years of Solitude`,`Ficciones`],correctIndex:2,explanation:`Published in 1967, this masterpiece of Colombian literature profoundly influenced writers around the entire world.`},{id:988,category:`Pop Culture`,question:`What beloved Japanese character, recognizable by her red bow and lack of a mouth, was created by Sanrio in 1974?`,options:[`Pikachu`,`Sailor Moon`,`Doraemon`,`Hello Kitty`],correctIndex:3,explanation:`Hello Kitty is a staple of the 'kawaii' (cute) segment of Japanese popular culture and is a multi-billion dollar global franchise.`},{id:989,category:`Pop Culture`,question:`Which Cuban-born singer, known as the 'Queen of Salsa', popularized Latin music worldwide with her incredibly powerful voice and iconic shout '¡Azúcar!'?`,options:[`Celia Cruz`,`Gloria Estefan`,`Marc Anthony`,`Tito Puente`],correctIndex:0,explanation:`Celia Cruz was one of the most popular Latin artists of the 20th century, winning multiple Grammys and taking Salsa music global.`},{id:990,category:`Pop Culture`,question:`The wildly successful 2016 Japanese anime film 'Your Name' (Kimi no Na wa) was directed by which acclaimed filmmaker?`,options:[`Hayao Miyazaki`,`Mamoru Hosoda`,`Satoshi Kon`,`Makoto Shinkai`],correctIndex:3,explanation:`Makoto Shinkai's visually stunning body-swapping romance became a massive box office hit worldwide.`},{id:991,category:`Pop Culture`,question:`What traditional style of singing from the Indian subcontinent, combining classical music and poetry, is famous for its intricate vocal improvisations?`,options:[`Qawwali`,`Carnatic`,`Ghazal`,`Bhangra`],correctIndex:0,explanation:`Qawwali is a form of Sufi Islamic devotional singing, massively popularized globally by the legendary Nusrat Fateh Ali Khan.`},{id:992,category:`Pop Culture`,question:`Which beloved French comic book series follows a village of indomitable Gauls as they resist Roman occupation using a magic potion?`,options:[`Tintin`,`Asterix`,`Lucky Luke`,`Spirou`],correctIndex:1,explanation:`Asterix (created by Goscinny and Uderzo) is a giant in European pop culture, translated into over 100 languages and dialects.`},{id:993,category:`Pop Culture`,question:`Which globally renowned Indian film director, famous for the 'Apu Trilogy', put Indian parallel cinema on the world map and won an Honorary Oscar in 1992?`,options:[`Yash Chopra`,`Raj Kapoor`,`Satyajit Ray`,`Bimal Roy`],correctIndex:2,explanation:`Satyajit Ray is universally recognized as one of the greatest filmmakers of the 20th century for his deeply humanistic storytelling.`},{id:994,category:`Pop Culture`,question:`What is the name of the popular Japanese musical group that created the 'kawaii metal' genre by mixing J-pop idol elements with heavy metal?`,options:[`Band-Maid`,`X Japan`,`Perfume`,`Babymetal`],correctIndex:3,explanation:`Babymetal completely disrupted the global rock scene, bringing choreographed dance routines into heavy metal concerts.`},{id:995,category:`Pop Culture`,question:`Which Puerto Rican artist made streaming history by being Spotify’s most-streamed artist globally for three consecutive years (2020-2022)?`,options:[`J Balvin`,`Maluma`,`Bad Bunny`,`Ricky Martin`],correctIndex:2,explanation:`Bad Bunny shattered language barriers, achieving massive global chart dominance singing entirely in Spanish.`},{id:996,category:`Pop Culture`,question:`Which wildly popular Japanese media franchise follows the adventures of a young ninja who seeks recognition from his peers and dreams of becoming the village leader?`,options:[`Bleach`,`Demon Slayer`,`Naruto`,`Hunter x Hunter`],correctIndex:2,explanation:`Masashi Kishimoto's 'Naruto' became a global phenomenon, introducing millions of people worldwide to anime and manga.`},{id:997,category:`Pop Culture`,question:`Which Hong Kong actor and martial artist achieved legendary global status in the 1970s with films like 'Enter the Dragon'?`,options:[`Jackie Chan`,`Jet Li`,`Donnie Yen`,`Bruce Lee`],correctIndex:3,explanation:`Bruce Lee bridged the gap between East and West in cinema, revolutionizing martial arts and shifting the portrayal of Asians in Western media.`},{id:998,category:`Pop Culture`,question:`The term 'Cantopop' refers to a popular music genre that originated in and is primarily sung in the dialect of which major city?`,options:[`Beijing`,`Shanghai`,`Taipei`,`Hong Kong`],correctIndex:3,explanation:`Cantopop (Cantonese pop music) peaked in the 1980s and 90s, led by massive stars like Leslie Cheung and Anita Mui.`},{id:999,category:`Pop Culture`,question:`What globally loved Nigerian author wrote the highly influential novel 'Things Fall Apart', which is a staple of African literature?`,options:[`Chimamanda Ngozi Adichie`,`Chinua Achebe`,`Wole Soyinka`,`Ngũgĩ wa Thiong'o`],correctIndex:1,explanation:`Published in 1958, Chinua Achebe's novel critically portrays the complex culture of the Igbo people and the impact of British colonialism.`},{id:1e3,category:`Sports`,question:`Which sport, massively popular in India, Pakistan, and Australia, involves a pitch, wickets, and players called bowlers and batters?`,options:[`Baseball`,`Cricket`,`Rugby`,`Croquet`],correctIndex:1,explanation:`Cricket is the second most popular sport globally (behind soccer). Legends like Sachin Tendulkar are treated as national heroes in India.`},{id:1001,category:`Sports`,question:`What traditional South Asian contact team sport involves a 'raider' running into the opposing team's half, tagging defenders, and returning without taking a breath?`,options:[`Kabaddi`,`Kho Kho`,`Sepak Takraw`,`Buzkashi`],correctIndex:0,explanation:`Kabaddi originated in ancient India and has grown into a highly physical, professional international sport.`},{id:1002,category:`Sports`,question:`Which spectacular Southeast Asian sport is often described as 'kick volleyball' because players use their feet, knees, chest, and head to hit a rattan ball over a net?`,options:[`Muay Thai`,`Pencak Silat`,`Sepak Takraw`,`Bocce`],correctIndex:2,explanation:`Sepak Takraw requires incredible acrobatic skill, with players frequently performing mid-air bicycle kicks to spike the ball.`},{id:1003,category:`Sports`,question:`Known as the 'Art of Eight Limbs', which highly effective martial art and national sport of Thailand utilizes punches, kicks, elbows, and knee strikes?`,options:[`Taekwondo`,`Karate`,`Judo`,`Muay Thai`],correctIndex:3,explanation:`Muay Thai is a devastatingly powerful striking art that forms the fundamental striking base for modern Mixed Martial Arts (MMA).`},{id:1004,category:`Sports`,question:`In the traditional Japanese sport of Sumo, what is the highest rank a wrestler (rikishi) can achieve?`,options:[`Ozeki`,`Yokozuna`,`Sekiwake`,`Maegashira`],correctIndex:1,explanation:`Yokozuna (Grand Champion) is a lifelong title representing the pinnacle of power, technique, and dignity in Sumo.`},{id:1005,category:`Sports`,question:`Which explosive Afro-Brazilian martial art combines elements of dance, acrobatics, and music, originally developed by enslaved Africans to secretly practice self-defense?`,options:[`Jiu-Jitsu`,`Sambo`,`Capoeira`,`Krav Maga`],correctIndex:2,explanation:`Capoeira is instantly recognizable by its fluid, rhythmic movements and the accompanying traditional instruments like the berimbau.`},{id:1006,category:`Sports`,question:`In which racket sport have Asian countries, particularly China, maintained total global dominance for decades at the Olympic level?`,options:[`Tennis`,`Table Tennis`,`Squash`,`Badminton`],correctIndex:1,explanation:`China has completely dominated Table Tennis (Ping Pong), winning nearly every Olympic gold medal since the sport was introduced in 1988.`},{id:1007,category:`Sports`,question:`Which ancient, weapon-based martial art is the national sport of the Philippines, featuring the use of rattan sticks, bladed weapons, and bare hands?`,options:[`Silat`,`Lethwei`,`Arnis`,`Vovinam`],correctIndex:2,explanation:`Arnis (also known as Kali or Eskrima) is a highly practical and lethal combat system adapted to use everyday items like sticks or machetes.`},{id:1008,category:`Sports`,question:`Before every international match, the New Zealand national rugby team (the All Blacks) famously performs what traditional Māori challenge?`,options:[`The Haka`,`The Siva Tau`,`The Cibi`,`The Kailao`],correctIndex:0,explanation:`The Haka is a powerful, synchronized display of stomping, chanting, and facial expressions meant to intimidate opponents and unite the team.`},{id:1009,category:`Sports`,question:`Which Korean martial art, famous for its emphasis on high, spinning, and jumping kicks, is an official Olympic sport?`,options:[`Hapkido`,`Kendo`,`Taekwondo`,`Wushu`],correctIndex:2,explanation:`Taekwondo translates to 'the way of the foot and the fist', and is one of the most widely practiced martial arts in the world.`},{id:1010,category:`Sports`,question:`What traditional Irish field sport, played with a wooden stick and a small ball, is considered one of the fastest field games in the world?`,options:[`Lacrosse`,`Gaelic Football`,`Shinty`,`Hurling`],correctIndex:3,explanation:`Hurling is a uniquely Irish sport with ancient Celtic origins, combining skills that look like a mix of hockey, baseball, and lacrosse.`},{id:1011,category:`Sports`,question:`Which Kenyan distance runner made history in 2019 by becoming the first human ever to run a marathon in under two hours?`,options:[`Kenenisa Bekele`,`Mo Farah`,`Haile Gebrselassie`,`Eliud Kipchoge`],correctIndex:3,explanation:`Eliud Kipchoge ran a staggering time of 1:59:40 in Vienna, an achievement previously thought to be biologically impossible.`},{id:1012,category:`Sports`,question:`What is the national sport of Argentina, a game played on horseback that originally involved using a live duck in a leather basket?`,options:[`Polo`,`Charrería`,`Pato`,`Buzkashi`],correctIndex:2,explanation:`Pato (meaning 'duck' in Spanish) is a high-speed equestrian game blending elements of polo and basketball.`},{id:1013,category:`Sports`,question:`Which legendary Brazilian footballer, widely considered one of the greatest of all time, won three FIFA World Cups during his career?`,options:[`Ronaldo`,`Pelé`,`Ronaldinho`,`Zico`],correctIndex:1,explanation:`Edson Arantes do Nascimento, universally known as Pelé, became a global sporting icon and scored over 1,000 professional goals.`},{id:1014,category:`Sports`,question:`In which traditional Afghan sport do men on horseback wildly fight over a goat or calf carcass to score points?`,options:[`Polo`,`Buzkashi`,`Tent Pegging`,`Jereed`],correctIndex:1,explanation:`Buzkashi is incredibly rough and chaotic. It requires immense horsemanship skills and strength from the riders (Chapandaz).`},{id:1015,category:`Sports`,question:`Which Southeast Asian country is globally dominant in the sport of Badminton, alongside China, considering it their most popular national sport?`,options:[`Vietnam`,`Thailand`,`Indonesia`,`Philippines`],correctIndex:2,explanation:`Badminton is intensely popular in Indonesia, which consistently produces Olympic gold medalists and World Champions.`},{id:1016,category:`Sports`,question:`Which Japanese educator and martial artist founded the throwing-focused martial art of Judo in 1882?`,options:[`Morihei Ueshiba`,`Gichin Funakoshi`,`Kanō Jigorō`,`Mas Oyama`],correctIndex:2,explanation:`Kanō Jigorō developed Judo from older Jujutsu styles, establishing a sport focused on leverage and maximum efficiency with minimum effort.`},{id:1017,category:`Sports`,question:`Which Filipino boxing legend is the only boxer in history to win world titles in eight different weight divisions?`,options:[`Nonito Donaire`,`Roberto Durán`,`Manny Pacquiao`,`Julio César Chávez`],correctIndex:2,explanation:`Manny 'PacMan' Pacquiao's unprecedented speed and power across weight classes made him a national hero in the Philippines.`},{id:1018,category:`Sports`,question:`What traditional martial art from the Indian state of Kerala is widely considered to be one of the oldest surviving fighting systems in the world?`,options:[`Gatka`,`Kalaripayattu`,`Pehlwani`,`Musti-yuddha`],correctIndex:1,explanation:`Kalaripayattu involves stunning acrobatics, weaponry, and strikes, and heavily influenced later Asian martial art
