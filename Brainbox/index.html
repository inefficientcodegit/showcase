s via Buddhist monks.`},{id:1019,category:`Sports`,question:`Which traditional West African form of boxing, historically practiced by the Hausa butcher caste, involves wrapping the striking arm in tightly bound cord?`,options:[`Dambe`,`La Lutte`,`Senegalese Wrestling`,`Engolo`],correctIndex:0,explanation:`Dambe is a brutal, bare-knuckle striking art from Nigeria where the dominant hand is used as a 'spear' and the lead hand as a 'shield'.`},{id:1020,category:`Sports`,question:`Who is the legendary Jamaican sprinter that shattered the 100m and 200m world records and won eight Olympic gold medals?`,options:[`Yohan Blake`,`Asafa Powell`,`Tyson Gay`,`Usain Bolt`],correctIndex:3,explanation:`Usain Bolt's charisma and sheer dominance on the track made him one of the most recognizable athletes on the planet.`},{id:1021,category:`Sports`,question:`Which high-speed Basque sport, played with a woven basket and a hard rubber ball off a wall, is often called the fastest sport in the world?`,options:[`Pelota`,`Jai Alai`,`Handball`,`Squash`],correctIndex:1,explanation:`In Jai Alai, the ball (pelota) can be hurled out of the wicker basket (cesta) at speeds exceeding 180 mph.`},{id:1022,category:`Sports`,question:`Which nation's unlikely debut in the bobsleigh event at the 1988 Winter Olympics inspired the beloved film 'Cool Runnings'?`,options:[`Nigeria`,`Bahamas`,`Jamaica`,`Kenya`],correctIndex:2,explanation:`The Jamaican national bobsleigh team became massive fan favorites at the Calgary Olympics for competing in a winter sport without snow.`},{id:1023,category:`Sports`,question:`Which class of indigenous martial arts from the Malay Archipelago heavily features fluid dance-like movements hiding lethal strikes and joint locks?`,options:[`Wushu`,`Kuntao`,`Pencak Silat`,`Krabi-Krabong`],correctIndex:2,explanation:`Pencak Silat is deeply integrated into the culture of Indonesia and Malaysia, featuring highly diverse regional styles.`},{id:1024,category:`Sports`,question:`Which Indian Chess Grandmaster became the first player from Asia to win the FIDE World Chess Championship, sparking a chess boom in India?`,options:[`Magnus Carlsen`,`Ding Liren`,`Garry Kasparov`,`Viswanathan Anand`],correctIndex:3,explanation:`Viswanathan (Vishy) Anand dominated the chess world in the 2000s and is largely responsible for India's current status as a chess superpower.`},{id:1025,category:`Sports`,question:`Which brutal, bare-knuckle combat sport from Myanmar is similar to Muay Thai but also legally allows headbutts?`,options:[`Lethwei`,`Pradal Serey`,`Vovinam`,`Sanda`],correctIndex:0,explanation:`Lethwei is known as the 'Art of Nine Limbs' because it adds the headbutt to the standard punches, kicks, elbows, and knees.`},{id:1026,category:`Sports`,question:`What is the traditional sport of Colombia that involves throwing a heavy metal puck at gunpowder targets that explode on impact?`,options:[`Bocce`,`Tejo`,`Petanque`,`Kubb`],correctIndex:1,explanation:`Tejo is a highly social, noisy, and fun Colombian sport where scoring often results in a loud explosion of the 'mechas' (gunpowder packets).`},{id:1027,category:`Sports`,question:`Which nation absolutely dominated the sport of Squash in the 1980s and 90s, led by the legendary Jahangir Khan who went unbeaten in 555 matches?`,options:[`Egypt`,`England`,`Pakistan`,`Australia`],correctIndex:2,explanation:`Pakistan produced a dynasty of Squash champions, with Jahangir Khan and Jansher Khan establishing arguably the most dominant run in sports history.`},{id:1028,category:`Sports`,question:`The sport of Charrería, featuring complex equestrian events and roping skills, is the official national sport of which country?`,options:[`Spain`,`Argentina`,`Mexico`,`Chile`],correctIndex:2,explanation:`Charrería evolved from the working practices of haciendas in Mexico, celebrating the deep tradition and skill of the charro (horseman).`},{id:1029,category:`Sports`,question:`In the high-intensity sport of Aussie Rules Football (AFL), how many points is a goal worth when kicked between the two tall center posts?`,options:[`1`,`3`,`6`,`7`],correctIndex:2,explanation:`A goal is worth 6 points. If the ball goes between a tall center post and a shorter outer post, it's a 'behind', worth 1 point.`},{id:1030,category:`Sports`,question:`What is the name of the chaotic traditional Japanese sport where two teams of 75 people brutally fight to pull down the opposing team's large wooden pole?`,options:[`Kendo`,`Bo-taoshi`,`Yabusame`,`Naginata`],correctIndex:1,explanation:`Bo-taoshi (literally 'pole toppling') is played by cadets of the National Defense Academy of Japan and looks like a massive, organized riot.`},{id:1031,category:`Sports`,question:`Which traditional Swiss team sport is played by hitting a puck with a flexible whip-like stick into the opposing team's field, where defenders try to knock it out of the air?`,options:[`Schwingen`,`Hornussen`,`Eisstock`,`Bandy`],correctIndex:1,explanation:`Hornussen is an indigenous Swiss sport that blends elements of golf and baseball, and requires defenders to use large placards to bat the puck.`},{id:1032,category:`Sports`,question:`Which South African athlete became an international symbol of triumph when they won the Rugby World Cup in 1995, famously handed the trophy by Nelson Mandela?`,options:[`Siya Kolisi`,`Joost van der Westhuizen`,`Francois Pienaar`,`Bryan Habana`],correctIndex:2,explanation:`Francois Pienaar captained the Springboks to victory. Mandela wearing the team jersey was a monumental moment of racial reconciliation in post-apartheid South Africa.`},{id:1033,category:`History`,question:`Which ancient Mesoamerican civilization is famous for carving colossal stone heads, some weighing up to 50 tons?`,options:[`The Maya`,`The Aztecs`,`The Olmecs`,`The Toltecs`],correctIndex:2,explanation:`The Olmecs are widely considered the 'mother culture' of Mesoamerica, flourishing in the Gulf Coast of Mexico from roughly 1200 to 400 BCE.`},{id:1034,category:`History`,question:`Who was the first Emperor of a unified China, famously buried with a massive Terracotta Army to protect him in the afterlife?`,options:[`Emperor Wu`,`Qin Shi Huang`,`Kublai Khan`,`Emperor Gaozu`],correctIndex:1,explanation:`Qin Shi Huang unified China in 221 BCE, establishing the Qin Dynasty and initiating the construction of the Great Wall.`},{id:1035,category:`History`,question:`Which ancient Babylonian king established one of the earliest and most complete written legal codes in human history?`,options:[`Gilgamesh`,`Nebuchadnezzar II`,`Hammurabi`,`Sargon`],correctIndex:2,explanation:`The Code of Hammurabi, dating back to around 1754 BCE, famously codified the principle of 'an eye for an eye'.`},{id:1036,category:`History`,question:`Founded in 859 CE by Fatima al-Fihri in Morocco, what is recognized by UNESCO as the oldest continuously operating university in the world?`,options:[`Al-Azhar University`,`University of Al-Qarawiyyin`,`Sankore Madrasah`,`Nalanda University`],correctIndex:1,explanation:`The University of Al-Qarawiyyin in Fez, Morocco, became a leading spiritual and educational center of the historic Muslim world.`},{id:1037,category:`History`,question:`Which ancient civilization, located in modern-day Peru, is considered the oldest known civilization in the Americas, flourishing around 2500 BCE?`,options:[`The Inca`,`The Moche`,`The Nazca`,`The Caral-Supe`],correctIndex:3,explanation:`The Caral-Supe civilization thrived at the same time as ancient Egypt and Mesopotamia, building monumental pyramids without the use of ceramics or art.`},{id:1038,category:`History`,question:`Which 19th-century rebellion in China, led by a man claiming to be the brother of Jesus Christ, was one of the deadliest conflicts in human history?`,options:[`The Boxer Rebellion`,`The Taiping Rebellion`,`The Yellow Turban Rebellion`,`The Wuchang Uprising`],correctIndex:1,explanation:`The Taiping Rebellion (1850–1864) was a massive civil war in southern China against the Qing dynasty, resulting in an estimated 20 to 30 million deaths.`},{id:1039,category:`History`,question:`Which Persian empire established Twelver Shi'ism as the official state religion, deeply shaping the modern cultural and religious landscape of Iran?`,options:[`The Safavid Empire`,`The Achaemenid Empire`,`The Sassanid Empire`,`The Parthian Empire`],correctIndex:0,explanation:`The Safavid Dynasty (1501–1736) reunified Iran and established a strong, distinct cultural identity that ushered in a golden age of Persian art and architecture.`},{id:1040,category:`History`,question:`Who was the founder of the Maurya Empire, successfully unifying most of the Indian subcontinent for the first time in history?`,options:[`Ashoka`,`Chandragupta Maurya`,`Harsha`,`Samudragupta`],correctIndex:1,explanation:`Chandragupta Maurya overthrew the Nanda Dynasty and rapidly expanded his power westward across central and western India in the 4th century BCE.`},{id:1041,category:`History`,question:`Located in modern-day Sudan, which ancient kingdom built hundreds of steep-sided pyramids that served as tombs for their royalty?`,options:[`The Kingdom of Kush`,`The Kingdom of Aksum`,`The Mali Empire`,`The Carthage Empire`],correctIndex:0,explanation:`The Nubian pyramids at Meroë were built by the rulers of the Kushite kingdoms, who heavily interacted with (and briefly ruled) ancient Egypt.`},{id:1042,category:`History`,question:`Which fierce Queen Mother of the Ashanti Empire famously led a major rebellion against British colonialism in 1900?`,options:[`Nzinga Mbande`,`Nefertiti`,`Yaa Asantewaa`,`Amina of Zazzau`],correctIndex:2,explanation:`Yaa Asantewaa led the 'War of the Golden Stool' against the British Empire to protect the sacred symbol of the Ashanti nation in modern-day Ghana.`},{id:1043,category:`History`,question:`What policy, translating to 'locked country', was enacted by the Tokugawa shogunate to severely limit Japanese contact with the outside world for over 200 years?`,options:[`Bushido`,`Sakoku`,`Meiji`,`Shinto`],correctIndex:1,explanation:`The Sakoku policy strictly regulated foreign trade and relations, preventing most foreigners from entering Japan and commoners from leaving.`},{id:1044,category:`History`,question:`Which powerful Southeast Asian thalassocracy (maritime empire) reached its peak in the 14th century under the brilliant military leader Gajah Mada?`,options:[`The Srivijaya Empire`,`The Majapahit Empire`,`The Khmer Empire`,`The Chola Dynasty`],correctIndex:1,explanation:`Based on the island of Java, the Majapahit Empire dominated the Indonesian archipelago and controlled key spice trade routes.`},{id:1045,category:`History`,question:`Which massive Mesoamerican city, translating to 'The City of the Gods', is famous for its towering Pyramid of the Sun and Avenue of the Dead?`,options:[`Tenochtitlan`,`Chichen Itza`,`Tikal`,`Teotihuacan`],correctIndex:3,explanation:`Teotihuacan was one of the largest cities in the pre-Columbian Americas, and its origins and original founders remain largely a mystery today.`},{id:1046,category:`History`,question:`Which Muslim dynasty ruled over Al-Andalus (Islamic Iberia) and oversaw a remarkable period of religious tolerance, architectural brilliance, and scientific advancement in Cordoba?`,options:[`The Abbasid Caliphate`,`The Umayyad Caliphate`,`The Ottoman Empire`,`The Fatimid Caliphate`],correctIndex:1,explanation:`The Umayyad Emirate (and later Caliphate) of Cordoba became a leading cultural and economic center in the Mediterranean and Europe.`},{id:1047,category:`History`,question:`Who was the only female ruler in the history of the Delhi Sultanate, known for her sharp intellect and refusal to be addressed by feminine titles?`,options:[`Mumtaz Mahal`,`Razia Sultana`,`Nur Jahan`,`Chand Bibi`],correctIndex:1,explanation:`Razia Sultana reigned from 1236 to 1240. She was a bold monarch who commanded armies and administered justice directly to her subjects.`},{id:1048,category:`History`,question:`Which Persian polymath, active during the Islamic Golden Age, is considered the 'father of algebra' and introduced Hindu-Arabic numerals to the West?`,options:[`Al-Khwarizmi`,`Ibn Sina`,`Al-Biruni`,`Omar Khayyam`],correctIndex:0,explanation:`Muhammad ibn Musa al-Khwarizmi's foundational texts on mathematics were translated into Latin; the word 'algebra' comes from the title of his most famous book.`},{id:1049,category:`History`,question:`Which West African kingdom is world-renowned for its incredibly detailed brass and bronze sculptures that decorated the royal palace?`,options:[`The Kingdom of Dahomey`,`The Ashanti Empire`,`The Kingdom of Benin`,`The Oyo Empire`],correctIndex:2,explanation:`The Benin Bronzes are a group of several thousand stunning metal plaques and sculptures created by the Edo people from the 13th century onwards.`},{id:1050,category:`History`,question:`Which brilliant 17th-century African queen fought a decades-long guerrilla war against Portuguese colonization in modern-day Angola?`,options:[`Queen Nzinga`,`Queen Amina`,`Queen Ranavalona`,`Queen Makeda`],correctIndex:0,explanation:`Queen Nzinga of Ndongo and Matamba was a masterful diplomat and military tactician who successfully resisted Portuguese slave traders for much of her life.`},{id:1051,category:`History`,question:`In 1803, which decisive battle led by Jean-Jacques Dessalines resulted in the final defeat of French colonial forces in the Haitian Revolution?`,options:[`Battle of Waterloo`,`Battle of Vertières`,`Battle of Ayacucho`,`Battle of Boyacá`],correctIndex:1,explanation:`The Battle of Vertières was the last major battle of the Haitian Revolution, directly leading to Haiti becoming the world's first free black republic.`},{id:1052,category:`History`,question:`Which Thai kingdom, founded in 1351, became one of the wealthiest and most cosmopolitan cities in the world before being sacked by the Burmese in 1767?`,options:[`The Sukhothai Kingdom`,`The Lanna Kingdom`,`The Ayutthaya Kingdom`,`The Khmer Empire`],correctIndex:2,explanation:`Ayutthaya was a massive, bustling international trading port strategically located between China and India.`},{id:1053,category:`History`,question:`Which legendary Korean admiral won the Battle of Myeongnyang against a Japanese fleet of over 130 ships with only 13 ships of his own?`,options:[`King Sejong`,`Yi Sun-sin`,`Jumong`,`Wang Geon`],correctIndex:1,explanation:`Admiral Yi Sun-sin is a legendary national hero in Korea, famous for his brilliant naval tactics and the use of iron-plated 'Turtle Ships'.`},{id:1054,category:`History`,question:`Which ancient civilization created massive, intricate geoglyphs of animals and geometric shapes in the desert plains of southern Peru?`,options:[`The Inca`,`The Moche`,`The Nazca`,`The Tiwanaku`],correctIndex:2,explanation:`The Nazca Lines were created between 500 BCE and 500 CE. Their exact purpose remains a subject of intense archaeological debate.`},{id:1055,category:`History`,question:`Which fierce Indigenous leader united the Mapuche people to successfully resist the Spanish conquest in Chile during the Arauco War?`,options:[`Atahualpa`,`Lautaro`,`Moctezuma`,`Túpac Amaru`],correctIndex:1,explanation:`Lautaro learned Spanish military tactics while held captive, then escaped to teach his people how to defeat the Spanish cavalry.`},{id:1056,category:`History`,question:`The oldest layer of Sanskrit literature and the foundational scriptures of Hinduism were composed during which historical period in ancient India?`,options:[`The Maurya Period`,`The Gupta Period`,`The Vedic Period`,`The Mughal Period`],correctIndex:2,explanation:`The Vedic period (c. 1500 – c. 500 BCE) saw the composition of the Vedas, profoundly shaping the cultural and religious landscape of the Indian subcontinent.`},{id:1057,category:`History`,question:`Which religion served as the official state religion of the Sassanid Persian Empire before the Islamic conquest?`,options:[`Zoroastrianism`,`Buddhism`,`Manichaeism`,`Hinduism`],correctIndex:0,explanation:`Zoroastrianism, based on the teachings of the prophet Zoroaster, is one of the world's oldest continuously practiced religions.`},{id:1058,category:`History`,question:`Which epic oral tradition tells the story of the founder of the Mali Empire, a prince who overcame physical disabilities to build a vast kingdom?`,options:[`The Epic of Gilgamesh`,`The Epic of Sundiata`,`The Kebra Nagast`,`The Mahabharata`],correctIndex:1,explanation:`The Epic of Sundiata (Sundiata Keita) is a masterpiece of West African oral history, passed down by generations of griots (storytellers).`},{id:1059,category:`History`,question:`Under the leadership of Askia the Great, which West African empire reached its zenith in the 15th century, controlling trans-Saharan trade routes?`,options:[`The Mali Empire`,`The Ghana Empire`,`The Songhai Empire`,`The Kanem-Bornu Empire`],correctIndex:2,explanation:`Askia Muhammad I expanded the Songhai Empire and made it a global center of commerce and Islamic learning.`},{id:1060,category:`History`,question:`In 1879, a Zulu army armed mostly with spears and shields famously defeated a technologically superior British force at which historic battle?`,options:[`Battle of Rorke's Drift`,`Battle of Isandlwana`,`Battle of Majuba Hill`,`Battle of Blood River`],correctIndex:1,explanation:`The Battle of Isandlwana was a shocking and decisive victory for the Zulu Kingdom, standing as one of the worst defeats ever suffered by the British Army against an indigenous force.`},{id:1061,category:`History`,question:`Which pivotal 1600 battle effectively unified Japan and established the power of the Tokugawa shogunate?`,options:[`Battle of Okehazama`,`Battle of Nagashino`,`Battle of Sekigahara`,`Battle of Shiroyama`],correctIndex:2,explanation:`The Battle of Sekigahara was the largest and most important battle in Japanese feudal history, bringing an end to the Sengoku period.`},{id:1062,category:`History`,question:`Which Ethiopian emperor oversaw the carving of eleven monolithic, rock-hewn Christian churches out of solid volcanic rock in the 12th century?`,options:[`Menelik II`,`Haile Selassie`,`Ezana`,`Lalibela`],correctIndex:3,explanation:`King Lalibela commissioned the incredible rock-hewn churches in a town that now bears his name, intending to create a 'New Jerusalem'.`},{id:1063,category:`History`,question:`Which 11th-century Persian polymath authored 'The Canon of Medicine', an encyclopedia that served as the standard medical textbook in Europe and the Islamic world for centuries?`,options:[`Ibn Sina (Avicenna)`,`Al-Kindi`,`Ibn Rushd (Averroes)`,`Ibn Khaldun`],correctIndex:0,explanation:`Ibn Sina was a brilliant physician, astronomer, and philosopher whose systematic compilation of medical knowledge heavily influenced global medicine.`},{id:1064,category:`History`,question:`Which powerful maritime network of city-states along the eastern coast of Africa facilitated massive trade between Africa, the Middle East, and Asia from the 8th century onward?`,options:[`The Swahili Coast`,`The Barbary Coast`,`The Gold Coast`,`The Skeleton Coast`],correctIndex:0,explanation:`The Swahili Coast consisted of wealthy trading hubs like Kilwa and Zanzibar, blending Bantu and Arab cultures to create a distinct language and society.`},{id:1065,category:`History`,question:`Which Native American confederacy in the northeastern woodlands operated under a complex democratic constitution known as the Great Law of Peace?`,options:[`The Cherokee Nation`,`The Iroquois Confederacy (Haudenosaunee)`,`The Sioux Nation`,`The Navajo Nation`],correctIndex:1,explanation:`The Haudenosaunee Confederacy united five (later six) nations under a deeply democratic system that later influenced the framers of the US Constitution.`},{id:1066,category:`History`,question:`Which massive ancient Indian university was renowned globally, attracting thousands of scholars from Tibet, China, Greece, and Persia long before the universities of Oxford or Cambridge existed?`,options:[`Taxila`,`Nalanda`,`Vikramashila`,`Valabhi`],correctIndex:1,explanation:`Nalanda University in Bihar, India, flourished under the Gupta Empire and was a massive center of learning for Buddhism, mathematics, and astronomy.`},{id:1067,category:`Pop Culture`,question:`What term is used to globally describe the wildly popular, high-drama Turkish television soap operas that are exported to over 150 countries?`,options:[`Telenovelas`,`K-Dramas`,`Dizi`,`Lakorn`],correctIndex:2,explanation:`Turkish 'Dizi' feature lavish production values, sweeping romances, and historical epics, dominating viewership across the Middle East, Latin America, and Asia.`},{id:1068,category:`Pop Culture`,question:`Which infectious subgenre of house music, characterized by deep basslines, jazzy piano melodies, and log drum percussion, originated in South Africa in the 2010s and became a global sensation?`,options:[`Afrobeats`,`Gqom`,`Amapiano`,`Kwaito`],correctIndex:2,explanation:`Amapiano took over the African continent and exploded globally via social media, heavily influencing modern pop and electronic music.`},{id:1069,category:`Pop Culture`,question:`Which legendary Chinese novel features the mischievous, shape-shifting Sun Wukong (The Monkey King) traveling to India to obtain Buddhist sutras?`,options:[`Romance of the Three Kingdoms`,`Journey to the West`,`Water Margin`,`Dream of the Red Chamber`],correctIndex:1,explanation:`Published in the 16th century, 'Journey to the West' is one of the Four Great Classical Novels of Chinese literature and has inspired countless films, comics, and video games globally.`},{id:1070,category:`Pop Culture`,question:`In the famous Middle Eastern collection of tales 'One Thousand and One Nights', who is the brilliant storyteller who survives execution by weaving endless, captivating stories?`,options:[`Aladdin`,`Sinbad`,`Scheherazade`,`Morgiana`],correctIndex:2,explanation:`Scheherazade tells the king a story every night but leaves it on a cliffhanger, forcing him to keep her alive to hear the ending the next day.`},{id:1071,category:`Pop Culture`,question:`Who was the brilliant Bengali poet, philosopher, and polymath who became the first non-European to win the Nobel Prize in Literature in 1913?`,options:[`Rabindranath Tagore`,`Kazi Nazrul Islam`,`Premchand`,`R. K. Narayan`],correctIndex:0,explanation:`Rabindranath Tagore reshaped Bengali literature and music. He is also the only person to have penned the national anthems for two different countries (India and Bangladesh).`},{id:1072,category:`Pop Culture`,question:`Which influential 1960s Brazilian film movement emphasized gritty realism, social inequality, and anti-colonialism, heavily inspired by Italian Neorealism?`,options:[`Tropicália`,`Cinema Novo`,`Nouvelle Vague`,`Mundo Latino`],correctIndex:1,explanation:`Cinema Novo revolutionized Latin American cinema by rejecting polished studio aesthetics in favor of telling authentic stories about Brazil's impoverished classes.`},{id:1073,category:`Pop Culture`,question:`Which acclaimed Iranian filmmaker won two Academy Awards for Best Foreign Language Film for his masterpieces 'A Separation' and 'The Salesman'?`,options:[`Abbas Kiarostami`,`Asghar Farhadi`,`Majid Majidi`,`Jafar Panahi`],correctIndex:1,explanation:`Asghar Farhadi is globally celebrated for his complex, morally ambiguous domestic dramas that offer profound insights into modern Iranian society.`},{id:1074,category:`Pop Culture`,question:`Which visionary Hong Kong director is globally revered for visually stunning, highly stylized, and emotionally atmospheric films like 'In the Mood for Love'?`,options:[`John Woo`,`Wong Kar-wai`,`Stephen Chow`,`Ang Lee`],correctIndex:1,explanation:`Wong Kar-wai's signature use of bold colors, step-printing slow motion, and themes of longing have heavily influenced global arthouse cinema.`},{id:1075,category:`Pop Culture`,question:`Which brilliant Nigerian playwright, poet, and political activist became the first Sub-Saharan African to be awarded the Nobel Prize in Literature in 1986?`,options:[`Chinua Achebe`,`Wole Soyinka`,`Ngũgĩ wa Thiong'o`,`Ben Okri`],correctIndex:1,explanation:`Wole Soyinka's plays, such as 'Death and the King's Horseman', brilliantly weave traditional Yoruba mythology with biting political critique.`},{id:1076,category:`Pop Culture`,question:`Originating in the Mexican state of Jalisco, what traditional style of music is globally recognizable by its use of the vihuela, guitarrón, trumpets, and distinct charro outfits?`,options:[`Cumbia`,`Banda`,`Mariachi`,`Ranchera`],correctIndex:2,explanation:`Mariachi music is deeply woven into the cultural identity of Mexico and is performed at weddings, festivals, and celebrations worldwide.`},{id:1077,category:`Pop Culture`,question:`What is the name of the highly popular, emotional, and rhythmic genre of Korean pop music that existed long before the modern 'K-Pop' idol phenomenon?`,options:[`Trot`,`Pansori`,`Gugak`,`Minyo`],correctIndex:0,explanation:`Trot (short for foxtrot) is characterized by its distinctive vocal inflections and remains incredibly popular in South Korea, especially among older generations.`},{id:1078,category:`Pop Culture`,question:`Which legendary Japanese filmmaker directed profound cinematic masterpieces like 'Seven Samurai' and 'Rashomon', heavily influencing Western cinema?`,options:[`Hayao Miyazaki`,`Akira Kurosawa`,`Yasujirō Ozu`,`Kenji Mizoguchi`],correctIndex:1,explanation:`Akira Kurosawa's dynamic visual style and narrative structures directly inspired Hollywood classics, including 'The Magnificent Seven' and 'Star Wars'.`},{id:1079,category:`Pop Culture`,question:`Which vibrant, highly danceable musical rhythm and folk dance originated on the Caribbean coast of Colombia, blending Indigenous, African, and Spanish influences?`,options:[`Salsa`,`Cumbia`,`Merengue`,`Bachata`],correctIndex:1,explanation:`Cumbia is often considered the 'mother of all Latin music' and has evolved into various popular subgenres across Latin America.`},{id:1080,category:`Pop Culture`,question:`Originating in Ghana in the early 20th century, which musical genre fused traditional Akan rhythms with Western jazz instruments and heavily influenced modern Afrobeats?`,options:[`Highlife`,`Soukous`,`Makossa`,`Mbalax`],correctIndex:0,explanation:`Highlife music features jazzy horns, multiple guitars, and upbeat rhythms. It dominated the West African music scene for decades.`},{id:1081,category:`Pop Culture`,question:`The famous 'Whirling Dervishes', who perform a mesmerizing spinning dance as a form of physical and active meditation, belong to the Mevlevi Order of which mystical Islamic tradition?`,options:[`Shia`,`Sufism`,`Sunni`,`Ibadi`],correctIndex:1,explanation:`Sufism is the mystical branch of Islam. The whirling dance (Sema) represents a spiritual journey seeking closer communion with the divine, inspired by the poet Rumi.`},{id:1082,category:`Pop Culture`,question:`Which ancient Indian epic, containing the philosophical text of the Bhagavad Gita, holds the record as the longest epic poem ever written?`,options:[`The Ramayana`,`The Odyssey`,`The Mahabharata`,`The Iliad`],correctIndex:2,explanation:`The Mahabharata is roughly ten times the length of the Iliad and the Odyssey combined, detailing the massive Kurukshetra War and moral philosophy.`},{id:1083,category:`Pop Culture`,question:`Which ancient Indian epic follows the heroic journey of a prince attempting to rescue his wife Sita from the demon king Ravana?`,options:[`The Mahabharata`,`The Puranas`,`The Upanishads`,`The Ramayana`],correctIndex:3,explanation:`The Ramayana is one of the most influential texts in South and Southeast Asia, deeply impacting art, culture, theater, and religious practices.`},{id:1084,category:`Pop Culture`,question:`Which prominent Mexican painter, who was married to Frida Kahlo, was famous for painting massive, politically charged frescoes establishing the Mexican Mural Movement?`,options:[`David Alfaro Siqueiros`,`Diego Rivera`,`José Clemente Orozco`,`Rufino Tamayo`],correctIndex:1,explanation:`Diego Rivera's monumental murals celebrated Mexican history, indigenous culture, and Marxist ideals, influencing public art worldwide.`},{id:1085,category:`Pop Culture`,question:`Which celebrated Chilean author wrote the globally acclaimed magical realism novel 'The House of the Spirits'?`,options:[`Isabel Allende`,`Laura Esquivel`,`Gabriela Mistral`,`Julia Alvarez`],correctIndex:0,explanation:`Isabel Allende is one of the most widely read Spanish-language authors in the world, blending personal history with myth and politics.`},{id:1086,category:`Pop Culture`,question:`Which legendary Nigerian multi-instrumentalist, bandleader, and political activist pioneered the hypnotic and politically charged Afrobeat music genre?`,options:[`King Sunny Adé`,`Fela Kuti`,`Burna Boy`,`Youssou N'Dour`],correctIndex:1,explanation:`Fela Kuti blended jazz, funk, and traditional Yoruba rhythms. He used his music to fiercely criticize political corruption and military dictatorships.`},{id:1087,category:`Pop Culture`,question:`Often referred to globally as the 'King of Bollywood' or 'King Khan', which Indian actor has starred in over 90 films and possesses one of the largest fan followings in the world?`,options:[`Amitabh Bachchan`,`Salman Khan`,`Aamir Khan`,`Shah Rukh Khan`],correctIndex:3,explanation:`Shah Rukh Khan (SRK) is a global icon of Indian cinema, known for legendary romantic blockbusters like 'Dilwale Dulhania Le Jayenge'.`},{id:1088,category:`Pop Culture`,question:`Which groundbreaking 1995 Japanese anime series, directed by Hideaki Anno, deconstructed the 'mecha' giant robot genre by heavily exploring psychology and depression?`,options:[`Gundam Wing`,`Neon Genesis Evangelion`,`Cowboy Bebop`,`Akira`],correctIndex:1,explanation:`'Evangelion' is a cornerstone of global anime culture, renowned for its complex religious symbolism and deep psychological exploration of its teenage pilots.`},{id:1089,category:`Pop Culture`,question:`Which passionate, deeply emotional style of music and partner dance originated in the working-class port neighborhoods of Buenos Aires, Argentina, in the 1880s?`,options:[`Samba`,`Tango`,`Flamenco`,`Bolero`],correctIndex:1,explanation:`Tango evolved from a blend of African, Native American, and European immigrant cultures, becoming a profound symbol of Argentine identity.`},{id:1090,category:`Pop Culture`,question:`What highly expressive Spanish art form, originating in Andalusia, combines 'cante' (singing), 'toque' (guitar playing), 'baile' (dance), and 'palmas' (handclaps)?`,options:[`Paso Doble`,`Fandango`,`Flamenco`,`Zarzuela`],correctIndex:2,explanation:`Flamenco is deeply rooted in the Romani (Gitano) culture of southern Spain, known for its fierce emotional intensity and complex rhythmic footwork.`},{id:1091,category:`Pop Culture`,question:`Which smooth, jazz-influenced style of samba music was developed in Rio de Janeiro in the late 1950s, producing the global hit 'The Girl from Ipanema'?`,options:[`Tropicália`,`Bossa Nova`,`Forró`,`Pagode`],correctIndex:1,explanation:`Bossa Nova (meaning 'new trend') was pioneered by artists like João Gilberto and Antônio Carlos Jobim, bringing a laid-back Brazilian sound to the world.`},{id:1092,category:`Pop Culture`,question:`Originating in Jamaica in the late 1970s, which high-energy genre of urban music heavily features 'toasting' (rhythmic chanting) over digital riddims, directly influencing the birth of hip hop?`,options:[`Ska`,`Rocksteady`,`Dancehall`,`Calypso`],correctIndex:2,explanation:`Dancehall music shifted away from the roots reggae sound toward faster, club-oriented beats, producing global stars like Shabba Ranks and Sean Paul.`},{id:1093,category:`Pop Culture`,question:`Which Senegalese film director, producer, and writer is globally honored as the 'father of African cinema' for pioneering films like 'Black Girl' (La Noire de...)?`,options:[`Ousmane Sembène`,`Djibril Diop Mambéty`,`Souleymane Cissé`,`Idrissa Ouedraogo`],correctIndex:0,explanation:`Ousmane Sembène's deeply political films were the first produced by a Sub-Saharan African to gain international critical acclaim, fiercely critiquing colonialism.`},{id:1094,category:`Pop Culture`,question:`Which 13th-century Persian poet and Sufi mystic wrote profound verses about love and the divine that made him one of the best-selling poets in the United States today?`,options:[`Hafez`,`Omar Khayyam`,`Rumi`,`Saadi Shirazi`],correctIndex:2,explanation:`Jalal al-Din Muhammad Rumi's spiritual poetry transcends national and religious borders, remaining incredibly popular globally over 700 years after his death.`},{id:1095,category:`Pop Culture`,question:`Which highly acclaimed 2003 South Korean neo-noir action thriller, famous for a brutal single-take hallway fight scene, was directed by Park Chan-wook?`,options:[`Memories of Murder`,`Oldboy`,`The Man from Nowhere`,`I Saw the Devil`],correctIndex:1,explanation:`'Oldboy' won the Grand Prix at the 2004 Cannes Film Festival and heavily influenced Western action cinema and directors like Quentin Tarantino.`},{id:1096,category:`Pop Culture`,question:`Which Malian singer and multi-instrumentalist pioneered the 'Desert Blues' genre, seamlessly blending traditional West African musical styles with American blues?`,options:[`Salif Keita`,`Toumani Diabaté`,`Ali Farka Touré`,`Amadou Bagayoko`],correctIndex:2,explanation:`Ali Farka Touré won multiple Grammy awards and highlighted the deep, historical connections between traditional African music and the American blues.`},{id:1097,category:`Pop Culture`,question:`Which classical Japanese dance-drama is world-renowned for its highly stylized performances, elaborate makeup (kumadori), and dynamic stage mechanics?`,options:[`Noh`,`Kabuki`,`Bunraku`,`Gagaku`],correctIndex:1,explanation:`Kabuki theater originated in the early 17th century and features exaggerated actions and dramatic poses (mie) to convey intense emotion.`},{id:1098,category:`Pop Culture`,question:`What is the traditional form of deeply spiritual shadow puppet theater found in Indonesia, traditionally accompanied by a gamelan orchestra?`,options:[`Wayang Kulit`,`Khon`,`Water Puppetry`,`Bunraku`],correctIndex:0,explanation:`Wayang Kulit uses intricately carved leather puppets cast against a lit screen, traditionally used to tell Hindu epics and local Javanese myths.`},{id:1099,category:`Pop Culture`,question:`Which complex, storytelling dance form was developed by the Polynesian people of the Hawaiian Islands, originally performed to honor the gods and preserve oral history?`,options:[`Siva Samoa`,`Hula`,`Ori Tahiti`,`Meke`],correctIndex:1,explanation:`Hula is a deeply sacred cultural practice in Hawaii, using specific hand and body movements to represent words, nature, and historical events.`},{id:1100,category:`Sports`,question:`Which traditional form of wrestling, practiced in the dirt pits (akharas) of the Indian subcontinent, requires athletes to adhere to a strict physical and spiritual regimen?`,options:[`Sumo`,`Kushti (Pehlwani)`,`Ssireum`,`Sambo`],correctIndex:1,explanation:`Kushti or Pehlwani wrestlers live highly disciplined lifestyles. The sport was heavily sponsored by Indian royalty before modern Olympic wrestling became prevalent.`},{id:1101,category:`Sports`,question:`Which awe-inspiring traditional Indian sport involves athletes performing complex yoga postures and aerial gymnastics while hanging from a vertical wooden pole?`,options:[`Gatka`,`Mallakhamb`,`Kalaripayattu`,`Kho Kho`],correctIndex:1,explanation:`Mallakhamb translates to 'wrestler of the pole'. It builds incredible core strength, grip, and flexibility.`},{id:1102,category:`Sports`,question:`In the United Arab Emirates and other Gulf nations, which highly lucrative traditional animal racing sport now legally requires the use of small, lightweight robot jockeys?`,options:[`Ostrich Racing`,`Camel Racing`,`Horse Racing`,`Falconry`],correctIndex:1,explanation:`To prevent the human rights abuses associated with child jockeys, robot jockeys equipped with remote-controlled whips were successfully introduced to camel racing in 2004.`},{id:1103,category:`Sports`,question:`Which traditional Chinese water sport, held annually during the Duanwu Festival, involves teams of paddlers racing long boats to the beat of a heavy drum?`,options:[`Sampan Racing`,`Junk Boat Racing`,`Dragon Boat Racing`,`Canoe Sprint`],correctIndex:2,explanation:`Dragon Boat racing dates back over 2,000 years, originally held to commemorate the death of the poet and minister Qu Yuan.`},{id:1104,category:`Sports`,question:`What is the highly acrobatic, traditional, non-competitive sport of Myanmar where a team of players cooperates to keep a woven rattan ball in the air?`,options:[`Chinlone`,`Sepak Takraw`,`Jianzi`,`Kemari`],correctIndex:0,explanation:`Unlike Sepak Takraw, Chinlone is totally non-competitive. It is described as a combination of sport and dance, focusing entirely on fluid, beautiful form.`},{id:1105,category:`Sports`,question:`Which dynamic Vietnamese martial art is famous globally for its spectacular, high-flying scissor kicks specifically designed to grapple an opponent's neck?`,options:[`Pencak Silat`,`Vovinam`,`Lethwei`,`Sanda`],correctIndex:1,explanation:`Vovinam was founded in 1938 and trains practitioners in both hard and soft techniques, but is most famous for its stunning leg-grappling takedowns.`},{id:1106,category:`Sports`,question:`What is the traditional national sport of Korea, a style of wrestling where competitors grab a fabric belt tied around their opponent's waist and thigh?`,options:[`Judo`,`Hapkido`,`Ssireum`,`Kudo`],correctIndex:2,explanation:`Ssireum matches take place in a sand pit. The goal is to force any part of the opponent's body above the knee to touch the ground.`},{id:1107,category:`Sports`,question:`Which ancient, ritually significant sport played by the Maya and Aztecs involved keeping a heavy solid rubber ball in play using only the hips, and sometimes ended in human sacrifice?`,options:[`The Mesoamerican Ballgame`,`Pelota Purépecha`,`Batey`,`Tejo`],correctIndex:0,explanation:`Often referred to as Pok-ta-Pok or Ōllamaliztli, the Mesoamerican ballgame was deeply tied to mythology, warfare, and religious rituals.`},{id:1108,category:`Sports`,question:`Which intensely popular West African sport, packing massive stadiums in Senegal, incorporates traditional folk wrestling, bare-knuckle boxing, and mystic rituals?`,options:[`Dambe`,`La Lutte (Njom)`,`Engolo`,`Testa`],correctIndex:1,explanation:`Senegalese wrestling (La Lutte Sénégalaise / Njom) is a massive cultural and economic phenomenon, with champion wrestlers treated like A-list celebrities.`},{id:1109,category:`Sports`,question:`Which extremely fast-paced traditional Indian tag game consists of teams taking turns chasing opponents while the chasers sit in a straight line facing opposite directions?`,options:[`Kabaddi`,`Kho Kho`,`Gilli Danda`,`Pithu`],correctIndex:1,explanation:`Kho Kho requires massive bursts of speed, agility, and teamwork, as chasers must quickly tag out running defenders within a strict time limit.`},{id:1110,category:`Sports`,question:`Which ancient Chinese internal martial art, originally developed for self-defense, is globally practiced today for its slow, highly deliberate, and meditative movements?`,options:[`Wing Chun`,`Shaolin Kung Fu`,`Tai Chi (Taijiquan)`,`Baguazhang`],correctIndex:2,explanation:`Tai Chi focuses on the flow of 'qi' (life energy) and is practiced worldwide by millions daily for its profound physical and mental health benefits.`},{id:1111,category:`Sports`,question:`What is the name of the traditional martial art associated with the Sikhs of the Punjab region, which prominently features combat using wooden sticks and shields?`,options:[`Kalaripayattu`,`Gatka`,`Silambam`,`Thang-Ta`],correctIndex:1,explanation:`Gatka was historically used to train Sikh warriors (Khalsa) in swordsmanship and remains a deeply spiritual, rhythmic, and martial practice today.`},{id:1112,category:`Sports`,question:`Which highly acrobatic modern exhibition and full-contact sport was standardized in China to unify the various traditional styles of Chinese martial arts?`,options:[`Judo`,`Wushu`,`Karate`,`Sambo`],correctIndex:1,explanation:`Wushu encompasses 'Taolu' (forms/routines) and 'Sanda' (sparring), producing global martial arts superstars like Jet Li.`},{id:1113,category:`Sports`,question:`Which deeply ceremonial Japanese martial art focuses on the discipline and practice of traditional longbow archery?`,options:[`Kendo`,`Kyudo`,`Aikido`,`Iaido`],correctIndex:1,explanation:`Kyudo (the way of the bow) emphasizes truth, goodness, and beauty. A practitioner focuses intensely on their mental state rather than simply hitting the target.`},{id:1114,category:`Sports`,question:`In which modern Japanese martial art do competitors wear protective armor (bogu) and fiercely strike each other using flexible bamboo swords (shinai)?`,options:[`Judo`,`Karate`,`Kendo`,`Naginata`],correctIndex:2,explanation:`Kendo evolved from the brutal sword-fighting practices of the samurai class, transforming into a fast-paced, highly vocal modern sport.`},{id:1115,category:`Sports`,question:`Which traditional form of stick-fighting, famously practiced by Nelson Mandela in his youth, is a cornerstone of manhood rituals in South African culture?`,options:[`Donga`,`Nguni stick-fighting`,`Tahtib`,`Makha`],correctIndex:1,explanation:`Nguni stick-fighting requires warriors to use two sticks—one for defense and one for striking—testing courage and endurance among young men.`},{id:1116,category:`Sports`,question:`Which brutal, ceremonial stick-fighting sport is practiced by the Suri people of Ethiopia to settle disputes, display courage, and attract a bride?`,options:[`Dambe`,`Donga`,`Tahtib`,`La Lutte`],correctIndex:1,explanation:`Donga is incredibly dangerous and highly regulated by referees. It serves as a vital cultural touchstone for the Suri people in the Omo Valley.`},{id:1117,category:`Sports`,question:`What is the official Chinese full-contact kickboxing sport that originally developed from military combat training, famously allowing fast-paced wrestling takedowns?`,options:[`Muay Thai`,`Sanda (Sanshou)`,`Lethwei`,`Savate`],correctIndex:1,explanation:`Sanda uniquely allows fighters to catch kicks and execute throws, forcing competitors off the raised platform (lei tai) to score major points.`},{id:1118,category:`Sports`,question:`Which ancient Egyptian martial art, originally developed for military training, survives today as a joyous traditional stick-dancing game accompanied by music?`,options:[`Tahtib`,`Dambe`,`Senegalese Wrestling`,`Engolo`],correctIndex:0,explanation:`Tahtib dates back to the Pharaonic era (depicted in ancient tombs). Today, it is a festive, highly rhythmic mock-combat dance.`},{id:1119,category:`Sports`,question:`Recognized by UNESCO as an Intangible Cultural Heritage, which ancient hunting sport utilizing trained birds of prey is highly revered in the Middle East?`,options:[`Pigeon Racing`,`Cormorant Fishing`,`Falconry`,`Hawking`],correctIndex:2,explanation:`Falconry has been practiced for over 4,000 years. In countries like the UAE, top racing and hunting falcons are highly prized status symbols.`},{id:1120,category:`Sports`,question:`Which legendary Indian cricketer, worshipped globally as the 'God of Cricket', is the only player in history to score 100 international centuries?`,options:[`Virat Kohli`,`MS Dhoni`,`Kapil Dev`,`Sachin Tendulkar`],correctIndex:3,explanation:`Sachin Tendulkar carried the hopes of a billion Indians for over two decades, setting batting records that may never be broken.`},{id:1121,category:`Sports`,question:`Which Moroccan middle-distance runner set the phenomenal world record for the 1500m in 1998, a record that has stood unbroken for over 25 years?`,options:[`Kenenisa Bekele`,`Hicham El Guerrouj`,`David Rudisha`,`Mo Farah`],correctIndex:1,explanation:`Hicham El Guerrouj is widely considered the greatest middle-distance runner in history, holding the world records for both the 1500m and the mile.`},{id:1122,category:`Sports`,question:`Which South Korean athlete, affectionately known as 'Queen Yuna', shattered world records and won Gold in figure skating at the 2010 Winter Olympics?`,options:[`Mao Asada`,`Yuna Kim`,`Michelle Kwan`,`Midori Ito`],correctIndex:1,explanation:`Yuna Kim is a national hero in South Korea and one of the most highly decorated and technically brilliant figure skaters in history.`},{id:1123,category:`Sports`,question:`Which Qatari athlete won gold at the Tokyo 2020 Olympics in a legendary moment of sportsmanship by agreeing to share the gold medal with his Italian rival?`,options:[`Mutaz Essa Barshim`,`Nasser Al-Attiyah`,`Abderrahman Samba`,`Femi Ogunode`],correctIndex:0,explanation:`High jumper Mutaz Essa Barshim and Gianmarco Tamberi famously tied and chose to share the gold medal rather than enter a jump-off.`},{id:1124,category:`Sports`,question:`Which legendary Ethiopian long-distance runner won two Olympic gold medals and famously set 27 different world records during his career?`,options:[`Kenenisa Bekele`,`Eliud Kipchoge`,`Abebe Bikila`,`Haile Gebrselassie`],correctIndex:3,explanation:`Haile Gebrselassie dominated the 10,000m event and the marathon in the 1990s and 2000s, becoming a global icon of athletics.`},{id:1125,category:`Sports`,question:`Which iconic Brazilian footballer holds the absolute record for the most goals scored at FIFA World Cup tournaments, regardless of gender?`,options:[`Pelé`,`Ronaldo`,`Marta`,`Neymar`],correctIndex:2,explanation:`Marta Vieira da Silva is a six-time FIFA World Player of the Year. She has scored 17 World Cup goals, more than any man or woman in history.`},{id:1126,category:`Sports`,question:`Which Chinese athlete, widely considered the greatest badminton player of all time, completed the 'Super Grand Slam' by winning all nine major titles in the world?`,options:[`Chen Long`,`Lee Chong Wei`,`Lin Dan`,`Taufik Hidayat`],correctIndex:2,explanation:`Lin Dan dominated the sport of badminton, bringing unmatched speed, power, and tactical brilliance to the court for over a decade.`},{id:1127,category:`Sports`,question:`Which Malaysian badminton legend was ranked number one in the world for 349 weeks and remains a massive national hero despite his fierce rivalry with Lin Dan?`,options:[`Koo Kien Keat`,`Lee Chong Wei`,`Tan Boon Heong`,`Misbun Sidek`],correctIndex:1,explanation:`Lee Chong Wei's epic battles against Lin Dan are considered the golden age of men's badminton, making him a beloved icon in Malaysia.`},{id:1128,category:`Sports`,question:`Which Pacific Island nation erupted in massive celebration after winning their first-ever Olympic gold medal in the Rugby Sevens tournament in 2016?`,options:[`Samoa`,`Tonga`,`Fiji`,`Vanuatu`],correctIndex:2,explanation:`The Flying Fijians absolutely dominated the 2016 Olympic tournament. Rugby Sevens is a religion in Fiji, and the win united the entire country.`},{id:1129,category:`Sports`,question:`Which traditional sport of the Mapuche people in Chile strongly resembles field hockey and was historically used to train warriors and settle community disputes?`,options:[`Palin (Chueca)`,`Tejo`,`Pato`,`Batey`],correctIndex:0,explanation:`Palin is played with a curved stick and a wooden ball. The Spanish banned it during colonial times, but the Mapuche fiercely preserved the tradition.`},{id:1130,category:`Sports`,question:`What deeply spiritual Japanese discipline involves a samurai galloping on horseback at high speeds while shooting blunt arrows at wooden targets?`,options:[`Kyudo`,`Yabusame`,`Kendo`,`Naginata`],correctIndex:1,explanation:`Yabusame was designed to train samurai in both equestrian s
