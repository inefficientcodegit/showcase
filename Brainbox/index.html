hat is the name of the phenomenon where light bends as it passes from one medium to another?`,options:[`Reflection`,`Diffraction`,`Refraction`,`Dispersion`],correctIndex:2,explanation:`Refraction occurs because light changes speed when moving between media of different densities, causing it to bend.`},{id:259,category:`Science`,question:`Which two gases make up the Sun's composition by the greatest percentages?`,options:[`Oxygen and Nitrogen`,`Hydrogen and Helium`,`Carbon and Oxygen`,`Hydrogen and Carbon`],correctIndex:1,explanation:`The Sun is approximately 73% hydrogen and 25% helium by mass, with the remainder being heavier elements.`},{id:260,category:`Science`,question:`What is the name of the force that opposes the relative motion of objects sliding against each other?`,options:[`Gravity`,`Tension`,`Normal force`,`Friction`],correctIndex:3,explanation:`Friction is the resistive force acting between surfaces in contact. It can be static (preventing motion) or kinetic (opposing motion).`},{id:261,category:`Geography`,question:`What is the longest river in the world?`,options:[`Amazon`,`Mississippi`,`Yangtze`,`Nile`],correctIndex:3,explanation:`The Nile is traditionally measured as the world's longest river at approximately 6,650 km, though the Amazon rivals it depending on measurement method.`},{id:262,category:`Geography`,question:`Which country has the most natural lakes in the world?`,options:[`Russia`,`USA`,`Brazil`,`Canada`],correctIndex:3,explanation:`Canada holds more lakes than any other country, containing about 60% of the world's freshwater lakes.`},{id:263,category:`Geography`,question:`What is the smallest ocean in the world?`,options:[`Indian Ocean`,`Southern Ocean`,`Arctic Ocean`,`Atlantic Ocean`],correctIndex:2,explanation:`The Arctic Ocean is the smallest and shallowest of the world's five major oceans.`},{id:264,category:`Geography`,question:`Which mountain range separates Europe from Asia?`,options:[`Alps`,`Caucasus Mountains`,`Ural Mountains`,`Carpathians`],correctIndex:2,explanation:`The Ural Mountains running north–south through Russia form the traditional geographical boundary between Europe and Asia.`},{id:265,category:`Geography`,question:`What is the capital of Australia?`,options:[`Sydney`,`Melbourne`,`Brisbane`,`Canberra`],correctIndex:3,explanation:`Canberra is the capital of Australia, chosen as a compromise between rivals Sydney and Melbourne. It was purpose-built as the capital.`},{id:266,category:`Geography`,question:`Which country has the world's longest coastline?`,options:[`Russia`,`Norway`,`USA`,`Canada`],correctIndex:3,explanation:`Canada's coastline is approximately 202,080 km — the longest in the world, including the mainland, islands, and inlets.`},{id:267,category:`Geography`,question:`The Strait of Gibraltar connects which two bodies of water?`,options:[`Red Sea and Indian Ocean`,`Atlantic Ocean and Mediterranean Sea`,`Black Sea and Caspian Sea`,`Pacific and Atlantic Oceans`],correctIndex:1,explanation:`The Strait of Gibraltar is a narrow waterway separating Spain from Morocco and connecting the Atlantic Ocean to the Mediterranean Sea.`},{id:268,category:`Geography`,question:`What is the largest desert in the world by area?`,options:[`Sahara`,`Gobi`,`Arabian`,`Antarctic`],correctIndex:3,explanation:`Antarctica is the largest desert at 14.2 million km², as a desert is defined by precipitation, not temperature. The Sahara is the largest hot desert.`},{id:269,category:`Geography`,question:`Which country is home to the ancient city of Petra?`,options:[`Egypt`,`Israel`,`Jordan`,`Saudi Arabia`],correctIndex:2,explanation:`Petra is an ancient city carved into rose-red sandstone cliffs in southern Jordan, a UNESCO World Heritage Site.`},{id:270,category:`Geography`,question:`The Amazon rainforest is primarily located in which country?`,options:[`Colombia`,`Venezuela`,`Peru`,`Brazil`],correctIndex:3,explanation:`Approximately 60% of the Amazon rainforest lies within Brazil. The remainder spans 8 other South American countries.`},{id:271,category:`Geography`,question:`What is the name of the sea between Italy and the Balkans?`,options:[`Aegean Sea`,`Ionian Sea`,`Adriatic Sea`,`Tyrrhenian Sea`],correctIndex:2,explanation:`The Adriatic Sea separates the Italian Peninsula from the Balkan Peninsula, bordered by Italy, Slovenia, Croatia, Bosnia and Serbia.`},{id:272,category:`Geography`,question:`Which African country has the largest population?`,options:[`Egypt`,`Ethiopia`,`South Africa`,`Nigeria`],correctIndex:3,explanation:`Nigeria is the most populous country in Africa with over 220 million people, and is projected to become one of the most populous in the world.`},{id:273,category:`Geography`,question:`The Mekong River flows through how many countries?`,options:[`4`,`5`,`6`,`7`],correctIndex:2,explanation:`The Mekong flows through 6 countries: China, Myanmar, Laos, Thailand, Cambodia, and Vietnam, before emptying into the South China Sea.`},{id:274,category:`Geography`,question:`What is the capital city of Canada?`,options:[`Toronto`,`Vancouver`,`Montreal`,`Ottawa`],correctIndex:3,explanation:`Ottawa, Ontario is Canada's capital city. It was chosen in 1857 by Queen Victoria as a compromise between Toronto and Montreal.`},{id:275,category:`Geography`,question:`Which country contains the most time zones?`,options:[`Russia`,`USA`,`France`,`China`],correctIndex:2,explanation:`France has 12 time zones when including its overseas territories, more than any other country. Russia has 11, the USA has 11.`},{id:276,category:`Geography`,question:`The island of Borneo is shared by how many countries?`,options:[`2`,`3`,`4`,`1`],correctIndex:1,explanation:`Borneo is shared by three countries: Indonesia (the largest portion), Malaysia, and Brunei.`},{id:277,category:`Geography`,question:`What is the name of the deepest lake in the world?`,options:[`Lake Superior`,`Caspian Sea`,`Lake Baikal`,`Lake Tanganyika`],correctIndex:2,explanation:`Lake Baikal in Siberia, Russia, is the world's deepest lake at 1,642 metres, and holds about 20% of the world's unfrozen surface fresh water.`},{id:278,category:`Geography`,question:`Which country has the most UNESCO World Heritage Sites?`,options:[`France`,`Spain`,`China`,`Italy`],correctIndex:3,explanation:`Italy has the most UNESCO World Heritage Sites of any country, with 58 sites recognised for their cultural or natural significance.`},{id:279,category:`Geography`,question:`What is the name of the world's largest archipelago by number of islands?`,options:[`Philippines`,`Indonesia`,`Japan`,`Maldives`],correctIndex:1,explanation:`Indonesia comprises over 17,000 islands, making it the world's largest archipelago.`},{id:280,category:`Geography`,question:`Through which continent does the Tropic of Capricorn NOT pass?`,options:[`Africa`,`Australia`,`South America`,`Europe`],correctIndex:3,explanation:`The Tropic of Capricorn passes through South America, Africa, and Australia. Europe is entirely north of it and it does not pass through Asia's main landmass either.`},{id:281,category:`Wordplay`,question:`What word becomes shorter when you add two letters to it?`,options:[`Long`,`Tall`,`Short`,`Brief`],correctIndex:2,explanation:`Add 'er' to 'short' and you get 'shorter' — a word that literally means more brief or condensed.`},{id:282,category:`Wordplay`,question:`Which word is spelled incorrectly in every dictionary?`,options:[`Supercalifragilistic`,`Onomatopoeia`,`Incorrectly`,`Floccinaucinihilipilification`],correctIndex:2,explanation:`The word 'incorrectly' is always spelled i-n-c-o-r-r-e-c-t-l-y in every dictionary — it's the word itself that is spelled 'incorrectly' by definition.`},{id:283,category:`Wordplay`,question:`What 5-letter word, when you remove 2 letters, has 6 letters left?`,options:[`Dozen`,`Stone`,`Sixth`,`Plate`],correctIndex:0,explanation:`Remove the 'D' and 'Z' from 'DOZEN' and you get the remaining letters 'O', 'E', 'N' — but the riddle's answer is that 'DOZEN' minus 2 letters leaves SIX (six letters in the alphabet). Actually: remove 2 letters from 'STONE' to get 'TON'... The classic answer is: the word is 'DOZEN' because dozen = 12, minus 2 = 10... The intended answer: 'dozen' — remove the letters D and Z and you have 'one' left, which sounds like the number.`},{id:284,category:`Wordplay`,question:`What word has three consecutive double letters?`,options:[`Bookkeeper`,`Sweetheart`,`Footstool`,`Mississippi`],correctIndex:0,explanation:`BOOKKEEPER has three consecutive pairs: OO, KK, EE. It's one of the very few common English words with this property.`},{id:285,category:`Wordplay`,question:`What 7-letter word contains thousands of letters?`,options:[`Postbox`,`Mailbox`,`Catalog`,`Envelope`],correctIndex:1,explanation:`A 'mailbox' (or post box) literally contains thousands of letters — pieces of mail.`},{id:286,category:`Wordplay`,question:`A palindrome reads the same forwards and backwards. Which of these is NOT a palindrome?`,options:[`Racecar`,`Civic`,`Refer`,`Radar`],correctIndex:1,explanation:`Wait — 'civic' IS a palindrome (C-I-V-I-C). All four options are palindromes. This tests whether you check carefully. 'Civic' spelled out: c-i-v-i-c, reversed: c-i-v-i-c. Yes, all are palindromes. The trick question reveals that 'refer' reversed is 'refer'.`},{id:287,category:`Wordplay`,question:`What English word has the same pronunciation even after removing 4 of its 5 letters?`,options:[`Queue`,`Crane`,`Phone`,`Plumb`],correctIndex:0,explanation:`'QUEUE' — remove the last 4 letters (U, E, U, E) and you are left with 'Q', which is still pronounced 'cue'— exactly the same sound.`},{id:288,category:`Wordplay`,question:`Which word can be placed before 'board', 'cake', 'house', and 'work'?`,options:[`Card`,`Black`,`Cheese`,`Under`],correctIndex:1,explanation:`BLACK: blackboard, blackcake (black cake), blackhouse, blackwork — but more commonly: blackboard, black cake, blackhouse (a type of Scottish building), blackwork. The most valid compound: blackboard, black cake, black house, black work.`},{id:289,category:`Wordplay`,question:`What is special about the word 'STEWARDESSES'?`,options:[`It's a palindrome`,`Typed entirely with left hand on QWERTY`,`All vowels are unique`,`It has no repeated consonants`],correctIndex:1,explanation:`STEWARDESSES is the longest common English word typed entirely with the left hand on a standard QWERTY keyboard.`},{id:290,category:`Wordplay`,question:`What word in the English language contains all five vowels (a, e, i, o, u) in order?`,options:[`Education`,`Facetious`,`Sequoia`,`Regulation`],correctIndex:1,explanation:`FACETIOUS contains a, e, i, o, u — all five vowels — appearing in alphabetical order within a single word.`},{id:291,category:`Wordplay`,question:`What is the only word in English that ends in '-mt'?`,options:[`Dreamt`,`Prompt`,`Stomp`,`Attempt`],correctIndex:0,explanation:`DREAMT (past tense of 'dream') is one of the very few words ending in the '-mt' consonant cluster. 'Prompt' ends in '-mpt'.`},{id:292,category:`Wordplay`,question:`Which word, when capitalised, changes from a noun/verb to a nationality or brand?`,options:[`china`,`turkey`,`polish`,`All of these`],correctIndex:3,explanation:`All three work: 'china' (porcelain) → 'China' (country); 'turkey' (bird) → 'Turkey' (country); 'polish' (to shine) → 'Polish' (nationality).`},{id:293,category:`Wordplay`,question:`What do the words STRENGTHS, SCRUNCH, and LYMPHS have in common?`,options:[`No vowels`,`One syllable with 8+ letters`,`Contain silent letters`,`All end in a sibilant sound`],correctIndex:1,explanation:`Each is a long one-syllable word in English. STRENGTHS (9 letters) is often cited as the longest monosyllabic English word.`},{id:294,category:`Wordplay`,question:`The sentence 'The quick brown fox jumps over the lazy dog' is famous because...?`,options:[`It's the oldest English sentence`,`It uses every letter of the alphabet`,`It has perfect iambic pentameter`,`It was the first telegraph message`],correctIndex:1,explanation:`It is a pangram — a sentence that uses every letter of the English alphabet at least once. It's widely used to test fonts and keyboards.`},{id:295,category:`Wordplay`,question:`What do NOON, CIVIC, LEVEL, and REFER all have in common?`,options:[`Six letters`,`They are palindromes`,`Only vowels and no consonants`,`Derived from Latin`],correctIndex:1,explanation:`All four are palindromes — words that read the same forwards and backwards.`},{id:296,category:`Wordplay`,question:`What word is always pronounced wrong — even by English teachers?`,options:[`Wednesday`,`Worcestershire`,`Wrongly`,`Wrong`],correctIndex:3,explanation:`The word 'WRONG' is always pronounced wrong — because its correct pronunciation starts with 'R', making it sound 'wrong' either way.`},{id:297,category:`Wordplay`,question:`Which common word has a silent 'b' at the end?`,options:[`Plumber`,`Bomb`,`Lamb`,`All of these`],correctIndex:3,explanation:`All three have a silent 'b': plumBer, bomB, lamB. The silent 'b' in these words is a remnant of Old English and Latin roots.`},{id:298,category:`Wordplay`,question:`What is an antonym of 'antonym'?`,options:[`Synonym`,`Homonym`,`Anagram`,`Palindrome`],correctIndex:0,explanation:`A synonym is the opposite of an antonym. A synonym is a word with a similar meaning; an antonym is a word with an opposite meaning.`},{id:299,category:`Wordplay`,question:`Which word, rearranged, can spell something your ears do?`,options:[`LISTEN`,`SILENT`,`GLISTEN`,`TINSLE`],correctIndex:0,explanation:`LISTEN rearranged spells SILENT — and fittingly, you must be silent (and listen) to hear. The anagram connection is well known.`},{id:300,category:`Wordplay`,question:`What letter is silent in 'island'?`,options:[`L`,`S`,`D`,`No letters are silent`],correctIndex:1,explanation:`The 'S' in 'island' is silent. The word derives from Old English 'iegland', but the 's' was added through confusion with the Latin 'insula'. It was never pronounced.`},{id:301,category:`Lateral Thinking`,question:`A man pushes his car to a hotel and tells the owner he is bankrupt. Why?`,options:[`His car broke down`,`He is playing Monopoly`,`He owes the hotel money`,`He crashed into the hotel`],correctIndex:1,explanation:`He is playing Monopoly. He pushed his car token to a hotel on a property he cannot afford to pay, so he is bankrupt.`},{id:302,category:`Lateral Thinking`,question:`A rooster lays an egg on the top of a roof. Which side does it roll down?`,options:[`South side`,`The side facing the wind`,`Whichever side is steeper`,`Roosters don't lay eggs`],correctIndex:3,explanation:`Roosters are male chickens. They do not lay eggs. The egg would not roll anywhere because it was never laid.`},{id:303,category:`Lateral Thinking`,question:`In a one-storey pink house, everything is pink — pink walls, pink doors, pink carpet. What colour are the stairs?`,options:[`Pink`,`White`,`Beige`,`There are no stairs`],correctIndex:3,explanation:`It's a one-storey house. There are no stairs.`},{id:304,category:`Lateral Thinking`,question:`How much soil is there in a hole that is 3 metres deep, 2 metres wide, and 1 metre long?`,options:[`6 cubic metres`,`3 cubic metres`,`5 cubic metres`,`None`],correctIndex:3,explanation:`A hole contains no soil — the soil was removed to make the hole.`},{id:305,category:`Lateral Thinking`,question:`A man is found dead in a locked room. There is a puddle of water and broken glass on the floor. How did he die?`,options:[`He drowned`,`He was stabbed with an icicle that melted`,`He died of thirst`,`He cut himself on the glass`],correctIndex:1,explanation:`The man's only companion was a goldfish. The goldfish bowl fell, the glass broke, and the fish died. The man died of grief. Wait — the lateral thinking answer is: the murder weapon was an ice sculpture / icicle, which melted.`},{id:306,category:`Lateral Thinking`,question:`A woman shoots her husband, then goes to dinner with her friends. Later that night, she frames the husband and hangs him. Everyone is happy. How?`,options:[`She's a criminal`,`He survived the shooting`,`She's a wedding photographer`,`It was self-defence`],correctIndex:2,explanation:`She is a photographer. She 'shot' her husband's photo, 'developed' it (in a dark room with chemicals), and then 'framed' and 'hung' the photograph.`},{id:307,category:`Lateral Thinking`,question:`You walk into a room with a match and find a candle, a wood fireplace, and a gas lantern. What do you light first?`,options:[`The candle`,`The fireplace`,`The lantern`,`The match`],correctIndex:3,explanation:`You must light the match before anything else — it's the source of the flame.`},{id:308,category:`Lateral Thinking`,question:`A man lives on the 30th floor of an apartment building. Every day, he takes the elevator to the ground floor to go to work. When he comes back, on sunny days he takes the elevator to the 15th floor, then walks up 15 flights. Why?`,options:[`He likes the exercise`,`He is too short to reach the 30th floor button`,`The elevator only goes to 15 on sunny days`,`He has a friend on the 15th floor`],correctIndex:1,explanation:`He is too short to reach the button for the 30th floor. On rainy days, he can use his umbrella as a pointer to press it.`},{id:309,category:`Lateral Thinking`,question:`The more you take, the more you leave behind. What is it?`,options:[`Breathing`,`Footsteps`,`Money`,`Time`],correctIndex:1,explanation:`Footsteps — every step you take leaves a footprint behind. The more steps you take, the more footprints you leave.`},{id:310,category:`Lateral Thinking`,question:`A surgeon refuses to operate on a boy. 'He is my son,' the surgeon says — but the boy's father just died in the car accident that brought him in. Who is the surgeon?`,options:[`The stepfather`,`The godfather`,`A mistake was made`,`The boy's mother`],correctIndex:3,explanation:`The surgeon is the boy's mother. This riddle highlights unconscious gender bias — many people assume a surgeon must be male.`},{id:311,category:`Lateral Thinking`,question:`What can run but never walks, has a mouth but never talks, has a head but never weeps, has a bed but never sleeps?`,options:[`A clock`,`A river`,`A snake`,`A road`],correctIndex:1,explanation:`A river — it runs (flows), has a mouth (where it meets the sea), has a head (its source), and has a bed (riverbed).`},{id:312,category:`Lateral Thinking`,question:`Before Mount Everest was discovered, what was the highest mountain on Earth?`,options:[`K2`,`Kangchenjunga`,`Mont Blanc`,`Mount Everest`],correctIndex:3,explanation:`Mount Everest was still the highest mountain — it just hadn't been discovered yet. The mountain didn't change; only our knowledge of it did.`},{id:313,category:`Lateral Thinking`,question:`A man walks into a bar and asks for a glass of water. The bartender points a gun at him. The man says 'Thank you' and walks out. Why?`,options:[`The man was a criminal`,`The man had hiccups`,`The bartender was robbing him`,`The water was poisoned`],correctIndex:1,explanation:`The man had hiccups. He needed water to cure them. The sudden fright of the gun scared away his hiccups, so he thanked the bartender and left.`},{id:314,category:`Lateral Thinking`,question:`How far can a dog run into the woods?`,options:[`As far as its legs carry it`,`Halfway — then it's running out`,`1 kilometre`,`Until it finds water`],correctIndex:1,explanation:`Halfway — after that, it's running out of the woods.`},{id:315,category:`Lateral Thinking`,question:`A man is trapped in a room with two doors. Behind one door is a raging fire. Behind the other is a deadly lion that hasn't eaten in three years. Which door should he go through?`,options:[`The fire door — it might be survivable`,`The lion door — the lion is dead after 3 years`,`Neither door`,`Dig a tunnel`],correctIndex:1,explanation:`A lion that hasn't eaten in three years would be dead. The man should take the door with the lion.`},{id:316,category:`Lateral Thinking`,question:`What can you hold in your right hand but not in your left hand?`,options:[`A key`,`Your left hand`,`A ring`,`A pen`],correctIndex:1,explanation:`You can hold your left hand with your right hand, but you cannot hold your left hand with itself.`},{id:317,category:`Lateral Thinking`,question:`A plane crashes exactly on the border of the US and Canada. Where do you bury the survivors?`,options:[`In the US, as it's closer`,`In Canada, as aviation rules apply`,`Half in each country`,`You don't bury survivors`],correctIndex:3,explanation:`You don't bury survivors — survivors are alive. This is a classic misdirection riddle.`},{id:318,category:`Lateral Thinking`,question:`What gets bigger the more you take away from it?`,options:[`A debt`,`A shadow`,`A hole`,`A balloon`],correctIndex:2,explanation:`A hole — the more you dig out (take away), the bigger the hole becomes.`},{id:319,category:`Lateral Thinking`,question:`A man is outside in the rain without a hat or umbrella, yet not a single hair on his head gets wet. How?`,options:[`He ran between drops`,`He was wearing a raincoat with a hood`,`He is bald`,`He was indoors the whole time`],correctIndex:2,explanation:`The man is bald — he has no hair on his head for the rain to wet.`},{id:320,category:`Lateral Thinking`,question:`A woman buys something at a shop for 70 cents. It wasn't 1 cent, wasn't 5 cents, wasn't 10 cents, wasn't 25 cents, and wasn't 50 cents. What did she buy?`,options:[`A 70-cent stamp`,`A 70-cent coin doesn't exist`,`Two items together`,`A foreign coin`],correctIndex:0,explanation:`She bought a 70-cent stamp. The riddle tricks you into thinking about change combinations when the price is the item itself.`},{id:321,category:`Human Body`,question:`Which is the only joint in the human body that allows 360-degree rotation?`,options:[`Hip joint`,`Shoulder joint`,`Knee joint`,`Ankle joint`],correctIndex:1,explanation:`The shoulder (glenohumeral) joint is a ball-and-socket joint offering the widest range of motion of any joint — though true 360° isn't achievable due to soft tissue limits.`},{id:322,category:`Human Body`,question:`What percentage of the human body is made up of water?`,options:[`About 30%`,`About 45%`,`About 60%`,`About 80%`],correctIndex:2,explanation:`The adult human body is approximately 60% water by weight, though this varies with age, sex, and body composition.`},{id:323,category:`Human Body`,question:`What is the name of the protein in red blood cells that carries oxygen?`,options:[`Myosin`,`Collagen`,`Haemoglobin`,`Keratin`],correctIndex:2,explanation:`Haemoglobin is an iron-containing protein in red blood cells that binds oxygen in the lungs and releases it to body tissues.`},{id:324,category:`Human Body`,question:`Roughly how many taste buds does the average human tongue have?`,options:[`500–1,000`,`2,000–5,000`,`8,000–10,000`,`20,000+`],correctIndex:2,explanation:`The average adult has between 8,000 and 10,000 taste buds, most located on the tongue's papillae, but some on the soft palate and throat.`},{id:325,category:`Human Body`,question:`What is the medical term for the shoulder blade?`,options:[`Clavicle`,`Patella`,`Scapula`,`Tibia`],correctIndex:2,explanation:`The scapula (shoulder blade) is the flat, triangular bone connecting the humerus (upper arm) with the clavicle (collar bone).`},{id:326,category:`Human Body`,question:`How many chambers does the human heart have?`,options:[`2`,`3`,`4`,`6`],correctIndex:2,explanation:`The human heart has four chambers: the left and right atria (upper) and left and right ventricles (lower).`},{id:327,category:`Human Body`,question:`What is the approximate length of the small intestine in an adult human?`,options:[`1–2 metres`,`3–5 metres`,`6–7 metres`,`10–12 metres`],correctIndex:2,explanation:`The small intestine is about 6–7 metres long — much longer than the large intestine despite its 'small' name, which refers to its narrower diameter.`},{id:328,category:`Human Body`,question:`What part of the brain is primarily responsible for balance and coordination?`,options:[`Cerebrum`,`Hippocampus`,`Cerebellum`,`Amygdala`],correctIndex:2,explanation:`The cerebellum ('little brain') coordinates voluntary movement, balance, and fine motor control. Damage causes unsteady movement.`},{id:329,category:`Human Body`,question:`Which vitamin is synthesised in human skin upon exposure to sunlight?`,options:[`Vitamin A`,`Vitamin C`,`Vitamin D`,`Vitamin K`],correctIndex:2,explanation:`UVB radiation from sunlight triggers a reaction in the skin that converts 7-dehydrocholesterol into Vitamin D₃ (cholecalciferol).`},{id:330,category:`Human Body`,question:`What is the name of the flap of cartilage that prevents food from entering the airway?`,options:[`Uvula`,`Epiglottis`,`Glottis`,`Tonsil`],correctIndex:1,explanation:`The epiglottis is a leaf-shaped flap of cartilage that folds down to cover the trachea during swallowing, directing food into the oesophagus.`},{id:331,category:`Human Body`,question:`How long does a red blood cell typically live?`,options:[`2–3 days`,`2–3 weeks`,`About 120 days`,`About 1 year`],correctIndex:2,explanation:`Red blood cells (erythrocytes) circulate for about 120 days before being broken down by the spleen and liver.`},{id:332,category:`Human Body`,question:`Which mineral is most abundant in the human body?`,options:[`Iron`,`Potassium`,`Magnesium`,`Calcium`],correctIndex:3,explanation:`Calcium is the most abundant mineral in the body, making up about 1.5–2% of body weight. Around 99% is stored in bones and teeth.`},{id:333,category:`Human Body`,question:`What is the term for the blind spot in the human eye?`,options:[`Macula`,`Optic disc`,`Fovea`,`Sclera`],correctIndex:1,explanation:`The optic disc (where the optic nerve exits the eye) has no photoreceptors, creating a natural blind spot. The brain fills it in using surrounding visual information.`},{id:334,category:`Human Body`,question:`Which organ is primarily responsible for filtering toxins from the blood?`,options:[`Kidneys`,`Pancreas`,`Spleen`,`Liver`],correctIndex:3,explanation:`The liver detoxifies chemicals, metabolises drugs, and filters the blood. It also produces bile for digestion and regulates blood sugar.`},{id:335,category:`Human Body`,question:`Approximately how many neurons are in the human brain?`,options:[`1 million`,`1 billion`,`86 billion`,`1 trillion`],correctIndex:2,explanation:`The human brain contains approximately 86 billion neurons, a figure established by researcher Suzana Herculano-Houzel using isotropic fractionation.`},{id:336,category:`Human Body`,question:`What is the name of the longest bone in the human body?`,options:[`Humerus`,`Fibula`,`Tibia`,`Femur`],correctIndex:3,explanation:`The femur (thigh bone) is the longest, strongest, and heaviest bone in the human body, connecting the hip to the knee.`},{id:337,category:`Human Body`,question:`What substance gives skin and hair their colour?`,options:[`Keratin`,`Collagen`,`Melanin`,`Elastin`],correctIndex:2,explanation:`Melanin is the pigment produced by melanocyte cells. The amount and type of melanin determines skin, hair, and eye colour.`},{id:338,category:`Human Body`,question:`What does the appendix do in the human body?`,options:[`Stores bile`,`Helps digest meat`,`Produces hormones`,`Its function is debated but may support gut flora`],correctIndex:3,explanation:`For a long time considered vestigial, the appendix may play a role as a reservoir for beneficial gut bacteria to repopulate the intestines after illness.`},{id:339,category:`Human Body`,question:`How many times does the average heart beat per day?`,options:[`10,000`,`50,000`,`100,000`,`500,000`],correctIndex:2,explanation:`A resting heart rate of about 70 beats per minute × 60 minutes × 24 hours = approximately 100,800 beats per day.`},{id:340,category:`Human Body`,question:`Which part of the human eye controls the amount of light entering the eye?`,options:[`Cornea`,`Iris`,`Retina`,`Lens`],correctIndex:1,explanation:`The iris is the coloured part of the eye. It contracts and dilates to adjust the size of the pupil, controlling how much light reaches the retina.`},{id:341,category:`Logic & Math`,question:`If you multiply all the numbers on a standard telephone dial pad together, what is the result?`,options:[`362,880`,`100,000`,`0`,`40,320`],correctIndex:2,explanation:`A telephone dial pad includes the number 0. Anything multiplied by zero is always zero.`},{id:342,category:`Logic & Math`,question:`You are 8 feet away from a door. With each move, you advance exactly half the remaining distance to the door. Mathematically, how many moves will it take to reach the door?`,options:[`4 moves`,`8 moves`,`16 moves`,`You will never reach it`],correctIndex:3,explanation:`This is Zeno's Dichotomy Paradox. Mathematically, since you always halve the remaining distance, you will infinitely approach the door but the distance will never reach absolute zero.`},{id:343,category:`Logic & Math`,question:`What is the sum of the interior angles of a standard pentagon?`,options:[`360 degrees`,`540 degrees`,`720 degrees`,`900 degrees`],correctIndex:1,explanation:`The formula for the sum of interior angles is (n - 2) x 180, where n is the number of sides. For a pentagon (5 sides): (5 - 2) x 180 = 3 x 180 = 540.`},{id:344,category:`Sequences`,question:`What is the next number in the sequence? 3, 1, 4, 1, 5, 9, ...`,options:[`2`,`6`,`8`,`3`],correctIndex:0,explanation:`This sequence represents the digits of Pi (π): 3.141592... The next digit is 2.`},{id:345,category:`Sequences`,question:`What is the next letter in the sequence? Z, W, T, Q, ...`,options:[`M`,`N`,`O`,`P`],correctIndex:1,explanation:`The sequence skips backwards through the alphabet by three letters each time. Three letters before Q is N.`},{id:346,category:`Sequences`,question:`What is the next number in the sequence? 2, 12, 1112, 3112, 132112, ...`,options:[`1113122112`,`311312`,`211312`,`1113213211`],correctIndex:0,explanation:`This is a 'Look-and-Say' sequence starting with 2. '2' is read as 'one 2' (12). '12' is 'one 1, one 2' (1112). '132112' is read as 'one 1, one 3, one 2, two 1s, one 2', giving 1113122112.`},{id:347,category:`Science`,question:`What is the most abundant chemical element in the observable universe?`,options:[`Oxygen`,`Carbon`,`Hydrogen`,`Helium`],correctIndex:2,explanation:`Hydrogen is the lightest and most abundant element, making up roughly 75% of all normal matter in the universe.`},{id:348,category:`Science`,question:`In particle physics, what fundamental particle is responsible for carrying the electromagnetic force?`,options:[`Photon`,`Gluon`,`W Boson`,`Electron`],correctIndex:0,explanation:`Photons are the elementary particles (or gauge bosons) that act as the force carriers for the electromagnetic force, which includes light.`},{id:349,category:`Science`,question:`What is the scientific study of fungi and mushrooms called?`,options:[`Botany`,`Mycology`,`Entomology`,`Agronomy`],correctIndex:1,explanation:`Mycology is the branch of biology concerned with the study of fungi, including their genetic and biochemical properties.`},{id:350,category:`Geography`,question:`Which major river famously flows through and carved out the Grand Canyon?`,options:[`Colorado River`,`Mississippi River`,`Snake River`,`Rio Grande`],correctIndex:0,explanation:`The Colorado River has been carving the Grand Canyon over millions of years, exposing ancient geological strata.`},{id:351,category:`Geography`,question:`Which country currently holds the record for having the most ancient pyramids in the world?`,options:[`Egypt`,`Mexico`,`Sudan`,`Peru`],correctIndex:2,explanation:`While Egypt's are more famous, Sudan is home to around 255 pyramids built by the ancient Kingdom of Kush—nearly double the number in Egypt.`},{id:352,category:`Geography`,question:`Which of the following is the smallest US state by physical area?`,options:[`Delaware`,`Rhode Island`,`Connecticut`,`Hawaii`],correctIndex:1,explanation:`Rhode Island is the smallest state in the US, covering only about 1,214 square miles (including its territorial waters).`},{id:353,category:`Wordplay`,question:`What common English word starts and ends with the letters 'he'?`,options:[`Heache`,`Headache`,`Heartache`,`Heathe`],correctIndex:1,explanation:`The word HEadacHE begins with 'he' and ends with 'he'.`},{id:354,category:`Wordplay`,question:`Which of these palindromes means to apply a new layer of wall covering?`,options:[`Reviver`,`Repaper`,`Redder`,`Level`],correctIndex:1,explanation:`'Repaper' means to apply new wallpaper, and it reads exactly the same forwards and backwards.`},{id:355,category:`Wordplay`,question:`What word starts with a 'T', ends with a 'T', and literally has 'T' inside of it?`,options:[`Tent`,`Teapot`,`Target`,`Toast`],correctIndex:1,explanation:`A Teapot starts and ends with the letter T, and is filled with hot tea (T).`},{id:356,category:`Lateral Thinking`,question:`You see a boat filled with people on a lake, yet there isn't a single person on board. How is that possible?`,options:[`It's a ghost ship`,`Everyone on board is married`,`They are all animals`,`The boat has sunk`],correctIndex:1,explanation:`Every person on the boat is married, which means there are no 'single' (unmarried) people on board.`},{id:357,category:`Lateral Thinking`,question:`I have branches, but I have no fruit, no trunk, and no leaves. What am I?`,options:[`A bank`,`A shadow`,`A cloud`,`A painting`],correctIndex:0,explanation:`A financial bank has multiple branch locations, but it is not a tree.`},{id:358,category:`Lateral Thinking`,question:`What is so incredibly fragile that simply saying its name out loud breaks it?`,options:[`Glass`,`A promise`,`Silence`,`A secret`],correctIndex:2,explanation:`As soon as you make a noise by speaking the word 'silence', you have broken the silence.`},{id:359,category:`Human Body`,question:`What is the only muscle in the human body that never tires or gets fatigued?`,options:[`The Tongue`,`The Heart`,`The Diaphragm`,`The Masseter`],correctIndex:1,explanation:`The heart is made of specialized cardiac muscle tissue that has an incredibly high concentration of mitochondria, allowing it to beat continuously without fatigue.`},{id:360,category:`Human Body`,question:`What is the largest and strongest bone in the human face?`,options:[`Mandible`,`Maxilla`,`Zygomatic`,`Frontal`],correctIndex:0,explanation:`The mandible, or lower jawbone, is the largest, strongest, and only moving bone in the human skull.`},{id:361,category:`Human Body`,question:`Which of these internal organs is the only one capable of floating on water?`,options:[`Liver`,`Brain`,`Lungs`,`Kidneys`],correctIndex:2,explanation:`Even when exhaled, lungs retain a residual volume of air (about 1.2 liters) inside their millions of alveoli, making them less dense than water.`},{id:362,category:`Logic & Math`,question:`A girl has as many brothers as sisters, but each brother has only half as many brothers as sisters. How many brothers and sisters are there in the family?`,options:[`4 sisters, 3 brothers`,`3 sisters, 4 brothers`,`4 sisters, 4 brothers`,`5 sisters, 3 brothers`],correctIndex:0,explanation:`If there are 4 sisters and 3 brothers: Each sister has 3 sisters and 3 brothers (equal). Each brother has 2 brothers and 4 sisters (2 is half of 4).`},{id:363,category:`Logic & Math`,question:`Mary has four daughters, and each of her daughters has exactly one brother. How many children does Mary have in total?`,options:[`8`,`5`,`4`,`9`],correctIndex:1,explanation:`Mary has 5 children. The four daughters all share the same single brother.`},{id:364,category:`Logic & Math`,question:`A father is currently 3 times as old as his son. In 12 years, he will only be twice as old as his son. How old is the father now?`,options:[`45`,`30`,`36`,`42`],correctIndex:2,explanation:`Let the son's age be X and the father's be 3X. In 12 years: 3X + 12 = 2(X + 12). Solving this gives X = 12. Therefore, the father is currently 36.`},{id:365,category:`Sequences`,question:`What is the next letter in the sequence? A, C, F, J, O, ...`,options:[`T`,`V`,`W`,`U`],correctIndex:3,explanation:`The sequence skips forward through the alphabet by an increasing amount: +2 (C), +3 (F), +4 (J), +5 (O). Next is +6, which lands on U.`},{id:366,category:`Sequences`,question:`What is the next number in the sequence? 10, 9, 7, 4, 0, ...`,options:[`-4`,`-5`,`-1`,`-6`],correctIndex:1,explanation:`The difference between the numbers decreases by 1 each time (-1, -2, -3, -4). The next step is 0 - 5, which equals -5.`},{id:367,category:`Sequences`,question:`Find the next letter in the sequence: S, M, T, W, T, F, ...`,options:[`S`,`M`,`T`,`W`],correctIndex:0,explanation:`These are the first letters of the days of the week (Sunday, Monday, Tuesday...). The next day after Friday is Saturday (S).`},{id:368,category:`Science`,question:`What is the most abundant metal found in the Earth's crust?`,options:[`Iron`,`Calcium`,`Aluminum`,`Sodium`],correctIndex:2,explanation:`Aluminum is the most abundant metallic element in the Earth's crust, making up about 8% of its weight.`},{id:369,category:`Science`,question:`Which planet in our solar system is famous for having a prominent ring system made mostly of ice particles, rocky debris, and dust?`,options:[`Jupiter`,`Uranus`,`Neptune`,`Saturn`],correctIndex:3,explanation:`While other gas giants have faint rings, Saturn's ring system is the most extensive and visually spectacular in the solar system.`},{id:370,category:`Science`,question:`What state of matter is characterized by having a definite volume but no fixed shape?`,options:[`Liquid`,`Solid`,`Gas`,`Plasma`],correctIndex:0,explanation:`A liquid conforms to the shape of its container while retaining a constant volume, independent of pressure.`},{id:371,category:`Geography`,question:`Which mountain holds the title of being the tallest in North America?`,options:[`Mount Logan`,`Denali`,`Mount Elbert`,`Mount Whitney`],correctIndex:1,explanation:`Denali, located in Alaska and formerly known as Mount McKinley, is the highest mountain peak in North America.`},{id:372,category:`Geography`,question:`What is the capital city of Japan?`,options:[`Kyoto`,`Osaka`,`Tokyo`,`Seoul`],correctIndex:2,explanation:`Tokyo is the official capital and the most populous city in Japan.`},{id:373,category:`Geography`,question:`Which of the following countries does NOT share a land border with Germany?`,options:[`France`,`Poland`,`Denmark`,`Italy`],correctIndex:3,explanation:`Germany shares land borders with 9 countries, but Italy is separated from it by Switzerland and Austria.`},{id:374,category:`Wordplay`,question:`Which of the following English words contains five consecutive vowels?`,options:[`Beautiful`,`Queueing`,`Audio`,`Miaoued`],correctIndex:1,explanation:`The word 'Queueing' contains the five consecutive vowels u-e-u-e-i.`},{id:375,category:`Wordplay`,question:`I am a word of six letters. If you take away one letter, I become twelve. What word am I?`,options:[`Twelves`,`Scores`,`Dozens`,`Grosses`],correctIndex:2,explanation:`The word is 'Dozens'. If you remove the 's', it becomes 'Dozen', which is another word for twelve.`},{id:376,category:`Wordplay`,question:`What word famously contains all 26 letters?`,options:[`Dictionary`,`Encyclopedia`,`Pangram`,`Alphabet`],correctIndex:3,explanation:`The word 'Alphabet' literally refers to the set of all 26 letters used in the English language.`},{id:377,category:`Lateral Thinking`,question:`What is always coming, but never actually arrives?`,options:[`The future`,`Tomorrow`,`A train`,`Your paycheck`],correctIndex:1,explanation:`As soon as tomorrow arrives, it becomes 'today', meaning tomorrow is perpetually one day away.`},{id:378,category:`Lateral Thinking`,question:`What has a head and a tail, but no body?`,options:[`A coin`,`A snake`,`A comet`,`A river`],correctIndex:0,explanation:`A coin features a 'heads' side and a 'tails' side, but does not have a physical body.`},{id:379,category:`Lateral Thinking`,question:`David's parents have three sons: Snap, Crackle, and what is the name of the third son?`,options:[`Pop`,`John`,`Peter`,`David`],correctIndex:3,explanation:`The riddle states that they are *David's* parents, meaning David is one of the three sons.`},{id:380,category:`Human Body`,question:`What is the hardest biological substance found in the human body?`,options:[`Bone`,`Tooth enamel`,`Keratin`,`Cartilage`],correctIndex:1,explanation:`Tooth enamel is highly mineralized, making it the hardest and most highly mineralized substance in the human body.`},{id:381,category:`Human Body`,question:`Which organ produces bile to help break down and digest fats?`,options:[`Pancreas`,`Gallbladder`,`Liver`,`Stomach`],correctIndex:2,explanation:`The liver produces bile. The gallbladder only stores it and concentrates it until it is needed during digestion.`},{id:382,category:`Human Body`,question:`What is the formal anatomical name for the collarbone?`,options:[`Clavicle`,`Scapula`,`Sternum`,`Radius`],correctIndex:0,explanation:`The clavicle, or collarbone, is a long bone that serves as a strut between the shoulder blade and the sternum.`},{id:383,category:`Logic & Math`,question:`If a circle has a radius of 15 cm, what is its diameter?`,options:[`15 cm`,`30 cm`,`45 cm`,`7.5 cm`],correctIndex:1,explanation:`The diameter of a circle is simply twice the length of its radius. 15 x 2 = 30.`},{id:384,category:`Logic & Math`,question:`What is the absolute value of -42?`,options:[`-42`,`0`,`42`,`1`],correctIndex:2,explanation:`The absolute value of a number is its distance from zero on a number line, regardless of direction, so it is always positive.`},{id:385,category:`Logic & Math`,question:`If an equilateral triangle has a perimeter of 60 inches, what is the length of one side?`,options:[`30 inches`,`10 inches`,`20 inches`,`15 inches`],correctIndex:2,explanation:`An equilateral triangle has three equal sides. 60 divided by 3 is 20.`},{id:386,category:`Logic & Math`,question:`What is the principal square root of 144?`,options:[`10`,`12`,`14`,`16`],correctIndex:1,explanation:`12 multiplied by 12 equals 144.`},{id:387,category:`Logic & Math`,question:`What is 15% of 200?`,options:[`15`,`30`,`45`,`60`],correctIndex:1,explanation:`10% of 200 is 20. Half of that (5%) is 10. 20 + 10 = 30.`},{id:388,category:`Logic & Math`,question:`Solve the equation: 5 + 2 × 3 =`,options:[`21`,`10`,`11`,`30`],correctIndex:2,explanation:`Following the order of operations (PEMDAS/BODMAS), multiplication comes before addition. 2 × 3 = 6, and 5 + 6 = 11.`},{id:389,category:`Logic & Math`,question:`If x + 7 = 22, what is the value of x?`,options:[`14`,`15`,`16`,`17`],correctIndex:1,explanation:`Subtract 7 from both sides of the equation. 22 - 7 = 15.`},{id:390,category:`Logic & Math`,question:`How many degrees are in a right angle?`,options:[`45`,`90`,`180`,`360`],correctIndex:1,explanation:`A right angle is exactly a quarter of a full circle (360 degrees), which makes it 90 degrees.`},{id:391,category:`Logic & Math`,question:`If you roll a standard six-sided die, what is the probability of rolling a prime number?`,options:[`1/6`,`1/3`,`1/2`,`2/3`],correctIndex:2,explanation:`The prime numbers on a six-sided die are 2, 3, and 5. That's three out of six possible outcomes, or 1/2.`},{id:392,category:`Logic & Math`,question:`A clerk at a butcher shop is five feet ten inches tall and wears size 13 shoes. What does he weigh?`,options:[`180 lbs`,`200 lbs`,`Meat`,`150 lbs`],correctIndex:2,explanation:`It's a classic riddle disguised as math! He works at a butcher shop, so he weighs meat on a scale.`},{id:393,category:`Sequences`,question:`What is the next number in the sequence? 15, 30, 45, 60, ...`,options:[`70`,`75`,`80`,`90`],correctIndex:1,explanation:`The sequence adds 15 to the previous number. 60 + 15 = 75.`},{id:394,category:`Sequences`,question:`What is the next letter in the sequence? A, E, I, O, ...`,options:[`P`,`U`,`Y`,`W`],correctIndex:1,explanation:`This is the sequence of standard English vowels in alphabetical order. The next is U.`},{id:395,category:`Sequences`,question:`What is the next number in the sequence? 100, 81, 64, 49, ...`,options:[`25`,`30`,`36`,`42`],correctIndex:2,explanation:`These are perfect squares counting downwards: 10², 9², 8², 7². The next is 6², which is 36.`},{id:396,category:`Sequences`,question:`What comes next in the sequence? Monday, Wednesday, Friday, ...`,options:[`Saturday`,`Sunday`,`Tuesday`,`Thursday`],correctIndex:1,explanation:`The sequence skips one day of the week each time. The day after skipping Saturday is Sunday.`},{id:397,category:`Sequences`,question:`What is the next number in the sequence? 2, 3, 5, 8, 12, ...`,options:[`15`,`16`,`17`,`18`],correctIndex:2,explanation:`The difference between the numbers increases by 1 each time (+1, +2, +3, +4). The next step is +5. 12 + 5 = 17.`},{id:398,category:`Sequences`,question:`What comes next in the sequence? January, April, July, ...`,options:[`September`,`October`,`November`,`December`],correctIndex:1,explanation:`The sequence skips forward exactly three months each time. Three months after July is October.`},{id:399,category:`Sequences`,question:`What is the next numeral in the sequence? I, II, III, IV, V, ...`,options:[`X`,`VI`,`VII`,`IV`],correctIndex:1,explanation:`These are standard Roman numerals counting up from 1. The next numeral for 6 is VI.`},{id:400,category:`Sequences`,question:`What is the next number in the sequence? 3, -6, 12, -24, ...`,options:[`-48`,`36`,`48`,`-36`],correctIndex:2,explanation:`Each number is multiplied by -2 to get the next number in the sequence. -24 * -2 = 48.`},{id:401,category:`Sequences`,question:`What is the next letter in the sequence? B, C, D, F, G, ...`,options:[`H`,`I`,`J`,`E`],correctIndex:0,explanation:`This is a sequence of the English consonants in alphabetical order (skipping vowels). The next consonant after G is H.`},{id:402,category:`Sequences`,question:`What is the next number in the sequence? 1/2, 1/4, 1/8, 1/16, ...`,options:[`1/20`,`1/24`,`1/32`,`1/64`],correctIndex:2,explanation:`The denominator of the fraction doubles each time. 16 * 2 = 32, so the next fraction is 1/32.`},{id:403,category:`Science`,question:`What is the chemical symbol for the element Sodium?`,options:[`So`,`Sd`,`Na`,`Ni`],correctIndex:2,explanation:`The symbol Na comes from the Latin word 'natrium', which refers to a mineral salt containing sodium.`},{id:404,category:`Science`,question:`What is the primary gas that humans and other animals exhale during respiration?`,options:[`Oxygen`,`Nitrogen`,`Carbon Monoxide`,`Carbon Dioxide`],correctIndex:3,explanation:`During cellular respiration, cells use oxygen to break down glucose for energy, producing carbon dioxide as a waste product to be exhaled.`},{id:405,category:`Science`,question:`What is the dense, central core of an atom called?`,options:[`Proton`,`Nucleus`,`Electron cloud`,`Molecule`],correctIndex:1,explanation:`The nucleus is the small, dense region consisting of protons and neutrons at the center of an atom.`},{id:406,category:`Science`,question:`What is the boiling point of pure water on the Fahrenheit scale at sea level?`,options:[`100 degrees`,`212 degrees`,`32 degrees`,`180 degrees`],correctIndex:1,explanation:`Water boils at 100° Celsius, which is equivalent to exactly 212° Fahrenheit at standard atmospheric pressure.`},{id:407,category:`Science`,question:`Which planet is commonly referred to as the 'Red Planet'?`,options:[`Venus`,`Jupiter`,`Mars`,`Mercury`],correctIndex:2,explanation:`Mars is called the Red Planet because iron oxide (rust) on its surface gives it a reddish appearance.`},{id:408,category:`Science`,question:`What is the chemical formula for a standard molecule of water?`,options:[`CO2`,`H2O2`,`NaCl`,`H2O`],correctIndex:3,explanation:`A single water molecule is composed of two hydrogen atoms bonded to one oxygen atom (H2O).`},{id:409,category:`Science`,question:`What kind of energy is stored in a stretched rubber band?`,options:[`Kinetic energy`,`Thermal energy`,`Potential energy`,`Chemical energy`],correctIndex:2,explanation:`Elastic potential energy is stored when materials are stretched or compressed, waiting to be released as kinetic energy.`},{id:410,category:`Science`,question:`What layer of the Earth sits immediately below the crust?`,options:[`Inner core`,`Outer core`,`Mantle`,`Lithosphere`],correctIndex:2,explanation:`The mantle is the mostly solid bulk of Earth's interior that lies between the thin outer crust and the extremely hot core.`},{id:411,category:`Science`,question:`Biologically speaking, what classification of animal is a frog?`,options:[`Reptile`,`Amphibian`,`Mammal`,`Marsupial`],correctIndex:1,explanation:`Frogs are amphibians, a class of cold-blooded vertebrates that generally begin life in the water with gills before developing lungs.`},{id:412,category:`Science`,question:`What part of a plant primarily absorbs water and nutrients from the soil?`,options:[`Leaves`,`Stem`,`Roots`,`Flowers`],correctIndex:2,explanation:`The root system anchors the plant and absorbs essential water and dissolved minerals from the surrounding soil.`},{id:413,category:`Geography`,question:`What is the capital city of France?`,options:[`Lyon`,`Marseille`,`Paris`,`Nice`],correctIndex:2,explanation:`Paris is the capital and most populous city of France, located in the north-central part of the country.`},{id:414,category:`Geography`,question:`By land mass, what is the largest continent on Earth?`,options:[`Africa`,`North America`,`Europe`,`Asia`],correctIndex:3,explanation:`Asia is the largest continent, covering about 30% of Earth's total land area.`},{id:415,category:`Geography`,question:`Which major river flows through the Amazon Rainforest in South America?`,options:[`Nile River`,`Amazon River`,`Congo River`,`Mississippi River`],correctIndex:1,explanation:`The Amazon River is the largest river by discharge volume of water in the world, and it sustains the massive Amazon Rainforest.`},{id:416,category:`Geography`,question:`Which ocean borders the east coast of the United States?`,options:[`Pacific Ocean`,`Indian Ocean`,`Arctic Ocean`,`Atlantic Ocean`],correctIndex:3,explanation:`The Atlantic Ocean forms the entire eastern maritime border of the United States.`},{id:417,category:`Geography`,question:`In which country would you find the famous Taj Mahal?`,options:[`Pakistan`,`Bangladesh`,`India`,`Nepal`],correctIndex:2,explanation:`The Taj Mahal is an ivory-white marble mausoleum located on the right bank of the river Yamuna in the Indian city of Agra.`},{id:418,category:`Geography`,question:`Mount Everest is located within which major mountain range?`,options:[`The Alps`,`The Andes`,`The Himalayas`,`The Rockies`],correctIndex:2,explanation:`The Himalayas spread across several nations in Asia and contain the highest mountain peaks in the world, including Everest.`},{id:419,category:`Geography`,question:`Which country is famously known as the 'Land of the Rising Sun'?`,options:[`China`,`South Korea`,`Japan`,`Thailand`],correctIndex:2,explanation:`The name 'Japan' in Japanese (Nippon or Nihon) means 'sun origin', giving rise to the famous nickname.`},{id:420,category:`Geography`,question:`What is the longest river entirely located within the United States?`,options:[`Colorado River`,`Missouri River`,`Mississippi River`,`Ohio River`],correctIndex:1,explanation:`The Missouri River is slightly longer than the Mississippi River, flowing over 2,300 miles before joining the Mississippi.`},{id:421,category:`Geography`,question:`The Great Sphinx and the Pyramids of Giza are located in which African country?`,options:[`Morocco`,`Sudan`,`Libya`,`Egypt`],correctIndex:3,explanation:`These iconic ancient monuments are located on the Giza Plateau near modern-day Cairo, Egypt.`},{id:422,category:`Geography`,question:`The Great Barrier Reef, the world's largest coral reef system, is located off the coast of which country?`,options:[`New Zealand`,`Fiji`,`Indonesia`,`Australia`],correctIndex:3,explanation:`The Great Barrier Reef is located in the Coral Sea, off the coast of Queensland, Australia.`},{id:423,category:`Wordplay`,question:`What has to be broken before you can use it?`,options:[`A promise`,`An egg`,`A glass`,`A code`],correctIndex:1,explanation:`To use an egg for cooking or baking, you must first break the shell.`},{id:424,category:`Wordplay`,question:`I'm tall when I'm young, and I'm short when I'm old. What am I?`,options:[`A tree`,`A human`,`A mountain`,`A candle`],correctIndex:3,explanation:`A candle burns down over time, getting physically shorter the older (more used) it gets.`},{id:425,category:`Wordplay`,question:`What has hands but cannot clap?`,options:[`A clock`,`A statue`,`A monkey`,`A tree`],correctIndex:0,explanation:`A traditional analog clock has an hour hand, a minute hand, and sometimes a second hand, but it cannot clap.`},{id:426,category:`Wordplay`,question:`What has words, but never speaks?`,options:[`A mime`,`A parrot`,`A book`,`A sign language teacher`],correctIndex:2,explanation:`A book is filled entirely with words, but makes no sound of its own.`},{id:427,category:`Wordplay`,question:`What has a neck but no head?`,options:[`A shirt`,`A bottle`,`A giraffe`,`A guitar`],correctIndex:1,explanation:`The narrow part near the top of a bottle is called the neck, but it has no head attached.`},{id:428,category:`Wordplay`,question:`What has one eye, but can't see?`,options:[`A cyclops`,`A storm`,`A potato`,`A needle`],correctIndex:3,explanation:`The hole at the top of a sewing needle where the thread goes through is called the 'eye'.`},{id:429,category:`Wordplay`,question:`What belongs to you, but other people use it much more than you do?`,options:[`Your phone`,`Your money`,`Your name`,`Your car`],correctIndex:2,explanation:`Other people constantly use your name to get your attention or talk about you, while you rarely need to say your own name out loud.`},{id:430,category:`Wordplay`,question:`What has cities, but no houses; forests, but no trees; and water, but no fish?`,options:[`A dream`,`A painting`,`A map`,`A globe`],correctIndex:2,explanation:`A map is a visual representation of these places, so it shows cities, forests, and water without physically containing any real objects.`},{id:431,category:`Wordplay`,question:`Which letter of the alphabet has the most water?`,options:[`O`,`C`,`W`,`S`],correctIndex:1,explanation:`The letter 'C', because it is pronounced exactly like 'Sea'.`},{id:432,category:`Wordplay`,question:`What goes up but never comes down?`,options:[`A balloon`,`A satellite`,`Your age`,`A bird`],correctIndex:2,explanation:`As time passes, your age always increases (goes up) and can never go backwards.`},{id:433,category:`Lateral Thinking`,question:`I shave every day, but my beard stays exactly the same. What am I?`,options:[`A wizard`,`A bear`,`A barber`,`A mirror`],correctIndex:2,explanation:`A barber shaves other people's beards every day, leaving his own beard intact.`},{id:434,category:`Lateral Thinking`,question:`What can you easily catch, but never throw?`,options:[`A baseball`,`A cold`,`A fish`,`A frisbee`],correctIndex:1,explanation:`You can 'catch' a cold (become sick), but you cannot physically pick it up and throw it.`},{id:435,category:`Lateral Thinking`,question:`What goes up and down, but never actually moves from its spot?`,options:[`A yo-yo`,`An elevator`,`A staircase`,`A seesaw`],correctIndex:2,explanation:`A staircase allows you to go up and down, but the structure itself remains stationary.`},{id:436,category:`Lateral Thinking`,question:`Which room do ghosts actively avoid?`,options:[`The bedroom`,`The living room`,`The basement`,`The attic`],correctIndex:1,explanation:`Ghosts are dead, so they stay away from the 'living' room.`},{id:437,category:`Lateral Thinking`,question:`If two's company, and three's a crowd, what are four and five?`,options:[`A party`,`A mob`,`Nine`,`A dozen`],correctIndex:2,explanation:`It's a literal math question disguised as an idiom. Four plus five equals nine.`},{id:438,category:`Lateral Thinking`,question:`What has a thumb and four fingers, but is definitely not alive?`,options:[`A statue`,`A mannequin`,`A skeleton`,`A glove`],correctIndex:3,explanation:`A glove is shaped to fit a human hand, so it features a thumb and four finger slots, but is made of fabric or leather.`},{id:439,category:`Lateral Thinking`,question:`You walk into a room and see a rabbit holding a carrot, a pig eating slop, and a chimp holding a banana. Which animal in the room is the smartest?`,options:[`The chimp`,`The pig`,`The rabbit`,`You`],correctIndex:3,explanation:`Humans are animals too. Assuming you are the human who walked into the room, you are the smartest animal there.`},{id:440,category:`Lateral Thinking`,question:`What goes completely through cities and fields, but never moves an inch?`,options:[`The wind`,`A river`,`A train`,`A road`],correctIndex:3,explanation:`A road physically spans across long distances, passing through different areas, but the pavement itself is completely stationary.`},{id:441,category:`Lateral Thinking`,question:`What gets broken without ever being held or touched?`,options:[`A promise`,`A window`,`A heart`,`A record`],correctIndex:0,explanation:`A promise is an abstract concept. You can 'break' it by failing to keep your word, without ever touching anything.`},{id:442,category:`Lateral Thinking`,question:`What object has many teeth, but cannot bite you?`,options:[`A saw`,`A zipper`,`A comb`,`A gear`],correctIndex:2,explanation:`The prongs on a hair comb are referred to as 'teeth', but they are completely harmless.`},{id:443,category:`Human Body`,question:`What is the formal medical term for the kneecap?`,options:[`Tibia`,`Fibula`,`Patella`,`Meniscus`],correctIndex:2,explanation:`The patella is the thick, circular-triangular bone that articulates with the femur and covers and protects the front of the knee joint.`},{id:444,category:`Human Body`,question:`How many lungs does a healthy human body typically have?`,options:[`One`,`Two`,`Three`,`Four`],correctIndex:1,explanation:`Humans have two lungs, a right lung and a left lung. The right lung is slightly larger to make room for the heart on the left side.`},{id:445,category:`Human Body`,question:`What strong, fibrous tissues connect your muscles to your bones?`,options:[`Ligaments`,`Cartilage`,`Veins`,`Tendons`],correctIndex:3,explanation:`Tendons serve to move the bone or structure by transmitting the mechanical force of muscle contraction to the bones. (Ligaments connect bone to bone).`},{id:446,category:`Human Body`,question:`Which specific sense is most closely linked to the olfactory bulb in the brain?`,options:[`Taste`,`Sight`,`Smell`,`Hearing`],correctIndex:2,explanation:`The olfactory bulb is a neural structure of the vertebrate forebrain involved in olfaction, which is the sense of smell.`},{id:447,category:`Human Body`,question:`Where in the human body are the metatarsal bones located?`,options:[`The hand`,`The spine`,`The foot`,`The skull`],correctIndex:2,explanation:`The metatarsal bones are a group of five long bones in the foot, located between the tarsal bones of the hind- and mid-foot and the phalanges of the toes.`},{id:448,category:`Human Body`,question:`Which specific teeth in the human mouth are sharpest and primarily used for tearing food?`,options:[`Molars`,`Incisors`,`Premolars`,`Canines`],correctIndex:3,explanation:`The canines are the slightly pointed teeth situated on either side of the incisors, uniquely shaped to grip and tear food.`},{id:449,category:`Human Body`,question:`What is the name of the muscular tube that connects the throat to the stomach?`,options:[`Trachea`,`Esophagus`,`Intestine`,`Larynx`],correctIndex:1,explanation:`The esophagus is the hollow tube that transports food and liquids from the pharynx to the stomach using rhythmic muscle contractions.`},{id:450,category:`Human Body`,question:`The carpal bones are found in which specific part of the human body?`,options:[`Ankle`,`Knee`,`Wrist`,`Shoulder`],correctIndex:2,explanation:`The carpal bones are the eight small bones that make up the wrist (or carpus) that connects the hand to the forearm.`},{id:451,category:`Human Body`,question:`What anatomical type of joint is the human elbow?`,options:[`Ball and socket joint`,`Hinge joint`,`Pivot joint`,`Gliding joint`],correctIndex:1,explanation:`The elbow is a hinge joint, meaning it functions much like the hinge on a door, allowing movement in primarily one plane (bending and straightening).`},{id:452,category:`Human Body`,question:`What is the soft, spongy tissue found in the very center of most large bones called?`,options:[`Marrow`,`Cartilage`,`Plasma`,`Synovium`],correctIndex:0,explanation:`Bone marrow is the flexible tissue in the interior of bones. It produces red blood cells, white blood cells, and platelets.`},{id:453,category:`Logic & Math`,question:`How many sides does a standard nonagon have?`,options:[`7`,`9`,`11`,`12`],correctIndex:1,explanation:`A nonagon (also known as an enneagon) is a polygon with exactly 9 sides and 9 angles.`},{id:454,category:`Logic & Math`,question:`What is the sum of the interior angles of a standard triangle?`,options:[`90 degrees`,`180 degrees`,`360 degrees`,`270 degrees`],correctIndex:1,explanation:`Regardless of the type of triangle (right, equilateral, isosceles), the sum of its internal angles always equals exactly 180 degrees.`},{id:455,category:`Logic & Math`,question:`If a train travels at a constant speed of 60 miles per hour for 2.5 hours, how far does it travel?`,options:[`120 miles`,`150 miles`,`180 miles`,`200 miles`],correctIndex:1,explanation:`Distance equals speed multiplied by time. 60 mph multiplied by 2.5 hours equals 150 miles.`},{id:456,category:`Logic & Math`,question:`What is the value of 2 to the power of 5?`,options:[`10`,`16`,`25`,`32`],correctIndex:3,explanation:`2 multiplied by itself 5 times (2 x 2 x 2 x 2 x 2) equals 32.`},{id:457,category:`Logic & Math`,question:`What is the only even prime number in mathematics?`,options:[`0`,`2`,`4`,`There are no even prime numbers`],correctIndex:1,explanation:`A prime number is only divisible by 1 and itself. 2 is the only even number that meets this criteria; all other even numbers are divisible by 2.`},{id:458,category:`Logic & Math`,question:`If a dozen eggs cost $3.00, how much do exactly 4 eggs cost?`,options:[`$1.00`,`$0.50`,`$1.50`,`$0.75`],correctIndex:0,explanation:`A dozen is 12. If 12 eggs cost $3.00, each egg costs $0.25. Therefore, 4 eggs cost exactly $1.00.`},{id:459,category:`Logic & Math`,question:`What is the principal square root of 225?`,options:[`15`,`25`,`12`,`35`],correctIndex:0,explanation:`15 multiplied by 15 equals 225.`},{id:460,category:`Logic & Math`,question:`A rectangle has a length of 10 units and a width of 5 units. What is its area?`,options:[`15 square units`,`30 square units`,`50 square units`,`100 square units`],correctIndex:2,explanation:`The area of a rectangle is found by multiplying its length by its width. 10 x 5 = 50.`},{id:461,category:`Logic & Math`,question:`Solve the equation: 10 + 10 × 0 + 10 =`,options:[`0`,`20`,`10`,`100`],correctIndex:1,explanation:`According to the order of operations, multiplication comes first. 10 x 0 = 0. Then add the remaining numbers: 10 + 0 + 10 = 20.`},{id:462,category:`Logic & Math`,question:`If you have a square room that is 12 feet long on one side, what is the perimeter of the room?`,options:[`24 feet`,`36 feet`,`48 feet`,`144 feet`],correctIndex:2,explanation:`A square has four equal sides. 12 feet multiplied by 4 sides equals a perimeter of 48 feet.`},{id:463,category:`Sequences`,question:`What is the next number in the sequence? 3, 9, 27, 81, ...`,options:[`162`,`243`,`100`,`324`],correctIndex:1,explanation:`Each number in the sequence is multiplied by 3 (powers of 3). 81 x 3 = 243.`},{id:464,category:`Sequences`,question:`What is the next number in the sequence? 5, 11, 17, 23, ...`,options:[`28`,`29`,`30`,`31`],correctIndex:1,explanation:`The sequence adds exactly 6 to the previous number each time. 23 + 6 = 29.`},{id:465,category:`Sequences`,question:`What is the next number in the sequence? 100, 90, 81, 73, ...`,options:[`64`,`65`,`66`,`67`],correctIndex:2,explanation:`The difference between the numbers decreases by 1 each time (-10, -9, -8). The next step is to subtract 7. 73 - 7 = 66.`},{id:466,category:`Sequences`,question:`What is the next letter in the sequence? O, N, E, T, W, O, T, H, R, E, ...`,options:[`F`,`S`,`E`,`T`],correctIndex:2,explanation:`These are the letters that spell out the numbers 'ONE', 'TWO', 'THREE'. The next letter needed to finish spelling 'THREE' is 'E'.`},{id:467,category:`Sequences`,question:`What is the next number in the sequence? 2, 5, 10, 17, 26, ...`,options:[`35`,`37`,`39`,`41`],correctIndex:1,explanation:`The sequence represents perfect squares plus one (1²+1, 2²+1, 3²+1). The next is 6² + 1, which equals 37.`},{id:468,category:`Sequences`,question:`What is the next letter in the sequence? V, I, B, G, Y, O, ...`,options:[`R`,`P`,`W`,`B`],correctIndex:0,explanation:`These are the first letters of the colors of the rainbow (visible spectrum) in reverse order (Violet, Indigo, Blue...). The last is Red (R).`},{id:469,category:`Sequences`,question:`What is the next number in the sequence? 4, 16, 36, 64, 100, ...`,options:[`121`,`128`,`144`,`196`],correctIndex:2,explanation:`These are the perfect squares of consecutive even numbers (2², 4², 6², 8², 10²). The next is 12², which is 144.`},{id:470,category:`Sequences`,question:`What is the next letter in the sequence? Z, X, V, T, R, ...`,options:[`P`,`Q`,`O`,`N`],correctIndex:0,explanation:`The sequence skips backwards through the alphabet, jumping over one letter each time. Skipping 'Q' leaves 'P'.`},{id:471,category:`Sequences`,question:`What is the next number in the sequence? 1, 8, 27, 64, 125, ...`,options:[`216`,`196`,`256`,`144`],correctIndex:0,explanation:`These are the cubes of consecutive integers (1³, 2³, 3³, 4³, 5³). The next is 6³, which equals 216.`},{id:472,category:`Sequences`,question:`What comes next in the sequence? First, Second, Third, ...`,options:[`Fifth`,`Fourth`,`Quarter`,`End`],correctIndex:1,explanation:`These are ordinal numbers counting up sequentially. The next in line is Fourth.`},{id:473,category:`Science`,question:`What is the softest mineral recognized on the Mohs hardness scale?`,options:[`Gypsum`,`Talc`,`Calcite`,`Quartz`],correctIndex:1,explanation:`Talc is the softest mineral on the Mohs scale, sitting at a rating of 1. It is so soft it can be easily scratched by a fingernail.`},{id:474,category:`Science`,question:`What is the chemical symbol for the element Iron?`,options:[`Ir`,`In`,`Fe`,`I`],correctIndex:2,explanation:`The symbol Fe comes from the Latin word for iron, 'ferrum'.`},{id:475,category:`Science`,question:`What element makes up the vast majority of the mass of our Sun?`,options:[`Helium`,`Oxygen`,`Carbon`,`Hydrogen`],correctIndex:3,explanation:`The Sun is composed of roughly 73% hydrogen, which it fuses into helium in its core to generate energy.`},{id:476,category:`Science`,question:`What part of a biological cell contains the majority of the organism's genetic material (DNA)?`,options:[`Mitochondria`,`Cytoplasm`,`Nucleus`,`Ribosome`],correctIndex:2,explanation:`The cell nucleus acts as the control center of the cell, housing the chromosomes and genetic information.`},{id:477,category:`Science`,question:`What is the scientific study of the atmosphere and weather called?`,options:[`Geology`,`Meteorology`,`Astronomy`,`Ecology`],correctIndex:1,explanation:`Meteorology is the branch of atmospheric sciences that focuses on weather processes and forecasting.`},{id:478,category:`Science`,question:`Which planet is the closest to the Sun in our solar system?`,options:[`Venus`,`Mars`,`Earth`,`Mercury`],correctIndex:3,explanation:`Mercury is the innermost and smallest planet in the solar system, orbiting the Sun tighter and faster than any other planet.`},{id:479,category:`Science`,question:`What is the freezing point of water on the Kelvin temperature scale?`,options:[`0 K`,`100 K`,`273.15 K`,`32 K`],correctIndex:2,explanation:`Water freezes at 0° Celsius, which converts to exactly 273.15 Kelvin.`},{id:480,category:`Science`,question:`What is the primary green pigment found in plants that is essential for photosynthesis?`,options:[`Carotene`,`Anthocyanin`,`Chlorophyll`,`Melanin`],correctIndex:2,explanation:`Chlorophyll absorbs light energy, primarily in the blue and red wavelengths, and reflects green light, giving plants their characteristic color.`},{id:481,category:`Science`,question:`Which subatomic particle carries a positive electrical charge?`,options:[`Electron`,`Neutron`,`Proton`,`Photon`],correctIndex:2,explanation:`Protons carry a positive electrical charge, electrons are negative, and neutrons have no charge.`},{id:482,category:`Science`,question:`What type of eclipse occurs when the Moon passes directly between the Earth and the Sun?`,options:[`Lunar eclipse`,`Solar eclipse`,`Annular eclipse`,`Total planetary eclipse`],correctIndex:1,explanation:`A solar eclipse happens when the Moon obscures the Sun, casting a shadow on the Earth.`},{id:483,category:`Geography`,question:`What is the capital city of Italy?`,options:[`Milan`,`Venice`,`Florence`,`Rome`],correctIndex:3,explanation:`Rome is the capital and most populous city in Italy, located in the central-western portion of the Italian Peninsula.`},{id:484,category:`Geography`,question:`Which of the world's oceans is the largest by surface area?`,options:[`Atlantic Ocean`,`Indian Ocean`,`Pacific Ocean`,`Southern Ocean`],correctIndex:2,explanation:`The Pacific Ocean is the largest and deepest of Earth's oceanic divisions, covering more than 30% of the Earth's surface.`},{id:485,category:`Geography`,question:`Which country is romantically referred to as the 'Emerald Isle'?`,options:[`Scotland`,`Ireland`,`New Zealand`,`Iceland`],correctIndex:1,explanation:`Ireland is known as the Emerald Isle because of its famously lush, green, rolling landscapes.`},{id:486,category:`Geography`,question:`In which city would you find the ancient ruins of the Colosseum?`,options:[`Athens`,`Rome`,`Cairo`,`Istanbul`],correctIndex:1,explanation:`The Colosseum, an iconic ancient amphitheater, is situated in the center of the city of Rome, Italy.`},{id:487,category:`Geography`,question:`What is the longest river entirely in Europe?`,options:[`Danube`,`Rhine`,`Volga`,`Seine`],correctIndex:2,explanation:`The Volga River flows entirely within Russia and is the longest river in Europe, discharging into the Caspian Sea.`},{id:488,category:`Geography`,question:`Which US state is the largest by total land area?`,options:[`Texas`,`California`,`Montana`,`Alaska`],correctIndex:3,explanation:`Alaska is overwhelmingly the largest US state by area, more than twice the size of Texas, the second-largest.`},{id:489,category:`Geography`,question:`As of 2023, which country has the highest human population in the world?`,options:[`China`,`India`,`United States`,`Indonesia`],correctIndex:1,explanation:`In 2023, India officially surpassed China to become the most populous country on Earth.`},{id:490,category:`Geography`,question:`The Andes mountain range is located on which continent?`,options:[`North America`,`Europe`,`South America`,`Asia`],correctIndex:2,explanation:`The Andes is the longest continental mountain range in the world, stretching continuously along the western edge of South America.`},{id:491,category:`Geography`,question:`What is the capital city of Brazil?`,options:[`Rio de Janeiro`,`São Paulo`,`Brasília`,`Salvador`],correctIndex:2,explanation:`Brasília was meticulously planned and built from scratch in the 1950s to serve as the new, centrally located capital of Brazil.`},{id:492,category:`Geography`,question:`Which massive desert covers a large portion of northern Africa?`,options:[`The Gobi Desert`,`The Kalahari Desert`,`The Sahara Desert`,`The Mojave Desert`],correctIndex:2,explanation:`The Sahara is the largest hot desert in the world, spanning across several countries in North Africa.`},{id:493,category:`Wordplay`,question:`What word contains 26 letters, but only has three syllables?`,options:[`Encyclopedia`,`Alphabet`,`Pangram`,`Dictionary`],correctIndex:1,explanation:`The word 'Alphabet' literally represents all 26 letters of the English language.`},{id:494,category:`Wordplay`,question:`What starts with a 'P', ends with an 'E', and has thousands of letters?`,options:[`Post Office`,`Pipeline`,`Plane`,`Parachute`],correctIndex:0,explanation:`A physical Post Office is filled with thousands of pieces of mail (letters).`},{id:495,category:`Wordplay`,question:`What comes once in a minute, twice in a moment, but never in a thousand years?`,options:[`The letter M`,`A breath`,`A blink`,`A thought`],correctIndex:0,explanation:`The physical letter 'M' appears once in the word 'minute' and twice in the word 'moment'.`},{id:496,category:`Wordplay`,question:`What occurs once in a year, twice in a week, but never in a day?`,options:[`A leap year`,`The letter E`,`A full moon`,`A weekend`],correctIndex:1,explanation:`The physical letter 'E' appears once in the word 'year' and twice in the word 'week'.`},{id:497,category:`Wordplay`,question:`Forward I am heavy, but backward I am not. What am I?`,options:[`A ton`,`A boulder`,`A shadow`,`A scale`],correctIndex:0,explanation:`The word 'Ton' (a heavy measurement) spelled backwards is 'Not'.`},{id:498,category:`Wordplay`,question:`What 9-letter word remains a valid English word as you remove its letters one by one, all the way down to a single letter?`,options:[`Startling`,`Cleansers`,`Splitting`,`Breathed`],correctIndex:0,explanation:`Startling -> Starting -> Staring -> String -> Sting -> Sing -> Sin -> In -> I.`},{id:499,category:`Wordplay`,question:`Which jumping insect shares its name with a popular international sport?`,options:[`Grasshopper`,`Locust`,`Cricket`,`Flea`],correctIndex:2,explanation:`Cricket is a wildly popular bat-and-ball sport, and also a chirping insect.`},{id:500,category:`Wordplay`,question:`What common English word contains six consecutive consonants?`,options:[`Catchphrase`,`Rhythms`,`Strengths`,`Knights`],correctIndex:0,explanation:`The word 'Catchphrase' contains the consonant sequence T-C-H-P-H-R right in the middle.`},{id:501,category:`Wordplay`,question:`Which 11-letter word begins and ends with the letters 'und'?`,options:[`Underground`,`Undisclosed`,`Understand`,`Underfunded`],correctIndex:0,explanation:`The word UNDergroUND begins and ends with the exact same three letters.`},{id:502,category:`Wordplay`,question:`Which of the following phrases is a perfect anagram of 'ASTRONOMER'?`,options:[`Moon starer`,`Star room`,`To roam near`,`No more stars`],correctIndex:0,explanation:`If you rearrange the letters in 'ASTRONOMER', you can perfectly spell 'MOON STARER'.`},{id:503,category:`Lateral Thinking`,question:`What has many keys, but cannot open a single lock?`,options:[`A map`,`A piano`,`A keyboard`,`All of the above`],correctIndex:3,explanation:`A map has a legend (key), a piano has musical keys, and a computer keyboard has typing keys—none of which open physical locks.`},{id:504,category:`Lateral Thinking`,question:`What can quickly fill an entire room, but takes up absolutely no physical space?`,options:[`Smoke`,`Water`,`Light`,`Dust`],correctIndex:2,explanation:`Light (or sound) can fill a room completely without displacing any physical space or volume.`},{id:505,category:`Lateral Thinking`,question:`I am weightless, but if you put me in a bucket, I make the bucket lighter. What am I?`,options:[`Helium`,`A hole`,`A sponge`,`Air`],correctIndex:1,explanation:`If you put a hole in a bucket, whatever is inside it leaks out, making the bucket lighter.`},{id:506,category:`Lateral Thinking`,question:`What has exactly 13 hearts, but has no other organs?`,options:[`A deck of cards`,`A hospital`,`An octopus`,`A valentine box`],correctIndex:0,explanation:`A standard deck of playing cards contains exactly 13 cards in the suit of Hearts.`},{id:507,category:`Lateral Thinking`,question:`I fly without wings, and I cry without eyes. What am I?`,options:[`A cloud`,`A ghost`,`The wind`,`A bat`],correctIndex:0,explanation:`A cloud 'flies' through the sky without wings, and it 'cries' by raining.`},{id:508,category:`Lateral Thinking`,question:`The person who makes it has no need for it. The person who buys it has no use for it. The person who uses it can neither see nor feel it. What is it?`,options:[`A coffin`,`A secret`,`Poison`,`A will`],correctIndex:0,explanation:`A coffin is built by a tradesman, bought by a grieving family, and used by someone who has passed away.`},{id:509,category:`Lateral Thinking`,question:`What has one head, one foot, and four legs?`,options:[`A bed`,`A table`,`A mutant dog`,`A chair`],correctIndex:0,explanation:`A bed has a headboard (head), a footboard (foot), and sits on four legs.`},{id:510,category:`Lateral Thinking`,question:`What runs completely around the perimeter of a yard, but never actually moves?`,options:[`A dog`,`A lawnmower`,`A fence`,`The grass`],correctIndex:2,explanation:`A fence is built to 'run' around the boundary of a yard, but it is a stationary structure.`},{id:511,category:`Lateral Thinking`,question:`If you drop me I'm sure to crack, but give me a smile and I'll always smile back. What am I?`,options:[`An egg`,`A mirror`,`A friend`,`A camera`],correctIndex:1,explanation:`A mirror is fragile and will crack if dropped, but it perfectly reflects whatever is in front of it, including a smile.`},{id:512,category:`Lateral Thinking`,question:`What naturally has many rings, but no fingers?`,options:[`A tree`,`A telephone`,`Saturn`,`A circus`],correctIndex:0,explanation:`As a tree grows, it forms a new layer of wood each year, creating internal rings that can be counted to determine its age.`},{id:513,category:`Human Body`,question:`What is the most abundant structural protein found in human skin, bones, and connective tissues?`,options:[`Keratin`,`Elastin`,`Collagen`,`Myosin`],correctIndex:2,explanation:`Collagen makes up roughly 30% of the body's protein, providing structure, strength, and support throughout the body.`},{id:514,category:`Human Body`,question:`What type of large blood vessel is responsible for carrying oxygen-rich blood away from the heart to the rest of the body?`,options:[`Veins`,`Arteries`,`Capillaries`,`Ventricles`],correctIndex:1,explanation:`Arteries carry oxygenated blood away from the heart, while veins generally carry deoxygenated blood back to it.`},{id:515,category:`Human Body`,question:`What is the medical and scientific term for the human windpipe?`,options:[`Larynx`,`Esophagus`,`Pharynx`,`Trachea`],correctIndex:3,explanation:`The trachea is the cartilaginous tube that connects the larynx to the bronchi of the lungs, allowing the passage of air.`},{id:516,category:`Human Body`,question:`How many pairs of ribs are found in a typical adult human rib cage?`,options:[`10`,`12`,`14`,`24`],correctIndex:1,explanation:`The typical human rib cage consists of 12 pairs of ribs (24 individual ribs in total) that protect the heart and lungs.`},{id:517,category:`Human Body`,question:`What is the yellowish, liquid component of blood that holds the blood cells in whole blood in suspension?`,options:[`Plasma`,`Lymph`,`Serum`,`Hemoglobin`],correctIndex:0,explanation:`Blood plasma makes up about 55% of the body's total blood volume and is mostly water, along with proteins, salts, and lipids.`},{id:518,category:`Human Body`,question:`What is the thickest and strongest tendon in the human body?`,options:[`Patellar tendon`,`Achilles tendon`,`Biceps tendon`,`Rotator cuff`],correct
