<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ─── PlayFab ──────────────────────────────────────────────────────────────────
const TITLE_ID = '1EA45F';
const BASE     = `https://${TITLE_ID}.playfabapi.com`;
const QUEUE    = 'ShiftPvP';

let _sess = null, _eToken = null, _eId = null, _pfId = null;

const pf = async (path, body, auth = 'session') => {
  const h = { 'Content-Type': 'application/json' };
  if (auth === 'session' && _sess)   h['X-Authorization'] = _sess;
  if (auth === 'entity'  && _eToken) h['X-EntityToken']   = _eToken;
  try {
    const r = await fetch(BASE + path, { method: 'POST', headers: h, body: JSON.stringify(body) });
    const j = await r.json();
    return j.code === 200 ? { ok: true, data: j.data } : { ok: false, error: j.errorMessage || `err ${j.code}` };
  } catch(e) { return { ok: false, error: e.message }; }
};

const deviceId = () => {
  let id = localStorage.getItem('shift_device_id');
  if (!id) { id = crypto.randomUUID(); localStorage.setItem('shift_device_id', id); }
  return id;
};

const pfLogin = async () => {
  const r = await pf('/Client/LoginWithCustomID', {
    TitleId: TITLE_ID, CustomId: deviceId(), CreateAccount: true,
    InfoRequestParameters: { GetUserAccountInfo: true, GetPlayerProfile: true },
  }, 'none');
  if (r.ok) {
    _sess   = r.data.SessionTicket;
    _eToken = r.data.EntityToken.EntityToken;
    _eId    = r.data.EntityToken.Entity.Id;
    _pfId   = r.data.PlayFabId;
  }
  return r;
};

const pfSetName    = n  => pf('/Client/UpdateUserTitleDisplayName', { DisplayName: n });
const pfSubmit     = v  => pf('/Client/UpdatePlayerStatistics', { Statistics: [{ StatisticName: 'DailyScore', Value: Math.round(v * 10000) }] });
const pfBoard      = () => pf('/Client/GetLeaderboard', { StatisticName: 'DailyScore', StartPosition: 0, MaxResultsCount: 15, ProfileConstraints: { ShowDisplayName: true } });
const pfMyRank     = () => pf('/Client/GetLeaderboardAroundPlayer', { StatisticName: 'DailyScore', MaxResultsCount: 3, ProfileConstraints: { ShowDisplayName: true } });
const pfCreateTix  = () => pf('/Match/CreateMatchmakingTicket', { Creator: { Entity: { Id: _eId, Type: 'title_player_account' } }, GiveUpAfterSeconds: 120, QueueName: QUEUE }, 'entity');
const pfPollTix    = id => pf('/Match/GetMatchmakingTicket', { TicketId: id, QueueName: QUEUE, EscapeObject: false }, 'entity');
const pfGetMatch   = id => pf('/Match/GetMatch', { MatchId: id, QueueName: QUEUE, EscapeObject: false, ReturnMemberAttributes: false }, 'entity');
const pfCancelTix  = () => pf('/Match/CancelAllMatchmakingTicketsForPlayer', { QueueName: QUEUE, Entity: { Id: _eId, Type: 'title_player_account' } }, 'entity');
const pfWriteSetup = (mid, seed)     => pf('/Client/UpdateUserData', { Data: { [`match_${mid}_setup`]: JSON.stringify({ seed }) }, Permission: 'Public' });
const pfWriteRound = (mid, ri, sc)   => pf('/Client/UpdateUserData', { Data: { [`match_${mid}_r${ri}`]: JSON.stringify({ score: sc }) }, Permission: 'Public' });
const pfReadOpp    = async (oppId, key) => {
  const r = await pf('/Client/GetUserPublicData', { PlayFabId: oppId, Keys: [key] });
  if (!r.ok) return r;
  const raw = r.data.Data?.[key]?.Value;
  return { ok: true, data: raw ? JSON.parse(raw) : null };
};

// ─── Puzzle ───────────────────────────────────────────────────────────────────
const mulberry32 = seed => {
  let s = seed;
  return () => {
    s |= 0; s = (s + 0x6D2B79F5) | 0;
    let t = Math.imul(s ^ (s >>> 15), 1 | s);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
};

const shuffle = (arr, rng = Math.random) => {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
};

function _genOnce(n, rng) {
  let cur = Math.floor(rng() * 10) + 1;
  const start = cur, ops = [];
  for (let i = 0; i < n; i++) {
    let valid = false, t, op, sym, tries = 0;
    while (!valid && tries++ < 50) {
      t = Math.floor(rng() * 4);
      if (t === 0) { op = Math.floor(rng()*12)+1; sym='+'; cur+=op; valid=true; }
      else if (t===1) { op=Math.floor(rng()*12)+1; sym='-'; cur-=op; valid=true; }
      else if (t===2 && Math.abs(cur)<60) { op=Math.floor(rng()*3)+2; sym='×'; cur*=op; valid=true; }
      else if (t===3) { op=Math.floor(rng()*4)+2; if(cur!==0&&cur%op===0){ sym='÷'; cur/=op; valid=true; } }
    }
    if (!valid) { op=Math.floor(rng()*10)+1; sym='+'; cur+=op; }
    const v=op;
    ops.push({ id:`op${i}`, label:`${sym} ${v}`, symbol:sym, val:v, type:sym, expectedIndex:i,
      fn: sym==='+'?x=>x+v:sym==='-'?x=>x-v:sym==='×'?x=>x*v:x=>x/v });
  }
  return { start, target: cur, ops };
}

const genPuzzle = (n, rng = Math.random) => {
  for (let a = 0; a < 20; a++) {
    const p = _genOnce(n, rng);
    if (p.ops.some(o=>o.type==='×'||o.type==='÷') && p.ops.some(o=>o.type==='+'||o.type==='-')) return p;
  }
  return _genOnce(n, rng);
};

const maxT  = n => n * 10 - 10;
const scoreR = (applied, val, target, tLeft, mT) => {
  const c = applied.filter((o,i)=>o.expectedIndex===i).length;
  return val===target ? { score: Math.max(100, Math.floor(1000*(tLeft/mT))), perfect:true, correct:c, timedOut:false }
                      : { score: c*125, perfect:false, correct:c, timedOut:false };
};
const scoreTO = applied => {
  const c = applied.filter((o,i)=>o.expectedIndex===i).length;
  return { score:c*125, perfect:false, correct:c, timedOut:true };
};

// ─── Daily ────────────────────────────────────────────────────────────────────
const dailySeed    = () => { const d=new Date(); return d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate(); };
const dailyPuzzles = () => { const rng=mulberry32(dailySeed()); return [0,1,2].map(()=>genPuzzle(4,rng)); };
const dailyKey     = () => { const d=new Date(); return `shift_daily_${d.getFullYear()}_${d.getMonth()+1}_${d.getDate()}`; };
const todayLabel   = () => new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});

// ─── Names / Ghost ────────────────────────────────────────────────────────────
const ADJS  = ['Swift','Clever','Bold','Keen','Sharp','Bright','Quick','Smart','Nimble','Savvy'];
const NOUNS = ['Fox','Eagle','Wolf','Bear','Hawk','Owl','Lynx','Puma','Viper','Tiger'];
const randName  = () => ADJS[Math.floor(Math.random()*10)]+NOUNS[Math.floor(Math.random()*10)];
const GHOSTS    = ['AlgebraBot','NumericNick','CalcQueen','TheoremX','PrimeTime','DeltaForce','SigmaShift','MathWizard','FactorBot','RootRaider'];
const ghostSc   = () => { const r=Math.random(); return r<.07?0:r<.17?250+r*100:r<.4?350+r*200:r<.75?550+r*250:r<.93?800+r*150:950+r*50; };

// ─── Lines (from GAME_LINES.md) ───────────────────────────────────────────────
const LINES = {
  idle:     ['"don\'t mess up. i\'m watching."','"tick tock, math brain."','"you\'ve got this. probably."','"looking at you. no pressure."','"go on then."'],
  mid:      ['"okay big brain..."','"i guess that works..."','"suspicious move..."','"bold choice."','"hm. we\'ll see."','"interesting strategy."','"really?"','"sure, why not."','"that\'s one way to do it."','"i\'m not judging. (i\'m judging.)"'],
  decimal:  ['"decimals? gross."','"oh no. fractions."','"things just got messy."','"eww. a decimal."'],
  negative: ['"into the negative zone we go..."','"below zero. risky move."','"negative energy detected."','"oh we\'re going negative. brave."'],
  wayoff:   ['"you are so far away it hurts."','"where are you going?"','"bold detour."','"this is a very scenic route."','"target? what target?"'],
  perfect:  ['"bingo bango. you did it."','"correct. don\'t get cocky."','"well well well."','"i didn\'t think you had it in you."','"nailed it. annoying."','"okay fine. that was good."','"perfect. i\'m almost proud."'],
  partial:  ['"wrong. but {n} in the right spot, so i pity u."','"not quite. {n} right though."','"partial credit. very partial."','"almost. but almost doesn\'t count here."'],
  zero:     ['"absolute trash fire of a calculation."','"zero correct. zero."','"not a single one. wow."','"did you even try?"','"spectacular failure. truly."'],
  toPartial:['"too slow. but {n} right — i\'ll allow it."','"time\'s up. {n} correct though."','"bzzt. time. but {n} weren\'t bad."'],
  toZero:   ['"bzzzt. time is up."','"time\'s up. and nothing right. rough combo."','"zero and out of time. double loss."','"the clock killed you AND you were wrong."'],
};
const pick = (cat, vars = {}) => {
  let s = LINES[cat][Math.floor(Math.random()*LINES[cat].length)];
  for (const [k,v] of Object.entries(vars)) s = s.replace(`{${k}}`, v);
  return s;
};

// ─── Colours ──────────────────────────────────────────────────────────────────
const BC  = ['#dcf0e5','#e8e4f2','#f7dfd6'];
const BR  = ['-0.5deg','0.5deg','1deg'];

// ─── AnimScore ────────────────────────────────────────────────────────────────
function AnimScore({ target, dur = 1000 }) {
  const [v, setV] = useState(0);
  useEffect(() => {
    const t0 = Date.now(); let raf;
    const tick = () => {
      const p = Math.min(1,(Date.now()-t0)/dur);
      setV((1-Math.pow(1-p,3))*target);
      if (p < 1) raf = requestAnimationFrame(tick); else setV(target);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [target]);
  return <>{Math.round(v)}</>;
}

// ─── Countdown ────────────────────────────────────────────────────────────────
function Countdown({ onDone }) {
  const [n, setN] = useState(3);
  useEffect(() => {
    if (n <= 0) { onDone(); return; }
    const t = setTimeout(() => setN(n-1), 800);
    return () => clearTimeout(t);
  }, [n]);
  return (
    <div style={{position:'fixed',inset:0,background:'#000',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'Space Mono,monospace',zIndex:100}}>
      <div className="anim-pop" key={n} style={{fontSize:'8rem',fontWeight:900,color:'#fff',lineHeight:1}}>
        {n || 'GO!'}
      </div>
    </div>
  );
}

// ─── GameBoard ────────────────────────────────────────────────────────────────
function GameBoard({ puzzle, label, total, onDone }) {
  const mt = maxT(puzzle.ops.length);
  const [cur, setCur]     = useState(puzzle.start);
  const [applied, setApp] = useState([]);
  const [used, setUsed]   = useState(new Set());
  const [slots, setSlots] = useState([]);
  const [msg, setMsg]     = useState(() => pick('idle'));
  const [msgBg, setMsgBg] = useState('#ffffff');
  const [shake, setShake] = useState(false);
  const [vClr, setVClr]   = useState('');
  const [fKey, setFKey]   = useState(0);
  const [fTxt, setFTxt]   = useState('+0');
  const [fBg,  setFBg]    = useState('#dcf0e5');
  const [fin,  setFin]    = useState(false);
  const [shuf]            = useState(() => shuffle(puzzle.ops));

  const timerEl  = useRef(null);
  const doneR    = useRef(false);
  const appR     = useRef([]);
  const curR     = useRef(puzzle.start);
  const timeR    = useRef(mt);
  const timerI   = useRef(null);

  useEffect(()=>{ appR.current = applied; }, [applied]);
  useEffect(()=>{ curR.current = cur;     }, [cur]);

  const finish = useCallback((res) => {
    if (doneR.current) return;
    doneR.current = true;
    clearInterval(timerI.current);
    setFin(true);
    const fb = res.perfect ? '#dcf0e5' : res.score > 0 ? '#f2e9c9' : '#f7dfd6';
    setFBg(fb); setFTxt(`+${res.score}`); setFKey(k => k+1);
    if (res.timedOut) {
      setVClr('#cc2255');
      if (res.score > 0) { setMsg(pick('toPartial',{n:res.correct})); setMsgBg('#f2e9c9'); }
      else               { setMsg(pick('toZero'));  setMsgBg('#f7dfd6'); setShake(true); }
    } else if (res.perfect) {
      setMsg(pick('perfect')); setMsgBg('#dcf0e5');
    } else if (res.score > 0) {
      setMsg(pick('partial',{n:res.correct})); setMsgBg('#f2e9c9'); setShake(true);
    } else {
      setVClr('#cc2255'); setMsg(pick('zero')); setMsgBg('#f7dfd6'); setShake(true);
    }
    setTimeout(() => onDone(res), res.perfect ? 1500 : 1800);
  }, [onDone]);

  useEffect(() => {
    timerI.current = setInterval(() => {
      timeR.current -= 0.05;
      const pct = Math.max(0, (timeR.current / mt) * 100);
      if (timerEl.current) {
        timerEl.current.style.width = `${pct}%`;
        timerEl.current.style.backgroundColor = pct < 30 ? '#f7dfd6' : '#f2e9c9';
      }
      if (timeR.current <= 0 && !doneR.current) { clearInterval(timerI.current); finish(scoreTO(appR.current)); }
    }, 50);
    return () => clearInterval(timerI.current);
  }, [finish, mt]);

  const handleOp = op => {
    if (fin || used.has(op.id)) return;
    const nv = op.fn(curR.current);
    const na = [...appR.current, op];
    const ns = [...slots, op.symbol];
    setCur(nv); curR.current = nv;
    setApp(na); appR.current = na;
    setUsed(p => new Set([...p, op.id]));
    setSlots(ns);
    if (na.length < puzzle.ops.length) {
      if (nv % 1 !== 0)                             { setMsg(pick('decimal'));  setMsgBg('#e8e4f2'); }
      else if (nv < 0)                              { setMsg(pick('negative')); setMsgBg('#dcf0e5'); }
      else if (Math.abs(nv) > Math.abs(puzzle.target)*3) { setMsg(pick('wayoff'));  setMsgBg('#ffffff'); }
      else                                          { setMsg(pick('mid'));      setMsgBg('#ffffff'); }
    }
    if (na.length === puzzle.ops.length) finish(scoreR(na, nv, puzzle.target, timeR.current, mt));
  };

  const cols = puzzle.ops.length <= 3 ? 3 : puzzle.ops.length === 4 ? 2 : 3;

  return (
    <div className="anim-fade flex flex-col gap-4 w-full">
      {/* Header */}
      <header style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',background:'#fff',padding:'.75rem 1rem',border:'2px solid #000',borderRadius:'.5rem',transform:'rotate(-.5deg)'}} className="bs">
        <div>
          <div style={{fontSize:'1.5rem',fontWeight:900,letterSpacing:'-.05em',lineHeight:1}}>SHIFT</div>
          <div style={{fontSize:'.625rem',fontWeight:900,textTransform:'uppercase',background:'#dcf0e5',padding:'2px 8px',marginTop:4,border:'1px solid #000',borderRadius:4,display:'inline-block'}}>{label}</div>
        </div>
        <div style={{textAlign:'right'}}>
          <div style={{fontSize:'.625rem',fontWeight:900,textTransform:'uppercase',background:'#e8e4f2',padding:'2px 8px',border:'1px solid #000',borderRadius:4,display:'inline-block',marginBottom:4}}>score</div>
          <div style={{fontSize:'1.6rem',fontWeight:900,lineHeight:1}}>{total}</div>
        </div>
      </header>

      {/* Card */}
      <div className={shake ? 'anim-shake' : ''} style={{position:'relative',background:'#fff',padding:'1.5rem',border:'2px solid #000',borderRadius:'.75rem',display:'flex',flexDirection:'column',gap:'1.5rem'}} className={`bs6${shake?' anim-shake':''}`}>
        {/* Timer */}
        <div style={{position:'absolute',top:-2,left:-2,width:'calc(100% + 4px)',height:12,background:'#fff',border:'2px solid #000',borderRadius:'.75rem .75rem 0 0',overflow:'hidden',zIndex:10}}>
          <div ref={timerEl} style={{height:'100%',backgroundColor:'#f2e9c9',transition:'width .1s linear',borderRight:'2px solid #000',borderRadius:'.75rem 0 0 0'}} />
        </div>

        {/* Start / Target */}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:4,paddingBottom:'1rem',borderBottom:'2px dashed #c5bfb0'}}>
          <div style={{position:'relative'}}>
            <span style={{position:'absolute',top:-12,left:0,fontSize:'.5625rem',fontWeight:900,textTransform:'uppercase',padding:'2px 8px',background:'#1a1a1a',color:'#f5f0e8',borderRadius:4,transform:'rotate(-1deg)'}}>start</span>
            <span style={{fontSize:'1.8rem',fontWeight:900,marginTop:8,display:'block',lineHeight:1}}>{puzzle.start}</span>
          </div>
          <div style={{position:'relative',textAlign:'right'}}>
            <span style={{position:'absolute',top:-12,right:0,fontSize:'.5625rem',fontWeight:900,textTransform:'uppercase',padding:'2px 8px',background:'#f7dfd6',border:'1px solid #000',borderRadius:4,transform:'rotate(1deg)'}}>target</span>
            <span style={{fontSize:'2.2rem',fontWeight:900,marginTop:8,display:'block',lineHeight:1}}>{puzzle.target}</span>
          </div>
        </div>

        {/* Current + Slots */}
        <div style={{position:'relative',display:'flex',alignItems:'center',justifyContent:'space-between',background:'#dcf0e5',padding:'.75rem 1.25rem',borderRadius:'.5rem',border:'2px solid #000'}} className="bs2">
          <span style={{fontSize:'2.2rem',fontWeight:900,minWidth:60,color:vClr||'#1a1a1a',transition:'color .1s'}}>
            {Number.isInteger(cur) ? cur : cur.toFixed(2)}
          </span>
          <div style={{display:'flex',gap:8,flexWrap:'wrap',justifyContent:'flex-end'}}>
            {Array.from({length:puzzle.ops.length},(_,i) => (
              <div key={i} style={{width:36,height:36,borderRadius:6,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1rem',fontWeight:900,border:slots[i]?'2px solid #000':'2px dashed #c5bfb0',background:slots[i]?'#e8e4f2':'#fff',transform:slots[i]?'scale(1.05) rotate(2deg)':'none',boxShadow:slots[i]?'2px 2px 0 0 #000':'none',transition:'all .15s'}}>
                {slots[i]||''}
              </div>
            ))}
          </div>
          {fKey > 0 && (
            <div key={fKey} className="anim-float" style={{position:'absolute',right:'1.25rem',top:'-1.5rem',fontWeight:900,fontSize:'.875rem',padding:'2px 10px',borderRadius:6,border:'2px solid #000',background:fBg,pointerEvents:'none'}}>
              {fTxt}
            </div>
          )}
        </div>

        {/* Buttons */}
        <div style={{display:'grid',gridTemplateColumns:`repeat(${cols},1fr)`,gap:12}}>
          {shuf.map((op,i) => {
            const isUsed = used.has(op.id);
            return (
              <button key={op.id} onClick={()=>handleOp(op)} disabled={fin||isUsed}
                style={{border:'2px solid #000',padding:'.875rem 0',borderRadius:'.5rem',fontSize:'1.25rem',fontWeight:900,cursor:isUsed?'not-allowed':'pointer',background:BC[i%3],transform:isUsed?undefined:`rotate(${BR[i%3]})`,opacity:isUsed?.4:1,boxShadow:isUsed?'none':'4px 4px 0 0 #000',transition:'all .075s',userSelect:'none',fontFamily:'Space Mono,monospace'}}>
                {op.label}
              </button>
            );
          })}
        </div>
      </div>

      {/* Snarky */}
      <div style={{textAlign:'center',fontSize:'.875rem',padding:'.75rem',border:'2px solid #000',borderRadius:'.5rem',minHeight:48,display:'flex',alignItems:'center',justifyContent:'center',background:msgBg,transition:'background .3s',transform:'rotate(.5deg)',lineHeight:1.5}} className="bs2">
        {msg}
      </div>
    </div>
  );
}

// ─── Leaderboard ──────────────────────────────────────────────────────────────
function LeaderBoard({ onBack }) {
  const [rows,    setRows]    = useState(null);
  const [loading, setLoading] = useState(true);
  const [err,     setErr]     = useState('');

  useEffect(() => {
    pfBoard().then(r => {
      setLoading(false);
      if (r.ok) setRows(r.data.Leaderboard || []);
      else setErr(r.error);
    });
  }, []);

  return (
    <div style={{position:'fixed',inset:0,background:'#f5f0e8',display:'flex',flexDirection:'column',fontFamily:'Space Mono,monospace',overflow:'hidden'}}>
      <div style={{position:'absolute',inset:0,zIndex:0}} className="dot-grid" />
      <div style={{flex:1,overflowY:'auto',padding:'1.5rem',display:'flex',flexDirection:'column',alignItems:'center',gap:0,zIndex:1}}>
        <div style={{background:'#fff',border:'8px solid #000',width:'100%',maxWidth:400,overflow:'hidden'}} className="bs8 anim-fade">

// ─── DailyGame ────────────────────────────────────────────────────────────────
function DailyGame({ onExit }) {
  const [puzzles]     = useState(dailyPuzzles);
  const [round,  setR]       = useState(0);
  const [scores, setScores]  = useState([]); // per-round score objects
  const [phase,  setPhase]   = useState(() => {
    const saved = localStorage.getItem(dailyKey());
    return saved ? 'done' : 'countdown';
  });
  const [settled, setSettled] = useState(false);
  const [submitted, setSubmitted] = useState(false);

  // Load saved scores if already played
  const savedData = useMemo(() => {
    const s = localStorage.getItem(dailyKey());
    return s ? JSON.parse(s) : null;
  }, []);

  const displayScores = phase === 'done' && savedData ? savedData.rounds : scores;

  useEffect(() => {
    if (phase !== 'inter') return;
    setSettled(false);
    const id = setTimeout(() => setSettled(true), 1300);
    return () => clearTimeout(id);
  }, [phase, round]);

  const onRoundDone = (res) => {
    setScores(prev => [...prev, res]);
    setPhase('inter');
  };

  const totalSoFar = scores.reduce((a,r) => a+r.score, 0);
  const last = scores[scores.length - 1];
  const isLastRound = round === 2;

  const goNext = () => {
    if (isLastRound) {
      const total = scores.reduce((a,r) => a+r.score, 0);
      const rounds = scores;
      localStorage.setItem(dailyKey(), JSON.stringify({ totalScore: total, rounds }));
      setPhase('done');
      if (!submitted) {
        setSubmitted(true);
        pfSubmit(total / 3).catch(() => {});
      }
    } else {
      setR(r => r + 1);
      setPhase('countdown');
    }
  };

  // Submit if we just reached done without a prior save
  useEffect(() => {
    if (phase !== 'done' || submitted || savedData) return;
  }, [phase]);

  const iWon = last && last.score > 0;

  if (phase === 'countdown') return <Countdown onDone={() => setPhase('playing')} />;

  if (phase === 'playing') return (
    <div style={{position:'fixed',inset:0,background:'#f5f0e8',display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <div style={{position:'absolute',inset:0,zIndex:0}} className="dot-grid" />
      <button onClick={onExit} style={{position:'absolute',top:16,right:16,zIndex:50,background:'#fff',border:'2px solid #000',width:32,height:32,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:900,fontSize:'.75rem',cursor:'pointer',fontFamily:'Space Mono,monospace'}} className="bs2">✕</button>
      <div style={{flex:1,overflowY:'auto',padding:'1.5rem',paddingTop:'3.5rem',zIndex:1}}>
        <GameBoard key={round} puzzle={puzzles[round]} label={`Daily · Round ${round+1}/3`} total={totalSoFar} onDone={onRoundDone} />
      </div>
    </div>
  );

  if (phase === 'inter' && last) {
    const perfect = last.perfect;
    const partial = !perfect && last.score > 0;
    const header = !settled ? `Round ${round+1}`
      : last.score === 0   ? `Round ${round+1} — Zero`
      : perfect            ? `Round ${round+1} — Perfect!`
      : partial            ? `Round ${round+1} — Partial`
      :                      `Round ${round+1}`;

    return (
      <div style={{position:'fixed',inset:0,background:'#fff',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'1.5rem',fontFamily:'Space Mono,monospace'}}>
        <div style={{position:'absolute',inset:0,zIndex:0}} className="dot-grid" />
        <button onClick={onExit} style={{position:'absolute',top:16,right:16,zIndex:50,background:'#fff',border:'2px solid #000',width:32,height:32,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:900,fontSize:'.75rem',cursor:'pointer',fontFamily:'Space Mono,monospace'}} className="bs2">✕</button>
        <div style={{background:'#fff',border:'8px solid #000',width:'100%',maxWidth:400,overflow:'hidden',zIndex:1}} className="bs8 anim-fade">
          <div style={{padding:'.75rem 1rem',borderBottom:'4px solid #000',textAlign:'center',fontWeight:900,textTransform:'uppercase',letterSpacing:'.1em',fontSize:'.875rem',background:settled&&perfect?'#000':'#fff',color:settled&&perfect?'#fff':'#1a1a1a',transition:'all .3s'}}>
            {header}

          <div style={{padding:'1.5rem',textAlign:'center',borderBottom:'4px solid #000'}}>

          <div style={{padding:'1rem'}}>
            <button onClick={goNext} style={{width:'100%',background:'#000',color:'#fff',border:'4px solid #000',padding:'.75rem',fontWeight:900,fontSize:'.875rem',textTransform:'uppercase',cursor:'pointer',fontFamily:'Space Mono,monospace'}} className="bs">

            </button>
          </div>

  }

  if (phase === 'done') {
    const ds = savedData || { totalScore: scores.reduce((a,r)=>a+r.score,0), rounds: scores };
    const total = ds.totalScore;

    const tagline = quality === 'elite' ? 'elite work, genuinely.' : quality === 'decent' ? 'not bad. not great. but not bad.' : 'you showed up. that\'s something.';

    const share = async () => {

      if (navigator.share) { try { await navigator.share({ text }); return; } catch(e) { if (e.name==='AbortError') return; } }
      try { await navigator.clipboard.writeText(text); } catch(e) {}

    return (

            <div style={{fontSize:'3rem',fontWeight:900,lineHeight:1}}>{total}</div>
            <div style={{fontSize:'.75rem',opacity:.5,marginTop:4}}>avg {avg}</div>
          </div>
          <div style={{padding:'.75rem 1rem',borderBottom:'2px solid #000',fontSize:'.8rem',fontStyle:'italic',textAlign:'center',color:'#666'}}>
            {tagline}
          </div>
          {ds.rounds.map((r,i) => (
            <div key={i} style={{display:'flex',alignItems:'center',gap:12,padding:'.625rem 1rem',borderBottom:'2px solid #000'}}>
              <span style={{fontSize:'.75rem',fontWeight:900,textTransform:'uppercase',width:40,color:'#999'}}>R{i+1}</span>
              <span style={{flex:1,fontSize:'.875rem',fontWeight:900}}>{r.score}</span>
              <span style={{fontSize:'.75rem',fontWeight:900,color: r.perfect?'#2a7a4b':'#999'}}>{r.perfect?'✓ perfect':r.score>0?'✓ partial':'✗'}</span>
            </div>

          <div style={{padding:'1rem',display:'flex',gap:'.75rem',flexDirection:'column'}}>
            <button onClick={share} style={{width:'100%',background:'#000',color:'#fff',border:'4px solid #000',padding:'.75rem',fontWeight:900,fontSize:'.875rem',textTransform:'uppercase',cursor:'pointer',fontFamily:'Space Mono,monospace'}} className="bs">
              ↑ Share Score
            </button>
            <button onClick={onExit} style={{width:'100%',background:'#fff',border:'4px solid #000',padding:'.75rem',fontWeight:900,fontSize:'.875rem',textTransform:'uppercase',cursor:'pointer',fontFamily:'Space Mono,monospace'}} className="bs">

  return null;

            <div style={{fontSize:'.625rem',fontWeight:900,textTransform:'uppercase',color:'#999',marginBottom:8}}>this round</div>

          <div style={{padding:'.75rem 1rem',borderBottom:'4px solid #000',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontSize:'.75rem',fontWeight:900,textTransform:'uppercase'}}>Total</span>

// ─── VersusGame ───────────────────────────────────────────────────────────────
const POLL_MS    = 2500;
const MATCH_TO   = 12000;

function VersusGame({ onExit }) {
  const [phase,    setPhase]   = useState('lobby');
  const [puzzles,  setPuzzles] = useState([]);
  const [round,    setRound]   = useState(0);
  const [rounds,   setRounds]  = useState([]);
  const [myLast,   setMyLast]  = useState(null);
  const [oppLast,  setOppLast] = useState(null);
  const [oppName,  setOppName] = useState('');
  const [isGhost,  setIsGhost] = useState(false);
  const [matchId,  setMatchId] = useState(null);
  const [oppId,    setOppId]   = useState(null);
  const [status,   setStatus]  = useState('');
  const [lMsg,     setLMsg]    = useState('');
  const [settled,  setSettled] = useState(false);
  const [dots,     setDots]    = useState(0);

  const pollR     = useRef(null);
  const ghostR    = useRef(null);
  const toR       = useRef(null);
  const pendingR  = useRef(null);
  const roundsR   = useRef([]);

  useEffect(() => { roundsR.current = rounds; }, [rounds]);

  const stopPoll = () => { clearInterval(pollR.current); pollR.current = null; };
  const clearAll = () => { stopPoll(); clearTimeout(ghostR.current); clearTimeout(toR.current); };
  useEffect(() => () => clearAll(), []);

  useEffect(() => {
    if (phase !== 'waiting') return;
    const id = setInterval(() => setDots(d => (d+1)%4), 480);
    return () => clearInterval(id);
  }, [phase]);

  useEffect(() => {
    if (phase !== 'inter') return;
    setSettled(false);
    const id = setTimeout(() => setSettled(true), 1300);
    return () => clearTimeout(id);
  }, [phase, round]);

  const mkPuzzles = seed => {
    const rng = mulberry32(seed);
    return [0,1,2].map(() => genPuzzle(4, rng));
  };

  const startGhost = useCallback(() => {
    const name = GHOSTS[Math.floor(Math.random()*GHOSTS.length)];
    const seed = Math.floor(Math.random() * 0xFFFFFF);
    setIsGhost(true); setOppName(name);
    setPuzzles(mkPuzzles(seed));
    setRound(0); setRounds([]); roundsR.current = [];
    setPhase('flash');
    ghostR.current = setTimeout(() => setPhase('countdown'), 1800);
  }, []);

  const startMatch = async () => {
    if (!navigator.onLine) { setLMsg('No internet connection'); return; }
    setLMsg(''); setPhase('matching'); setStatus('Searching for opponent…');
    const r = await pfCreateTix();
    if (!r.ok) { ghostR.current = setTimeout(startGhost, 2000 + Math.random()*2000); return; }
    const tid = r.data.TicketId;
    toR.current = setTimeout(async () => {
      stopPoll();
      await pfCancelTix().catch(()=>{});
      ghostR.current = setTimeout(startGhost, 1500 + Math.random()*2000);
    }, MATCH_TO);
    pollR.current = setInterval(async () => {
      const p = await pfPollTix(tid);
      if (!p.ok) return;
      if (p.data.Status === 'Matched') {
        clearAll();
        const mr = await pfGetMatch(p.data.MatchId);
        if (!mr.ok) { startGhost(); return; }
        const members = mr.data.Members;
        const opp = members.find(m => m.Entity.Id !== _pfId);
        if (!opp) { startGhost(); return; }
        const mid = p.data.MatchId, oid = opp.Entity.Id;
        const host = members[0].Entity.Id === _pfId;
        setMatchId(mid); setOppId(oid);
        setIsGhost(false); setOppName('Opponent');
        setRound(0); setRounds([]); roundsR.current = [];
        if (host) {
          const seed = Math.floor(Math.random() * 0xFFFFFF);
          setPuzzles(mkPuzzles(seed));
          await pfWriteSetup(mid, seed);
          setPhase('flash');
          ghostR.current = setTimeout(() => setPhase('countdown'), 1800);
        } else {
          setStatus('Syncing…');
          pollR.current = setInterval(async () => {
            const d = await pfReadOpp(oid, `match_${mid}_setup`);
            if (d.ok && d.data?.seed != null) {
              stopPoll();
              setPuzzles(mkPuzzles(d.data.seed));
              setPhase('flash');
              ghostR.current = setTimeout(() => setPhase('countdown'), 1800);
            }
          }, POLL_MS);
        }
      } else if (p.data.Status === 'Cancelled' || p.data.Status === 'Failed') {
        clearAll(); startGhost();
      }
    }, POLL_MS);
  };

  const onRoundDone = useCallback((res) => {
    pendingR.current = { ri: round, my: res.score };
    setMyLast(res.score); setOppLast(null);
    if (!isGhost && matchId) pfWriteRound(matchId, round, res.score).catch(()=>{});
    setPhase('waiting');
  }, [round, isGhost, matchId]);

  useEffect(() => {
    if (phase !== 'waiting') return;
    const pr = pendingR.current;
    if (!pr) return;
    if (isGhost) {
      const r = Math.random();
      const delay = r<.65 ? 800+Math.random()*2200 : r<.88 ? 3000+Math.random()*2000 : 5000+Math.random()*3000;
      ghostR.current = setTimeout(() => completeRound(pr.ri, pr.my, Math.round(ghostSc())), delay);
    } else {
      pollR.current = setInterval(async () => {
        const d = await pfReadOpp(oppId, `match_${matchId}_r${pr.ri}`);
        if (d.ok && d.data?.score != null) { stopPoll(); completeRound(pr.ri, pr.my, d.data.score); }
      }, POLL_MS);
    }
  }, [phase]); // eslint-disable-line

  const completeRound = (ri, my, opp) => {
    const nr = { ri, my, opp };
    const updated = [...roundsR.current, nr];
    roundsR.current = updated;
    setOppLast(opp);
    setRounds(updated);
    setPhase('inter');
  };

  const nextRound = () => {
    const ni = round + 1;
    if (ni >= 3) { setPhase('done'); }
    else { setRound(ni); setMyLast(null); setOppLast(null); setPhase('countdown'); }
  };

  const reset = () => {
    clearAll();
    setPhase('lobby'); setRound(0); setRounds([]); roundsR.current = [];
    setPuzzles([]); setMyLast(null); setOppLast(null);
  };

  const abort = () => { clearAll(); setPhase('lobby'); setRound(0); setRounds([]); roundsR.current = []; setPuzzles([]); };

  const abortBtn = (
    <button onClick={abort} style={{position:'absolute',top:16,right:16,zIndex:50,background:'#fff',border:'2px solid #000',width:32,height:32,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:900,fontSize:'.75rem',cursor:'pointer',fontFamily:'Space Mono,monospace'}} className="bs2">✕</button>
  );

  // Flash screen
  if (phase === 'flash') return (
    <div style={{position:'fixed',inset:0,background:'#000',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:16,fontFamily:'Space Mono,monospace'}}>
      <div style={{fontSize:'.625rem',fontWeight:900,textTransform:'uppercase',letterSpacing:'.2em',color:'rgba(255,255,255,.5)'}}>Opponent Found</div>
      <div style={{fontSize:'2rem',fontWeight:900,textTransform:'uppercase',letterSpacing:'-.05em',color:'#fff'}}>{oppName}</div>
      <div style={{fontSize:'.75rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.1em',color:'rgba(255,255,255,.35)',marginTop:8}}>prepare to play…</div>
    </div>
  );

  if (phase === 'countdown') return <Countdown onDone={() => setPhase('playing')} />;

  if (phase === 'playing' && puzzles.length > 0) return (
    <div style={{position:'fixed',inset:0,background:'#f5f0e8',display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <div style={{position:'absolute',inset:0,zIndex:0}} className="dot-grid" />
      {abortBtn}
      <div style={{flex:1,overflowY:'auto',padding:'1.5rem',paddingTop:'3.5rem',zIndex:1}}>
        <GameBoard key={round} puzzle={puzzles[round]} label={`vs ${oppName} · Round ${round+1}/3`} total={roundsR.current.reduce((a,r)=>a+r.my,0)} onDone={onRoundDone} />
      </div>
    </div>
  );

  if (phase === 'waiting') {
    const DOTSTR = ['○○○','●○○','●●○','●●●'];
    return (
      <div style={{position:'fixed',inset:0,background:'#18181b',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:16,fontFamily:'Space Mono,monospace',color:'#fff'}}>
        {abortBtn}
        <div style={{fontSize:'.625rem',fontWeight:900,textTransform:'uppercase',letterSpacing:'.15em',opacity:.4}}>Round {round+1} · Waiting</div>
        <div style={{border:'4px solid rgba(255,255,255,.15)',width:'100%',maxWidth:380,overflow:'hidden',margin:'0 1.5rem'}}>
          <div style={{display:'flex'}}>
            <div style={{flex:1,borderRight:'2px solid rgba(255,255,255,.1)',background:'#27272a',padding:'1.25rem 1rem',textAlign:'center'}}>
              <div style={{fontSize:'.5625rem',fontWeight:700,textTransform:'uppercase',color:'rgba(255,255,255,.4)',marginBottom:8}}>You</div>
              <div style={{fontSize:'2.5rem',fontWeight:900}}>{myLast ?? '—'}</div>
            </div>
            <div style={{flex:1,background:'#27272a',padding:'1.25rem 1rem',textAlign:'center'}}>
              <div style={{fontSize:'.5625rem',fontWeight:700,textTransform:'uppercase',color:'rgba(255,255,255,.4)',marginBottom:8,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{oppName}</div>
              <div style={{fontSize:'1.75rem',fontWeight:900,color:'rgba(255,255,255,.25)',letterSpacing:'.1em'}}>{DOTSTR[dots]}</div>
              <div style={{fontSize:'.5rem',fontWeight:700,textTransform:'uppercase',color:'rgba(255,255,255,.25)',marginTop:4}}>Calculating…</div>
            </div>
          </div>
        </div>
      </div>
    );
  }

  if (phase === 'inter' && rounds.length > 0) {
    const last   = rounds[rounds.length - 1];
    const iWon   = last.my > last.opp;
    const tied   = last.my === last.opp;
    const totMy  = rounds.reduce((a,r)=>a+r.my,  0);
    const totOpp = rounds.reduce((a,r)=>a+r.opp, 0);
    const hdr    = !settled ? `Round ${round+1}`
      : tied   ? `Round ${round+1} — Tied`
      : iWon   ? `Round ${round+1} — You Win`
      :          `Round ${round+1} — They Win`;
    return (
      <div style={{position:'fixed',inset:0,background:'#fff',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'1.5rem',fontFamily:'Space Mono,monospace'}}>
        <div style={{position:'absolute',inset:0,zIndex:0}} className="dot-grid" />
        {abortBtn}
        <div style={{background:'#fff',border:'8px solid #000',width:'100%',maxWidth:400,overflow:'hidden',zIndex:1}} className="bs8 anim-fade">
          <div style={{padding:'.75rem 1rem',borderBottom:'4px solid #000',textAlign:'center',fontWeight:900,textTransform:'uppercase',fontSize:'.875rem',letterSpacing:'.1em',background:settled&&!tied&&iWon?'#000':'#fff',color:settled&&!tied&&iWon?'#fff':'#1a1a1a',transition:'all .3s'}}>
            {hdr}
          </div>
          <div style={{display:'flex',borderBottom:'4px solid #000'}}>
            <div style={{flex:1,borderRight:'2px solid #000',padding:'1.25rem 1rem',textAlign:'center',background:settled&&!tied&&iWon?'#000':'#fff',color:settled&&!tied&&iWon?'#fff':'#1a1a1a',transition:'all .3s'}}>
              <div style={{fontSize:'.5625rem',fontWeight:700,textTransform:'uppercase',marginBottom:8,opacity:.5}}>You</div>
              <div style={{fontSize:'2.5rem',fontWeight:900}}><AnimScore target={last.my} /></div>
            </div>
            <div style={{flex:1,padding:'1.25rem 1rem',textAlign:'center',background:settled&&!tied&&!iWon?'#000':'#fff',color:settled&&!tied&&!iWon?'#fff':'#1a1a1a',transition:'all .3s'}}>
              <div style={{fontSize:'.5625rem',fontWeight:700,textTransform:'uppercase',marginBottom:8,opacity:.5,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{oppName}</div>
              <div style={{fontSize:'2.5rem',fontWeight:900}}><AnimScore target={last.opp} /></div>
            </div>
          </div>
          <div style={{padding:'.75rem 1rem',borderBottom:'4px solid #000',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontSize:'.75rem',fontWeight:900,textTransform:'uppercase'}}>Total</span>
            <span style={{fontSize:'1.25rem',fontWeight:900,letterSpacing:'-.05em'}}>{totMy} — {totOpp}</span>
          </div>
          <div style={{padding:'1rem'}}>
            <button onClick={nextRound} style={{width:'100%',background:'#000',color:'#fff',border:'4px solid #000',padding:'.75rem',fontWeight:900,fontSize:'.875rem',textTransform:'uppercase',cursor:'pointer',fontFamily:'Space Mono,monospace'}} className="bs">
              {round + 1 >= 3 ? 'See Final Result' : `Round ${round+2} →`}
            </button>
          </div>
        </div>
      </div>
    );
  }

  if (phase === 'done' && rounds.length > 0) {
    const totMy  = rounds.reduce((a,r)=>a+r.my,  0);
    const totOpp = rounds.reduce((a,r)=>a+r.opp, 0);
    const won    = totMy > totOpp;
    const tied   = totMy === totOpp;
    return (
      <div style={{position:'fixed',inset:0,background:'#fff',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'1.5rem',fontFamily:'Space Mono,monospace',overflow:'hidden'}}>
        <div style={{position:'absolute',inset:0,zIndex:0}} className="dot-grid" />
        <div style={{background:'#fff',border:'8px solid #000',width:'100%',maxWidth:400,overflow:'hidden',zIndex:1}} className="bs8 anim-fade">
          <div style={{padding:'1.25rem 1rem',borderBottom:'4px solid #000',background:won&&!tied?'#000':'#fff',color:won&&!tied?'#fff':'#1a1a1a',textAlign:'center'}}>
            <div style={{fontSize:'.875rem',fontWeight:900,textTransform:'uppercase',letterSpacing:'.1em'}}>{tied?'Draw':won?'You Win!':'You Lose'}</div>
            <div style={{fontSize:'2.5rem',fontWeight:900,marginTop:4,lineHeight:1}}>{totMy} — {totOpp}</div>
            <div style={{fontSize:'.625rem',opacity:won&&!tied?.5:.4,marginTop:4,textTransform:'uppercase',letterSpacing:'.1em'}}>total score</div>
          </div>
          {rounds.map((r,i) => (
            <div key={i} style={{display:'flex',alignItems:'center',gap:12,padding:'.625rem 1rem',borderBottom:'2px solid #000'}}>
              <span style={{fontSize:'.625rem',fontWeight:900,textTransform:'uppercase',width:24,color:'#999'}}>R{i+1}</span>
              <span style={{flex:1,fontSize:'.875rem',fontWeight:900}}>You {r.my}</span>
              <span style={{fontSize:'.875rem',color:'#666'}}>{r.opp} {oppName}</span>
              <span style={{fontSize:'.75rem',fontWeight:900}}>{r.my>r.opp?'✓':r.my<r.opp?'✗':'='}</span>
            </div>
          ))}
          <div style={{padding:'1rem',display:'flex',gap:'.75rem',flexDirection:'column'}}>
            <button onClick={reset} style={{width:'100%',background:'#000',color:'#fff',border:'4px solid #000',padding:'.75rem',fontWeight:900,fontSize:'.875rem',textTransform:'uppercase',cursor:'pointer',fontFamily:'Space Mono,monospace'}} className="bs">
              Play Again
            </button>
            <button onClick={onExit} style={{width:'100%',background:'#fff',border:'4px solid #000',padding:'.75rem',fontWeight:900,fontSize:'.875rem',textTransform:'uppercase',cursor:'pointer',fontFamily:'Space Mono,monospace'}} className="bs">
              ← Menu
            </button>
          </div>
        </div>
      </div>
    );
  }

  // Lobby / Matching
  const searching = phase === 'matching';
  return (
    <div style={{position:'fixed',inset:0,background:'#fff',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'1.5rem',fontFamily:'Space Mono,monospace',overflow:'hidden'}}>
      <div style={{position:'absolute',inset:0,zIndex:0}} className="dot-grid" />
      <div style={{background:'#fff',border:'8px solid #000',padding:'2rem',width:'100%',maxWidth:400,display:'flex',flexDirection:'column',alignItems:'center',gap:24,zIndex:1}} className="bs8 anim-fade">
        <div style={{fontSize:'2.5rem',fontWeight:900,textTransform:'uppercase',letterSpacing:'-.05em',textAlign:'center'}}>Versus Mode</div>
        {searching ? (
          <>
            <div style={{width:'100%',border:'2px solid #000',padding:'1rem',display:'flex',flexDirection:'column',alignItems:'center',gap:12}}>
              <div style={{display:'flex',gap:6}}>
                {[0,1,2,3].map(i => (
                  <div key={i} style={{width:10,height:10,borderRadius:'50%',background:'#000',animation:`spinBounce .8s ease-in-out ${i*.15}s infinite`}} />
                ))}
              </div>
              <div style={{fontSize:'.75rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.1em',textAlign:'center'}}>{status}</div>
            </div>
            <button onClick={onExit} style={{width:'100%',background:'#fff',border:'4px solid #000',padding:'.75rem',fontWeight:900,fontSize:'.875rem',textTransform:'uppercase',cursor:'pointer',fontFamily:'Space Mono,monospace'}} className="bs">
              Cancel
            </button>
          </>
        ) : (
          <>
            {lMsg && <div style={{width:'100%',border:'2px solid #c00',padding:'.75rem 1rem',fontSize:'.75rem',fontWeight:700,textTransform:'uppercase',textAlign:'center',color:'#c00'}}>{lMsg}</div>}
            <p style={{fontSize:'.75rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.1em',textAlign:'center',borderTop:'2px solid #000',borderBottom:'2px solid #000',padding:'1rem 0',width:'100%',margin:0,lineHeight:1.8}}>
              3 rounds · highest total wins
            </p>
            <button onClick={startMatch} style={{width:'100%',background:'#000',color:'#fff',border:'4px solid #000',padding:'1.25rem',fontWeight:900,fontSize:'1.25rem',textTransform:'uppercase',cursor:'pointer',fontFamily:'Space Mono,monospace'}} className="bs">
              Find Match
            </button>
            <button onClick={onExit} style={{width:'100%',background:'#fff',border:'4px solid #000',padding:'.75rem',fontWeight:900,fontSize:'.875rem',textTransform:'uppercase',cursor:'pointer',fontFamily:'Space Mono,monospace'}} className="bs">
              ← Back
            </button>
          </>
        )}
      </div>
    </div>
  );
}

            <div key={label} title={title} style={{position:'relative',cursor:'default',width:148,height:48,borderRadius:8,overflow:'hidden',opacity:.55,filter:'grayscale(25%)',border:'2px solid rgba(0,0,0,.2)',background:'#111',display:'flex',alignItems:'center',justifyContent:'center',gap:8,color:'#fff',flexShrink:0}}>
              {imgSrc ? (
                <img src={imgSrc} alt={label} style={{width:'100%',height:'100%',objectFit:'cover',position:'absolute',inset:0}}
                  onError={e=>{e.target.style.display='none';}} />
              ) : (
                <>
                  <span style={{fontSize:'1.1rem'}}>{icon}</span>
                  <div style={{textAlign:'left'}}>
                    <div style={{fontSize:'.45rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.08em',opacity:.6,fontFamily:'Space Mono,monospace'}}>Get it on</div>
                    <div style={{fontSize:'.75rem',fontWeight:900,fontFamily:'Space Mono,monospace'}}>{label}</div>
                  </div>
                </>
              )}
              <div style={{position:'absolute',inset:0,background:'rgba(245,240,232,.5)',display:'flex',alignItems:'flex-end',justifyContent:'center',paddingBottom:5}}>
                <span style={{background:'#1a1a1a',color:'#f5f0e8',fontSize:'.45rem',fontWeight:900,textTransform:'uppercase',letterSpacing:'.1em',padding:'1px 6px',borderRadius:3,fontFamily:'Space Mono,monospace'}}>Coming Soon</span>
              </div>
            </div>
          ))}
        </div>

      </div>
    </div>
  );
}

// ─── App ──────────────────────────────────────────────────────────────────────
function App() {
  const [screen, setScreen]     = useState('start');
  const [ready,  setReady]      = useState(false);
  const [name,   setName]       = useState(() => localStorage.getItem('shift_display_name') || '');

  useEffect(() => {
    (async () => {
      let n = localStorage.getItem('shift_display_name');
      if (!n) { n = randName(); localStorage.setItem('shift_display_name', n); }
      setName(n);
      await pfLogin();
      if (!localStorage.getItem('shift_display_name_set')) {
        await pfSetName(n).catch(()=>{});
        localStorage.setItem('shift_display_name_set', '1');
      }
      setReady(true);
    })();
  }, []);

  const handleShuffle = async () => {
    const n = randName();
    localStorage.setItem('shift_display_name', n);
    localStorage.removeItem('shift_display_name_set');
    setName(n);
    await pfSetName(n).catch(()=>{});
  };

  if (!ready) return (
    <div style={{position:'fixed',inset:0,background:'#f5f0e8',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'Space Mono,monospace'}}>
      <div style={{fontSize:'2.5rem',fontWeight:900,textTransform:'uppercase',letterSpacing:'-.05em',color:'#1a1a1a',animation:'spinBounce .9s ease-in-out infinite'}}>SHIFT</div>
    </div>
  );

  if (screen === 'daily')       return <DailyGame   onExit={() => setScreen('start')} />;
  if (screen === 'solo')        return <SoloGame    onExit={() => setScreen('start')} />;
  if (screen === 'versus')      return <VersusGame  onExit={() => setScreen('start')} />;
  if (screen === 'leaderboard') return <LeaderBoard onBack={() => setScreen('start')} />;

  return <StartScreen onNav={setScreen} playerName={name} onShuffle={handleShuffle} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
