<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Bloom (Expanded Replica)</title>
    
    <!-- React & ReactDOM via CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            background: linear-gradient(180deg, #151a30 0%, #080811 100%);
            touch-action: none; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none; -webkit-user-select: none;
        }

        #root { width: 100%; height: 100%; }

        .container {
            width: 100vw; height: 100vh; position: relative; overflow: hidden;
        }

        .play-area {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 1;
        }

        /* --- UI Controls --- */
        .controls-top {
            position: absolute; top: 20px; left: 0; right: 0;
            display: flex; justify-content: center; gap: 8px; flex-wrap: wrap;
            padding: 0 15px; z-index: 10; pointer-events: none;
        }

        .instrument-btn {
            position: relative; pointer-events: auto;
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.7); padding: 6px 12px; border-radius: 20px;
            font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
            transition: all 0.3s; cursor: pointer;
        }
        .instrument-btn.active {
            background: rgba(255, 255, 255, 0.2); border-color: white; color: white;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        /* Glowing dot to show this instrument has active loops playing */
        .active-dot {
            position: absolute; top: -2px; right: -2px;
            width: 8px; height: 8px; border-radius: 50%;
            box-shadow: 0 0 8px currentColor;
        }

        .controls-bottom {
            position: absolute; bottom: 30px; left: 0; right: 0;
            display: flex; justify-content: center; gap: 20px; flex-wrap: wrap;
            padding: 0 20px; z-index: 10; pointer-events: none;
        }

        .pedal {
            pointer-events: auto; width: 45px; height: 45px; border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.3); background: rgba(0, 0, 0, 0.4);
            cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center;
        }
        
        .pedal.recording {
            border-color: #ff3366; background: rgba(255, 51, 102, 0.2);
            box-shadow: 0 0 20px rgba(255, 51, 102, 0.6);
            animation: pulseRecord 1s infinite alternate;
        }

        .pedal.playing {
            border-color: #00ffcc; background: rgba(0, 255, 204, 0.2);
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
        }

        .pedal.add-loop {
            border-color: rgba(255, 255, 255, 0.2); border-style: dashed;
        }

        .pedal-icon { transition: all 0.3s; }
        .pedal.recording .pedal-icon { width: 14px; height: 14px; background: #ff3366; border-radius: 3px; }
        
        .pedal-icon.plus { color: rgba(255,255,255,0.5); font-size: 24px; font-weight: 300; line-height: 1; margin-top: -2px;}
        
        /* The "X" to delete a playing loop */
        .pedal-icon.delete-icon { position: relative; width: 14px; height: 14px; }
        .pedal-icon.delete-icon::before, .pedal-icon.delete-icon::after {
            content: ''; position: absolute; top: 50%; left: 0; right: 0;
            height: 2px; background: #00ffcc; border-radius: 2px;
        }
        .pedal-icon.delete-icon::before { transform: translateY(-50%) rotate(45deg); }
        .pedal-icon.delete-icon::after { transform: translateY(-50%) rotate(-45deg); }

        /* --- Visuals --- */
        .ripple {
            position: absolute; border-radius: 50%; transform: translate(-50%, -50%);
            animation: expandFade 4s ease-out forwards; pointer-events: none;
            border: 2px solid; box-shadow: inset 0 0 20px currentColor, 0 0 20px currentColor; z-index: 2;
        }

        @keyframes expandFade {
            0% { width: 0px; height: 0px; opacity: 0.8; border-width: 8px; }
            100% { width: 300px; height: 300px; opacity: 0; border-width: 1px; }
        }
        @keyframes pulseRecord {
            from { transform: scale(1); } to { transform: scale(1.1); }
        }

        .instruction {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.3); font-weight: 300; letter-spacing: 3px;
            pointer-events: none; transition: opacity 1s; z-index: 0; text-align: center;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // C Major Pentatonic Scale
        const PENTATONIC_SCALE = [
            261.63, 293.66, 329.63, 392.00, 440.00,
            523.25, 587.33, 659.25, 783.99, 880.00
        ].reverse();

        // Distinct ambient instrument profiles
        const INSTRUMENTS = {
            BELL: { id: 'BELL', name: 'Bell', type: 'sine', attack: 0.05, release: 2.5, filterFreq: 2000, color: '#00ffff' },
            PAD: { id: 'PAD', name: 'Pad', type: 'triangle', attack: 0.8, release: 3.5, filterFreq: 1200, color: '#ffaa00' },
            SYNTH: { id: 'SYNTH', name: 'Synth', type: 'square', attack: 0.1, release: 1.5, filterFreq: 600, color: '#ff00ff' },
            STRINGS: { id: 'STRINGS', name: 'Strings', type: 'sawtooth', attack: 1.2, release: 4.0, filterFreq: 800, color: '#aaff00' },
            FLUTE: { id: 'FLUTE', name: 'Flute', type: 'sine', attack: 0.2, release: 1.0, filterFreq: 1500, color: '#88ffcc' },
            MARIMBA: { id: 'MARIMBA', name: 'Marimba', type: 'triangle', attack: 0.01, release: 0.6, filterFreq: 2500, color: '#ffcc77' },
            CHOIR: { id: 'CHOIR', name: 'Choir', type: 'triangle', attack: 1.5, release: 3.0, filterFreq: 900, color: '#ccaaff' },
            DRUMS: { id: 'DRUMS', name: 'Drums', isDrum: true, color: '#ff5555' },
            PERC: { id: 'PERC', name: 'Perc', isPerc: true, color: '#ffffaa' }
        };

        function App() {
            const [hasStarted, setHasStarted] = useState(false);
            const [activeInstKey, setActiveInstKey] = useState('BELL');
            const [ripples, setRipples] = useState([]);
            
            // Dynamic Looper slots state: { id, instKey, state: 'recording' | 'playing' }
            const [pedals, setPedals] = useState([]);

            // Refs for Audio Systems
            const audioCtxRef = useRef(null);
            const masterGainRef = useRef(null);
            const delayRef = useRef(null);
            const noiseBufferRef = useRef(null);
            
            // Loop tracks data dynamic mapping
            const tracksRef = useRef({}); // { 'pedalId': { events: [], startTime, duration, interval, timeouts: [] } }

            // --- 1. Audio Initialization ---
            const initAudio = useCallback(() => {
                if (audioCtxRef.current) {
                    if (audioCtxRef.current.state === 'suspended') audioCtxRef.current.resume();
                    return;
                }

                const AudioContext = window.AudioContext || window.webkitAudioContext;
                const ctx = new AudioContext();
                audioCtxRef.current = ctx;

                const masterGain = ctx.createGain();
                masterGain.gain.value = 0.5;
                masterGain.connect(ctx.destination);
                masterGainRef.current = masterGain;

                // Ambient wash / global echo
                const delay = ctx.createDelay();
                delay.delayTime.value = 3.5; 
                const feedback = ctx.createGain();
                feedback.gain.value = 0.45; // Subtle background tails
                const delayFilter = ctx.createBiquadFilter();
                delayFilter.type = 'lowpass';
                delayFilter.frequency.value = 800;

                delay.connect(feedback); feedback.connect(delayFilter);
                delayFilter.connect(delay); delay.connect(masterGain);
                delayRef.current = delay;

                // Shared white noise buffer for drums/perc
                const bufferSize = ctx.sampleRate * 2;
                const noiseBuffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const output = noiseBuffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    output[i] = Math.random() * 2 - 1;
                }
                noiseBufferRef.current = noiseBuffer;

                setHasStarted(true);
            }, []);

            // --- 2. Tone Generation ---
            const playTone = useCallback((relY, instrumentKey) => {
                const ctx = audioCtxRef.current;
                if (!ctx) return;

                const inst = INSTRUMENTS[instrumentKey];
                const now = ctx.currentTime;
                const gain = ctx.createGain();
                gain.connect(masterGainRef.current);
                
                // Route a bit of everything to the global delay tail
                const delaySend = ctx.createGain();
                delaySend.gain.value = (inst.isDrum || inst.isPerc) ? 0.1 : 0.6;
                delaySend.connect(delayRef.current);
                gain.connect(delaySend);

                if (inst.isPerc) {
                    if (relY < 0.25) { // Clave
                        const osc = ctx.createOscillator(); osc.type = 'sine';
                        osc.frequency.setValueAtTime(2500, now); osc.frequency.exponentialRampToValueAtTime(2000, now + 0.05);
                        osc.connect(gain);
                        gain.gain.setValueAtTime(0.5, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                        osc.start(now); osc.stop(now + 0.05);
                    } else if (relY < 0.5) { // Snap/Click
                        const noiseSrc = ctx.createBufferSource(); noiseSrc.buffer = noiseBufferRef.current;
                        const filter = ctx.createBiquadFilter(); filter.type = 'highpass'; filter.frequency.value = 5000;
                        noiseSrc.connect(filter); filter.connect(gain);
                        gain.gain.setValueAtTime(0.5, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.03);
                        noiseSrc.start(now);
                    } else if (relY < 0.75) { // High Conga
                        const osc = ctx.createOscillator(); osc.type = 'sine';
                        osc.frequency.setValueAtTime(400, now); osc.frequency.exponentialRampToValueAtTime(200, now + 0.15);
                        osc.connect(gain);
                        gain.gain.setValueAtTime(0.6, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                        osc.start(now); osc.stop(now + 0.15);
                    } else { // Low Conga
                        const osc = ctx.createOscillator(); osc.type = 'sine';
                        osc.frequency.setValueAtTime(200, now); osc.frequency.exponentialRampToValueAtTime(100, now + 0.2);
                        osc.connect(gain);
                        gain.gain.setValueAtTime(0.7, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                        osc.start(now); osc.stop(now + 0.2);
                    }
                    return;
                }

                if (inst.isDrum) {
                    if (relY < 0.25) { // Hi-Hat
                        const noiseSrc = ctx.createBufferSource(); noiseSrc.buffer = noiseBufferRef.current;
                        const filter = ctx.createBiquadFilter(); filter.type = 'highpass'; filter.frequency.value = 8000;
                        noiseSrc.connect(filter); filter.connect(gain);
                        gain.gain.setValueAtTime(0.3, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                        noiseSrc.start(now);
                    } else if (relY < 0.5) { // Snare
                        const noiseSrc = ctx.createBufferSource(); noiseSrc.buffer = noiseBufferRef.current;
                        const filter = ctx.createBiquadFilter(); filter.type = 'bandpass'; filter.frequency.value = 2500;
                        const noiseGain = ctx.createGain(); noiseSrc.connect(filter); filter.connect(noiseGain); noiseGain.connect(gain);
                        noiseGain.gain.setValueAtTime(0.4, now); noiseGain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
                        noiseSrc.start(now);
                        const osc = ctx.createOscillator(); osc.frequency.setValueAtTime(200, now); osc.frequency.exponentialRampToValueAtTime(100, now + 0.1);
                        const oscGain = ctx.createGain(); osc.connect(oscGain); oscGain.connect(gain);
                        oscGain.gain.setValueAtTime(0.3, now); oscGain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                        osc.start(now); osc.stop(now + 0.2);
                    } else if (relY < 0.75) { // Tom
                        const osc = ctx.createOscillator(); osc.frequency.setValueAtTime(250, now); osc.frequency.exponentialRampToValueAtTime(120, now + 0.1);
                        osc.connect(gain); gain.gain.setValueAtTime(0.4, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                        osc.start(now); osc.stop(now + 0.3);
                    } else { // Kick
                        const osc = ctx.createOscillator(); osc.frequency.setValueAtTime(120, now); osc.frequency.exponentialRampToValueAtTime(40, now + 0.1);
                        osc.connect(gain); gain.gain.setValueAtTime(0.8, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                        osc.start(now); osc.stop(now + 0.5);
                    }
                    return; 
                }

                // Melodic Instruments
                const noteIndex = Math.max(0, Math.min(Math.floor(relY * PENTATONIC_SCALE.length), PENTATONIC_SCALE.length - 1));
                const frequency = PENTATONIC_SCALE[noteIndex];

                const osc = ctx.createOscillator();
                const filter = ctx.createBiquadFilter();

                osc.type = inst.type;
                osc.frequency.value = frequency;
                filter.type = 'lowpass'; filter.frequency.value = inst.filterFreq;

                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.5, now + inst.attack);
                gain.gain.exponentialRampToValueAtTime(0.001, now + inst.attack + inst.release);

                osc.connect(filter); filter.connect(gain);
                osc.start(now); osc.stop(now + inst.attack + inst.release + 0.1);
            }, []);

            // --- 3. Event Handling (Visuals + Audio + Recording) ---
            const triggerEvent = useCallback((relX, relY, instrumentKey, isPlayback = false) => {
                playTone(relY, instrumentKey);

                const absX = relX * window.innerWidth;
                const absY = relY * window.innerHeight;
                
                const newRipple = { id: Date.now() + Math.random(), x: absX, y: absY, color: INSTRUMENTS[instrumentKey].color };
                setRipples(prev => [...prev, newRipple]);
                setTimeout(() => setRipples(prev => prev.filter(r => r.id !== newRipple.id)), 4000);

                if (!isPlayback) {
                    pedals.forEach(pedal => {
                        // Record into the currently active recording pedal for THIS instrument
                        if (pedal.state === 'recording' && pedal.instKey === instrumentKey) {
                            const track = tracksRef.current[pedal.id];
                            track.events.push({ timeOffset: Date.now() - track.startTime, relX, relY, instrumentKey });
                        }
                    });
                }
            }, [pedals, playTone]);

            const handlePlayAreaClick = (e) => {
                initAudio();
                const rect = e.currentTarget.getBoundingClientRect();
                const relX = (e.clientX - rect.left) / rect.width;
                const relY = (e.clientY - rect.top) / rect.height;
                triggerEvent(relX, relY, activeInstKey, false);
            };

            // --- 4. Looper System (Instrument Specific) ---
            const startPlayback = (pedalId) => {
                const track = tracksRef.current[pedalId];
                if (!track || track.events.length === 0) return;

                const scheduleEvents = () => {
                    track.timeouts = track.events.map(ev => 
                        setTimeout(() => triggerEvent(ev.relX, ev.relY, ev.instrumentKey, true), ev.timeOffset)
                    );
                };

                scheduleEvents();
                track.interval = setInterval(scheduleEvents, track.duration);
            };

            const stopPlayback = (pedalId) => {
                const track = tracksRef.current[pedalId];
                if (!track) return;
                clearInterval(track.interval);
                track.timeouts.forEach(clearTimeout);
            };

            // Switch instrument logic (auto-closes recording loops)
            const switchInstrument = (newInstKey) => {
                setPedals(prev => {
                    let changed = false;
                    const updated = prev.map(p => {
                        if (p.state === 'recording') {
                            changed = true;
                            const track = tracksRef.current[p.id];
                            track.duration = Math.max(Date.now() - track.startTime, 1000);
                            startPlayback(p.id);
                            return { ...p, state: 'playing' };
                        }
                        return p;
                    });
                    return changed ? updated : prev;
                });
                setActiveInstKey(newInstKey);
                initAudio();
            };

            const togglePedal = (pedalId, e) => {
                e.stopPropagation(); initAudio();
                setPedals(prev => {
                    const pedal = prev.find(p => p.id === pedalId);
                    if (!pedal) return prev;

                    if (pedal.state === 'recording') {
                        const track = tracksRef.current[pedalId];
                        track.duration = Math.max(Date.now() - track.startTime, 1000);
                        startPlayback(pedalId);
                        return prev.map(p => p.id === pedalId ? { ...p, state: 'playing' } : p);
                    } else if (pedal.state === 'playing') {
                        stopPlayback(pedalId);
                        delete tracksRef.current[pedalId]; // Erase track data
                        return prev.filter(p => p.id !== pedalId); // Remove pedal entirely
                    }
                    return prev;
                });
            };

            const startNewLoop = (e) => {
                e.stopPropagation(); initAudio();
                const newId = `pedal-${Date.now()}`;
                tracksRef.current[newId] = { events: [], startTime: Date.now(), duration: 0, interval: null, timeouts: [] };
                setPedals(prev => [...prev, { id: newId, instKey: activeInstKey, state: 'recording' }]);
            };

            const activePedals = pedals.filter(p => p.instKey === activeInstKey);
            const isCurrentlyRecording = activePedals.some(p => p.state === 'recording');

            return (
                <div className="container">
                    <div className="play-area" onPointerDown={handlePlayAreaClick} />

                    {!hasStarted && <div className="instruction">TAP TO PLAY<br/><span style={{fontSize: '10px', marginTop: '10px', display: 'block'}}>Use bottom controls to loop</span></div>}

                    {ripples.map(ripple => (
                        <div key={ripple.id} className="ripple" style={{ left: ripple.x, top: ripple.y, color: ripple.color }} />
                    ))}

                    {/* Top UI: Instruments */}
                    <div className="controls-top">
                        {Object.values(INSTRUMENTS).map(inst => {
                            const hasActiveLoops = pedals.some(p => p.instKey === inst.id && p.state === 'playing');
                            return (
                                <button 
                                    key={inst.id}
                                    className={`instrument-btn ${activeInstKey === inst.id ? 'active' : ''}`}
                                    style={activeInstKey === inst.id ? { color: inst.color, borderColor: inst.color } : {}}
                                    onClick={(e) => { e.stopPropagation(); switchInstrument(inst.id); }}
                                >
                                    {inst.name}
                                    {hasActiveLoops && <span className="active-dot" style={{ backgroundColor: inst.color }}></span>}
                                </button>
                            );
                        })}
                    </div>

                    {/* Bottom UI: Instrument-Specific Looper Pedals */}
                    <div className="controls-bottom">
                        {activePedals.map(pedal => (
                            <div 
                                key={pedal.id}
                                className={`pedal ${pedal.state}`}
                                onPointerDown={(e) => togglePedal(pedal.id, e)}
                            >
                                <div className={pedal.state === 'recording' ? 'pedal-icon square' : 'pedal-icon delete-icon'}></div>
                            </div>
                        ))}
                        
                        {/* Only show the Add button if we aren't already recording on this instrument */}
                        {!isCurrentlyRecording && (
                            <div className="pedal add-loop" onPointerDown={startNewLoop}>
                                <div className="pedal-icon plus">+</div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
