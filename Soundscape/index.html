<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Bloom (Expanded Replica)</title>
    
    <!-- React & ReactDOM via CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            background: #000;
            touch-action: none; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none; -webkit-user-select: none;
        }

        #root { width: 100%; height: 100%; }

        .container {
            width: 100vw; height: 100vh; position: relative; overflow: hidden;
            transition: background 0.5s ease;
        }

        .play-area {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 1;
        }

        /* --- UI Controls Top --- */
        .controls-top {
            position: absolute; top: 50px; left: 0; right: 0;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            padding: 0 10px; z-index: 10; pointer-events: none;
        }

        .categories-row {
            display: flex; justify-content: center; gap: 15px;
            background: rgba(0,0,0,0.3); padding: 8px 15px; border-radius: 30px;
            pointer-events: auto; border: 1px solid rgba(255,255,255,0.1);
        }

        .category-icon {
            font-size: 20px; cursor: pointer; opacity: 0.4; filter: grayscale(100%);
            transition: all 0.3s; line-height: 1; margin: 0; padding: 0; background: none; border: none;
        }
        .category-icon.active {
            opacity: 1; filter: grayscale(0%); transform: scale(1.2);
        }

        .instruments-row {
            display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; pointer-events: auto;
        }

        .instrument-btn {
            position: relative; pointer-events: auto;
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.7); padding: 5px 10px; border-radius: 20px;
            font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
            transition: all 0.3s; cursor: pointer;
        }
        .instrument-btn.active {
            background: rgba(255, 255, 255, 0.2); border-color: white; color: white;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .active-dot {
            position: absolute; top: -2px; right: -2px;
            width: 6px; height: 6px; border-radius: 50%;
            box-shadow: 0 0 6px currentColor;
        }

        /* Top Left Theme Toggle */
        .theme-toggle {
            position: absolute; top: 15px; left: 15px; pointer-events: auto; z-index: 40;
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.3); color: white;
            padding: 6px 12px; border-radius: 20px; font-size: 10px; font-weight: bold; letter-spacing: 0.5px;
            cursor: pointer; transition: all 0.3s; display: flex; align-items: center; gap: 5px;
        }
        .theme-toggle:hover { background: rgba(255,255,255,0.2); }
        .theme-menu {
            position: absolute; top: 45px; left: 15px; z-index: 40;
            background: rgba(10, 15, 30, 0.95); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
            padding: 5px; display: flex; flex-direction: column; gap: 5px;
            transform-origin: top left; transition: all 0.2s;
            opacity: 0; pointer-events: none; transform: scale(0.95);
        }
        .theme-menu.open { opacity: 1; pointer-events: auto; transform: scale(1); }
        .theme-option {
            background: transparent; border: none; color: white; text-align: left;
            padding: 8px 12px; border-radius: 5px; font-size: 10px; cursor: pointer;
            transition: all 0.2s; font-weight: bold; display: flex; align-items: center; gap: 8px;
        }
        .theme-option:hover, .theme-option.active { background: rgba(255,255,255,0.15); }

        /* Top Right Record / Download Button */
        .download-toggle {
            position: absolute; top: 15px; right: 15px; pointer-events: auto; z-index: 30;
            background: rgba(255, 50, 100, 0.2); border: 1px solid #ff3366; color: #ff3366;
            padding: 6px 12px; border-radius: 20px; font-size: 10px; font-weight: bold; letter-spacing: 0.5px;
            cursor: pointer; box-shadow: 0 0 10px rgba(255,50,100,0.3);
            transition: all 0.3s; display: flex; align-items: center; gap: 5px;
        }
        .download-toggle.recording {
            background: rgba(255, 50, 100, 0.6); color: white;
            animation: pulseRecord 1s infinite alternate;
        }

        /* Toggles - Made smaller */
        .editor-toggle {
            position: absolute; bottom: 25px; right: 15px; pointer-events: auto; z-index: 30;
            background: rgba(0, 255, 204, 0.2); border: 1px solid #00ffcc; color: #00ffcc;
            padding: 4px 8px; border-radius: 15px; font-size: 9px; font-weight: bold; letter-spacing: 0.5px;
            cursor: pointer; box-shadow: 0 0 8px rgba(0,255,204,0.3);
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .editor-toggle.open { transform: translateY(-45vh); }

        .soundscape-toggle {
            position: absolute; bottom: 25px; left: 15px; pointer-events: auto; z-index: 30;
            background: rgba(255, 170, 0, 0.2); border: 1px solid #ffaa00; color: #ffaa00;
            padding: 4px 8px; border-radius: 15px; font-size: 9px; font-weight: bold; letter-spacing: 0.5px;
            cursor: pointer; box-shadow: 0 0 8px rgba(255,170,0,0.3);
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .soundscape-toggle.open { transform: translateY(-45vh); }

        .slider-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; font-size: 11px; }
        .slider-row label { width: 90px; font-weight: bold; color: rgba(255,255,255,0.8); text-transform: uppercase;}
        .slider-row input[type=range] { flex: 1; margin: 0 15px; accent-color: #ffaa00; cursor: pointer; }
        .slider-row span { width: 45px; text-align: right; opacity: 0.6; }

        /* --- Loops Bottom --- */
        .controls-bottom {
            position: absolute; bottom: 30px; left: 0; right: 0;
            display: flex; justify-content: center; gap: 15px; flex-wrap: wrap;
            padding: 0 90px; z-index: 10; pointer-events: none; /* Pads for toggles */
        }

        .pedal {
            pointer-events: auto; width: 40px; height: 40px; border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.3); background: rgba(0, 0, 0, 0.4);
            cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center;
        }
        
        .pedal.recording {
            border-color: #ff3366; background: rgba(255, 51, 102, 0.2);
            box-shadow: 0 0 15px rgba(255, 51, 102, 0.6);
            animation: pulseRecord 1s infinite alternate;
        }

        .pedal.playing {
            border-color: #00ffcc; background: rgba(0, 255, 204, 0.2);
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.4);
        }

        .pedal.add-loop { border-color: rgba(255, 255, 255, 0.2); border-style: dashed; }
        .pedal-icon { transition: all 0.3s; }
        .pedal.recording .pedal-icon { width: 12px; height: 12px; background: #ff3366; border-radius: 2px; }
        .pedal-icon.plus { color: rgba(255,255,255,0.5); font-size: 20px; font-weight: 300; line-height: 1; margin-top: -2px;}
        .pedal-icon.delete-icon { position: relative; width: 12px; height: 12px; }
        .pedal-icon.delete-icon::before, .pedal-icon.delete-icon::after {
            content: ''; position: absolute; top: 50%; left: 0; right: 0;
            height: 2px; background: #00ffcc; border-radius: 2px;
        }
        .pedal-icon.delete-icon::before { transform: translateY(-50%) rotate(45deg); }
        .pedal-icon.delete-icon::after { transform: translateY(-50%) rotate(-45deg); }

        /* --- Panels --- */
        .editor-panel {
            position: absolute; bottom: 0; left: 0; right: 0; height: 45vh;
            background: rgba(10, 15, 30, 0.95); border-top: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px); z-index: 25; display: flex; flex-direction: column;
            transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            padding: 20px; box-sizing: border-box; color: white; pointer-events: auto;
        }
        .editor-panel.open { transform: translateY(0); }
        .editor-header { font-size: 14px; font-weight: 300; letter-spacing: 2px; margin-bottom: 20px; opacity: 0.7; }
        .editor-header span { font-size: 10px; opacity: 0.5; display: block; margin-top: 4px; }
        .editor-scroll { flex: 1; overflow-y: auto; padding-right: 10px; }
        
        .track-row { display: flex; align-items: center; margin-bottom: 20px; }
        .track-label { width: 60px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .track-container { flex: 1; height: 45px; background: rgba(255,255,255,0.05); position: relative; border-radius: 6px; overflow: hidden; }
        .track-ruler { position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; background-image: linear-gradient(90deg, rgba(255,255,255,0.1) 1px, transparent 1px); background-size: 16.66% 100%; }
        
        .loop-block { position: absolute; top: 0; bottom: 0; background: rgba(255,255,255,0.08); border: 1px solid; border-radius: 6px; cursor: grab; }
        .loop-block:active { cursor: grabbing; background: rgba(255,255,255,0.15); }
        .loop-dot { position: absolute; top: 50%; width: 8px; height: 8px; border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 6px currentColor; pointer-events: none; }
        
        .resize-handle { position: absolute; top: 0; bottom: 0; width: 15px; background: rgba(255,255,255,0.2); cursor: ew-resize; z-index: 5; }
        .resize-handle.left { left: 0; border-right: 1px solid rgba(255,255,255,0.3); border-radius: 5px 0 0 5px; }
        .resize-handle.right { right: 0; border-left: 1px solid rgba(255,255,255,0.3); border-radius: 0 5px 5px 0; }

        .duplicate-btn {
            background: none; border: none; color: white; cursor: pointer; opacity: 0.3;
            font-size: 14px; margin-left: 10px; transition: opacity 0.3s;
        }
        .duplicate-btn:hover { opacity: 1; }

        /* --- Modals --- */
        .modal-backdrop {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.8); z-index: 100;
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(5px); pointer-events: auto;
        }
        .modal-content {
            background: rgba(20, 25, 40, 0.95); border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 20px; border-radius: 10px; width: 85%; max-width: 400px;
            color: white; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .modal-content h3 { margin-top: 0; font-weight: 300; letter-spacing: 2px; color: #00ffcc; }
        .modal-btn {
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.3);
            color: white; padding: 10px 15px; border-radius: 5px; cursor: pointer;
            transition: all 0.2s; font-size: 11px; font-weight: bold; flex: 1; letter-spacing: 1px;
        }
        .modal-btn.primary { background: rgba(0, 255, 204, 0.2); border-color: #00ffcc; color: #00ffcc; }
        .modal-btn:hover { background: rgba(255, 255, 255, 0.2); }
        .reset-btn {
            background: none; border: 1px solid currentColor; color: inherit;
            padding: 4px 8px; border-radius: 4px; font-size: 9px; cursor: pointer; opacity: 0.7;
        }
        .reset-btn:hover { opacity: 1; background: rgba(255,255,255,0.1); }

        /* --- Visuals --- */
        .ripple {
            position: absolute; border-radius: 50%; transform: translate(-50%, -50%);
            animation: expandFade 4s ease-out forwards; pointer-events: none;
            border: 2px solid; box-shadow: inset 0 0 20px currentColor, 0 0 20px currentColor; z-index: 2;
        }

        @keyframes expandFade {
            0% { width: 0px; height: 0px; opacity: 0.8; border-width: 8px; }
            100% { width: 300px; height: 300px; opacity: 0; border-width: 1px; }
        }
        @keyframes pulseRecord {
            from { transform: scale(1); } to { transform: scale(1.1); }
        }

        .instruction {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.3); font-weight: 300; letter-spacing: 3px;
            pointer-events: none; transition: opacity 1s; z-index: 0; text-align: center;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // Vibe/Theme Configurations
        const THEMES = {
            SOOTHING: {
                id: 'SOOTHING', name: 'Soothing', icon: '🌿',
                bg: 'linear-gradient(180deg, #151a30 0%, #080811 100%)',
                scale: [261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33, 659.25, 783.99, 880.00].reverse(), // C Maj Pent
                attackMult: 1.0, releaseMult: 1.0, filterMult: 1.0, drumPitch: 0, drumDecay: 1.0, chorus: 0.0
            },
            DANCE: {
                id: 'DANCE', name: 'Dance', icon: '🪩',
                bg: 'linear-gradient(180deg, #1c0024 0%, #000000 100%)',
                scale: [261.63, 311.13, 349.23, 392.00, 466.16, 523.25, 622.25, 698.46, 783.99, 932.33].reverse(), // C Min Pent
                attackMult: 0.1, releaseMult: 0.5, filterMult: 1.5, drumPitch: -150, drumDecay: 0.6, chorus: 0.0,
                waveMap: { 'sine': 'triangle' } // Make soft sines slightly buzzier
            },
            POP: {
                id: 'POP', name: 'Pop', icon: '⭐',
                bg: 'linear-gradient(180deg, #0f2027 0%, #203a43 50%, #2c5364 100%)',
                scale: [261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33, 659.25, 783.99, 880.00].reverse(), // C Maj Pent
                attackMult: 0.3, releaseMult: 0.7, filterMult: 1.2, drumPitch: 50, drumDecay: 0.8, chorus: 0.1
            },
            LOFI: {
                id: 'LOFI', name: 'Lo-Fi', icon: '☕',
                bg: 'linear-gradient(180deg, #2a1f1a 0%, #0a0805 100%)',
                scale: [174.61, 196.00, 220.00, 261.63, 293.66, 349.23, 392.00, 440.00, 523.25, 587.33].reverse(), // F Maj Pent (Warm/Low)
                attackMult: 1.5, releaseMult: 1.2, filterMult: 0.4, drumPitch: -300, drumDecay: 1.2, chorus: 0.5 // High default chorus for wobble
            },
            ELECTRO: {
                id: 'ELECTRO', name: 'Electro', icon: '⚡',
                bg: 'linear-gradient(180deg, #001f11 0%, #000000 100%)',
                scale: [261.63, 311.13, 349.23, 392.00, 466.16, 523.25, 622.25, 698.46, 783.99, 932.33].reverse(), // C Min Pent
                attackMult: 0.05, releaseMult: 0.3, filterMult: 2.0, drumPitch: -50, drumDecay: 0.4, chorus: 0.2,
                waveOverride: 'sawtooth' // Force harsh waves
            }
        };

        const CATEGORIES = [
            { id: 'STRING', icon: '🎻', name: 'String' },
            { id: 'WOODWIND', icon: '🎷', name: 'Woodwind' },
            { id: 'BRASS', icon: '🎺', name: 'Brass' },
            { id: 'KEYBOARD', icon: '🎹', name: 'Keyboard' },
            { id: 'PERCUSSION', icon: '🥁', name: 'Percussion' },
            { id: 'DIGITAL', icon: '💻', name: 'Digital' }
        ];

        const INSTRUMENTS = {
            // Strings
            HARP: { id: 'HARP', cat: 'STRING', name: 'Harp', type: 'sine', attack: 0.01, release: 2.0, filterFreq: 3000, color: '#ffaaaa' },
            CELLO: { id: 'CELLO', cat: 'STRING', name: 'Cello', type: 'sawtooth', attack: 0.5, release: 1.5, filterFreq: 800, color: '#ff8888' },
            VIOLIN: { id: 'VIOLIN', cat: 'STRING', name: 'Violin', type: 'sawtooth', attack: 0.3, release: 1.0, filterFreq: 1200, color: '#ff6666' },
            GUITAR: { id: 'GUITAR', cat: 'STRING', name: 'Guitar', type: 'triangle', attack: 0.02, release: 1.5, filterFreq: 2500, color: '#ffaa66' },
            SITAR: { id: 'SITAR', cat: 'STRING', name: 'Sitar', type: 'triangle', attack: 0.01, release: 2.5, filterFreq: 4000, color: '#ff8844' },
            KOTO: { id: 'KOTO', cat: 'STRING', name: 'Koto', type: 'sine', attack: 0.01, release: 1.0, filterFreq: 3500, color: '#ff6622' },
            // Woodwind
            FLUTE: { id: 'FLUTE', cat: 'WOODWIND', name: 'Flute', type: 'sine', attack: 0.2, release: 1.0, filterFreq: 1500, color: '#88ffcc' },
            CLARINET: { id: 'CLARINET', cat: 'WOODWIND', name: 'Clarinet', type: 'square', attack: 0.1, release: 0.8, filterFreq: 1000, color: '#66ffaa' },
            OBOE: { id: 'OBOE', cat: 'WOODWIND', name: 'Oboe', type: 'sawtooth', attack: 0.1, release: 0.8, filterFreq: 1200, color: '#44ff88' },
            BASSOON: { id: 'BASSOON', cat: 'WOODWIND', name: 'Bassoon', type: 'square', attack: 0.2, release: 1.0, filterFreq: 600, color: '#22ff66' },
            SHAKUHACHI: { id: 'SHAKUHACHI', cat: 'WOODWIND', name: 'Shakuhachi', type: 'sine', attack: 0.3, release: 1.5, filterFreq: 1000, color: '#00ff44' },
            PAN_FLUTE: { id: 'PAN_FLUTE', cat: 'WOODWIND', name: 'Pan Flute', type: 'triangle', attack: 0.1, release: 1.2, filterFreq: 1800, color: '#00cc22' },
            // Brass
            TRUMPET: { id: 'TRUMPET', cat: 'BRASS', name: 'Trumpet', type: 'sawtooth', attack: 0.1, release: 0.5, filterFreq: 2500, color: '#ffffaa' },
            FRENCH_HORN: { id: 'FRENCH_HORN', cat: 'BRASS', name: 'Horn', type: 'sawtooth', attack: 0.3, release: 1.0, filterFreq: 1000, color: '#ffff88' },
            TROMBONE: { id: 'TROMBONE', cat: 'BRASS', name: 'Trombone', type: 'square', attack: 0.2, release: 0.8, filterFreq: 800, color: '#ffff66' },
            TUBA: { id: 'TUBA', cat: 'BRASS', name: 'Tuba', type: 'square', attack: 0.3, release: 1.0, filterFreq: 400, color: '#ffff44' },
            SYNTH_BRASS: { id: 'SYNTH_BRASS', cat: 'BRASS', name: 'Synth', type: 'sawtooth', attack: 0.1, release: 1.5, filterFreq: 3000, color: '#ffff22' },
            MUTED_TRUMPET: { id: 'MUTED_TRUMPET', cat: 'BRASS', name: 'Muted', type: 'triangle', attack: 0.05, release: 0.6, filterFreq: 1500, color: '#cccc00' },
            // Keyboard
            PIANO: { id: 'PIANO', cat: 'KEYBOARD', name: 'Piano', type: 'triangle', attack: 0.01, release: 2.0, filterFreq: 2000, color: '#eeaaff' },
            RHODES: { id: 'RHODES', cat: 'KEYBOARD', name: 'Rhodes', type: 'sine', attack: 0.02, release: 2.5, filterFreq: 1200, color: '#dd88ff' },
            ORGAN: { id: 'ORGAN', cat: 'KEYBOARD', name: 'Organ', type: 'square', attack: 0.05, release: 0.5, filterFreq: 1800, color: '#cc66ff' },
            HARPSICHORD: { id: 'HARPSICHORD', cat: 'KEYBOARD', name: 'Harpsichord', type: 'sawtooth', attack: 0.01, release: 1.0, filterFreq: 3500, color: '#bb44ff' },
            CELESTA: { id: 'CELESTA', cat: 'KEYBOARD', name: 'Celesta', type: 'sine', attack: 0.01, release: 1.5, filterFreq: 4000, color: '#aa22ff' },
            CLAVINET: { id: 'CLAVINET', cat: 'KEYBOARD', name: 'Clavinet', type: 'square', attack: 0.01, release: 0.5, filterFreq: 2500, color: '#9900ff' },
            // Percussion
            DRUMS: { id: 'DRUMS', cat: 'PERCUSSION', name: 'Drums', isDrum: true, color: '#ff5555' },
            PERC: { id: 'PERC', cat: 'PERCUSSION', name: 'Perc', isPerc: true, color: '#ff3333' },
            TIMPANI: { id: 'TIMPANI', cat: 'PERCUSSION', name: 'Timpani', type: 'sine', attack: 0.05, release: 2.0, filterFreq: 400, color: '#ff1111' },
            MARIMBA: { id: 'MARIMBA', cat: 'PERCUSSION', name: 'Marimba', type: 'triangle', attack: 0.01, release: 0.6, filterFreq: 2500, color: '#ffcc77' },
            VIBRAPHONE: { id: 'VIBRAPHONE', cat: 'PERCUSSION', name: 'Vibraphone', type: 'sine', attack: 0.01, release: 3.0, filterFreq: 2000, color: '#ccaa55' },
            STEEL_PAN: { id: 'STEEL_PAN', cat: 'PERCUSSION', name: 'Steel Pan', type: 'triangle', attack: 0.02, release: 1.5, filterFreq: 3000, color: '#aa8833' },
            // Digital
            BELL: { id: 'BELL', cat: 'DIGITAL', name: 'Bell', type: 'sine', attack: 0.05, release: 2.5, filterFreq: 2000, color: '#00ffff' },
            PAD: { id: 'PAD', cat: 'DIGITAL', name: 'Pad', type: 'triangle', attack: 0.8, release: 3.5, filterFreq: 1200, color: '#00ccff' },
            SYNTH: { id: 'SYNTH', cat: 'DIGITAL', name: 'Synth', type: 'square', attack: 0.1, release: 1.5, filterFreq: 600, color: '#0099ff' },
            CHOIR: { id: 'CHOIR', cat: 'DIGITAL', name: 'Choir', type: 'triangle', attack: 1.5, release: 3.0, filterFreq: 900, color: '#0066ff' },
            BIT8: { id: 'BIT8', cat: 'DIGITAL', name: '8-Bit', type: 'square', attack: 0.01, release: 0.5, filterFreq: 4000, color: '#0033ff' },
            DRONE: { id: 'DRONE', cat: 'DIGITAL', name: 'Drone', type: 'sawtooth', attack: 2.0, release: 5.0, filterFreq: 400, color: '#0000ff' }
        };

        const WAVE_TYPES = ['sine', 'triangle', 'square', 'sawtooth'];
        const WAVE_NAMES = ['SINE', 'TRI', 'SQR', 'SAW'];

        function LoopTrackRow({ pedal, trackData, onRestart, onDuplicate, forceUpdate }) {
            const trackRef = useRef(null);
            const [localStart, setLocalStart] = useState(trackData.loopStart || 0);
            const [localEnd, setLocalEnd] = useState(trackData.loopEnd || 30000);
            const [localShift, setLocalShift] = useState(trackData.shift || 0);
            const inst = INSTRUMENTS[pedal.instKey];

            useEffect(() => {
                setLocalStart(trackData.loopStart || 0);
                setLocalEnd(trackData.loopEnd || 30000);
                setLocalShift(trackData.shift || 0);
            }, [trackData.loopStart, trackData.loopEnd, trackData.shift]);

            const handlePointerDown = (e, type) => {
                e.stopPropagation();
                const startX = e.clientX;
                const sStart = trackData.loopStart || 0;
                const sEnd = trackData.loopEnd || 30000;
                const sShift = trackData.shift || 0;
                
                // Track width represents max possible loop duration (30s)
                const trackWidth = trackRef.current.getBoundingClientRect().width;
                const msPerPixel = 30000 / trackWidth;

                const onMove = (moveEvent) => {
                    const deltaX = moveEvent.clientX - startX;
                    const deltaMs = deltaX * msPerPixel;
                    
                    if (type === 'resize-left') {
                        let newStart = Math.min(sEnd - 500, Math.max(0, sStart + deltaMs));
                        setLocalStart(newStart); trackData.loopStart = newStart;
                    } else if (type === 'resize-right') {
                        let newEnd = Math.min(30000, Math.max(sStart + 500, sEnd + deltaMs));
                        setLocalEnd(newEnd); trackData.loopEnd = newEnd;
                    } else if (type === 'shift') {
                        const loopLength = sEnd - sStart;
                        let newShift = (sShift + deltaMs) % loopLength;
                        if (newShift < 0) newShift += loopLength;
                        setLocalShift(newShift); trackData.shift = newShift;
                    }
                    forceUpdate(Date.now()); 
                };
                const onUp = () => {
                    window.removeEventListener('pointermove', onMove); window.removeEventListener('pointerup', onUp);
                    onRestart(pedal.id);
                };
                window.addEventListener('pointermove', onMove); window.addEventListener('pointerup', onUp);
            };

            const leftPct = (localStart / 30000) * 100;
            const widthPct = ((localEnd - localStart) / 30000) * 100;

            // Only visually render events that are within the trimmed loop window
            const validEvents = trackData.events.filter(ev => ev.timeOffset >= localStart && ev.timeOffset <= localEnd);

            return (
                <div className="track-row">
                    <div className="track-label" style={{color: inst.color}}>{inst.name}</div>
                    <div className="track-container" ref={trackRef}>
                        <div className="track-ruler"></div>
                        <div className="loop-block" style={{ left: `${leftPct}%`, width: `${widthPct}%`, borderColor: inst.color }} onPointerDown={(e) => handlePointerDown(e, 'shift')}>
                            {validEvents.map((ev, i) => {
                                const loopLength = localEnd - localStart;
                                let visualTime = (ev.timeOffset - localStart + localShift) % loopLength;
                                if (visualTime < 0) visualTime += loopLength;
                                return <div key={i} className="loop-dot" style={{ left: `${(visualTime / loopLength) * 100}%`, backgroundColor: inst.color }} />
                            })}
                            <div className="resize-handle left" onPointerDown={(e) => handlePointerDown(e, 'resize-left')}></div>
                            <div className="resize-handle right" onPointerDown={(e) => handlePointerDown(e, 'resize-right')}></div>
                        </div>
                    </div>
                    <button className="duplicate-btn" onClick={() => onDuplicate(pedal.id)} title="Duplicate Loop">📋</button>
                </div>
            );
        }

        function App() {
            const [hasStarted, setHasStarted] = useState(false);
            const [activeThemeId, setActiveThemeId] = useState('SOOTHING');
            const [isThemeMenuOpen, setIsThemeMenuOpen] = useState(false);
            
            const [activeCat, setActiveCat] = useState('DIGITAL');
            const [activeInstKey, setActiveInstKey] = useState('BELL');
            const [ripples, setRipples] = useState([]);
            const [isEditorOpen, setIsEditorOpen] = useState(false);
            const [isSoundscapeOpen, setIsSoundscapeOpen] = useState(false);
            const [, setForceRender] = useState(0);
            const [pedals, setPedals] = useState([]);

            // Song Recording State
            const [isRecordingSong, setIsRecordingSong] = useState(false);
            const [songProgress, setSongProgress] = useState(0);
            const [previewUrl, setPreviewUrl] = useState(null);
            const [previewBlob, setPreviewBlob] = useState(null);
            const mediaRecorderRef = useRef(null);
            const recordedChunksRef = useRef([]);
            const songIntervalRef = useRef(null);

            // Per-Instrument Settings State
            const [settings, setSettings] = useState(() => {
                const init = {};
                Object.values(INSTRUMENTS).forEach(inst => {
                    init[inst.id] = {
                        pitch: 0, volume: 0.6, reverb: 0.5,
                        waveform: inst.type ? WAVE_TYPES.indexOf(inst.type) : 0,
                        decay: 1.0, chorus: 0.0
                    };
                });
                return init;
            });

            const audioCtxRef = useRef(null);
            const masterGainRef = useRef(null);
            const delayRef = useRef(null);
            const noiseBufferRef = useRef(null);
            const tracksRef = useRef({});
            const settingsRef = useRef(settings);
            const themeRef = useRef('SOOTHING');

            useEffect(() => { settingsRef.current = settings; }, [settings]);
            useEffect(() => { themeRef.current = activeThemeId; }, [activeThemeId]);

            const initAudio = useCallback(() => {
                if (audioCtxRef.current) {
                    if (audioCtxRef.current.state === 'suspended') audioCtxRef.current.resume();
                    return;
                }
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                const ctx = new AudioContext();
                audioCtxRef.current = ctx;

                const masterGain = ctx.createGain(); masterGain.gain.value = 0.5;
                masterGain.connect(ctx.destination);
                masterGainRef.current = masterGain;

                const delay = ctx.createDelay(); delay.delayTime.value = 3.5; 
                const feedback = ctx.createGain(); feedback.gain.value = 0.55;
                const delayFilter = ctx.createBiquadFilter(); delayFilter.type = 'lowpass'; delayFilter.frequency.value = 800;

                delay.connect(feedback); feedback.connect(delayFilter);
                delayFilter.connect(delay); delay.connect(masterGain);
                delayRef.current = delay;

                const bufferSize = ctx.sampleRate * 2;
                const noiseBuffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const output = noiseBuffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1;
                noiseBufferRef.current = noiseBuffer;

                // Setup MediaStream Destination for downloading "Songs"
                const dest = ctx.createMediaStreamDestination();
                masterGain.connect(dest);
                
                // Use webm if supported (native in Chrome/Firefox offline), fallback gracefully
                let mimeType = 'audio/webm';
                if (!MediaRecorder.isTypeSupported(mimeType)) mimeType = ''; // Let browser choose

                mediaRecorderRef.current = new MediaRecorder(dest.stream, { mimeType });
                mediaRecorderRef.current.ondataavailable = (e) => {
                    if (e.data.size > 0) recordedChunksRef.current.push(e.data);
                };
                mediaRecorderRef.current.onstop = () => {
                    const blob = new Blob(recordedChunksRef.current, { type: mimeType || 'audio/mp4' });
                    const url = URL.createObjectURL(blob);
                    setPreviewBlob({ blob, mimeType: mimeType || 'audio/mp4' });
                    setPreviewUrl(url);
                    recordedChunksRef.current = [];
                    setIsRecordingSong(false);
                    setSongProgress(0);
                };

                setHasStarted(true);
            }, []);

            const toggleSongRecord = () => {
                if (isRecordingSong) {
                    mediaRecorderRef.current.stop();
                    clearInterval(songIntervalRef.current);
                } else {
                    initAudio();
                    recordedChunksRef.current = [];
                    mediaRecorderRef.current.start();
                    setIsRecordingSong(true);
                    setSongProgress(0);
                    
                    let time = 0;
                    songIntervalRef.current = setInterval(() => {
                        time++;
                        setSongProgress(time);
                        if (time >= 180) { // Max song length 3 minutes
                            mediaRecorderRef.current.stop();
                            clearInterval(songIntervalRef.current);
                        }
                    }, 1000);
                }
            };

            const playTone = useCallback((relY, instrumentKey) => {
                const ctx = audioCtxRef.current;
                if (!ctx) return;

                const theme = THEMES[themeRef.current];
                const currentScale = theme.scale;
                
                const inst = INSTRUMENTS[instrumentKey];
                const instSettings = settingsRef.current[instrumentKey];
                const now = ctx.currentTime;
                
                const gain = ctx.createGain();
                gain.connect(masterGainRef.current);
                
                const delaySend = ctx.createGain();
                delaySend.gain.value = instSettings.reverb;
                delaySend.connect(delayRef.current);
                gain.connect(delaySend);

                if (inst.isPerc || inst.isDrum) {
                    const pitchOffset = instSettings.pitch + theme.drumPitch;
                    const volMult = instSettings.volume;
                    const decMult = instSettings.decay * theme.drumDecay;
                    const fMult = theme.filterMult; // For modifying percussive noises per theme

                    if (inst.isPerc) {
                        if (relY < 0.25) { 
                            const osc = ctx.createOscillator(); osc.type = 'sine'; osc.detune.value = pitchOffset;
                            osc.frequency.setValueAtTime(2500 * fMult, now); osc.frequency.exponentialRampToValueAtTime(2000 * fMult, now + (0.05 * decMult));
                            osc.connect(gain); gain.gain.setValueAtTime(0.5 * volMult, now); gain.gain.exponentialRampToValueAtTime(0.01, now + (0.05 * decMult));
                            osc.start(now); osc.stop(now + (0.05 * decMult));
                        } else if (relY < 0.5) { 
                            const noiseSrc = ctx.createBufferSource(); noiseSrc.buffer = noiseBufferRef.current;
                            const filter = ctx.createBiquadFilter(); filter.type = 'highpass'; filter.frequency.value = 5000 * fMult;
                            noiseSrc.connect(filter); filter.connect(gain);
                            gain.gain.setValueAtTime(0.5 * volMult, now); gain.gain.exponentialRampToValueAtTime(0.01, now + (0.03 * decMult));
                            noiseSrc.start(now);
                        } else if (relY < 0.75) { 
                            const osc = ctx.createOscillator(); osc.type = 'sine'; osc.detune.value = pitchOffset;
                            osc.frequency.setValueAtTime(400 * fMult, now); osc.frequency.exponentialRampToValueAtTime(200 * fMult, now + (0.15 * decMult));
                            osc.connect(gain); gain.gain.setValueAtTime(0.6 * volMult, now); gain.gain.exponentialRampToValueAtTime(0.01, now + (0.15 * decMult));
                            osc.start(now); osc.stop(now + (0.15 * decMult));
                        } else { 
                            const osc = ctx.createOscillator(); osc.type = 'sine'; osc.detune.value = pitchOffset;
                            osc.frequency.setValueAtTime(200 * fMult, now); osc.frequency.exponentialRampToValueAtTime(100 * fMult, now + (0.2 * decMult));
                            osc.connect(gain); gain.gain.setValueAtTime(0.7 * volMult, now); gain.gain.exponentialRampToValueAtTime(0.01, now + (0.2 * decMult));
                            osc.start(now); osc.stop(now + (0.2 * decMult));
                        }
                    } else if (inst.isDrum) {
                        if (relY < 0.25) { 
                            const noiseSrc = ctx.createBufferSource(); noiseSrc.buffer = noiseBufferRef.current;
                            const filter = ctx.createBiquadFilter(); filter.type = 'highpass'; filter.frequency.value = 8000 * fMult;
                            noiseSrc.connect(filter); filter.connect(gain);
                            gain.gain.setValueAtTime(0.3 * volMult, now); gain.gain.exponentialRampToValueAtTime(0.01, now + (0.1 * decMult));
                            noiseSrc.start(now);
                        } else if (relY < 0.5) { 
                            const noiseSrc = ctx.createBufferSource(); noiseSrc.buffer = noiseBufferRef.current;
                            const filter = ctx.createBiquadFilter(); filter.type = 'bandpass'; filter.frequency.value = 2500 * fMult;
                            const noiseGain = ctx.createGain(); noiseSrc.connect(filter); filter.connect(noiseGain); noiseGain.connect(gain);
                            noiseGain.gain.setValueAtTime(0.4 * volMult, now); noiseGain.gain.exponentialRampToValueAtTime(0.01, now + (0.25 * decMult));
                            noiseSrc.start(now);
                            const osc = ctx.createOscillator(); osc.detune.value = pitchOffset; osc.frequency.setValueAtTime(200 * fMult, now); osc.frequency.exponentialRampToValueAtTime(100 * fMult, now + (0.1 * decMult));
                            const oscGain = ctx.createGain(); osc.connect(oscGain); oscGain.connect(gain);
                            oscGain.gain.setValueAtTime(0.3 * volMult, now); oscGain.gain.exponentialRampToValueAtTime(0.01, now + (0.2 * decMult));
                            osc.start(now); osc.stop(now + (0.2 * decMult));
                        } else if (relY < 0.75) { 
                            const osc = ctx.createOscillator(); osc.detune.value = pitchOffset; osc.frequency.setValueAtTime(250 * fMult, now); osc.frequency.exponentialRampToValueAtTime(120 * fMult, now + (0.1 * decMult));
                            osc.connect(gain); gain.gain.setValueAtTime(0.4 * volMult, now); gain.gain.exponentialRampToValueAtTime(0.01, now + (0.3 * decMult));
                            osc.start(now); osc.stop(now + (0.3 * decMult));
                        } else { 
                            const osc = ctx.createOscillator(); osc.detune.value = pitchOffset; osc.frequency.setValueAtTime(120 * fMult, now); osc.frequency.exponentialRampToValueAtTime(40 * fMult, now + (0.1 * decMult));
                            osc.connect(gain); gain.gain.setValueAtTime(0.8 * volMult, now); gain.gain.exponentialRampToValueAtTime(0.01, now + (0.5 * decMult));
                            osc.start(now); osc.stop(now + (0.5 * decMult));
                        }
                    }
                    return; 
                }

                // Melodic Instrument Theme Mapping
                const noteIndex = Math.max(0, Math.min(Math.floor(relY * currentScale.length), currentScale.length - 1));
                const frequency = currentScale[noteIndex];

                let oscType = WAVE_TYPES[instSettings.waveform] || inst.type;
                if (theme.waveOverride) oscType = theme.waveOverride;
                else if (theme.waveMap && theme.waveMap[oscType]) oscType = theme.waveMap[oscType];

                // Ensure attack is > 0 for linearRamp
                const attackTime = Math.max(0.001, inst.attack * theme.attackMult);
                const releaseTime = Math.max(0.01, inst.release * instSettings.decay * theme.releaseMult);
                
                const osc = ctx.createOscillator();
                osc.type = oscType;
                osc.frequency.value = frequency;
                osc.detune.value = instSettings.pitch;

                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass'; filter.frequency.value = inst.filterFreq * theme.filterMult;

                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(instSettings.volume, now + attackTime);
                gain.gain.exponentialRampToValueAtTime(0.001, now + attackTime + releaseTime);

                osc.connect(filter); filter.connect(gain);
                osc.start(now); osc.stop(now + attackTime + releaseTime + 0.1);

                const activeChorus = Math.max(instSettings.chorus, theme.chorus);
                if (activeChorus > 0) {
                    const chOsc = ctx.createOscillator();
                    chOsc.type = oscType;
                    chOsc.frequency.value = frequency;
                    chOsc.detune.value = instSettings.pitch + 15; // detune for chorus width
                    
                    const chGain = ctx.createGain();
                    chGain.gain.setValueAtTime(0, now);
                    chGain.gain.linearRampToValueAtTime(instSettings.volume * activeChorus, now + attackTime);
                    chGain.gain.exponentialRampToValueAtTime(0.001, now + attackTime + releaseTime);

                    chOsc.connect(filter); filter.connect(chGain);
                    chGain.connect(masterGainRef.current); chGain.connect(delaySend);
                    
                    chOsc.start(now); chOsc.stop(now + attackTime + releaseTime + 0.1);
                }
            }, []);

            const triggerEvent = useCallback((relX, relY, instrumentKey, isPlayback = false) => {
                playTone(relY, instrumentKey);
                const absX = relX * window.innerWidth;
                const absY = relY * window.innerHeight;
                
                const newRipple = { id: Date.now() + Math.random(), x: absX, y: absY, color: INSTRUMENTS[instrumentKey].color };
                setRipples(prev => [...prev, newRipple]);
                setTimeout(() => setRipples(prev => prev.filter(r => r.id !== newRipple.id)), 4000);

                if (!isPlayback) {
                    pedals.forEach(pedal => {
                        if (pedal.state === 'recording' && pedal.instKey === instrumentKey) {
                            tracksRef.current[pedal.id].events.push({ 
                                timeOffset: Date.now() - tracksRef.current[pedal.id].startTime, 
                                relX, relY, instrumentKey 
                            });
                        }
                    });
                }
            }, [pedals, playTone]);

            const handlePlayAreaClick = (e) => {
                initAudio();
                setIsThemeMenuOpen(false); // Close theme menu if open
                setIsEditorOpen(false);
                setIsSoundscapeOpen(false);
                
                const rect = e.currentTarget.getBoundingClientRect();
                triggerEvent((e.clientX - rect.left) / rect.width, (e.clientY - rect.top) / rect.height, activeInstKey, false);
            };

            const startPlayback = useCallback((pedalId) => {
                const track = tracksRef.current[pedalId];
                if (!track) return;
                if (track.interval) clearInterval(track.interval);
                if (track.timeouts) track.timeouts.forEach(clearTimeout);

                const loopLength = (track.loopEnd || 30000) - (track.loopStart || 0);
                if (loopLength <= 0) return;

                const scheduleEvents = () => {
                    const validEvents = track.events.filter(e => e.timeOffset >= (track.loopStart || 0) && e.timeOffset <= (track.loopEnd || 30000));
                    track.timeouts = validEvents.map(ev => {
                        let scheduledTime = (ev.timeOffset - (track.loopStart || 0) + (track.shift || 0)) % loopLength;
                        if (scheduledTime < 0) scheduledTime += loopLength;
                        return setTimeout(() => triggerEvent(ev.relX, ev.relY, ev.instrumentKey, true), scheduledTime);
                    });
                };

                scheduleEvents(); 
                track.interval = setInterval(scheduleEvents, loopLength);
            }, [triggerEvent]);

            const stopPlayback = useCallback((pedalId) => {
                const track = tracksRef.current[pedalId];
                if (!track) return;
                clearInterval(track.interval); track.timeouts.forEach(clearTimeout);
            }, []);

            const switchCategory = (catId) => {
                setActiveCat(catId);
                const firstInst = Object.values(INSTRUMENTS).find(i => i.cat === catId);
                if (firstInst) switchInstrument(firstInst.id);
            };

            const switchInstrument = (newInstKey) => {
                setPedals(prev => {
                    let changed = false;
                    const updated = prev.map(p => {
                        if (p.state === 'recording') {
                            changed = true; 
                            const duration = Math.min(Date.now() - tracksRef.current[p.id].startTime, 30000);
                            tracksRef.current[p.id].originalDuration = duration;
                            tracksRef.current[p.id].loopEnd = duration;
                            startPlayback(p.id);
                            return { ...p, state: 'playing' };
                        }
                        return p;
                    });
                    return changed ? updated : prev;
                });
                setActiveInstKey(newInstKey);
                initAudio();
            };

            const togglePedal = (pedalId, e) => {
                e.stopPropagation(); initAudio();
                setPedals(prev => {
                    const pedal = prev.find(p => p.id === pedalId);
                    if (!pedal) return prev;
                    if (pedal.state === 'recording') {
                        const duration = Math.min(Date.now() - tracksRef.current[pedalId].startTime, 30000);
                        tracksRef.current[pedalId].originalDuration = duration;
                        tracksRef.current[pedalId].loopEnd = duration;
                        tracksRef.current[pedalId].loopStart = 0;
                        startPlayback(pedalId);
                        return prev.map(p => p.id === pedalId ? { ...p, state: 'playing' } : p);
                    } else if (pedal.state === 'playing') {
                        stopPlayback(pedalId); delete tracksRef.current[pedalId]; 
                        return prev.filter(p => p.id !== pedalId); 
                    }
                    return prev;
                });
            };

            const startNewLoop = (e) => {
                e.stopPropagation(); initAudio();
                const newId = `pedal-${Date.now()}`;
                tracksRef.current[newId] = { events: [], startTime: Date.now(), loopStart: 0, loopEnd: 30000, shift: 0, interval: null, timeouts: [] };
                setPedals(prev => [...prev, { id: newId, instKey: activeInstKey, state: 'recording' }]);

                setTimeout(() => {
                    setPedals(currentPedals => {
                        const p = currentPedals.find(ped => ped.id === newId);
                        if (p && p.state === 'recording') {
                            tracksRef.current[newId].originalDuration = 30000;
                            tracksRef.current[newId].loopEnd = 30000;
                            startPlayback(newId);
                            return currentPedals.map(ped => ped.id === newId ? { ...ped, state: 'playing' } : ped);
                        }
                        return currentPedals;
                    });
                }, 30000);
            };

            const duplicateLoop = useCallback((pedalId) => {
                const trackToCopy = tracksRef.current[pedalId];
                if (!trackToCopy) return;
                const pedalToCopy = pedals.find(p => p.id === pedalId);
                
                const newId = `pedal-${Date.now()}`;
                tracksRef.current[newId] = {
                    events: JSON.parse(JSON.stringify(trackToCopy.events)),
                    startTime: Date.now(),
                    loopStart: trackToCopy.loopStart,
                    loopEnd: trackToCopy.loopEnd,
                    originalDuration: trackToCopy.originalDuration,
                    shift: trackToCopy.shift,
                    interval: null, timeouts: []
                };
                setPedals(prev => [...prev, { id: newId, instKey: pedalToCopy.instKey, state: 'playing' }]);
                startPlayback(newId);
            }, [pedals, startPlayback]);

            const updateInstSetting = (param, value) => {
                setSettings(prev => ({
                    ...prev,
                    [activeInstKey]: { ...prev[activeInstKey], [param]: parseFloat(value) }
                }));
            };

            const resetCurrentSettings = () => {
                const inst = INSTRUMENTS[activeInstKey];
                setSettings(prev => ({
                    ...prev,
                    [activeInstKey]: {
                        pitch: 0, volume: 0.6, reverb: 0.5,
                        waveform: inst.type ? WAVE_TYPES.indexOf(inst.type) : 0,
                        decay: 1.0, chorus: 0.0
                    }
                }));
            };

            const downloadPreview = () => {
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = previewUrl;
                a.download = `bloom-song-${Date.now()}.${previewBlob.mimeType.includes('webm') ? 'webm' : 'mp4'}`;
                document.body.appendChild(a);
                a.click();
                closePreview();
            };

            const closePreview = () => {
                if (previewUrl) window.URL.revokeObjectURL(previewUrl);
                setPreviewUrl(null);
                setPreviewBlob(null);
            };

            const activePedals = pedals.filter(p => p.instKey === activeInstKey);
            const isCurrentlyRecording = activePedals.some(p => p.state === 'recording');
            const playingLoops = pedals.filter(p => p.state === 'playing');
            const curSettings = settings[activeInstKey];

            return (
                <div className="container" style={{ background: THEMES[activeThemeId].bg }}>
                    <div className="play-area" onPointerDown={handlePlayAreaClick} />

                    {!hasStarted && <div className="instruction">TAP TO PLAY<br/><span style={{fontSize: '10px', marginTop: '10px', display: 'block'}}>Use bottom controls to loop</span></div>}

                    {ripples.map(ripple => (
                        <div key={ripple.id} className="ripple" style={{ left: ripple.x, top: ripple.y, color: ripple.color }} />
                    ))}

                    {/* Theme Selector */}
                    <div style={{ position: 'absolute', top: '15px', left: '15px', zIndex: 40 }}>
                        <button className="theme-toggle" onClick={() => setIsThemeMenuOpen(!isThemeMenuOpen)}>
                            {THEMES[activeThemeId].icon} {THEMES[activeThemeId].name.toUpperCase()}
                        </button>
                        <div className={`theme-menu ${isThemeMenuOpen ? 'open' : ''}`}>
                            {Object.values(THEMES).map(th => (
                                <button 
                                    key={th.id} 
                                    className={`theme-option ${activeThemeId === th.id ? 'active' : ''}`}
                                    onClick={() => {
                                        setActiveThemeId(th.id);
                                        setIsThemeMenuOpen(false);
                                        initAudio();
                                    }}
                                >
                                    {th.icon} {th.name}
                                </button>
                            ))}
                        </div>
                    </div>

                    {hasStarted && (
                        <>
                            <button className={`download-toggle ${isRecordingSong ? 'recording' : ''}`} onClick={toggleSongRecord} title="Record Song (Max 3 mins)">
                                {isRecordingSong ? `⏹️ REC (${Math.floor(songProgress/60)}:${(songProgress%60).toString().padStart(2, '0')})` : '⬇️ RECORD SONG'}
                            </button>
                            <button className={`editor-toggle ${isEditorOpen ? 'open' : ''}`} onClick={() => { setIsEditorOpen(!isEditorOpen); setIsSoundscapeOpen(false); setIsThemeMenuOpen(false); }}>
                                {isEditorOpen ? 'CLOSE EDITOR' : '🎛️ ADJUST LOOPS'}
                            </button>
                            <button className={`soundscape-toggle ${isSoundscapeOpen ? 'open' : ''}`} onClick={() => { setIsSoundscapeOpen(!isSoundscapeOpen); setIsEditorOpen(false); setIsThemeMenuOpen(false); }}>
                                {isSoundscapeOpen ? 'CLOSE SCAPE' : '🌊 SOUNDSCAPE'}
                            </button>
                        </>
                    )}

                    <div className="controls-top">
                        <div className="categories-row">
                            {CATEGORIES.map(cat => (
                                <button key={cat.id} className={`category-icon ${activeCat === cat.id ? 'active' : ''}`} onClick={(e) => { e.stopPropagation(); switchCategory(cat.id); }} title={cat.name}>
                                    {cat.icon}
                                </button>
                            ))}
                        </div>
                        <div className="instruments-row">
                            {Object.values(INSTRUMENTS).filter(i => i.cat === activeCat).map(inst => {
                                const hasActiveLoops = pedals.some(p => p.instKey === inst.id && p.state === 'playing');
                                return (
                                    <button 
                                        key={inst.id}
                                        className={`instrument-btn ${activeInstKey === inst.id ? 'active' : ''}`}
                                        style={activeInstKey === inst.id ? { color: inst.color, borderColor: inst.color } : {}}
                                        onClick={(e) => { e.stopPropagation(); switchInstrument(inst.id); }}
                                    >
                                        {inst.name}
                                        {hasActiveLoops && <span className="active-dot" style={{ backgroundColor: inst.color }}></span>}
                                    </button>
                                );
                            })}
                        </div>
                    </div>

                    <div className="controls-bottom">
                        {activePedals.map(pedal => (
                            <div key={pedal.id} className={`pedal ${pedal.state}`} onPointerDown={(e) => togglePedal(pedal.id, e)}>
                                <div className={pedal.state === 'recording' ? 'pedal-icon square' : 'pedal-icon delete-icon'}></div>
                            </div>
                        ))}
                        
                        {!isCurrentlyRecording && (
                            <div className="pedal add-loop" onPointerDown={startNewLoop}>
                                <div className="pedal-icon plus">+</div>
                            </div>
                        )}
                    </div>

                    {/* Timeline Editor Panel */}
                    <div className={`editor-panel ${isEditorOpen ? 'open' : ''}`}>
                        <div className="editor-header">
                            LOOP EDITOR
                            <span>Drag edges to trim parts (max 30s) • Drag body to shift phase • Click 📋 to duplicate</span>
                        </div>
                        <div className="editor-scroll" onPointerDown={e => e.stopPropagation()}>
                            {playingLoops.length === 0 && <div style={{opacity: 0.5, fontSize: '12px'}}>No active loops to adjust.</div>}
                            {playingLoops.map(pedal => (
                                <LoopTrackRow key={pedal.id} pedal={pedal} trackData={tracksRef.current[pedal.id]} onRestart={startPlayback} onDuplicate={duplicateLoop} forceUpdate={setForceRender} />
                            ))}
                        </div>
                    </div>

                    {/* Per-Instrument Soundscape Panel */}
                    <div className={`editor-panel ${isSoundscapeOpen ? 'open' : ''}`}>
                        <div className="editor-header" style={{color: INSTRUMENTS[activeInstKey].color, display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start'}}>
                            <div>
                                SOUNDSCAPE: {INSTRUMENTS[activeInstKey].name}
                                <span>These settings apply only to the currently selected instrument. Theme overrides may also apply.</span>
                            </div>
                            <button className="reset-btn" onClick={resetCurrentSettings}>RESET</button>
                        </div>
                        <div className="editor-scroll" onPointerDown={e => e.stopPropagation()}>
                            <div className="slider-row">
                                <label>Volume</label>
                                <input type="range" min="0" max="1" step="0.05" value={curSettings.volume} onChange={(e) => updateInstSetting('volume', e.target.value)} style={{accentColor: INSTRUMENTS[activeInstKey].color}}/>
                                <span>{Math.round(curSettings.volume * 100)}%</span>
                            </div>
                            <div className="slider-row">
                                <label>Pitch</label>
                                <input type="range" min="-1200" max="1200" step="10" value={curSettings.pitch} onChange={(e) => updateInstSetting('pitch', e.target.value)} style={{accentColor: INSTRUMENTS[activeInstKey].color}}/>
                                <span>{curSettings.pitch > 0 ? '+' : ''}{curSettings.pitch}c</span>
                            </div>
                            <div className="slider-row">
                                <label>Reverb (Send)</label>
                                <input type="range" min="0" max="1" step="0.05" value={curSettings.reverb} onChange={(e) => updateInstSetting('reverb', e.target.value)} style={{accentColor: INSTRUMENTS[activeInstKey].color}}/>
                                <span>{Math.round(curSettings.reverb * 100)}%</span>
                            </div>
                            <div className="slider-row">
                                <label>Decay/Sustain</label>
                                <input type="range" min="0.1" max="3" step="0.1" value={curSettings.decay} onChange={(e) => updateInstSetting('decay', e.target.value)} style={{accentColor: INSTRUMENTS[activeInstKey].color}}/>
                                <span>{curSettings.decay.toFixed(1)}x</span>
                            </div>
                            {!INSTRUMENTS[activeInstKey].isDrum && !INSTRUMENTS[activeInstKey].isPerc && (
                                <>
                                    <div className="slider-row">
                                        <label>Waveform</label>
                                        <input type="range" min="0" max="3" step="1" value={curSettings.waveform} onChange={(e) => updateInstSetting('waveform', e.target.value)} style={{accentColor: INSTRUMENTS[activeInstKey].color}}/>
                                        <span>{WAVE_NAMES[curSettings.waveform]}</span>
                                    </div>
                                    <div className="slider-row">
                                        <label>Chorus</label>
                                        <input type="range" min="0" max="1" step="0.05" value={curSettings.chorus} onChange={(e) => updateInstSetting('chorus', e.target.value)} style={{accentColor: INSTRUMENTS[activeInstKey].color}}/>
                                        <span>{Math.round(curSettings.chorus * 100)}%</span>
                                    </div>
                                </>
                            )}
                        </div>
                    </div>

                    {/* Song Preview Modal */}
                    {previewUrl && (
                        <div className="modal-backdrop">
                            <div className="modal-content" onPointerDown={e => e.stopPropagation()}>
                                <h3>SONG RECORDED</h3>
                                <p style={{fontSize: '11px', opacity: 0.8, marginBottom: '20px'}}>Preview your composition below.</p>
                                <audio controls src={previewUrl} style={{width: '100%', marginBottom: '20px', outline: 'none'}}></audio>
                                <div style={{display: 'flex', gap: '10px'}}>
                                    <button className="modal-btn primary" onClick={downloadPreview}>⬇️ DOWNLOAD</button>
                                    <button className="modal-btn" onClick={closePreview}>DISCARD</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
