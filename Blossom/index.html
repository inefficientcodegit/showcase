<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blossom</title>
    <!-- React & Babel CDNs -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body, html { 
            margin: 0; padding: 0; 
            width: 100%; height: 100%; 
            background-color: #0b132b; 
            overflow: hidden; 
            touch-action: none; 
            -webkit-user-select: none; user-select: none;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        #root { width: 100%; height: 100%; }
        
        .ripple {
            position: absolute;
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            animation: bloomFade 4s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
            pointer-events: none;
            mix-blend-mode: screen;
            filter: blur(4px);
        }

        .star {
            position: absolute;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        @keyframes bloomFade {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0.6; }
            30% { opacity: 0.4; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
        }

        .hud-text {
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        // C Major Pentatonic Scale frequencies
        const PENTATONIC_SCALE = [
            261.63, 293.66, 329.63, 392.00, 440.00, 
            523.25, 587.33, 659.25, 783.99, 880.00, 1046.50
        ];
        const BLOOM_COLORS = ['#3a86ff', '#8338ec', '#ff006e', '#fb5607', '#ffbe0b', '#48cae4'];

        // Instrument Definitions for Web Audio Synth
        const INSTRUMENTS = [
            { id: 0, name: 'Bells', color: '#ffffff', glow: 'rgba(255, 255, 255, 0.8)', wave: 'sine', attack: 0.05, release: 3.5, vol: 0.4 },
            { id: 1, name: 'Keys', color: '#fcf6bd', glow: 'rgba(252, 246, 189, 0.8)', wave: 'triangle', attack: 0.02, release: 2.5, vol: 0.2 },
            { id: 2, name: 'Strings', color: '#ff99c8', glow: 'rgba(255, 153, 200, 0.8)', wave: 'sine', attack: 0.8, release: 4.0, vol: 0.5 },
            { id: 3, name: 'Winds', color: '#a9def9', glow: 'rgba(169, 222, 249, 0.8)', wave: 'sine', attack: 0.3, release: 2.5, vol: 0.4 },
            { id: 4, name: 'Pad', color: '#e4c1f9', glow: 'rgba(228, 193, 249, 0.8)', wave: 'triangle', attack: 1.2, release: 4.5, vol: 0.15 }
        ];

        // Exponential thresholds for unlocks
        const UNLOCK_THRESHOLDS = [0, 1000, 3000, 7000, 15000];

        let audioCtx = null;
        const initAudio = () => {
            try {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') audioCtx.resume();
            } catch(e) {
                console.error("Audio Context initialization failed", e);
            }
        };

        const playTone = (freq, velocity, instrumentId = 0) => {
            if (!audioCtx) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                const inst = INSTRUMENTS[instrumentId] || INSTRUMENTS[0];
                
                osc.type = inst.wave;
                osc.frequency.value = freq;
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.start();
                
                const maxVol = velocity * inst.vol;
                
                gain.gain.setValueAtTime(0, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(maxVol, audioCtx.currentTime + inst.attack);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + inst.attack + inst.release);
                
                osc.stop(audioCtx.currentTime + inst.attack + inst.release);
            } catch(e) {
                console.error("Failed to play tone", e);
            }
        };

        const App = () => {
            const [started, setStarted] = useState(false);
            const [, setTick] = useState(0); 
            
            // Core Game State mapped to refs for high performance and stability
            const gameState = useRef({
                ripples: [],
                stars: [],
                floatingTexts: [],
                score: 0,
                tapsAvailable: 0,
                unlockedStage: 0,
                lastSpawnTime: 0,
                gameStartTime: 0,
                gameOver: false
            });

            // Event trigger
            const triggerEvent = useCallback((x, y, freq, color, baseVelocity, depth = 0, instrumentId = 0) => {
                const attenuation = Math.pow(0.55, depth);
                const velocity = baseVelocity * attenuation;

                if (velocity < 0.05) return;
                
                playTone(freq, velocity, instrumentId);
                
                const id = Date.now() + Math.random();
                const maxRadius = 120 * velocity; 
                
                gameState.current.ripples.push({ 
                    id, x, y, color, maxRadius, 
                    createdAt: performance.now(),
                    velocity,
                    depth,
                    dotsCaught: 0
                });
            }, []);

            // Game Loop Engine
            useEffect(() => {
                if (!started) return;

                let animationFrameId;
                
                const loop = () => {
                    const state = gameState.current;
                    const height = window.innerHeight;
                    const width = window.innerWidth;
                    const centerY = height / 2;
                    const now = performance.now();

                    if (state.gameStartTime === 0) state.gameStartTime = now;
                    const elapsed = now - state.gameStartTime;
                    
                    const progressiveMultiplier = Math.min(2.0, 1 + (elapsed / 120000));
                    const spawnDelay = Math.max(500, 800 - (elapsed / 300));

                    // Check Progression/Unlocks
                    let currentStage = 0;
                    for (let i = UNLOCK_THRESHOLDS.length - 1; i >= 0; i--) {
                        if (state.score >= UNLOCK_THRESHOLDS[i]) {
                            currentStage = i;
                            break;
                        }
                    }
                    currentStage = Math.min(INSTRUMENTS.length - 1, currentStage);
                    
                    if (currentStage > state.unlockedStage) {
                        state.unlockedStage = currentStage;
                        const newInst = INSTRUMENTS[currentStage] || INSTRUMENTS[0];
                        state.floatingTexts.push({
                            id: Math.random(),
                            x: width / 2,
                            y: height * 0.3,
                            text: `${newInst.name} Unlocked!`,
                            createdAt: now,
                            color: newInst.color,
                            isUnlock: true
                        });
                    }

                    // 1. Spawn new stars (Off-screen)
                    if (now - state.lastSpawnTime > spawnDelay) {
                        const randomBaseSpeed = 0.6 + (Math.random() * 1.0);
                        const direction = Math.random() > 0.5 ? 1 : -1;
                        const dotInstrumentId = Math.floor(Math.random() * (state.unlockedStage + 1));
                        
                        state.stars.push({
                            id: Math.random(),
                            x: Math.random() * (width - 40) + 20,
                            y: direction === 1 ? -20 : height + 20,
                            speed: randomBaseSpeed * progressiveMultiplier,
                            direction: direction,
                            size: Math.random() * 4 + 4,
                            instrumentId: dotInstrumentId,
                            hasGrantedTap: false // Start false, grant when entering visible screen
                        });
                        
                        state.lastSpawnTime = now;
                    }

                    // 2. Update Star Positions & Check Bounds
                    for (let i = state.stars.length - 1; i >= 0; i--) {
                        const star = state.stars[i];
                        star.y += star.speed * star.direction;
                        
                        // Check if dot has crossed into the visible screen to grant a tap exactly once
                        if (!star.hasGrantedTap) {
                            if ((star.direction === 1 && star.y >= 0) || 
                                (star.direction === -1 && star.y <= height)) {
                                star.hasGrantedTap = true;
                                state.tapsAvailable += 1; // Pure 1:1 economy
                            }
                        }

                        // Missed star (Crosses Center Line): Game Over
                        if ((star.direction === 1 && star.y > centerY) || 
                            (star.direction === -1 && star.y < centerY)) {
                            state.gameOver = true;
                            setStarted(false);
                            playTone(150, 1.0, 0); // Low thud
                            break; 
                        }
                    }

                    // 3. Collision Detection
                    for (let i = state.stars.length - 1; i >= 0; i--) {
                        const star = state.stars[i];
                        
                        // Prevent popping dots that are still off-screen
                        if ((star.direction === 1 && star.y < 0) || 
                            (star.direction === -1 && star.y > height)) continue;

                        let caught = false;
                        let catchingRipple = null;

                        for (let j = 0; j < state.ripples.length; j++) {
                            const ripple = state.ripples[j];
                            const age = now - ripple.createdAt;
                            
                            // Ripple must be within 80% of its 4000ms life to catch anything
                            if (age > 3200) continue;

                            const progress = Math.min(1, age / 4000);
                            const easeOut = 1 - Math.pow(1 - progress, 3);
                            const currentRadius = ripple.maxRadius * easeOut;

                            const dx = star.x - ripple.x;
                            const dy = star.y - ripple.y;
                            const dist = Math.sqrt(dx * dx + dy * dy);

                            // Strict collision: 1.01 edge
                            if (dist < currentRadius * 1.01) {
                                caught = true;
                                catchingRipple = ripple;
                                break;
                            }
                        }

                        // Handle Catch
                        if (caught && catchingRipple) {
                            catchingRipple.dotsCaught = (catchingRipple.dotsCaught || 0) + 1;

                            const travelProgress = star.direction === 1 ? (star.y / centerY) : ((height - star.y) / centerY);
                            const normalizedProgress = Math.max(0, Math.min(1, travelProgress));
                            const baseScore = 10 + Math.floor(normalizedProgress * 90); 
                            
                            const pointsEarned = baseScore * catchingRipple.dotsCaught;
                            state.score += pointsEarned;
                            
                            const absoluteNormalizedY = Math.max(0, Math.min(1, star.y / height));
                            const scaleIndex = Math.floor((1 - absoluteNormalizedY) * PENTATONIC_SCALE.length);
                            const safeIndex = Math.max(0, Math.min(PENTATONIC_SCALE.length - 1, scaleIndex));
                            
                            const freq = PENTATONIC_SCALE[safeIndex];
                            const instConfig = INSTRUMENTS[star.instrumentId] || INSTRUMENTS[0];
                            const color = instConfig.color;
                            
                            state.floatingTexts.push({
                                id: Math.random(),
                                x: star.x,
                                y: star.y,
                                text: catchingRipple.dotsCaught > 1 ? `+${pointsEarned} (x${catchingRipple.dotsCaught}!)` : `+${pointsEarned}`,
                                createdAt: now,
                                color: color
                            });
                            
                            const newDepth = (catchingRipple.depth || 0) + 1;
                            triggerEvent(star.x, star.y, freq, color, 1.0, newDepth, star.instrumentId);
                            
                            state.stars.splice(i, 1);
                        }
                    }

                    // 4. Cleanup old objects
                    state.ripples = state.ripples.filter(r => (now - r.createdAt) < 4000);
                    state.floatingTexts = state.floatingTexts.filter(ft => (now - ft.createdAt) < (ft.isUnlock ? 3000 : 1000));

                    setTick(t => t + 1);
                    animationFrameId = requestAnimationFrame(loop);
                };

                animationFrameId = requestAnimationFrame(loop);
                return () => cancelAnimationFrame(animationFrameId);
            }, [started, triggerEvent]);

            const processTap = (clientX, clientY) => {
                const state = gameState.current;
                if (state.gameOver) return;

                if (!started) {
                    initAudio();
                    setStarted(true);
                    return; 
                }
                
                // Bulletproof Tap Guard
                if (isNaN(state.tapsAvailable) || state.tapsAvailable < 1) {
                    state.tapsAvailable = 0; // Hard clamp any weird JS math bugs
                    
                    const hud = document.getElementById('taps-hud');
                    if (hud) {
                        hud.style.transform = 'scale(1.5)';
                        hud.style.color = '#ef4444'; // Red pulse
                        setTimeout(() => {
                            if (hud) hud.style.transform = 'scale(1)';
                        }, 200);
                    }
                    return; // Explicitly block the tap
                }
                
                // Safely consume exactly 1 tap per physical touch
                state.tapsAvailable -= 1;
                
                const height = window.innerHeight || 1; 
                const normalizedY = 1 - (clientY / height);
                const scaleIndex = Math.floor(normalizedY * PENTATONIC_SCALE.length);
                const safeIndex = Math.max(0, Math.min(PENTATONIC_SCALE.length - 1, scaleIndex));
                
                const freq = PENTATONIC_SCALE[safeIndex];
                const color = BLOOM_COLORS[safeIndex % BLOOM_COLORS.length];
                
                triggerEvent(clientX, clientY, freq, color, 1.0, 0, 0);
            };

            // Safely route touch events (Preventing ghost mouse events on mobile)
            const handleTouchStart = (e) => {
                if (e.cancelable) e.preventDefault(); // Stop mobile Safari ghost clicks
                for (let i = 0; i < e.changedTouches.length; i++) {
                    processTap(e.changedTouches[i].clientX, e.changedTouches[i].clientY);
                }
            };

            // Safely route mouse clicks (Ignored natively on mobile due to above preventDefault)
            const handleMouseDown = (e) => {
                processTap(e.clientX, e.clientY);
            };

            const { ripples, stars, floatingTexts, score, tapsAvailable } = gameState.current;

            return (
                <div 
                    className="w-full h-full relative overflow-hidden bg-[#0b132b]"
                    onTouchStart={handleTouchStart}
                    onMouseDown={handleMouseDown}
                    style={{ touchAction: 'none' }}
                >
                    {/* Glowing Center Line */}
                    <div className="absolute top-1/2 left-0 w-full h-px bg-[#48cae4]/50 shadow-[0_0_12px_2px_rgba(72,202,228,0.5)] pointer-events-none z-0"></div>

                    {/* HUD */}
                    <div className="absolute top-6 left-6 text-white/80 pointer-events-none hud-text z-10">
                        <div className="text-sm font-light uppercase tracking-widest text-white/50">Score</div>
                        <div className="text-4xl font-bold">{score}</div>
                    </div>
                    
                    {/* Transparent Tap Economy HUD */}
                    <div className="absolute top-6 right-6 text-white/80 pointer-events-none text-right z-10">
                        <div className="text-sm font-light uppercase tracking-widest text-white/50 hud-text">Taps</div>
                        <div 
                            id="taps-hud"
                            className="text-4xl font-bold transition-all duration-200 ease-out hud-text"
                            style={{ color: tapsAvailable <= 0 ? '#ef4444' : 'white' }}
                        >
                            {tapsAvailable}
                        </div>
                    </div>

                    {!started && !gameState.current.gameOver && (
                        <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none z-20 bg-[#0b132b]/80 backdrop-blur-sm">
                            <h1 className="text-white text-4xl font-light tracking-widest mb-4 text-center">BLOSSOM</h1>
                            <p className="text-white/60 mb-8 max-w-xs text-center text-sm leading-relaxed">
                                Each new dot grants 1 tap. Tap to create ripples and catch falling stardust before they cross the center line.
                            </p>
                            <div className="text-white tracking-widest uppercase text-sm animate-pulse border border-white/30 px-6 py-3 rounded-full">
                                Tap to begin
                            </div>
                        </div>
                    )}

                    {gameState.current.gameOver && (
                        <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-auto z-30 bg-[#0b132b]/90 backdrop-blur-md">
                            <h1 className="text-red-400 text-4xl font-light tracking-widest mb-2 text-center">GAME OVER</h1>
                            <div className="text-white/80 text-xl mb-8">Final Score: {score}</div>
                            <button 
                                onClick={(e) => {
                                    e.stopPropagation();
                                    gameState.current = {
                                        ripples: [],
                                        stars: [],
                                        floatingTexts: [],
                                        score: 0,
                                        tapsAvailable: 0,
                                        unlockedStage: 0,
                                        lastSpawnTime: performance.now(),
                                        gameStartTime: performance.now(),
                                        gameOver: false
                                    };
                                    setStarted(true);
                                }}
                                className="text-white tracking-widest uppercase text-sm border border-white/30 px-6 py-3 rounded-full hover:bg-white/10 transition-colors pointer-events-auto cursor-pointer"
                            >
                                Play Again
                            </button>
                        </div>
                    )}
                    
                    {/* Render Ripples */}
                    {ripples.map(r => (
                        <div 
                            key={r.id} 
                            className="ripple"
                            style={{ 
                                left: r.x, 
                                top: r.y, 
                                backgroundColor: r.color,
                                width: r.maxRadius * 2,
                                height: r.maxRadius * 2,
                                boxShadow: `0 0 ${r.maxRadius}px ${r.color}`
                            }} 
                        />
                    ))}

                    {/* Render Stars */}
                    {stars.map(s => {
                        const instConfig = INSTRUMENTS[s.instrumentId] || INSTRUMENTS[0];
                        return (
                            <div
                                key={s.id}
                                className="star"
                                style={{
                                    left: s.x,
                                    top: s.y,
                                    width: s.size,
                                    height: s.size,
                                    backgroundColor: instConfig.color,
                                    boxShadow: `0 0 10px 2px ${instConfig.glow}`
                                }}
                            />
                        );
                    })}

                    {/* Render Floating Texts */}
                    {floatingTexts.map(ft => {
                        const age = performance.now() - ft.createdAt;
                        const duration = ft.isUnlock ? 3000 : 1000;
                        const progress = Math.max(0, Math.min(1, age / duration));
                        
                        return (
                            <div
                                key={ft.id}
                                className={`absolute font-bold pointer-events-none ${ft.isUnlock ? 'text-2xl tracking-widest uppercase' : 'text-xl'}`}
                                style={{
                                    left: ft.x,
                                    top: ft.y - (progress * (ft.isUnlock ? 20 : 50)),
                                    color: ft.color,
                                    opacity: ft.isUnlock ? (progress < 0.2 ? progress / 0.2 : 1 - progress) : 1 - progress,
                                    transform: 'translate(-50%, -50%)',
                                    textShadow: '0 2px 4px rgba(0,0,0,0.8)'
                                }}
                            >
                                {ft.text}
                            </div>
                        );
                    })}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
