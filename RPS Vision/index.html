<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>RPS Local Vision</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel for parsing JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* Custom CSS Animation for the pumping hand */
    @keyframes pump {
      0% { transform: translateY(-30px) rotate(5deg); }
      50% { transform: translateY(40px) rotate(-15deg); }
      100% { transform: translateY(-30px) rotate(5deg); }
    }
    .animate-pump {
      /* 1s (1000ms) matches exactly with our Javascript interval */
      animation: pump 1s ease-in-out infinite;
      transform-origin: bottom center;
    }
  </style>
</head>
<body class="bg-slate-950">
  <div id="root"></div>

  <script type="text/babel">
    // MediaPipe's underlying C++ WebAssembly module routes its standard "INFO" logs to stderr,
    // which the browser displays as console.error. This intercepts and hides that harmless message.
    const originalConsoleError = console.error;
    console.error = (...args) => {
      if (args.length > 0 && typeof args[0] === 'string' && args[0].includes('XNNPACK delegate')) {
        return; // Suppress harmless Wasm info log
      }
      originalConsoleError(...args);
    };

    const { useState, useRef, useEffect, useCallback } = React;

    // --- Inline SVG Icons ---
    const CameraIcon = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>);
    const PlayIcon = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>);
    const RefreshIcon = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>);
    const HandIcon = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 11V6a2 2 0 0 0-2-2a2 2 0 0 0-2 2v5"/><path d="M14 10V4a2 2 0 0 0-2-2a2 2 0 0 0-2 2v6"/><path d="M10 10.5V5a2 2 0 0 0-2-2a2 2 0 0 0-2 2v8"/><path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"/><path d="M7 15V8a2 2 0 0 1 2-2a2 2 0 0 1 2 2v7"/></svg>);
    const AlertIcon = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>);
    const LoaderIcon = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>);
    const FlipCameraIcon = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 16.2A9 9 0 0 1 12 21a9 9 0 0 1-8-4.8"/><path d="M4 16.2V21h4.8"/><path d="M4 7.8A9 9 0 0 1 12 3a9 9 0 0 1 8 4.8"/><path d="M20 7.8V3h-4.8"/></svg>);

    // --- Helper Functions ---
    const EMOJIS = {
      ROCK: '✊',
      PAPER: '✋',
      SCISSORS: '✌️',
      UNKNOWN: '❓',
    };

    const getRandomComputerMove = () => {
      const moves = ['ROCK', 'PAPER', 'SCISSORS'];
      return moves[Math.floor(Math.random() * moves.length)];
    };

    const getWinner = (userMove, compMove) => {
      if (userMove === 'UNKNOWN' || userMove === 'ERROR') return 'INVALID';
      if (userMove === compMove) return 'TIE';
      
      if (
        (userMove === 'ROCK' && compMove === 'SCISSORS') ||
        (userMove === 'PAPER' && compMove === 'ROCK') ||
        (userMove === 'SCISSORS' && compMove === 'PAPER')
      ) {
        return 'USER';
      }
      return 'COMP';
    };

    function App() {
      // --- Refs ---
      const videoRef = useRef(null);
      const audioCtxRef = useRef(null);

      // --- State ---
      const [streamActive, setStreamActive] = useState(false);
      const [cameraError, setCameraError] = useState(null);
      const [facingMode, setFacingMode] = useState("user"); 
      
      // TFJS Model States
      const [tfModel, setTfModel] = useState(null);
      const [modelLoading, setModelLoading] = useState(true);

      // Game States
      const [gameState, setGameState] = useState('idle'); 
      const [countdown, setCountdown] = useState(null);
      const [userMove, setUserMove] = useState(null);
      const [compMove, setCompMove] = useState(null);
      const [resultMsg, setResultMsg] = useState("");
      const [scores, setScores] = useState({ user: 0, comp: 0 });
      const [flash, setFlash] = useState(false);

      // --- Audio Synthesizer Functions ---
      const initAudio = () => {
        if (!audioCtxRef.current) {
          audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtxRef.current.state === 'suspended') {
          audioCtxRef.current.resume();
        }
      };

      const playBeep = () => {
        if (!audioCtxRef.current) return;
        const osc = audioCtxRef.current.createOscillator();
        const gain = audioCtxRef.current.createGain();
        osc.connect(gain);
        gain.connect(audioCtxRef.current.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(800, audioCtxRef.current.currentTime);
        gain.gain.setValueAtTime(0.5, audioCtxRef.current.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtxRef.current.currentTime + 0.1);
        osc.start();
        osc.stop(audioCtxRef.current.currentTime + 0.1);
      };

      const playBuzzer = () => {
        if (!audioCtxRef.current) return;
        const osc = audioCtxRef.current.createOscillator();
        const gain = audioCtxRef.current.createGain();
        osc.connect(gain);
        gain.connect(audioCtxRef.current.destination);
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(300, audioCtxRef.current.currentTime);
        gain.gain.setValueAtTime(0.5, audioCtxRef.current.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtxRef.current.currentTime + 0.3);
        osc.start();
        osc.stop(audioCtxRef.current.currentTime + 0.3);
      };

      // --- Initialize Local TensorFlow Model ---
      useEffect(() => {
        const loadModel = async () => {
          try {
            // Use new Function to bypass Babel converting the dynamic import into a require() call
            const vision = await new Function('return import("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/+esm")')();
            const { GestureRecognizer, FilesetResolver } = vision;
            
            const visionData = await FilesetResolver.forVisionTasks(
              "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
            );
            
            const recognizer = await GestureRecognizer.createFromOptions(visionData, {
              baseOptions: {
                modelAssetPath: "https://storage.googleapis.com/mediapipe-models/gesture_recognizer/gesture_recognizer/float16/1/gesture_recognizer.task",
                delegate: "GPU"
              },
              runningMode: "IMAGE"
            });
            
            setTfModel(recognizer);
            setModelLoading(false);
          } catch (err) {
            console.error("Error loading MediaPipe model:", err);
            setCameraError("Failed to load the local AI vision model.");
            setModelLoading(false);
          }
        };
        loadModel();
      }, []);

      // --- Camera Initialization ---
      useEffect(() => {
        let currentStream = null;

        const startCamera = async () => {
          if (videoRef.current && videoRef.current.srcObject) {
            videoRef.current.srcObject.getTracks().forEach(track => track.stop());
          }

          setStreamActive(false);

          try {
            const stream = await navigator.mediaDevices.getUserMedia({
              video: { facingMode: facingMode }, 
              audio: false
            });
            
            currentStream = stream;
            if (videoRef.current) {
              videoRef.current.srcObject = stream;
              setStreamActive(true);
              setCameraError(null);
            }
          } catch (err) {
            console.error("Camera error:", err);
            setCameraError("Camera access denied or unavailable. Please allow permissions.");
          }
        };

        startCamera();

        return () => {
          if (currentStream) {
            currentStream.getTracks().forEach(track => track.stop());
          }
        };
      }, [facingMode]);

      // --- Local Vision Inference Logic ---
      const analyzeLocalImage = async (videoElement) => {
        if (!tfModel || !videoElement) return "UNKNOWN";

        try {
          // Draw to an offscreen canvas to standardize orientation and size before inference
          const canvas = document.createElement('canvas');
          canvas.width = videoElement.videoWidth;
          canvas.height = videoElement.videoHeight;
          const ctx = canvas.getContext('2d');
          
          if (facingMode === 'user') {
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
          }
          ctx.drawImage(videoElement, 0, 0, canvas.width, canvas.height);

          const results = tfModel.recognize(canvas);
          
          if (results.gestures && results.gestures.length > 0 && results.gestures[0].length > 0) {
            // The model returns categories like "Closed_Fist", "Open_Palm", "Victory" (Peace sign)
            const category = results.gestures[0][0].categoryName;
            
            if (category === "Closed_Fist") return "ROCK";
            if (category === "Open_Palm") return "PAPER";
            if (category === "Victory" || category === "ILoveYou") return "SCISSORS";
          }
        } catch (e) {
          console.error("Local inference error:", e);
        }
        return "UNKNOWN";
      };

      // --- Game Loop ---
      const captureAndAnalyze = async () => {
        const video = videoRef.current;
        if (!video) return;

        // Visual flash
        setFlash(true);
        setTimeout(() => setFlash(false), 150);

        setGameState('analyzing');
        
        // Let computer pick randomly
        const computerSelection = getRandomComputerMove();
        setCompMove(computerSelection);
        
        // Pass video feed into our local TFJS model
        const userSelection = await analyzeLocalImage(video);
        setUserMove(userSelection);

        // Result logic
        const winner = getWinner(userSelection, computerSelection);
        if (winner === 'USER') {
          setResultMsg("You Win! 🎉");
          setScores(prev => ({ ...prev, user: prev.user + 1 }));
        } else if (winner === 'COMP') {
          setResultMsg("Computer Wins! 🤖");
          setScores(prev => ({ ...prev, comp: prev.comp + 1 }));
        } else if (winner === 'TIE') {
          setResultMsg("It's a Tie! 🤝");
        } else {
          setResultMsg("Couldn't see hand! Try again.");
        }

        setGameState('result');
      };

      const playTurn = () => {
        initAudio();

        setGameState('countdown');
        setResultMsg("");
        setUserMove(null);
        setCompMove(null);

        const sequence = ["READY?", "ROCK", "PAPER", "SCISSORS", "GO!"];
        let step = 0;
        
        setCountdown(sequence[step]);
        playBeep(); 

        const interval = setInterval(() => {
          step++;
          if (step < sequence.length) {
            setCountdown(sequence[step]);
            
            if (sequence[step] === "GO!") {
              clearInterval(interval);
              playBuzzer(); 
              
              setTimeout(() => {
                captureAndAnalyze();
              }, 400);
            } else {
              playBeep(); 
            }
          } else {
            clearInterval(interval);
          }
        }, 1000);
      };

      const resetGame = () => {
        setScores({ user: 0, comp: 0 });
        setGameState('idle');
        setUserMove(null);
        setCompMove(null);
        setResultMsg("");
      };

      const toggleCamera = () => {
        setFacingMode(prev => prev === "user" ? "environment" : "user");
      };

      // --- UI Rendering Helpers ---
      const renderOverlayText = () => {
        if (gameState === 'countdown') {
          return (
            <div className="absolute inset-0 flex flex-col items-center justify-center bg-black/60 backdrop-blur-sm z-10 rounded-2xl overflow-hidden">
              {countdown !== "GO!" && (
                <div className="text-8xl md:text-9xl mb-8 animate-pump drop-shadow-[0_10px_10px_rgba(0,0,0,0.8)]">
                  ✊
                </div>
              )}
              <span className={`font-black text-white drop-shadow-2xl transition-all duration-200 
                ${countdown === 'GO!' ? 'text-7xl md:text-8xl text-emerald-400 scale-125' : 'text-5xl md:text-6xl tracking-widest'}`}>
                {countdown}
              </span>
            </div>
          );
        }
        
        if (gameState === 'analyzing') {
          return (
            <div className="absolute inset-0 flex flex-col items-center justify-center bg-black/70 backdrop-blur-md z-10 rounded-2xl space-y-4">
              <LoaderIcon className="w-16 h-16 text-emerald-400 animate-spin" />
              <span className="text-xl font-bold text-emerald-400 tracking-widest animate-pulse">
                ANALYZING...
              </span>
            </div>
          );
        }
        return null;
      };

      return (
        <div className="min-h-[100dvh] w-full bg-slate-950 text-slate-100 flex flex-col font-sans overflow-hidden">
          
          <header className="px-6 py-6 flex justify-between items-center bg-slate-900 shadow-md z-20">
            <div>
              <h1 className="text-xl font-black bg-gradient-to-r from-emerald-400 to-cyan-400 bg-clip-text text-transparent flex items-center gap-2">
                <HandIcon className="w-6 h-6 text-emerald-400" />
                RPS Vision
              </h1>
              <p className="text-xs text-slate-400 font-medium tracking-wider mt-1 flex items-center gap-1">
                <span className="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                LOCAL AI MODE
              </p>
            </div>
            
            <div className="flex gap-4 items-center">
              <div className="flex flex-col items-center">
                <span className="text-[10px] text-slate-400 font-bold tracking-wider">YOU</span>
                <span className="text-2xl font-black text-white">{scores.user}</span>
              </div>
              <div className="text-slate-600 font-black text-xl">:</div>
              <div className="flex flex-col items-center">
                <span className="text-[10px] text-slate-400 font-bold tracking-wider">COMP</span>
                <span className="text-2xl font-black text-white">{scores.comp}</span>
              </div>
            </div>
          </header>

          <main className="flex-1 p-4 flex flex-col relative">
            {cameraError ? (
              <div className="flex-1 flex flex-col items-center justify-center text-center p-6 bg-red-950/30 border border-red-900 rounded-3xl mt-4">
                <AlertIcon className="w-12 h-12 text-red-500 mb-4" />
                <h2 className="text-lg font-bold text-red-400 mb-2">Camera Error</h2>
                <p className="text-sm text-red-300">{cameraError}</p>
              </div>
            ) : (
              <div className="relative flex-1 w-full bg-slate-900 rounded-3xl overflow-hidden shadow-2xl border border-slate-800 flex items-center justify-center">
                
                {/* Camera Toggle Button */}
                {streamActive && !modelLoading && gameState === 'idle' && (
                  <button 
                    onClick={toggleCamera}
                    className="absolute top-4 right-4 z-30 p-3 bg-black/50 hover:bg-black/80 backdrop-blur-md rounded-full text-white transition-all shadow-lg active:scale-90 border border-white/10"
                    aria-label="Switch Camera"
                  >
                    <FlipCameraIcon className="w-5 h-5" />
                  </button>
                )}

                {/* Loading States */}
                {!streamActive && (
                  <div className="absolute inset-0 flex flex-col items-center justify-center text-slate-500 space-y-3 z-0">
                    <CameraIcon className="w-10 h-10 animate-pulse" />
                    <span className="text-sm font-semibold tracking-widest">STARTING CAMERA...</span>
                  </div>
                )}
                
                {streamActive && modelLoading && (
                  <div className="absolute inset-0 bg-slate-900/80 backdrop-blur-sm flex flex-col items-center justify-center text-emerald-400 space-y-3 z-10">
                    <LoaderIcon className="w-10 h-10 animate-spin" />
                    <span className="text-sm font-semibold tracking-widest text-center px-4">
                      LOADING LOCAL AI MODEL...<br/>
                      <span className="text-[10px] text-emerald-600">This happens once and runs offline</span>
                    </span>
                  </div>
                )}

                <video
                  ref={videoRef}
                  autoPlay
                  playsInline
                  muted
                  className={`absolute inset-0 w-full h-full object-cover transition-opacity duration-300 transform ${
                    facingMode === 'user' ? 'scale-x-[-1]' : '' 
                  } ${
                    streamActive ? 'opacity-100' : 'opacity-0'
                  }`}
                />

                {flash && (
                  <div className="absolute inset-0 bg-white z-50 animate-ping opacity-75" />
                )}

                {renderOverlayText()}
                
                <div className="absolute inset-8 border-2 border-white/20 border-dashed rounded-2xl pointer-events-none z-0" />
              </div>
            )}
          </main>

          <footer className="px-6 pb-8 pt-4 bg-slate-950 z-20">
            
            <div className={`transition-all duration-500 ease-in-out overflow-hidden flex flex-col items-center ${
              gameState === 'result' ? 'max-h-64 opacity-100 mb-6' : 'max-h-0 opacity-0 mb-0'
            }`}>
              <h2 className="text-2xl font-black text-white mb-4">{resultMsg}</h2>
              
              <div className="flex w-full max-w-sm justify-between items-center bg-slate-900 p-4 rounded-2xl border border-slate-800">
                <div className="flex flex-col items-center gap-2">
                  <span className="text-xs text-slate-400 font-bold tracking-widest">YOU</span>
                  <div className="w-16 h-16 bg-slate-800 rounded-full flex items-center justify-center text-3xl shadow-inner border border-slate-700">
                    {EMOJIS[userMove] || '❓'}
                  </div>
                  <span className="text-[10px] font-bold text-emerald-400">{userMove}</span>
                </div>
                
                <span className="text-xl font-black text-slate-600">VS</span>
                
                <div className="flex flex-col items-center gap-2">
                  <span className="text-xs text-slate-400 font-bold tracking-widest">COMP</span>
                  <div className="w-16 h-16 bg-slate-800 rounded-full flex items-center justify-center text-3xl shadow-inner border border-slate-700">
                    {EMOJIS[compMove] || '❓'}
                  </div>
                  <span className="text-[10px] font-bold text-cyan-400">{compMove}</span>
                </div>
              </div>
            </div>

            <div className="flex gap-4">
              <button
                onClick={playTurn}
                disabled={!streamActive || modelLoading || gameState === 'countdown' || gameState === 'analyzing'}
                className={`flex-1 flex items-center justify-center gap-3 py-4 rounded-2xl font-black text-lg transition-all active:scale-95 ${
                  !streamActive || modelLoading || gameState === 'countdown' || gameState === 'analyzing'
                    ? 'bg-slate-800 text-slate-500 cursor-not-allowed'
                    : 'bg-gradient-to-r from-emerald-500 to-emerald-400 text-white shadow-lg shadow-emerald-500/25 hover:from-emerald-400 hover:to-emerald-300'
                }`}
              >
                {gameState === 'result' ? 'PLAY AGAIN' : 'START TURN'}
                <PlayIcon className="w-5 h-5 fill-current" />
              </button>
              
              <button
                onClick={resetGame}
                disabled={gameState === 'countdown' || gameState === 'analyzing' || (scores.user === 0 && scores.comp === 0)}
                className="p-4 rounded-2xl bg-slate-900 border border-slate-800 text-slate-400 hover:text-white hover:bg-slate-800 transition-colors disabled:opacity-50 active:scale-95"
                aria-label="Reset Score"
              >
                <RefreshIcon className="w-6 h-6" />
              </button>
            </div>
            
            <p className="text-center text-[10px] text-slate-500 font-medium mt-4">
              Keep your hand clearly visible inside the frame on "GO!".
            </p>
          </footer>
          
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
