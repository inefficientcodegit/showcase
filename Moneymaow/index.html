    // ============================================================
    const fmt = (n) => {
      if (n >= 1e15) return (n / 1e15).toFixed(2) + 'Qa';
      if (n >= 1e12) return (n / 1e12).toFixed(2) + 'T';
      if (n >= 1e9)  return (n / 1e9).toFixed(2) + 'B';
      if (n >= 1e6)  return (n / 1e6).toFixed(2) + 'M';
      if (n >= 1e3)  return (n / 1e3).toFixed(1) + 'k';
      return Math.floor(n).toString();
    };

    // ============================================================
    // PIXEL CAT  — state: 'idle' | 'tapping' | 'excited' | 'sleeping'
    // ============================================================
    const PixelCat = ({ catState, combo }) => {
      const [blink, setBlink]   = useState(false);
      const blinkTimer           = useRef(null);

      useEffect(() => {
        const schedule = () => {
          blinkTimer.current = setTimeout(() => {
            setBlink(true);
            setTimeout(() => { setBlink(false); schedule(); }, 130);
          }, 2500 + Math.random() * 3500);
        };
        schedule();
        return () => clearTimeout(blinkTimer.current);
      }, []);

      const excited  = combo >= 10;
      const onFire   = combo >= 20;
      const sleeping = catState === 'sleeping';

      const eyeL = sleeping || blink
        ? <path d="M9 12h4v1H9v-1z" fill="#0f172a"/>
        : excited
          ? <><rect x="8" y="9" width="5" height="5" fill="#fff"/>
              <rect x="9" y="10" width="3" height="3" fill={onFire ? '#fbbf24' : '#0f172a'}/>
              <rect x="9" y="10" width="1" height="1" fill="white" opacity="0.7"/></>
          : <><rect x="9" y="10" width="3" height="3" fill="#0f172a"/>
              <rect x="9" y="10" width="1" height="1" fill="white" opacity="0.7"/></>;

      const eyeR = sleeping || blink
        ? <path d="M19 12h4v1h-4v-1z" fill="#0f172a"/>
        : excited
          ? <><rect x="19" y="9" width="5" height="5" fill="#fff"/>
              <rect x="20" y="10" width="3" height="3" fill={onFire ? '#fbbf24' : '#0f172a'}/>
              <rect x="20" y="10" width="1" height="1" fill="white" opacity="0.7"/></>
          : <><rect x="20" y="10" width="3" height="3" fill="#0f172a"/>
              <rect x="20" y="10" width="1" height="1" fill="white" opacity="0.7"/></>;

      return (
        <svg viewBox="0 0 32 38" className="w-full h-full" shapeRendering="crispEdges"
             style={{ filter: 'drop-shadow(0 8px 0 rgba(0,0,0,0.6))' }}>
          {/* Ears */}
          <path d="M4 0h6v7H4V0z"  fill="#1e293b"/>
          <path d="M5 1h4v5H5V1z"  fill="#fda4af"/>
          <path d="M22 0h6v7h-6V0z" fill="#1e293b"/>
          <path d="M23 1h4v5h-4V1z" fill="#fda4af"/>
          {/* Head outline */}
          <path d="M4 5h24v2H4V5z"  fill="#1e293b"/>
          <path d="M2 7h2v14H2V7z"  fill="#1e293b"/>
          <path d="M28 7h2v14h-2V7z" fill="#1e293b"/>
          <path d="M2 21h28v2H2v-2z" fill="#1e293b"/>
          {/* Head fill */}
          <path d="M4 7h24v14H4V7z" fill="#f8fafc"/>
          {/* Cheek blush */}
          <path d="M5 14h3v2H5v-2z"  fill="#fecdd3" opacity="0.7"/>
          <path d="M24 14h3v2h-3v-2z" fill="#fecdd3" opacity="0.7"/>
          {/* Eyes */}
          {eyeL}{eyeR}
          {/* Nose */}
          <path d="M14 15h4v2h-4v-2z" fill="#fda4af"/>
          <path d="M15 16h2v1h-2v-1z" fill="#fb7185"/>
          {/* Mouth */}
          {sleeping
            ? <path d="M13 18h3v1h-3v-1zm5 0h2v1h-2v-1z" fill="#0f172a"/>
            : excited
              ? <><path d="M12 17h8v1h-8v-1z" fill="#0f172a"/>
                  <path d="M13 18h6v2h-6v-2z" fill="#f8fafc"/>
                  <path d="M13 18h6v1h-6v-1z" fill="#f87171"/></>
              : <><path d="M13 17h2v1h-2v-1z" fill="#0f172a"/>
                  <path d="M17 17h2v1h-2v-1z" fill="#0f172a"/>
                  <path d="M14 18h4v1h-4v-1z" fill="#0f172a"/></>}
          {/* Whiskers */}
          <path d="M0 12h5v1H0v-1zm27 0h5v1h-5v-1z" fill="#94a3b8"/>
          <path d="M0 14h4v1H0v-1zm28 0h4v1h-4v-1z" fill="#94a3b8"/>
          <path d="M1 16h4v1H1v-1zm27 0h4v1h-4v-1z" fill="#94a3b8"/>
          {/* Body outline */}
          <path d="M4 22h24v2H4v-2z"  fill="#1e293b"/>
          <path d="M2 24h2v13H2V24z"  fill="#1e293b"/>
          <path d="M28 24h2v13h-2V24z" fill="#1e293b"/>
          <path d="M2 37h28v1H2v-1z"  fill="#1e293b"/>
          {/* Body fill */}
          <path d="M4 24h24v13H4V24z" fill="#f8fafc"/>
          {/* Belly */}
          <path d="M9 26h14v9H9v-9z"  fill="#fef3c7"/>
          <path d="M12 28h8v5h-8v-5z" fill="#fde68a"/>
          {/* Collar */}
          <path d="M4 23h24v3H4v-3z"  fill="#ef4444"/>
          <path d="M5 24h22v1H5v-1z"  fill="#dc2626"/>
          {/* Bell */}
          <path d="M14 22h4v4h-4v-4z" fill="#fbbf24"/>
          <path d="M15 23h2v3h-2v-3z" fill="#f59e0b"/>
          <path d="M15 25h2v1h-2v-1z" fill="#0f172a"/>
          {/* Feet */}
          <path d="M5 35h7v3H5v-3z"  fill="#f8fafc"/>
          <path d="M6 36h2v1H6v-1zm3 0h2v1H9v-1z" fill="#fda4af"/>
          <path d="M20 35h7v3h-7v-3z" fill="#f8fafc"/>
          <path d="M21 36h2v1h-2v-1zm3 0h2v1h-2v-1z" fill="#fda4af"/>
          {/* Ear stripes */}
          <path d="M4 27h2v2H4v-2zm22 0h2v2h-2v-2z" fill="#e2e8f0"/>
          {/* On-fire eye glow */}
          {onFire && <>
            <path d="M6 6h4v2H6V6z" fill="#fbbf24" opacity="0.6"/>
            <path d="M22 6h4v2h-4V6z" fill="#fbbf24" opacity="0.6"/>
          </>}
          {/* Sleeping ZZZs */}
          {sleeping && <>
            <text x="26" y="10" fontSize="4" fill="#c7d2fe" fontFamily="monospace" fontWeight="bold">z</text>
            <text x="29" y="7"  fontSize="5" fill="#a5b4fc" fontFamily="monospace" fontWeight="bold">Z</text>
          </>}
        </svg>
      );
    };

    // ============================================================
    // SWINGING ARM
    // ============================================================
    const PixelArm = ({ swinging }) => (
      <svg viewBox="0 0 14 22" className="w-full h-full" shapeRendering="crispEdges">
        <path d="M3 0h8v2h2v16H0V2h2V0z" fill="#1e293b"/>
        <path d="M4 1h6v2h2v14H2V3h2V1z" fill="#f8fafc"/>
        <path d="M4 3h2v3H4V3zm4 0h2v3H8V3z" fill="#fda4af"/>
        {/* Paw */}
        <path d="M1 15h12v5H1v-5z" fill="#fda4af"/>
        <path d="M2 16h3v3H2v-3zm4 0h3v3H6v-3zm4 0h2v3h-2v-3z" fill="#fb7185"/>
        <path d="M2 19h3v1H2v-1zm4 0h3v1H6v-1zm4 0h2v1h-2v-1z" fill="#1e293b"/>
        {/* Coin held when swinging */}
        {swinging && <>
          <path d="M5 19h4v2H5v-2z" fill="#fbbf24"/>
          <path d="M5 19h4v1H5v-1z" fill="#fde68a"/>
          <path d="M6 20h2v1H6v-1z" fill="#f59e0b"/>
        </>}
      </svg>
    );

    // ============================================================
    // FLOATING PARTICLE
    // ============================================================
    const Particle = ({ x, y, val, type, id }) => {
      const palette = ['#fde047','#fb923c','#f472b6','#34d399','#60a5fa','#a78bfa'];
      const color   = type === 'crit' ? '#ff6b6b' : type === 'lucky' ? '#fbbf24' : palette[id % palette.length];
      const sym     = ['¥','+','◆','●','▲'][id % 5];
      return (
        <div className="particle" style={{ left: x - 16, top: y - 20, color,
            fontSize: type === 'crit' ? '0.95rem' : '0.7rem' }}>
          {type === 'crit'  ? `💥CRIT! +${fmt(val)}`  :
           type === 'lucky' ? `⭐+${fmt(val)}`          :
           `${sym}+${fmt(val)}`}
        </div>
      );
    };

    // ============================================================
    // CONFETTI BURST
    // ============================================================
    const ConfettiBurst = ({ active }) => {
      if (!active) return null;
      const pieces = Array.from({ length: 44 }, (_, i) => ({
        id: i,
        color: ['#fde047','#f97316','#ec4899','#10b981','#3b82f6','#a855f7','#ef4444','#06b6d4'][i % 8],
        x: 10 + Math.random() * 80,
        delay: Math.random() * 0.5,
        dur:   0.8 + Math.random() * 0.9,
        size:  6 + Math.random() * 9,
        rot:   Math.random() * 360,
      }));
      return (
        <div className="confetti-wrap">
          {pieces.map(p => (
            <div key={p.id} className="confetti-piece" style={{
              left: `${p.x}%`, backgroundColor: p.color,
              width: p.size, height: p.size,
              animationDelay: `${p.delay}s`,
              animationDuration: `${p.dur}s`,
              transform: `rotate(${p.rot}deg)`,
            }}/>
          ))}
        </div>
      );
    };

    // ============================================================
    // TOAST NOTIFICATION
    // ============================================================
    const Toast = ({ toast, onDone }) => {
      useEffect(() => {
        if (!toast) return;
        const t = setTimeout(onDone, toast.duration || 3500);
        return () => clearTimeout(t);
      }, [toast, onDone]);
      if (!toast) return null;
      return (
        <div className={`toast-banner toast-${toast.type || 'default'}`}>
          <div className="toast-icon">{toast.icon}</div>
          <div className="toast-body">
            <div className="toast-title">{toast.title}</div>
            {toast.lines?.map((l, i) => <div key={i} className="toast-line">{l}</div>)}
          </div>
        </div>
      );
    };

    // ============================================================
    // MILESTONE CELEBRATION
    // ============================================================
    const MilestonePop = ({ milestone, onDone }) => {
      useEffect(() => {
        if (!milestone) return;
        const t = setTimeout(onDone, milestone.size === 'xl' ? 4200 : 3000);
        return () => clearTimeout(t);
      }, [milestone, onDone]);
      if (!milestone) return null;
      const big = milestone.size === 'xl' || milestone.size === 'lg';
      return (
        <div className={`milestone-overlay ${big ? 'milestone-big' : ''}`}>
          <div className="milestone-emoji">{milestone.emoji}</div>
          <div className="milestone-label">{milestone.label}</div>
        </div>
      );
    };

    // ============================================================
    // COMBO DISPLAY
    // ============================================================
    const ComboDisplay = ({ combo, mult }) => {
      if (combo < 3) return null;
      const fire = combo >= 20;
      const hot  = combo >= 10;
      return (
        <div className={`combo-box ${fire ? 'combo-fire' : hot ? 'combo-hot' : 'combo-norm'}`}>
          <div className="combo-count">{combo}× COMBO!</div>
          <div className="combo-mult">{mult}× BONUS</div>
          {fire && <div className="combo-flames">🔥🔥🔥</div>}
        </div>
      );
    };

    // ============================================================
    // OFFLINE MODAL
    // ============================================================
    const OfflineModal = ({ earned, onClose }) => {
      if (!earned) return null;
      return (
        <div className="offline-overlay" onClick={onClose}>
          <div className="offline-box">
            <div className="offline-title">WELCOME BACK!</div>
            <div style={{ fontSize: 52 }}>😸</div>
            <div className="offline-msg">While you were gone, the cat worked hard!</div>
            <div className="offline-earned">+¥{fmt(earned)}</div>
            <div className="offline-tap">[ TAP TO COLLECT ]</div>
          </div>
        </div>
      );
    };

    // ============================================================
    // UPGRADE CARD
    // ============================================================
    const UpgradeCard = ({ upgrade, cost, count, canAfford, onBuy, isNew }) => {
      const isMaxed = count >= upgrade.maxLevel;
      const pct     = Math.min(100, (count / upgrade.maxLevel) * 100);
      return (
        <button
          disabled={!canAfford || isMaxed}
          onClick={() => onBuy(upgrade)}
          className={[
            'upg-card',
            upgrade.isEvolved ? 'upg-evolved' : '',
            isMaxed           ? 'upg-maxed'   : '',
            isNew             ? 'upg-new'     : '',
            canAfford && !isMaxed ? 'upg-afford' : '',
          ].join(' ')}
        >
          <div className="upg-left">
            <div className="upg-name">{upgrade.name}</div>
            <div className="upg-flavor">{upgrade.flavor}</div>
            <div className="upg-desc">{upgrade.desc}</div>
            <div className="upg-prog-track">
              <div className="upg-prog-fill" style={{ width: `${pct}%` }}/>
            </div>
          </div>
          <div className="upg-right">
            {isMaxed
              ? <div className="upg-maxed-lbl">MAXED!</div>
              : <div className={`upg-cost ${canAfford ? 'upg-cost-ok' : 'upg-cost-no'}`}>¥{fmt(cost)}</div>
            }
            <div className="upg-lv">{isMaxed ? '100/100' : `LV.${count}`}</div>
            {upgrade.isEvolved && <div className="upg-evo-badge">EVOLVED</div>}
          </div>
        </button>
      );
    };

    // ============================================================
    // CATEGORY TAB
    // ============================================================
    const CatTab = ({ cat, isActive, unlocked, totalEarned, onClick }) => {
      const pct = unlocked ? 100 : Math.min(99, (totalEarned / cat.unlockAt) * 100);
      return (
        <button
          onClick={unlocked ? onClick : undefined}
          className={`cat-tab ${isActive ? 'cat-tab-active' : ''} ${unlocked ? 'cat-tab-open' : 'cat-tab-locked'}`}
        >
          <span className="tab-ico">{unlocked ? cat.icon : '🔒'}</span>
          <span className="tab-lbl">{unlocked ? cat.label : '???'}</span>
          {!unlocked && <div className="tab-prog"><div className="tab-prog-fill" style={{ width: `${pct}%` }}/></div>}
        </button>
      );
    };

    // ============================================================
    // MAIN APP
    // ============================================================
    function App() {

      // ── Core ──
      const [money,        setMoney]        = useState(0);
      const [totalEarned,  setTotalEarned]  = useState(0);
      const [cpc,          setCpc]          = useState(1);
      const [cps,          setCps]          = useState(0);
      const [inventory,    setInventory]    = useState({});
      const [loaded,       setLoaded]       = useState(false);

      // ── UI ──
      const [activeTab,    setActiveTab]    = useState('Menu');
      const [particles,    setParticles]    = useState([]);
      const [catState,     setCatState]     = useState('idle');
      const [swinging,     setSwinging]     = useState(false);
      const [squish,       setSquish]       = useState(false);

      // ── Combo ──
      const [combo,        setCombo]        = useState(0);
      const comboTimer                      = useRef(null);

      // ── Notifications ──
      const [toast,        setToast]        = useState(null);
      const [milestone,    setMilestone]    = useState(null);
      const [confetti,     setConfetti]     = useState(false);
      const [offlineEarned,setOfflineEarned]= useState(null);
      const [newItems,     setNewItems]     = useState(new Set());
      const [seenMiles,    setSeenMiles]    = useState(new Set());
      const [seenUnlocks,  setSeenUnlocks]  = useState(new Set());

      // ── Misc refs ──
      const sleepTimer   = useRef(null);
      const pidRef       = useRef(0);

      // SAVE / LOAD
      useEffect(() => {
        const raw = localStorage.getItem('mmSave_v3');
        if (raw) {
          try {
            const d = JSON.parse(raw);
            setMoney(d.money || 0);
            setCpc(d.cpc || 1);
            setCps(d.cps || 0);
            setInventory(d.inventory || {});
            setTotalEarned(d.totalEarned || 0);
            setSeenMiles(new Set(d.seenMiles || []));
            setSeenUnlocks(new Set(d.seenUnlocks || []));
            if (d.savedAt && d.cps > 0) {
              const secs   = Math.min((Date.now() - d.savedAt) / 1000, 28800);
              const gained = Math.floor(d.cps * secs * 0.5);
              if (gained > 50) setOfflineEarned(gained);
            }
          } catch (_) {}
        }
        setLoaded(true);
      }, []);

      useEffect(() => {
        if (!loaded) return;
        localStorage.setItem('mmSave_v3', JSON.stringify({
          money, cpc, cps, inventory, totalEarned,
          seenMiles: [...seenMiles], seenUnlocks: [...seenUnlocks],
          savedAt: Date.now(),
        }));
      });

      // PASSIVE INCOME
      useEffect(() => {
        if (cps === 0) return;
        const iv = setInterval(() => {
          setMoney(p => p + cps);
          setTotalEarned(p => p + cps);
        }, 1000);
        return () => clearInterval(iv);
      }, [cps]);

      // LUCKY BONUS (45–90s random)
      useEffect(() => {
        if (cps === 0) return;
        let t;
        const sched = () => {
          t = setTimeout(() => {
            const bonus = Math.floor(cps * (10 + Math.random() * 20));
            setMoney(p => p + bonus);
            setTotalEarned(p => p + bonus);
            spawnParticle(window.innerWidth / 2, window.innerHeight * 0.35, bonus, 'lucky');
            setToast({ icon: '⭐', title: 'LUCKY BONUS!', lines: [`+¥${fmt(bonus)} from the lucky cat!`], type: 'lucky', duration: 2800 });
            sched();
          }, 45000 + Math.random() * 45000);
        };
        sched();
        return () => clearTimeout(t);
      }, [cps]);

      // MILESTONE DETECTION
      useEffect(() => {
        if (!loaded) return;
        for (const ms of MILESTONES) {
          if (totalEarned >= ms.value && !seenMiles.has(ms.value)) {
            setSeenMiles(p => new Set([...p, ms.value]));
            setMilestone(ms);
            setConfetti(true);
            setTimeout(() => setConfetti(false), 3500);
            break;
          }
        }
      }, [totalEarned, loaded]);

      // CATEGORY UNLOCK DETECTION
      useEffect(() => {
        if (!loaded) return;
        for (const cat of CATEGORIES) {
          if (cat.unlockAt > 0 && totalEarned >= cat.unlockAt && !seenUnlocks.has(cat.id)) {
            setSeenUnlocks(p => new Set([...p, cat.id]));
            setToast({ icon: cat.icon, title: `${cat.label} UNLOCKED!`, lines: cat.story, type: 'unlock', duration: 4500 });
            setActiveTab(cat.id);
            break;
          }
        }
      }, [totalEarned, loaded]);

      // SLEEP TIMER
      const kickSleep = useCallback(() => {
        clearTimeout(sleepTimer.current);
        sleepTimer.current = setTimeout(() => setCatState('sleeping'), 30000);
      }, []);
      useEffect(() => { kickSleep(); return () => clearTimeout(sleepTimer.current); }, [kickSleep]);

      // VISIBLE UPGRADES
      const visibleUpgrades = useMemo(() => {
        return UPGRADES.filter(u => {
          if (!u.unlocksWhen) return true;
          return (inventory[u.unlocksWhen.itemId] || 0) >= u.unlocksWhen.level;
        });
      }, [inventory]);

      // COST FORMULA
      const getCost = useCallback((u) => {
        return Math.floor(u.baseCost * Math.pow(1.15, inventory[u.id] || 0));
      }, [inventory]);

      // COMBO MULTIPLIER
      const comboMult = useMemo(() => {
        if (combo >= 50) return 10;
        if (combo >= 20) return 5;
        if (combo >= 10) return 3;
        if (combo >= 5)  return 2;
        return 1;
      }, [combo]);

      // SPAWN PARTICLE
      const spawnParticle = useCallback((x, y, val, type = 'normal') => {
        const id = pidRef.current++;
        setParticles(prev => [...prev.slice(-14), { id, x, y, val, type }]);
        setTimeout(() => setParticles(prev => prev.filter(p => p.id !== id)), 900);
      }, []);

      // TAP HANDLER
      const handleTap = useCallback((e) => {
        if (e.cancelable) e.preventDefault();
        kickSleep();

        clearTimeout(comboTimer.current);
        setCombo(prev => prev + 1);
        comboTimer.current = setTimeout(() => setCombo(0), 1600);

        setSwinging(true); setSquish(true);
        setTimeout(() => setSwinging(false), 230);
        setTimeout(() => setSquish(false), 150);
        setCatState(combo >= 9 ? 'excited' : 'tapping');
        setTimeout(() => setCatState('idle'), 320);

        const isCrit  = Math.random() < 0.06;
        const earned  = Math.floor(cpc * comboMult * (isCrit ? 8 : 1));
        setMoney(p => p + earned);
        setTotalEarned(p => p + earned);

        let px = window.innerWidth / 2, py = window.innerHeight * 0.4;
        if (e.clientX)        { px = e.clientX;          py = e.clientY; }
        else if (e.touches?.[0]) { px = e.touches[0].clientX; py = e.touches[0].clientY; }
        spawnParticle(px, py, earned, isCrit ? 'crit' : 'normal');

        const extras = Math.min(combo, 4);
        for (let i = 0; i < extras; i++) {
          setTimeout(() => spawnParticle(
            px + (Math.random() - 0.5) * 90,
            py + (Math.random() - 0.5) * 70,
            Math.floor(cpc * 0.25), 'normal'
          ), i * 70);
        }
      }, [cpc, combo, comboMult, kickSleep, spawnParticle]);

      // BUY UPGRADE
      const buyUpgrade = useCallback((upgrade) => {
        const cost    = getCost(upgrade);
        if (money < cost) return;
        const prevLv  = inventory[upgrade.id] || 0;
        const newLv   = prevLv + 1;

        setMoney(p => p - cost);
        setInventory(p => ({ ...p, [upgrade.id]: newLv }));
        if (upgrade.type === 'cpc') setCpc(p => p + upgrade.boost);
        if (upgrade.type === 'cps') setCps(p => p + upgrade.boost);

        if (newLv >= upgrade.maxLevel) {
          const evo = UPGRADES.find(u => u.unlocksWhen?.itemId === upgrade.id && u.unlocksWhen?.level === 100);
          if (evo) {
            setNewItems(p => new Set([...p, evo.id]));
            setToast({ icon: '★', title: 'ITEM EVOLVED!', lines: [`${upgrade.name}`, `→ ${evo.name}`, evo.flavor], type: 'evolution', duration: 4200 });
            setConfetti(true);
            setTimeout(() => setConfetti(false), 3000);
          }
        }
      }, [money, inventory, getCost]);

      // COLLECT OFFLINE
      const collectOffline = useCallback(() => {
        if (!offlineEarned) return;
        setMoney(p => p + offlineEarned);
        setTotalEarned(p => p + offlineEarned);
        setOfflineEarned(null);
      }, [offlineEarned]);

      // RESET
      const resetGame = () => {
        if (!window.confirm('Reset your entire noodle empire? This CANNOT be undone!')) return;
        setMoney(0); setCpc(1); setCps(0); setInventory({}); setTotalEarned(0); setCombo(0);
        setSeenMiles(new Set()); setSeenUnlocks(new Set()); setNewItems(new Set());
        localStorage.removeItem('mmSave_v3');
      };

      // BG STAGE
      const bgStage = useMemo(() => {
        for (let i = CATEGORIES.length - 1; i >= 0; i--) {
          if (totalEarned >= CATEGORIES[i].unlockAt) return i;
        }
        return 0;
      }, [totalEarned]);

      const nextUnlock = CATEGORIES.find(c => totalEarned < c.unlockAt);

      if (!loaded) return (
        <div style={{ minHeight: '100dvh', background: '#2b1055', display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'white', fontFamily: 'monospace', fontSize: 18 }}>
          LOADING...
        </div>
      );

      const tabUpgrades = visibleUpgrades.filter(u => u.category === activeTab);

      return (
        <div className={`game-root stage-${bgStage}`}>
          <style dangerouslySetInnerHTML={{ __html: STYLES }}/>

          {/* Scanlines */}
          <div className="scanlines"/>

          {/* Overlays */}
          <ConfettiBurst active={confetti}/>
          <Toast toast={toast} onDone={() => setToast(null)}/>
          <MilestonePop milestone={milestone} onDone={() => setMilestone(null)}/>
          <OfflineModal earned={offlineEarned} onClose={collectOffline}/>

          {/* HEADER */}
          <header className="hdr">
            <h1 className="hdr-title">MONEY MAOW</h1>
            <div className="hdr-stats">
              <div className="stat-chip chip-gold">¥{fmt(money)}</div>
              <div className="stat-chip chip-blue">{fmt(cps)}/s</div>
              <div className="stat-chip chip-purple">{fmt(cpc)}/tap</div>
            </div>
            <button className="btn-reset" onClick={resetGame}>RESET</button>
          </header>

          {/* MAIN */}
          <main className="game-main">

            {/* LEFT: CAT PANEL */}
            <section className="cat-panel pxl-panel">
              <div className={`starburst sb-${bgStage}`} aria-hidden/>

              <div className="stage-lbl">
                {CATEGORIES[bgStage]?.icon} STAGE: {CATEGORIES[bgStage]?.label}
              </div>

              <ComboDisplay combo={combo} mult={comboMult}/>

              {/* TAP ZONE */}
              <div
                className={`tap-zone ${squish ? 'tap-squish' : ''}`}
                onPointerDown={handleTap}
                role="button" aria-label="Tap the cat to earn money"
              >
                <div className="cat-body-wrap">
                  <PixelCat catState={catState} combo={combo}/>
                </div>
                <div className={`arm-wrap ${swinging ? 'arm-swing' : ''}`}>
                  <PixelArm swinging={swinging}/>
                </div>
              </div>

              <div className="tap-prompt">
                {catState === 'sleeping' ? '💤 ZZZ... (TAP TO WAKE!)'
                 : combo >= 20 ? '🔥 ON FIRE!! KEEP GOING!!'
                 : combo >= 10 ? '⚡ COMBO MASTER!'
                 : 'TAP THE CAT!'}
              </div>

              <div className="total-earned">TOTAL: ¥{fmt(totalEarned)}</div>
            </section>

            {/* RIGHT: SHOP PANEL */}
            <section className="shop-panel pxl-panel">

              <div className="tab-row">
                {CATEGORIES.map(cat => (
                  <CatTab
                    key={cat.id}
                    cat={cat}
                    isActive={activeTab === cat.id}
                    unlocked={totalEarned >= cat.unlockAt}
                    totalEarned={totalEarned}
                    onClick={() => setActiveTab(cat.id)}
                  />
                ))}
              </div>

              {nextUnlock && (
                <div className="next-unlock-bar">
                  <div className="nub-label">
                    {nextUnlock.icon} NEXT: {nextUnlock.label} — ¥{fmt(Math.max(0, nextUnlock.unlockAt - totalEarned))} to go
                  </div>
                  <div className="nub-track">
                    <div className="nub-fill" style={{ width: `${Math.min(99, (totalEarned / nextUnlock.unlockAt) * 100)}%` }}/>
                  </div>
                </div>
              )}

              <div className="upg-list">
                {tabUpgrades.length === 0 && (
                  <div className="empty-shop">
                    <div>NO UPGRADES YET</div>
                    <div style={{ marginTop: 8, fontSize: '0.55em', color: '#6366f1' }}>
                      Level up existing items to unlock more!
                    </div>
                  </div>
                )}
                {tabUpgrades.map(u => (
                  <UpgradeCard
                    key={u.id}
                    upgrade={u}
                    cost={getCost(u)}
                    count={inventory[u.id] || 0}
                    canAfford={money >= getCost(u)}
                    onBuy={buyUpgrade}
                    isNew={newItems.has(u.id)}
                  />
                ))}
              </div>
            </section>
          </main>

          {/* Floating particles */}
          {particles.map(p => <Particle key={p.id} {...p}/>)}
        </div>
      );
    }
