<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Doomsday Trainer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body, #root {
      height: 100%; width: 100%; margin: 0; padding: 0;
      background: #f4ffc7;
      font-family: 'VT323', monospace;
      overflow: hidden;
    }
    * { -webkit-tap-highlight-color: transparent; }
    :root {
      --color-darkest: #171e00;
      --color-dark:    #376936;
      --color-light:   #d3f751;
      --color-lightest:#f4ffc7;
    }
    @keyframes pxFall {
      0%   { transform: translateY(-8px)  rotate(0deg);   opacity: 1; }
      100% { transform: translateY(180px) rotate(300deg); opacity: 0; }
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-6px); }
      40%, 80% { transform: translateX( 6px); }
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }
    .animate-shake  { animation: shake  0.4s ease-in-out; }
    .animate-bounce { animation: bounce 0.6s ease-in-out infinite; }
    .animate-pulse  { animation: pulse  1.5s ease-in-out infinite; }
    .pb-safe { padding-bottom: max(1.25rem, env(safe-area-inset-bottom, 1.25rem)); }
    .overflow-y-auto { -webkit-overflow-scrolling: touch; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: var(--color-dark); }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ── Constants ──────────────────────────────────────────────────────────────────
const DAYS       = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS     = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MONTHS_FULL= ['January','February','March','April','May','June','July','August','September','October','November','December'];
const CORRECT    = ['NICE!','CORRECT!','NAILED IT!','PERFECT!','BRILLIANT!','SPOT ON!','GREAT!','WELL DONE!'];
const APP_STORE  = 'https://apps.apple.com/app/id6760719687';
const PLAY_STORE = 'https://play.google.com/store/apps/details?id=com.inefficientcode.doomsdaytrainer';

// ── Maths ─────────────────────────────────────────────────────────────────────
const safeMod    = (n, m) => ((n % m) + m) % m;
const isLeapYear = (y) => (y % 4 === 0 && y % 100 !== 0) || (y % 400 === 0);

const formatDate = (date) => {
  const m = MONTHS[date.getMonth()];
  return `${m} ${date.getDate()}, ${date.getFullYear()}`;
};

const getCenturyAnchor = (year) =>
  [2, 0, 5, 3][((Math.floor(year / 100) % 4) + 4) % 4];

const getMonthDoomsday = (month, year) => {
  if (month === 0) return isLeapYear(year) ? 4 : 3;
  if (month === 1) return isLeapYear(year) ? 29 : 28;
  return [0,0,14,4,9,6,11,8,5,10,7,12][month];
};

const calcFinalDay = (date) => {
  const y   = date.getFullYear(), mo = date.getMonth(), d = date.getDate();
  const yy  = y % 100;
  const off = safeMod(d - getMonthDoomsday(mo, y), 7);
  const yr  = safeMod(yy + Math.floor(yy / 4), 7);
  return safeMod(off + getCenturyAnchor(y) + yr, 7);
};

const getRandomDate = () => {
  const y = 1800 + Math.floor(Math.random() * 400);
  const m = Math.floor(Math.random() * 12);
  const d = 1 + Math.floor(Math.random() * 28);
  return new Date(y, m, d, 0, 0, 0, 0);
};

const getTimeLimit = (s) => s >= 40 ? 5 : s >= 30 ? 10 : s >= 20 ? 20 : s >= 10 ? 30 : 60;

// ── Sound ─────────────────────────────────────────────────────────────────────
let soundOn = true;
const _ctx = (() => { try { return new (window.AudioContext || window.webkitAudioContext)(); } catch { return null; } })();
const tone = (f, t, d, v = 0.1) => {
  if (!soundOn || !_ctx) return;
  try {
    if (_ctx.state === 'suspended') _ctx.resume();
    const o = _ctx.createOscillator(), g = _ctx.createGain();
    o.type = t; o.frequency.setValueAtTime(f, _ctx.currentTime);
    g.gain.setValueAtTime(v, _ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, _ctx.currentTime + d);
    o.connect(g); g.connect(_ctx.destination); o.start(); o.stop(_ctx.currentTime + d);
  } catch {}
};
const sfx = {
  click:   () => tone(600, 'square', 0.05, 0.05),
  correct: () => tone(1200, 'square', 0.10, 0.12),
  wrong:   () => { tone(280, 'sawtooth', 0.2, 0.12); setTimeout(() => tone(180, 'sawtooth', 0.3, 0.12), 150); },
  streak:  () => [523,659,783,1046].forEach((f,i) => setTimeout(() => tone(f,'square',0.2,0.1), i*100)),
};

// ── useLocalStorage ───────────────────────────────────────────────────────────
function useLS(key, init) {
  const [v, setV] = useState(() => { try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : init; } catch { return init; } });
  const r = useRef(v);
  useEffect(() => { r.current = v; }, [v]);
  const set = useCallback((x) => {
    const n = x instanceof Function ? x(r.current) : x;
    r.current = n; setV(n);
    try { localStorage.setItem(key, JSON.stringify(n)); } catch {}
  }, [key]);
  return [v, set];
}

// ── PixelButton ───────────────────────────────────────────────────────────────
const Btn = ({ children, onClick, disabled, active, className = '' }) => (
  <button
    onClick={() => { if (!disabled) { sfx.click(); onClick && onClick(); } }}
    disabled={disabled}
    className={`border-4 border-[var(--color-darkest)] font-bold uppercase p-3 text-lg leading-tight transition-transform
      ${active
        ? 'bg-[var(--color-darkest)] text-[var(--color-lightest)] translate-y-1'
        : 'bg-[var(--color-light)] text-[var(--color-darkest)] shadow-[4px_4px_0_var(--color-darkest)] active:translate-y-1 active:shadow-none'}
      ${disabled ? 'opacity-50 cursor-not-allowed' : 'cursor-pointer'} ${className}`}
  >{children}</button>
);

// ── Confetti ──────────────────────────────────────────────────────────────────
const Confetti = () => {
  const ps = useMemo(() => {
    const C = ['#e74c3c','#e67e22','#f1c40f','#2ecc71','#3498db','#9b59b6','#e91e8c','#00bcd4'];
    return Array.from({length:28},(_,i) => ({ id:i, color:C[i%C.length], left:`${3+Math.floor(Math.random()*92)}%`, delay:`${(Math.random()*0.4).toFixed(2)}s`, size:[4,6,4,8,4][i%5] }));
  }, []);
  return (
    <div style={{position:'absolute',inset:0,overflow:'hidden',pointerEvents:'none',zIndex:0}}>
      {ps.map(p => <div key={p.id} style={{position:'absolute',top:0,left:p.left,width:p.size,height:p.size,background:p.color,animation:`pxFall 0.65s ${p.delay} ease-in forwards`}} />)}
    </div>
  );
};

// ── CircularDayPicker ─────────────────────────────────────────────────────────
const CirclePicker = ({ onAnswer, date, leapHints }) => {
  const r = 39, cx = 50;
  // Wednesday sits at 90° (bottom of SVG). Each step is 360/7 ≈ 51.4°
  const pts = DAYS.map((_,i) => {
    const a = ((90 - 3*(360/7)) + i*(360/7)) * Math.PI / 180;
    return { x: cx + r*Math.cos(a), y: cx + r*Math.sin(a) };
  });
  return (
    <div style={{position:'relative',width:'100%',paddingBottom:'100%',maxWidth:340,margin:'0 auto'}}>
      <div style={{position:'absolute',inset:0}}>
        <svg style={{position:'absolute',inset:0,width:'100%',height:'100%',pointerEvents:'none'}} viewBox="0 0 100 100">
          {pts.map((p,i) => { const q=pts[(i+1)%7]; return <line key={i} x1={p.x} y1={p.y} x2={q.x} y2={q.y} stroke="currentColor" strokeWidth="0.6" opacity="0.2" />; })}
        </svg>
        <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'28%',textAlign:'center',pointerEvents:'none'}}>
          <span style={{fontSize:'0.75rem',fontWeight:'bold',textTransform:'uppercase',opacity:0.5,letterSpacing:'0.08em'}}>Target Date</span>
          <span style={{fontWeight:'bold',fontSize:'1.25rem',marginTop:3,lineHeight:1.15}}>{formatDate(date)}</span>
          {leapHints && isLeapYear(date.getFullYear()) && (
            <span style={{fontSize:'0.65rem',border:'2px solid var(--color-darkest)',background:'var(--color-darkest)',color:'var(--color-lightest)',fontWeight:'bold',padding:'0 4px',marginTop:3}}>✦ LEAP</span>
          )}
        </div>
        {DAYS.map((day,i) => (
          <button key={day} onClick={() => { sfx.click(); onAnswer(i); }}
            style={{position:'absolute',left:`${pts[i].x}%`,top:`${pts[i].y}%`,transform:'translate(-50%,-50%)',
              border:'3px solid var(--color-darkest)',background:'var(--color-lightest)',color:'var(--color-darkest)',
              fontFamily:'inherit',fontSize:'1rem',fontWeight:'bold',textTransform:'uppercase',
              padding:'3px 8px',cursor:'pointer',boxShadow:'2px 2px 0 var(--color-darkest)',whiteSpace:'nowrap'}}>
            {day.slice(0,3)}
          </button>
        ))}
      </div>
    </div>
  );
};

// ── Tutorial ──────────────────────────────────────────────────────────────────
const STEPS = [
  {
    title: 'The Doomsday Algorithm',
    Body: () => (
      <div className="space-y-3 text-base leading-snug">
        <p>The <strong>Doomsday Algorithm</strong> — invented by John Conway — lets you find the day of the week for <em>any date in history</em> in your head.</p>
        <p>Every calculation boils down to one formula:</p>
        <div className="border-4 border-[var(--color-darkest)] p-4 text-center font-bold text-xl bg-[var(--color-lightest)] mt-1">
          (Month + Century + Year) mod 7
        </div>
        <p className="text-sm opacity-70 mt-1">Result → weekday number:<br/><strong>0=Sun · 1=Mon · 2=Tue · 3=Wed · 4=Thu · 5=Fri · 6=Sat</strong></p>
      </div>
    ),
  },
  {
    title: 'Step 1 · Month Offset',
    Body: () => (
      <div className="space-y-3 text-base leading-snug">
        <p>Each month has an <strong>anchor date</strong> that falls on the same weekday as the century + year doomsday. Count the gap from the nearest anchor to your date (mod 7).</p>
        <div className="grid grid-cols-4 gap-1 text-sm border-2 border-[var(--color-darkest)] p-2 bg-[var(--color-lightest)]">
          {[['Jan','3/4✦'],['Feb','28/29✦'],['Mar','14'],['Apr','4'],['May','9'],['Jun','6'],['Jul','11'],['Aug','8'],['Sep','5'],['Oct','10'],['Nov','7'],['Dec','12']].map(([m,d]) => (
            <div key={m} className="text-center border border-[var(--color-dark)] py-0.5">
              <div className="opacity-50 text-xs">{m}</div>
              <div className="font-bold">{d}</div>
            </div>
          ))}
        </div>
        <p className="text-xs opacity-60">✦ leap year · Memory trick: 4/4, 6/6, 8/8, 10/10, 12/12 are all doomsdays — so are 5/9, 9/5, 7/11, 11/7.</p>
        <div className="border-2 border-[var(--color-dark)] p-2 text-sm bg-[var(--color-light)]">
          <strong>Example:</strong> Jun 19 → nearest anchor Jun 6. Gap = 19 − 6 = 13. 13 mod 7 = <strong>6</strong>.
        </div>
      </div>
    ),
  },
  {
    title: 'Step 2 · Century Anchor',
    Body: () => (
      <div className="space-y-3 text-base leading-snug">
        <p>Memorise four century anchors — they repeat every 400 years:</p>
        <div className="grid grid-cols-2 gap-2 my-1">
          {[['1800s','5 · Fri'],['1900s','3 · Wed'],['2000s','2 · Tue'],['2100s','0 · Sun']].map(([c,v]) => (
            <div key={c} className="border-4 border-[var(--color-darkest)] p-3 text-center bg-[var(--color-light)]">
              <div className="opacity-60 text-sm">{c}</div>
              <div className="text-2xl font-bold">{v}</div>
            </div>
          ))}
        </div>
        <p className="text-sm opacity-60">2200s = 1800s, 2300s = 1900s, etc.</p>
      </div>
    ),
  },
  {
    title: 'Step 3 · Year Offset',
    Body: () => (
      <div className="space-y-3 text-base leading-snug">
        <p>Take the last two digits of the year (YY):</p>
        <div className="border-4 border-[var(--color-darkest)] p-4 text-center font-bold text-xl bg-[var(--color-lightest)]">
          (YY + ⌊YY ÷ 4⌋) mod 7
        </div>
        <p className="text-sm font-bold">Example: 1983 — YY = 83</p>
        <div className="border-2 border-[var(--color-dark)] p-3 text-sm space-y-1 bg-[var(--color-light)]">
          <p>⌊83 ÷ 4⌋ = <strong>20</strong></p>
          <p>83 + 20 = 103</p>
          <p>103 mod 7 = <strong>5</strong></p>
        </div>
        <p className="text-xs opacity-60">⌊YY÷4⌋ = how many leap years happened in the century so far.</p>
      </div>
    ),
  },
  {
    title: 'Putting It Together',
    Body: () => (
      <div className="space-y-3 text-base leading-snug">
        <p className="font-bold text-lg">Example: June 19, 1983</p>
        <div className="border-2 border-[var(--color-dark)] p-3 text-sm space-y-2 bg-[var(--color-light)]">
          <div className="flex justify-between items-baseline"><span>① Month offset (gap 13 mod 7)</span><strong className="text-xl">6</strong></div>
          <div className="flex justify-between items-baseline"><span>② Century anchor (1900s)</span><strong className="text-xl">3</strong></div>
          <div className="flex justify-between items-baseline"><span>③ Year offset (83+20=103 mod 7)</span><strong className="text-xl">5</strong></div>
          <div className="border-t-2 border-[var(--color-darkest)] pt-2 flex justify-between items-baseline font-bold">
            <span>(6+3+5)=14, mod 7 =</span><span className="text-2xl">0 = <u>Sunday</u> ✓</span>
          </div>
        </div>
        <p className="text-sm">June 19, 1983 really was a <strong>Sunday</strong>!</p>
      </div>
    ),
  },
  {
    title: "You're Ready!",
    Body: () => (
      <div className="space-y-4 text-center leading-snug">
        <div className="text-6xl mt-1">🎉</div>
        <p className="text-base">You now know the full algorithm. In the game, random dates appear — name the weekday as fast as you can.</p>
        <p className="text-sm">Your time limit shrinks as your streak grows. How high can you go?</p>
        <div className="border-4 border-[var(--color-darkest)] p-3 bg-[var(--color-light)] text-sm text-left space-y-1">
          <p className="font-bold text-center uppercase mb-1">Quick Reference</p>
          <p><strong>Days:</strong> 0=Sun 1=Mon 2=Tue 3=Wed 4=Thu 5=Fri 6=Sat</p>
          <p><strong>Cents:</strong> 1800s=5 · 1900s=3 · 2000s=2 · 2100s=0</p>
          <p><strong>Month anchors:</strong> 4/4 6/6 8/8 10/10 12/12 + 5/9 9/5 7/11 11/7</p>
        </div>
        <p className="text-xs opacity-40">Full app has Training Mode, Drills &amp; global leaderboards.</p>
      </div>
    ),
  },
];

const Tutorial = ({ onClose }) => {
  const [idx, setIdx] = useState(0);
  const { title, Body } = STEPS[idx];
  return (
    <div className="flex flex-col h-full w-full max-w-md mx-auto p-5 pt-[50px] pb-safe overflow-hidden">
      <div className="flex justify-between items-center border-b-4 border-[var(--color-darkest)] pb-2 mb-3 shrink-0">
        <span className="text-sm font-bold opacity-40 uppercase">{idx+1}/{STEPS.length}</span>
        <h2 className="font-bold uppercase text-xl tracking-tight">{title}</h2>
        <button onClick={onClose} className="border-2 border-[var(--color-darkest)] px-2 py-0.5 text-sm font-bold">✕</button>
      </div>
      <div className="h-2 border-2 border-[var(--color-darkest)] mb-3 bg-[var(--color-lightest)] shrink-0">
        <div className="h-full bg-[var(--color-darkest)] transition-all duration-300" style={{width:`${((idx+1)/STEPS.length)*100}%`}} />
      </div>
      <div className="flex-1 overflow-y-auto border-4 border-[var(--color-darkest)] bg-[var(--color-lightest)] p-4 shadow-[4px_4px_0_var(--color-darkest)] mb-4 min-h-0">
        <Body />
      </div>
      <div className="flex gap-3 shrink-0">
        {idx > 0 && <Btn onClick={() => setIdx(i=>i-1)} className="flex-1">← Back</Btn>}
        {idx < STEPS.length-1
          ? <Btn onClick={() => setIdx(i=>i+1)} className="flex-1">Next →</Btn>
          : <Btn onClick={onClose} className="flex-1">▶ Play Now!</Btn>}
      </div>
    </div>
  );
};

// ── GameOver ──────────────────────────────────────────────────────────────────
const GameOver = ({ stats, onPlayAgain, onMenu }) => (
  <div className="flex flex-col h-full w-full max-w-md mx-auto p-6 pt-[50px] pb-safe items-center justify-center overflow-y-auto">
    <h2 className="text-5xl font-bold uppercase animate-shake tracking-tighter text-center mb-5">Game Over</h2>
    <div className="border-4 border-[var(--color-darkest)] bg-[var(--color-light)] p-6 w-full mb-4 shadow-[8px_8px_0_var(--color-darkest)]">
      <div className="mb-4 text-center">
        <p className="text-xl font-bold opacity-60 uppercase mb-1">The date was</p>
        <p className="text-3xl font-bold underline decoration-4">{formatDate(stats.date)}</p>
      </div>
      {stats.timedOut && <p className="text-red-700 font-black uppercase text-2xl animate-pulse mb-4 text-center">TIME'S UP!</p>}
      <p className="text-2xl uppercase font-bold tracking-tighter text-center mb-3">
        Streak: <span className="text-4xl">{stats.streak}</span>
      </p>
      <div className="text-xl font-bold opacity-80 uppercase tracking-tighter text-center border-t-4 border-[var(--color-darkest)] pt-3">
        Correct Answer<br/>
        <span className="text-4xl font-black underline">{DAYS[stats.correctDay]}</span>
      </div>
    </div>
    {stats.isNewBest && stats.streak > 0 && (
      <div className="w-full border-2 border-[var(--color-darkest)] bg-[var(--color-darkest)] text-[var(--color-lightest)] px-3 py-2 mb-4 font-bold text-sm uppercase tracking-widest text-center">
        🏆 New personal best!
      </div>
    )}
    <div className="flex flex-col gap-3 w-full">
      <Btn onClick={onPlayAgain} className="w-full">▶ Play Again</Btn>
      <Btn onClick={onMenu}      className="w-full">Main Menu</Btn>
    </div>
  </div>
);

// ── GameMode ──────────────────────────────────────────────────────────────────
const GameMode = ({ onExit, onGameOver }) => {
  const [date,     setDate]     = useState(getRandomDate);
  const [streak,   setStreak]   = useState(0);
  const [dispTime, setDispTime] = useState('0.0');
  const [flash,    setFlash]    = useState(null);
  const [circular, setCircular] = useLS('dt_circ', false);

  // All mutable game state via refs — single persistent interval reads them live
  const dateRef     = useRef(date);
  const streakRef   = useRef(0);
  const answeredRef = useRef(false);
  const lastTapRef  = useRef(0);
  const limitRef    = useRef(60);
  const startRef    = useRef(Date.now());
  const onGORef     = useRef(onGameOver);

  useEffect(() => { dateRef.current   = date;        }, [date]);
  useEffect(() => { streakRef.current = streak;      }, [streak]);
  useEffect(() => { onGORef.current   = onGameOver;  }, [onGameOver]);

  useEffect(() => {
    const id = setInterval(() => {
      const elapsed = (Date.now() - startRef.current) / 1000;
      setDispTime(elapsed.toFixed(1));
      if (limitRef.current && elapsed >= limitRef.current && !answeredRef.current) {
        answeredRef.current = true; // prevent double-fire
        sfx.wrong();
        onGORef.current({ date: dateRef.current, streak: streakRef.current, correctDay: dateRef.current.getDay(), timedOut: true });
      }
    }, 100);
    return () => clearInterval(id);
  }, []); // single interval for the whole game session

  const advance = (ns) => {
    limitRef.current    = getTimeLimit(ns);
    answeredRef.current = false;
    const d = getRandomDate();
    dateRef.current  = d;
    startRef.current = Date.now();
    setDate(d);
    setDispTime('0.0');
  };

  const handleAnswer = (dayIndex) => {
    const now = Date.now();
    if (answeredRef.current || now - lastTapRef.current < 400) return;
    answeredRef.current = true;
    lastTapRef.current  = now;
    const correct = calcFinalDay(dateRef.current);
    if (dayIndex === correct) {
      sfx.correct();
      const ns = streakRef.current + 1;
      if (ns % 10 === 0) sfx.streak();
      setStreak(ns);
      setFlash({ msg: CORRECT[Math.floor(Math.random() * CORRECT.length)], time: ((now - startRef.current) / 1000).toFixed(1) });
      setTimeout(() => { setFlash(null); advance(ns); }, 700);
    } else {
      sfx.wrong();
      onGORef.current({ date: dateRef.current, streak: streakRef.current, correctDay: correct, timedOut: false });
    }
  };

  const elapsed = parseFloat(dispTime);
  const limit   = limitRef.current;
  const barLeft = limit ? Math.max(0, 100 - (elapsed / limit) * 100) : 100;
  const timeLow = limit && elapsed >= limit * 0.75;

  return (
    <div className="flex flex-col h-full w-full max-w-md mx-auto p-4 pt-[50px] pb-safe relative overflow-hidden">

      {/* Correct flash */}
      {flash && (
        <div className="absolute inset-0 z-20 flex flex-col items-center justify-center bg-[var(--color-lightest)] border-4 border-[var(--color-darkest)] overflow-hidden pointer-events-none">
          <Confetti />
          <h2 className="text-4xl font-bold uppercase animate-bounce z-10 px-4 text-center">{flash.msg}</h2>
          <p className="text-2xl font-bold opacity-40 z-10 mt-2">{flash.time}s</p>
        </div>
      )}

      {/* Header */}
      <div className="flex justify-between items-center border-b-4 border-[var(--color-darkest)] pb-2 mb-3 font-bold shrink-0">
        <span className="text-xl uppercase">Streak: {streak}</span>
        <button onClick={() => setCircular(v => !v)}
          className="border-2 border-[var(--color-darkest)] px-2 py-0.5 text-sm font-bold">
          {circular ? '⊞ Grid' : '○ Circle'}
        </button>
        <button onClick={onExit} className="border-2 border-[var(--color-darkest)] px-2 py-0.5 text-sm font-bold">EXIT</button>
      </div>

      {/* Timer bar */}
      <div className="h-2.5 border-2 border-[var(--color-darkest)] mb-3 bg-[var(--color-lightest)] overflow-hidden shrink-0">
        <div className={`h-full transition-none ${timeLow ? 'bg-red-600' : 'bg-[var(--color-dark)]'}`} style={{width:`${barLeft}%`}} />
      </div>

      {/* Game area */}
      {circular ? (
        <div className="flex-1 flex flex-col justify-center min-h-0">
          <CirclePicker onAnswer={handleAnswer} date={date} leapHints />
        </div>
      ) : (
        <>
          <div className="flex-1 flex flex-col items-center justify-center border-4 border-[var(--color-darkest)] bg-[var(--color-light)] text-center p-6 mb-4 shadow-[8px_8px_0_var(--color-darkest)] relative min-h-0">
            {isLeapYear(date.getFullYear()) && (
              <span className="absolute top-2 right-2 border-2 border-[var(--color-darkest)] bg-[var(--color-darkest)] text-[var(--color-lightest)] text-xs font-bold px-2 py-0.5 uppercase tracking-widest">✦ Leap Year</span>
            )}
            <span className="font-bold opacity-50 uppercase tracking-widest text-lg mb-1">Target Date</span>
            <span className="font-bold text-4xl leading-tight">{formatDate(date)}</span>
          </div>
          <div className="grid grid-cols-2 gap-2 shrink-0">
            {DAYS.map((day, i) => (
              <Btn key={day} onClick={() => handleAnswer(i)} className={i === 6 ? 'col-span-2' : ''}>{day}</Btn>
            ))}
          </div>
        </>
      )}

      <p className={`text-center font-bold text-sm mt-2 tabular-nums shrink-0 ${timeLow ? 'text-red-600 animate-pulse' : 'opacity-30'}`}>
        {dispTime}s{limit ? ` / ${limit}s` : ''}
      </p>
    </div>
  );
};

// ── MainMenu ──────────────────────────────────────────────────────────────────
const MainMenu = ({ onPlay, onTutorial, best, sndOn, setSnd }) => (
  <div className="flex flex-col items-center justify-center h-full w-full max-w-md mx-auto px-6 pb-safe overflow-y-auto">
    <div className="py-6" />

    {/* Title */}
    <div className="text-center border-4 border-[var(--color-darkest)] p-6 bg-[var(--color-light)] shadow-[10px_10px_0_var(--color-darkest)] w-full mb-7 shrink-0">
      <h1 className="text-5xl font-bold uppercase leading-none tracking-widest mb-1">Doomsday</h1>
      <h2 className="text-3xl font-bold uppercase leading-none tracking-tight opacity-80">Trainer</h2>
      <p className="text-sm opacity-50 mt-2">What day of the week is any date?</p>
    </div>

    {/* Play / Tutorial */}
    <div className="flex flex-col gap-3 w-full mb-5 shrink-0">
      <Btn onClick={onPlay} className="w-full flex flex-col items-center py-4">
        <span className="text-2xl">▶ Play</span>
        <span className="text-sm font-normal normal-case opacity-60 mt-0.5 tracking-normal">Build your streak, beat the clock</span>
      </Btn>
      <Btn onClick={onTutorial} className="w-full">? How to Play</Btn>
    </div>

    {/* Personal best */}
    {best > 0 && (
      <div className="border-2 border-[var(--color-dark)] px-6 py-2 font-bold opacity-60 mb-5 text-center shrink-0">
        🏆 Best Streak: {best}
      </div>
    )}

    {/* Download links */}
    <div className="w-full mb-5 shrink-0">
      <p className="text-center text-xs font-bold uppercase opacity-40 mb-2">Full app — Training · Drills · Leaderboards</p>
      <div className="flex gap-2">
        <a href={APP_STORE} target="_blank" rel="noopener noreferrer" onClick={() => sfx.click()}
          className="flex-1 border-4 border-[var(--color-darkest)] bg-[var(--color-lightest)] p-3 text-center font-bold uppercase text-sm shadow-[4px_4px_0_var(--color-darkest)] block leading-tight">
           App Store
        </a>
        <a href={PLAY_STORE} target="_blank" rel="noopener noreferrer" onClick={() => sfx.click()}
          className="flex-1 border-4 border-[var(--color-darkest)] bg-[var(--color-lightest)] p-3 text-center font-bold uppercase text-sm shadow-[4px_4px_0_var(--color-darkest)] block leading-tight">
          🤖 Play Store
        </a>
      </div>
    </div>

    {/* Sound toggle */}
    <button
      onClick={() => { const n = !sndOn; soundOn = n; setSnd(n); if (n) sfx.click(); }}
      className="border-2 border-[var(--color-dark)] px-4 py-1 text-sm font-bold opacity-40 hover:opacity-70 mb-6 shrink-0"
    >{sndOn ? '🔊 Sound On' : '🔇 Sound Off'}</button>
  </div>
);

// ── App ───────────────────────────────────────────────────────────────────────
const App = () => {
  const [screen, setScreen] = useState('MENU');
  const [stats,  setStats]  = useState(null);
  const [best,   setBest]   = useLS('dt_best', 0);
  const [sndOn,  setSnd]    = useLS('dt_snd',  true);

  useEffect(() => { soundOn = sndOn; }, [sndOn]);

  const handleGameOver = (s) => {
    const isNewBest = s.streak > best;
    if (isNewBest) setBest(s.streak);
    setStats({ ...s, isNewBest });
    setScreen('GAMEOVER');
  };

  return (
    <div style={{
      position:'fixed', inset:0, overflow:'hidden',
      background:'var(--color-lightest)',
      color:'var(--color-darkest)',
      fontFamily:"'VT323', monospace",
      '--color-darkest':'#171e00',
      '--color-dark':   '#376936',
      '--color-light':  '#d3f751',
      '--color-lightest':'#f4ffc7',
    }}>
      {screen === 'MENU'     && <MainMenu onPlay={() => setScreen('GAME')} onTutorial={() => setScreen('TUTORIAL')} best={best} sndOn={sndOn} setSnd={setSnd} />}
      {screen === 'GAME'     && <GameMode onExit={() => setScreen('MENU')} onGameOver={handleGameOver} />}
      {screen === 'GAMEOVER' && stats && <GameOver stats={stats} onPlayAgain={() => setScreen('GAME')} onMenu={() => setScreen('MENU')} />}
      {screen === 'TUTORIAL' && <Tutorial onClose={() => setScreen('MENU')} />}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
