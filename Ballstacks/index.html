<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Ballstacks</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;300;400&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>

<script>
tailwind.config = {
  darkMode: 'class',
  theme: { extend: {} }
};

<style>
  @import url('https://fonts.googleapis.com/css2?family=Raleway:wght@200;300;400&display=swap');
  body {
    font-family: 'Raleway', sans-serif;
    user-select: none;
    -webkit-user-select: none;
    overscroll-behavior: none;
    touch-action: none;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    margin: 0;
  }
  :root {
    --cell-size: 34px;
    --cell-margin: 2px;
    --board-padding: 8px;
    --launcher-offset: 72px;
  }
  @media (min-width: 360px) { :root { --cell-size: 42px; --cell-margin: 2px; } }
  @media (min-width: 640px) { :root { --cell-size: 50px; --cell-margin: 4px; } }

  .ball-dim { width: var(--cell-size); height: var(--cell-size); margin: var(--cell-margin); }
  .grid-cell { transition: transform 0.3s ease-in-out, opacity 0.3s ease-out; }
  .cell-idle { transform: scale(1); opacity: 1; transition: transform 0.15s ease, opacity 0.15s ease; }
  .cell-popping { transform: scale(0); opacity: 0; transition: transform 0.3s ease, opacity 0.3s ease; }
  .cell-cracking { animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both; }

  @keyframes floatUp {
    0%   { transform: translateY(0) scale(1); opacity: 1; }
    100% { transform: translateY(-40px) scale(1.1); opacity: 0; }
  }
  .floating-text { animation: floatUp 1.2s ease-out forwards; }

  @keyframes overlayFade {
    0%   { opacity: 0; transform: scale(0.8); }
    15%  { opacity: 1; transform: scale(1.1); }
    85%  { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(1.2); }
  }
  .overlay-anim { animation: overlayFade 1.8s ease-in-out forwards; }

  @keyframes shake {
    10%, 90% { transform: translate3d(-1px, 0, 0); }
    20%, 80%  { transform: translate3d(2px, 0, 0); }
    30%, 50%, 70% { transform: translate3d(-3px, 0, 0); }
    40%, 60% { transform: translate3d(3px, 0, 0); }
  }

  @keyframes subtlePulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.5; transform: scale(0.85); }
  }
  .bomb-icon { animation: subtlePulse 2s infinite ease-in-out; }

  .ball-falling {
    transition-property: transform;
    transition-timing-function: cubic-bezier(0.45, 0, 0.55, 1);
  }
  .launcher-ball { transition: left 0.1s ease-out; }

  @keyframes ballLand {
    0%   { transform: scale(0.8); opacity: 0.8; }
    55%  { transform: scale(1.07); opacity: 1; }
    100% { transform: scale(1); }
  }
  .ball-impact { animation: ballLand 0.28s cubic-bezier(0.34, 1.3, 0.64, 1) both; }
  .glass-overlay {
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

// ── Constants ─────────────────────────────────────────────────────────────
const ballColors = {
  1:'#78C2A4', 2:'#5A86A8', 3:'#D48C45', 4:'#E68A78',
  5:'#C15C7B', 6:'#A175C4', 7:'#5D9C81', 8:'#9E9E9E', 9:'#424242',
};
const sleep = (ms) => new Promise(r => setTimeout(r, ms));

// ── Ball generation ───────────────────────────────────────────────────────
const getUniquePotentials = (count, max) => {
  const values = [];
  while (values.length < count) {
    const r = Math.floor(Math.random() * max) + 1;
    if (!values.includes(r)) values.push(r);
  }
  return values;
};

const generateBall = (gridSize, currentLevel = 1, isNewRow = false) => {
  const rand = Math.random();
  const id = Math.random().toString(36).substr(2, 9);
  const baseMysteryChance = isNewRow
    ? Math.min(0.90, 0.35 + currentLevel * 0.05)
    : Math.min(0.40, 0.10 + currentLevel * 0.02);
  let probabilityThreshold = baseMysteryChance;
  if (rand < probabilityThreshold) {
    const mysterySubRand = Math.random();
    const l3Chance = Math.min(0.60, 0.05 + currentLevel * 0.05);
    const l2Chance = Math.min(0.30, 0.20 + currentLevel * 0.02);
    let mysteryLevel = 1;
    if (mysterySubRand < l3Chance) mysteryLevel = 3;
    else if (mysterySubRand < l3Chance + l2Chance) mysteryLevel = 2;
    const numColors = mysteryLevel + 1;
    const potentials = getUniquePotentials(numColors, gridSize);
    return { id, type:'mystery', value:'?', status:'idle', mysteryLevel, potentials };
  }
  probabilityThreshold += 0.02;
  if (rand < probabilityThreshold) return { id, type:'bomb_row', value:'—', status:'idle' };
  probabilityThreshold += 0.02;
  if (rand < probabilityThreshold) return { id, type:'bomb_col', value:'|', status:'idle' };
  probabilityThreshold += 0.02;
  if (rand < probabilityThreshold) return { id, type:'bomb_adj', value:'✦', status:'idle' };
  return { id, type:'number', value: Math.floor(Math.random() * gridSize) + 1, status:'idle' };
};

// ── SoundEngine ───────────────────────────────────────────────────────────
let audioCtx = null;
let isSfxMuted = false;

const play = (freq, type, duration, volume, slideTo) => {
  if (isSfxMuted || !audioCtx) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  if (slideTo) osc.frequency.exponentialRampToValueAtTime(slideTo, audioCtx.currentTime + duration);
  gain.gain.setValueAtTime(volume, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
};

const SoundEngine = {
  setMute: (val) => { isSfxMuted = val; },
  init: () => { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); },
  tick:    () => play(800,'sine',0.05,0.05),
  drop:    () => play(400,'sine',0.2,0.1,100),
  impact:  () => play(150,'triangle',0.1,0.2),
  pop:     (combo) => play(440+combo*100,'sine',0.15,0.15),
  crack:   () => play(2000,'square',0.05,0.02),
  explode: () => play(100,'sawtooth',0.4,0.2,20),
  levelUp: () => { [440,554,659].forEach((f,i) => setTimeout(()=>play(f,'sine',0.3,0.1),i*100)); },
  perfect: () => { [523,659,783,1046].forEach((f,i) => setTimeout(()=>play(f,'sine',0.5,0.1),i*80)); },
  gameOver:() => play(200,'sawtooth',1.0,0.2,50),
};

const IconVolume = ({ muted }) => muted ? (
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5">
    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>

  </svg>
) : (
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5">
    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
    <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
  </svg>
);

// ── Themes & Stats ────────────────────────────────────────────────────────
const THEMES = [
  { id:'mint',     label:'Mint',     primary:'#78C2A4', bg:'#f4faf7' },
  { id:'rose',     label:'Rose',     primary:'#E87E9A', bg:'#fdf4f7' },
  { id:'indigo',   label:'Indigo',   primary:'#7B93D4', bg:'#f4f6fb' },
  { id:'amber',    label:'Amber',    primary:'#D4A445', bg:'#fdf9f0' },
  { id:'coral',    label:'Coral',    primary:'#E8826A', bg:'#fdf6f4' },
  { id:'lavender', label:'Lavender', primary:'#A878C8', bg:'#f8f4fc' },
];

const DEFAULT_STATS = {
  gamesPlayed:0, totalScore:0, highestLevel:0, longestCombo:0,
  popped:{ number:0, bomb:0, mystery:0 },
  grids:{ 6:{highScore:0,highestLevel:0,gamesPlayed:0}, 7:{highScore:0,highestLevel:0,gamesPlayed:0}, 8:{highScore:0,highestLevel:0,gamesPlayed:0}, 9:{highScore:0,highestLevel:0,gamesPlayed:0} },
};
const loadStats = () => {
  try {
    const s = localStorage.getItem('ballstacks_stats');
    if (!s) return DEFAULT_STATS;
    const p = JSON.parse(s);
    return { ...DEFAULT_STATS, ...p, popped:{...DEFAULT_STATS.popped,...(p.popped||{})}, grids:{...DEFAULT_STATS.grids,...(p.grids||{})} };
  } catch { return DEFAULT_STATS; }
};
const saveStats = s => localStorage.setItem('ballstacks_stats', JSON.stringify(s));
const SAVE_KEY = 'ballstacks_saved_game';

// ── Main component ────────────────────────────────────────────────────────
const BallstacksGame = () => {
  const [gameState, setGameState] = useState('menu');
  const [gridSize, setGridSize] = useState(7);
  const [isDarkMode, setIsDarkMode] = useState(false);
  const [isMuted, setIsMuted] = useState(false);
  const [board, setBoard] = useState([]);
  const [activeBall, setActiveBall] = useState(null);
  const [nextBall, setNextBall] = useState(null);
  const [dragCol, setDragCol] = useState(3);
  const [isDragging, setIsDragging] = useState(false);
  const containerRef = useRef(null);
  const cellSize = useMemo(() => {
    const available = Math.min(window.innerWidth, 448) - 24;
    return Math.min(56, Math.floor(available / gridSize) - 4);
  }, [gridSize]);
  const [fallingBall, setFallingBall] = useState(null);
  const [score, setScore] = useState(0);
  const [stats, setStats] = useState(DEFAULT_STATS);
  const [multiplier, setMultiplier] = useState(1);
  const [level, setLevel] = useState(1);
  const [maxDrops, setMaxDrops] = useState(7);
  const [dropsRemaining, setDropsRemaining] = useState(7);
  const [dropCount, setDropCount] = useState(0);
  const [isProcessing, setIsProcessing] = useState(false);
  const [floatingTexts, setFloatingTexts] = useState([]);
  const [levelUpAnim, setLevelUpAnim] = useState(false);
  const [perfectClearAnim, setPerfectClearAnim] = useState(false);
  const [landedCell, setLandedCell] = useState(null);
  const [showStats, setShowStats] = useState(false);
  const [colorTheme, setColorTheme] = useState('mint');
  const [showThemePicker, setShowThemePicker] = useState(false);
  const [showSettings, setShowSettings] = useState(false);
  const [tutorialStep, setTutorialStep] = useState(null);
  const [hasSavedGame, setHasSavedGame] = useState(() => !!localStorage.getItem(SAVE_KEY));

  const sessionPopped = useRef({ number:0, bomb:0, mystery:0 });
  const sessionMaxCombo = useRef(1);
  const sessionMaxLevel = useRef(1);
  const dragColRef = useRef(3);
  const gameSnapshotRef = useRef(null);

  useEffect(() => {
    const s = loadStats();
    setStats(s);
    const savedMute = localStorage.getItem('ballstacks_mute') === 'true';
    setIsMuted(savedMute);
    SoundEngine.setMute(savedMute);
    const savedTheme = localStorage.getItem('ballstacks_theme');
    if (savedTheme === 'dark') { setIsDarkMode(true); document.documentElement.classList.add('dark'); }
    const savedColor = localStorage.getItem('ballstacks_color');
    if (savedColor && THEMES.find(t => t.id === savedColor)) setColorTheme(savedColor);
    const seenTutorial = localStorage.getItem('ballstacks_tutorial_seen');
    if (!seenTutorial) setTutorialStep(0);
    const doSave = () => { if (gameSnapshotRef.current) localStorage.setItem(SAVE_KEY, JSON.stringify(gameSnapshotRef.current)); };
    const onVisibility = () => { if (document.hidden) doSave(); };
    document.addEventListener('visibilitychange', onVisibility);
    window.addEventListener('beforeunload', doSave);
    return () => { document.removeEventListener('visibilitychange', onVisibility); window.removeEventListener('beforeunload', doSave); };
  }, []);

  useEffect(() => {
    if (gameState === 'playing') {
      gameSnapshotRef.current = { board, activeBall, nextBall, score, level, maxDrops, dropsRemaining, dropCount, gridSize };
    }
  }, [gameState, board, activeBall, nextBall, score, level, maxDrops, dropsRemaining, dropCount, gridSize]);

  const theme = THEMES.find(t => t.id === colorTheme) ?? THEMES[0];
  const primary = theme.primary;
  const menuBg = isDarkMode ? '#111' : theme.bg;
  const highScore = stats.grids[gridSize]?.highScore ?? 0;

  const applyColorTheme = (id) => { setColorTheme(id); localStorage.setItem('ballstacks_color', id); };
  const toggleTheme = () => {
    const n = !isDarkMode; setIsDarkMode(n);
    document.documentElement.classList.toggle('dark', n);
    localStorage.setItem('ballstacks_theme', n ? 'dark' : 'light');
  };
  const toggleMute = () => {
    const n = !isMuted; setIsMuted(n); SoundEngine.setMute(n); localStorage.setItem('ballstacks_mute', n);
  };

  const handleShare = async (currentScore) => {
    const text = `I scored ${(currentScore ?? score).toLocaleString()} on Ball Stacks (${gridSize}×${gridSize})! Can you beat it?`;
    if (navigator.share) { try { await navigator.share({ title:'Ball Stacks', text }); } catch (_) {} }
    else { await navigator.clipboard.writeText(text).catch(()=>{}); alert('Score copied to clipboard!'); }
  };

  const flushSessionStats = (finalScore, finalLevel) => {
    setStats(prev => {
      const next = {
        ...prev, gamesPlayed: prev.gamesPlayed+1, totalScore: prev.totalScore+finalScore,
        highestLevel: Math.max(prev.highestLevel, finalLevel),
        longestCombo: Math.max(prev.longestCombo, sessionMaxCombo.current),
        popped: { number: prev.popped.number+sessionPopped.current.number, bomb: prev.popped.bomb+sessionPopped.current.bomb, mystery: prev.popped.mystery+sessionPopped.current.mystery },
        grids: { ...prev.grids, [gridSize]: { highScore: Math.max(prev.grids[gridSize]?.highScore??0, finalScore), highestLevel: Math.max(prev.grids[gridSize]?.highestLevel??0, finalLevel), gamesPlayed: (prev.grids[gridSize]?.gamesPlayed??0)+1 } },
      };
      saveStats(next); return next;
    });
  };

  const startGame = () => {
    localStorage.removeItem(SAVE_KEY);
    gameSnapshotRef.current = null;
    setHasSavedGame(false);
    SoundEngine.init();
    sessionPopped.current = { number:0, bomb:0, mystery:0 };
    sessionMaxCombo.current = 1;
    sessionMaxLevel.current = 1;
    const emptyBoard = Array.from({length:gridSize}, ()=>Array(gridSize).fill(null));
    setBoard(emptyBoard);
    setActiveBall(generateBall(gridSize,1));
    setNextBall(generateBall(gridSize,1));
    setScore(0); setMultiplier(1); setLevel(1); setMaxDrops(7); setDropsRemaining(7); setDropCount(0);
    setDragCol(Math.floor(gridSize/2));
    dragColRef.current = Math.floor(gridSize/2);
    setGameState('playing');
  };

  const saveGame = () => {
    if (!gameSnapshotRef.current) return;
    localStorage.setItem(SAVE_KEY, JSON.stringify(gameSnapshotRef.current));
    setHasSavedGame(true);
  };
  const pauseGame = (e) => { e.stopPropagation(); saveGame(); setGameState('paused'); };
  const resumeGame = () => setGameState('playing');
  const abandonGame = () => { localStorage.removeItem(SAVE_KEY); gameSnapshotRef.current = null; setHasSavedGame(false); setGameState('menu'); };

  const continueGame = () => {
    try {
      const saved = JSON.parse(localStorage.getItem(SAVE_KEY)||'null');
      if (!saved) return;
      setGridSize(saved.gridSize); setBoard(saved.board); setActiveBall(saved.activeBall);
      setNextBall(saved.nextBall); setScore(saved.score); setLevel(saved.level);
      setMaxDrops(saved.maxDrops); setDropsRemaining(saved.dropsRemaining); setDropCount(saved.dropCount??0);
      setMultiplier(1); SoundEngine.init(); setGameState('playing');
    } catch {}
  };

  const calculateColFromX = (clientX) => {
    if (!containerRef.current) return dragColRef.current;
    const rect = containerRef.current.getBoundingClientRect();
    const cellMargin = 2;
    const cellTotal = cellSize + cellMargin*2;
    const ballAreaWidth = gridSize * cellTotal;
    const ballAreaLeft = rect.left + (rect.width - ballAreaWidth) / 2;
    const col = Math.floor((clientX - ballAreaLeft) / cellTotal);
    return Math.max(0, Math.min(gridSize-1, col));
  };

  const handlePointerDown = (e) => {
    if (isProcessing || gameState !== 'playing') return;
    SoundEngine.init();
    setIsDragging(true);
    const clientX = e.clientX || (e.touches&&e.touches[0].clientX);
    const col = calculateColFromX(clientX);
    if (col !== dragColRef.current) SoundEngine.tick();
    dragColRef.current = col; setDragCol(col);
  };
  const handlePointerMove = (e) => {
    if (isProcessing || !isDragging) return;
    const clientX = e.clientX || (e.touches&&e.touches[0].clientX);
    const col = calculateColFromX(clientX);
    if (col !== dragColRef.current) SoundEngine.tick();
    dragColRef.current = col; setDragCol(col);
  };
  const handlePointerUp = () => {
    if (isProcessing || !isDragging) return;
    setIsDragging(false);
    executeTurn(dragColRef.current);
  };

  const executeTurn = async (colIndex) => {
    if (isProcessing) return;
    setIsProcessing(true);
    SoundEngine.drop();
    const currentDropCount = dropCount + 1;
    setDropCount(currentDropCount);
    try {
      let currentBoard = board.map(row=>[...row]);
      let runningScore = score;
      let targetRow = -1;
      for (let r = gridSize-1; r >= 0; r--) { if (currentBoard[r][colIndex]===null) { targetRow=r; break; } }
      if (targetRow === -1) { setIsProcessing(false); return; }

      const ballToDrop = {...activeBall};
      const fallDistance = targetRow+1;
      const duration = Math.min(0.4, 0.15+fallDistance*0.04);
      setFallingBall({cell:ballToDrop, col:colIndex, targetRow, duration});
      setActiveBall(null);
      await sleep(duration*1000);
      SoundEngine.impact();
      setFallingBall(null);
      currentBoard[targetRow][colIndex] = ballToDrop;
      setBoard([...currentBoard]);
      setLandedCell({r:targetRow, c:colIndex});
      setTimeout(()=>setLandedCell(null), 400);
      await sleep(100);

      let nextDrops = dropsRemaining - 1;
      let levelUpPending = nextDrops <= 0;
      setDropsRemaining(levelUpPending ? maxDrops : nextDrops);

      let combo = 1;
      let cascading = true;

      while (cascading) {
        setMultiplier(combo);
        if (combo > sessionMaxCombo.current) sessionMaxCombo.current = combo;

        let toPop = Array.from({length:gridSize}, ()=>Array(gridSize).fill(false));
        let matchFound = false;

        for (let r = 0; r < gridSize; r++) {
          for (let c = 0; c < gridSize; c++) {
            const cell = currentBoard[r][c];
            if (!cell || cell.type!=='number' || cell.status!=='idle') continue;
            let hCount=0;
            for (let i=c;i>=0&&currentBoard[r][i]!==null;i--) hCount++;
            for (let i=c+1;i<gridSize&&currentBoard[r][i]!==null;i++) hCount++;
            let vCount=0;
            for (let i=r;i>=0&&currentBoard[i][c]!==null;i--) vCount++;
            for (let i=r+1;i<gridSize&&currentBoard[i][c]!==null;i++) vCount++;
            if (cell.value===hCount || cell.value===vCount) { toPop[r][c]=true; matchFound=true; }
          }
        }

        // BFS bomb chain
        if (matchFound) {
          const inQueue = new Set();
          const bombFired = new Set();
          const queue = [];
          for (let r=0;r<gridSize;r++) for (let c=0;c<gridSize;c++) if (toPop[r][c]) { const k=`${r},${c}`; inQueue.add(k); queue.push(k); }
          while (queue.length > 0) {
            const key = queue.shift();
            const [r,c] = key.split(',').map(Number);
            for (const [dr,dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
              const nr=r+dr, nc=c+dc;
              if (nr>=0&&nr<gridSize&&nc>=0&&nc<gridSize) {
                const nk=`${nr},${nc}`;
                if (currentBoard[nr][nc]?.type?.startsWith('bomb_') && !inQueue.has(nk)) { inQueue.add(nk); toPop[nr][nc]=true; queue.push(nk); }
              }
            }
            const cell = currentBoard[r][c];
            if (cell?.type?.startsWith('bomb_') && !bombFired.has(key)) {
              bombFired.add(key); SoundEngine.explode();
              const blast = [];
              if (cell.type==='bomb_row') for (let i=0;i<gridSize;i++) blast.push([r,i]);
              if (cell.type==='bomb_col') for (let i=0;i<gridSize;i++) blast.push([i,c]);
              if (cell.type==='bomb_adj') for (let rr=-1;rr<=1;rr++) for (let cc=-1;cc<=1;cc++) if (r+rr>=0&&r+rr<gridSize&&c+cc>=0&&c+cc<gridSize) blast.push([r+rr,c+cc]);
              for (const [br,bc] of blast) { if (currentBoard[br][bc]) { const bk=`${br},${bc}`; if (!inQueue.has(bk)) { inQueue.add(bk); toPop[br][bc]=true; queue.push(bk); } } }
            }
          }
        }

        let toCrack = Array.from({length:gridSize}, ()=>Array(gridSize).fill(false));
        for (let r=0;r<gridSize;r++) for (let c=0;c<gridSize;c++) if (toPop[r][c]) for (const [dr,dc] of [[-1,0],[1,0],[0,-1],[0,1]]) { const nr=r+dr,nc=c+dc; if (nr>=0&&nr<gridSize&&nc>=0&&nc<gridSize&&currentBoard[nr][nc]?.type==='mystery'&&!toPop[nr][nc]) toCrack[nr][nc]=true; }

        let anyAction = false;
        for (let r=0;r<gridSize;r++) for (let c=0;c<gridSize;c++) if (toPop[r][c]||toCrack[r][c]) anyAction=true;

        if (!anyAction) {
          const isEmpty = currentBoard.every(row=>row.every(cell=>cell===null));
          if (isEmpty && !levelUpPending && currentDropCount>1) {
            SoundEngine.perfect(); setPerfectClearAnim(true);
            runningScore += level*120; setScore(runningScore);
            await sleep(1800); setPerfectClearAnim(false);
          }
          if (levelUpPending) {
            SoundEngine.levelUp(); setLevelUpAnim(true);
            runningScore += 120*level; setScore(runningScore);
            await sleep(1200); setLevelUpAnim(false);
            const nextLevel = level+1; setLevel(nextLevel);
            if (nextLevel>sessionMaxLevel.current) sessionMaxLevel.current=nextLevel;
            if (currentBoard[0].some(c=>c!==null)) { SoundEngine.gameOver(); flushSessionStats(runningScore,nextLevel); setGameState('gameover'); return; }
            currentBoard.shift();
            currentBoard.push(Array.from({length:gridSize}, ()=>generateBall(gridSize,level+1,true)));
            setBoard([...currentBoard]); await sleep(300); levelUpPending=false; cascading=true; combo=1; continue;
          } else { cascading=false; break; }
        }

        currentBoard = currentBoard.map((row,r)=>row.map((cell,c)=>{
          if (!cell) return null;
          if (toPop[r][c]) return {...cell,status:'popping'};
          if (toCrack[r][c]) return {...cell,status:'cracking'};
          return cell;
        }));
        setBoard([...currentBoard]);

        let newTexts=[], triggerPopSound=false;
        for (let r=0;r<gridSize;r++) for (let c=0;c<gridSize;c++) if (toPop[r][c]) {
          const cell=currentBoard[r][c]; const val=cell.value; const popScore=7*combo;
          newTexts.push({id:Math.random().toString(36).substr(2,9),r,c,text:`+${popScore}`,color:ballColors[val]||'#E68A78'});
          runningScore+=popScore; triggerPopSound=true;
          if (cell.type==='number') sessionPopped.current.number++;
          else if (cell.type?.startsWith('bomb')) sessionPopped.current.bomb++;
          else if (cell.type==='mystery') sessionPopped.current.mystery++;
        }
        if (triggerPopSound) SoundEngine.pop(combo);
        if (newTexts.length>0) { setFloatingTexts(prev=>[...prev,...newTexts]); setTimeout(()=>setFloatingTexts(prev=>prev.filter(ft=>!newTexts.find(n=>n.id===ft.id))),1200); }
        setScore(runningScore);
        await sleep(400);

        let triggerCrackSound=false;
        currentBoard = currentBoard.map(row=>row.map(cell=>{
          if (!cell) return null;
          if (cell.status==='popping') return null;
          if (cell.status==='cracking') {
            triggerCrackSound=true; sessionPopped.current.mystery++;
            if (cell.type==='mystery') {
              if (cell.mysteryLevel>1) { const np=[...cell.potentials]; np.pop(); return {...cell,mysteryLevel:cell.mysteryLevel-1,potentials:np,status:'idle'}; }
              else { const fv=cell.potentials[Math.floor(Math.random()*cell.potentials.length)]; return {id:Math.random().toString(36).substr(2,9),type:'number',value:fv,status:'idle'}; }
            }
            return {id:Math.random().toString(36).substr(2,9),type:'number',value:Math.floor(Math.random()*gridSize)+1,status:'idle'};
          }
          return cell;
        }));
        if (triggerCrackSound) SoundEngine.crack();
        setBoard([...currentBoard]); await sleep(100);

        let moved=false;
        for (let c=0;c<gridSize;c++) { let wp=gridSize-1; for (let r=gridSize-1;r>=0;r--) { if (currentBoard[r][c]!==null) { if (wp!==r) { currentBoard[wp][c]=currentBoard[r][c]; currentBoard[r][c]=null; moved=true; } wp--; } } }
        if (moved) { setBoard([...currentBoard]); await sleep(300); }
        combo++;
      }

      if (currentBoard[0].every(cell=>cell!==null)) { SoundEngine.gameOver(); flushSessionStats(runningScore,level); setGameState('gameover'); return; }
      setActiveBall({...nextBall});
      setNextBall(generateBall(gridSize,level));
    } catch(e) { console.error(e); } finally { setIsProcessing(false); }
  };

        </div>

          <div className="flex flex-col items-center gap-2"><button onClick={()=>handleShare(highScore)} className="w-14 h-14 rounded-full border border-gray-300 dark:border-white/20 flex items-center justify-center text-gray-500 dark:text-gray-400 hover:border-gray-400 transition-colors active:scale-95"><IconShare/></button><span className="text-[11px] font-light tracking-widest uppercase text-gray-400">share</span></div>
          <div className="flex flex-col items-center gap-2"><button onClick={()=>setShowStats(true)} className="w-14 h-14 rounded-full border border-gray-300 dark:border-white/20 flex items-center justify-center text-gray-500 dark:text-gray-400 hover:border-gray-400 transition-colors active:scale-95"><IconBars/></button><span className="text-[11px] font-light tracking-widest uppercase text-gray-400">stats</span></div>
          <div className="flex flex-col items-center gap-2"><button onClick={()=>setShowThemePicker(true)} className="w-14 h-14 rounded-full border border-gray-300 dark:border-white/20 flex items-center justify-center text-gray-500 dark:text-gray-400 hover:border-gray-400 transition-colors active:scale-95"><div className="w-5 h-5 rounded-full" style={{backgroundColor:primary}}/></button><span className="text-[11px] font-light tracking-widest uppercase text-gray-400">theme</span></div>
        </div>
      </div>
      {showStats&&<StatsModal/>}{showSettings&&<SettingsSheet/>}{tutorialStep!==null&&<TutorialOverlay/>}
      {showThemePicker&&(
        <div className="absolute inset-0 z-50 flex items-end justify-center bg-black/30 backdrop-blur-sm" onClick={()=>setShowThemePicker(false)}>
          <div className="bg-white dark:bg-[#1c1c1c] rounded-t-3xl w-full max-w-md px-6 pt-5 pb-10 shadow-2xl" onClick={e=>e.stopPropagation()}>
            <div className="w-10 h-1 bg-gray-200 dark:bg-white/10 rounded-full mx-auto mb-6"/>
            <h2 className="text-xs tracking-[0.35em] uppercase text-gray-400 dark:text-gray-500 mb-5">theme</h2>
            <div className="flex justify-between mb-6">{THEMES.map(t=><button key={t.id} onClick={()=>applyColorTheme(t.id)} className="flex flex-col items-center gap-1.5"><div className="w-10 h-10 rounded-full transition-transform active:scale-90" style={{backgroundColor:t.primary,boxShadow:colorTheme===t.id?`0 0 0 3px white, 0 0 0 5px ${t.primary}`:'none',transform:colorTheme===t.id?'scale(1.15)':'scale(1)'}}/><span className="text-[9px] tracking-wide text-gray-400">{t.label}</span></button>)}</div>
            <div className="flex items-center justify-between px-1"><span className="text-sm font-light text-gray-500 dark:text-gray-400">{isDarkMode?'Dark mode':'Light mode'}</span><button onClick={toggleTheme} className="flex items-center gap-2 text-gray-400 dark:text-gray-300 hover:text-gray-600 transition-colors">{isDarkMode?<IconSun/>:<IconMoon/>}</button></div>
          </div>
        </div>
      )}
    </div>
  );

  // ── Game Over ─────────────────────────────────────────────────────────────
  if (gameState==='gameover') {
    const isNewBest = score>=(stats.grids[gridSize]?.highScore??0);
    return (
      <div className="min-h-screen flex flex-col bg-[#1a1a1a] text-white relative">
        <div className="flex items-start justify-between px-5 pt-6">
          <div>
            <p className="text-[10px] tracking-[0.35em] uppercase text-gray-500 mb-1">ballstacks · {gridSize}×{gridSize}</p>
            <p className="text-4xl font-light tracking-wide">{score.toLocaleString()}</p>
            {isNewBest&&score>0&&<p className="text-xs tracking-widest mt-0.5" style={{color:primary}}>new best!</p>}
          </div>
          <div className="flex gap-2 mt-1">
            <button onClick={()=>setShowStats(true)} className="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center text-gray-400"><IconBars/></button>
            <button onClick={()=>setGameState('menu')} className="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center text-gray-400"><IconHome/></button>
          </div>
        </div>
        <div className="flex-1 flex flex-col items-center justify-center">
          <h1 className="text-[4rem] font-extralight tracking-widest lowercase mb-16 text-white">game over</h1>
          <div className="flex flex-col items-center gap-3">
            <button onClick={startGame} style={{backgroundColor:primary}} className="w-20 h-20 rounded-full flex items-center justify-center shadow-lg hover:opacity-90 active:scale-95 transition-all text-gray-800"><IconRefresh/></button>
            <span className="text-sm tracking-widest" style={{color:primary}}>try again</span>
          </div>
          <div className="flex gap-20 mt-16">
            <div className="flex flex-col items-center gap-2"><button onClick={()=>handleShare(score)} className="text-gray-500 hover:text-gray-300 transition-colors active:scale-95"><IconShare/></button><span className="text-[10px] tracking-[0.25em] uppercase text-gray-600">share</span></div>
            <div className="flex flex-col items-center gap-2"><button onClick={()=>setGameState('menu')} className="text-gray-500 hover:text-gray-300 transition-colors"><IconHome/></button><span className="text-[10px] tracking-[0.25em] uppercase text-gray-600">menu</span></div>
          </div>
        </div>
        {showStats&&<StatsModal/>}
      </div>
    );
  }

  // ── Playing / Paused ──────────────────────────────────────────────────────
  return (
    <div className="min-h-screen flex flex-col items-center py-4 relative w-full overflow-hidden" style={{'--cell-size':`${cellSize}px`}} onPointerDown={handlePointerDown} onPointerMove={handlePointerMove} onPointerUp={handlePointerUp} onPointerLeave={handlePointerUp}>
      {/* Header */}
      <div className="w-full max-w-md flex justify-between items-center px-4 mt-2 mb-2 pointer-events-none">
        <div className="w-12 flex flex-col items-center justify-center">
          <span className="text-[9px] uppercase tracking-tighter text-gray-400">Next</span>
          <div className="relative flex items-center justify-center -mt-1.5" style={{width:'var(--cell-size)',height:'var(--cell-size)',transform:'scale(0.6)'}}>{renderBall(nextBall,'w-full h-full')}</div>
        </div>
        <div className="flex flex-col items-center">
          <div className="text-3xl font-light tracking-wide">score {score.toLocaleString()}</div>
          <div className="text-xs h-4" style={{color:primary}}>{multiplier>1?`${multiplier}x combo`:''}</div>
        </div>
        <div className="flex items-center gap-1 pointer-events-auto" onPointerDown={e=>e.stopPropagation()} onPointerUp={e=>e.stopPropagation()}>
          <button onClick={e=>{e.stopPropagation();toggleMute();}} className="w-10 h-10 flex justify-center items-center opacity-60" style={{color:isMuted?'#d1d5db':undefined}}><IconVolume muted={isMuted}/></button>
          <button onClick={pauseGame} className="w-10 h-10 flex justify-center items-center opacity-60"><div className="flex gap-1"><div className="w-1 h-4 border border-current"/><div className="w-1 h-4 border border-current"/></div></button>
        </div>
      </div>
      {/* Drops bar */}
      <div className="w-full max-w-md px-4 mb-8 pointer-events-none">
        <div className="h-1.5 bg-gray-200 dark:bg-gray-700 w-full relative rounded overflow-hidden">
          <div className="absolute left-0 top-0 h-full bg-[#E68A78] transition-all duration-300" style={{width:`${(dropsRemaining/maxDrops)*100}%`}}/>
        </div>
      </div>
      {/* Launcher */}
      <div className="w-full max-w-md flex justify-center mb-1 relative h-14 pointer-events-none" ref={containerRef}>
        <div className="flex w-full justify-center">{Array.from({length:gridSize}).map((_,col)=><div key={`launcher-${col}`} className="ball-dim"/>)}</div>
        {!isProcessing&&activeBall&&(
          <div className="absolute launcher-ball ball-dim pointer-events-none transition-opacity duration-150" style={{left:`calc(50% + (${dragCol} - ${(gridSize-1)/2}) * (var(--cell-size) + 4px) - (var(--cell-size) + 4px)/2)`,opacity:board[0]?.[dragCol]!==null?0.25:1}}>
            {renderBall(activeBall,'w-full h-full')}
          </div>
        )}
      </div>
      {/* Board */}
      <div className="relative flex-1 flex flex-col items-center pb-8 w-full max-w-md pointer-events-none">
        <div className="flex flex-col relative py-2 border-t-2 border-b-2 border-gray-200 dark:border-gray-700 border-opacity-50">
          <div className="absolute inset-y-2 left-0 right-0 flex justify-center z-0">
            {Array.from({length:gridSize}).map((_,c)=>{
              const isFull=board[0]?.[c]!==null, isActive=isDragging&&c===dragCol&&!isFull;
              return (
                <div key={`col-bg-${c}`} className="rounded-full transition-all duration-100" style={{width:'var(--cell-size)',margin:'var(--cell-margin)',opacity:isFull?0.15:isActive?0.9:0.4,backgroundColor:isActive?primary:undefined}}>
                  {!isActive&&<div className="w-full h-full rounded-full bg-gray-300 dark:bg-gray-600"/>}
                </div>
              );
            })}
          </div>
          {board.map((row,r)=>(
            <div key={`row-${r}`} className="flex relative z-10">
              {row.map((cell,c)=>(
                <div key={`cell-${r}-${c}`} className={`ball-dim relative flex items-center justify-center${landedCell?.r===r&&landedCell?.c===c?' ball-impact':''}`}>
                  {renderBall(cell,'w-full h-full')}
                  {floatingTexts.filter(ft=>ft.r===r&&ft.c===c).map(ft=><div key={ft.id} className="absolute text-xl sm:text-2xl font-medium floating-text z-20" style={{color:ft.color}}>{ft.text}</div>)}
                </div>
              ))}
            </div>
          ))}
          {fallingBall&&(
            <div className="absolute ball-dim ball-falling z-10" style={{left:`calc(${fallingBall.col} * (var(--cell-size) + 4px))`,top:'calc(-1 * var(--launcher-offset))',transform:`translateY(calc(var(--launcher-offset) + var(--board-padding) + ${fallingBall.targetRow} * (var(--cell-size) + 4px)))`,transitionDuration:`${fallingBall.duration}s`}}>
              {renderBall(fallingBall.cell,'w-full h-full')}
            </div>
          )}
        </div>
      </div>
      {/* Overlays */}
      {levelUpAnim&&<div className="absolute inset-0 z-40 glass-overlay flex flex-col items-center justify-center pointer-events-none"><div className="overlay-anim text-5xl font-extralight text-white tracking-widest uppercase">Level {level}</div><div className="text-3xl font-light mt-4" style={{color:primary}}>+{120*level}</div></div>}
      {perfectClearAnim&&<div className="absolute inset-0 z-40 glass-overlay flex flex-col items-center justify-center pointer-events-none"><div className="overlay-anim text-5xl font-extralight text-white tracking-tighter italic">PERFECT</div><div className="text-3xl font-light text-[#E68A78] mt-4">+{120*level} bonus</div></div>}
      {/* Pause overlay */}
      {gameState==='paused'&&(
        <div className="absolute inset-0 z-50 flex flex-col items-center justify-center bg-black/70 backdrop-blur-md">
          <p className="text-xs tracking-[0.4em] uppercase text-gray-500 mb-2">paused</p>
          <p className="text-4xl font-light tracking-wide text-white mb-12">{score.toLocaleString()}</p>
          <div className="flex flex-col gap-3 w-52">
            <button onClick={resumeGame} style={{backgroundColor:primary}} className="w-full py-4 rounded-2xl text-gray-900 font-light tracking-widest uppercase text-sm active:scale-95 transition-transform">resume</button>
            <button onClick={abandonGame} className="w-full py-4 rounded-2xl border border-white/20 text-white/60 font-light tracking-widest uppercase text-sm active:scale-95 transition-transform">new game</button>
          </div>
        </div>
      )}
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<BallstacksGame />);
</script>
</body>
</html>
