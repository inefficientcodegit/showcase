    animation: fadeIn 0.3s ease-out;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  h1.logo {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 3rem;
    letter-spacing: -1px;
    margin: 6px 0;
    font-weight: 900;
    color: #fff;
    text-align: center;
  }

  /* Logo decoration */
  .logo-line {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, ${u.teal}, transparent);
  }
  .logo-blocks {
    display: grid;
    grid-template-columns: 52px 52px;
    grid-template-rows: 52px 52px;
    gap: 10px;
    margin: 24px auto;
    animation: logoPulse 3s ease-in-out infinite;
  }
  @keyframes logoPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.04); }
  }
  .logo-block { border-radius: 0; }

  /* Buttons */
  .btn-primary {
    background: linear-gradient(135deg, #80f4ae 0%, #68dc99 100%);
    color: #07100d;
    border: none;
    padding: 16px 32px;
    border-radius: 0;
    font-size: 1.05rem;
    font-weight: 700;
    font-family: 'Space Grotesk', sans-serif;
    letter-spacing: 0.5px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: all 0.2s cubic-bezier(0.34, 1.2, 0.64, 1);
    margin-bottom: 12px;
    width: 100%;
    box-shadow: 0 4px 24px rgba(128,244,174,0.18);
  }
  .btn-primary:active { transform: scale(0.96); opacity: 0.9; }
  .btn-secondary {
    background: ${u.bgPanel};
    color: ${u.offWhite};
    border: 1px solid rgba(62,74,64,0.15);
    padding: 14px;
    border-radius: 0;
    font-size: 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 10px;
    width: 100%;
    transition: opacity 0.15s;
  }
  .btn-secondary:active { opacity: 0.7; }

  /* Bottom nav */
  .bottom-nav {
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding: 16px 0 max(16px, env(safe-area-inset-bottom));
    background: ${u.bgPanel};
    border-top: 1px solid rgba(62,74,64,0.15);
    width: calc(100% + 40px);
    margin: 0 -20px -20px;
  }
  .nav-icon-btn {
    background: none;
    border: none;
    color: ${u.textDim};
    padding: 8px 16px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    font-size: 9px;
    text-transform: uppercase;
    font-family: 'Space Grotesk', sans-serif;
    letter-spacing: 0.12em;
    transition: color 0.15s;
  }
  .nav-icon-btn:active { opacity: 0.8; }
  .nav-icon-btn.active {
    background: linear-gradient(135deg, #80f4ae, #68dc99);
    color: #0b0e15;
  }

  /* Range sliders (music volume etc.) */
  .range-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 44px; /* tall hit zone for iOS */
    touch-action: pan-x;
    border-radius: 0;
    background: transparent;
    outline: none;
    margin: 0;
    padding: 0;
    cursor: pointer;
  }
  .range-slider::-webkit-slider-runnable-track {
    height: 4px;
    background: ${u.bgCell};
    border-radius: 0;
  }
  .range-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 36px;
    height: 36px;
    border-radius: 0;
    background: ${u.teal};
    cursor: pointer;
    border: 2px solid #0b0e15;
    box-shadow: 0 0 10px rgba(128,244,174,0.4);
    margin-top: -16px; /* vertically centre thumb on track */
  }
  .range-slider::-moz-range-track {
    height: 4px;
    background: ${u.bgCell};
  }
  .range-slider::-moz-range-thumb {
    width: 36px;
    height: 36px;
    border-radius: 0;
    background: ${u.teal};
    cursor: pointer;
    border: 2px solid #0b0e15;
  }

  /* Operator toggle buttons */
  .op-btn {
    width: 62px;
    height: 62px;
    border-radius: 0;
    font-size: 1.5rem;
    font-weight: bold;
    font-family: 'Space Grotesk', sans-serif;
    cursor: pointer;
    transition: all 0.15s cubic-bezier(0.34, 1.2, 0.64, 1);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .op-btn.active  { background: rgba(95,36,159,0.25); border: 2px solid #5f249f; color: #bb83ff; box-shadow: 0 0 15px rgba(95,36,159,0.4); }
  .op-btn.inactive { background: transparent; border: 2px solid rgba(62,74,64,0.3); color: #879489; }
  .op-btn:active { transform: scale(0.93); }

  /* Board */
  .board {
    display: grid;
    gap: 4px;
    background: rgba(62,74,64,0.15);
    padding: 8px;
    border-radius: 0;
    border: 1px solid rgba(62,74,64,0.15);
    box-shadow: 0 12px 48px rgba(0,0,0,0.5);
    margin: 6px auto;
    width: fit-content;
  }
  .board-cell {
    background: ${u.bgCell};
    border-radius: 0;
    touch-action: none; /* iOS: prevent scroll-gesture competing with piece drag */
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
    transition: background 0.18s;
    width: 100%;
    height: 100%;
    box-sizing: border-box;
  }
  .board-cell.filled.correct   { background: rgba(128, 244, 174, 0.82); }
  .board-cell.filled.incorrect { background: rgba(255, 113, 108, 0.72); }
  .board-cell.ghost-valid      { background: rgba(187, 131, 255, 0.35); outline: 2px solid rgba(187,131,255,0.65); outline-offset: -2px; }
  .board-cell.ghost-invalid    { background: rgba(255, 113, 108, 0.25); outline: 2px solid rgba(255,113,108,0.5);  outline-offset: -2px; }
  .bg-number { font-weight: 700; font-family: 'Space Grotesk', sans-serif; color: rgba(255,255,255,0.22); pointer-events: none; transition: color 0.2s; }
  .board-cell.filled .bg-number { color: rgba(7,16,13,0.9); }
  .operator-label { font-size: 0.7rem; font-weight: 900; font-family: 'Space Grotesk', sans-serif; position: absolute; top: 3px; left: 5px; color: rgba(7,16,13,0.85); text-shadow: none; pointer-events: none; z-index: 10; }

  /* Game top bar */
  .game-top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 0 8px;
    width: 100%;
  }
  .game-icon-btn {
    background: none;
    border: none;
    color: ${u.textDim};
    padding: 6px 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    border-radius: 0;
    transition: color 0.15s;
  }
  .game-icon-btn:active { color: ${u.teal}; opacity: 0.8; }

  /* Timer — compact, lives inline in top bar */
  .game-timer {
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: 2px;
    color: ${u.textDim};
    font-variant-numeric: tabular-nums;
    font-family: 'Space Grotesk', sans-serif;
    position: relative;
  }
  /* Library bottom panel */
  .library-panel {
    flex-shrink: 0;
    background: ${u.bgPanel};
    border-top: 1px solid ${u.border};
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: height 0.25s ease;
    /* bleed to screen edges — negate exactly the parent's inline padding */
    margin-left: calc(-1 * max(16px, env(safe-area-inset-left)));
    margin-right: calc(-1 * max(16px, env(safe-area-inset-right)));
    padding-bottom: max(0px, env(safe-area-inset-bottom));
  }
  .library-panel.expanded { height: 48%; }
  /* Collapsed = tray bar + one row of pieces */
  .library-panel.collapsed { height: auto; }
  .library-tray-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 12px 4px;
    flex-shrink: 0;
  }
  .library-tray-row {
    display: flex;
    flex-direction: row;
    gap: 10px;
    overflow-x: scroll;
    overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    touch-action: pan-x;
    /* no horizontal padding — item sizing uses full 100% width */
    padding: 4px 0 max(10px, env(safe-area-inset-bottom));
    scrollbar-width: auto;
    scrollbar-color: ${u.teal}99 ${u.bgHigh};
    /* first and last items get a little breathing room via pseudo-elements */
    box-sizing: border-box;
  }
  .library-tray-row::-webkit-scrollbar { height: 8px; }
  .library-tray-row::-webkit-scrollbar-track { background: ${u.bgHigh}; }
  .library-tray-row::-webkit-scrollbar-thumb { background: ${u.teal}99; border-radius: 4px; min-width: 40px; }
  .library-tray-item {
    /* exactly 3 visible at a time: (100% - 2 gaps) / 3 */
    flex: 0 0 calc((100% - 20px) / 3);
    aspect-ratio: 1 / 1;
    background: ${u.bgHigh};
    border: 1px solid rgba(255,255,255,0.06);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    cursor: grab;
    touch-action: pan-x; /* container scrolls; only inner piece cell blocks scroll */
    position: relative;
    padding: 7px 7px 9px;
    box-sizing: border-box;
  }
  .library-panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 12px 4px;
    flex-shrink: 0;
  }
  .pieces-remaining {
    font-size: 0.72rem;
    color: #888;
    text-align: center;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  /* Piece rendering */
  .queue-piece { display: grid; gap: 3px; }
  .queue-piece.dragging { position: fixed; pointer-events: none; z-index: 9999; }
  .piece-cell { border-radius: 0; position: relative; }
  .piece-cell.empty { background: transparent !important; }

  /* Pause / win overlay */
  .overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(10,10,12,0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    z-index: 2000;
    padding: 20px;
    padding-top: max(20px, env(safe-area-inset-top));
    padding-left: max(20px, env(safe-area-inset-left));
    padding-right: max(20px, env(safe-area-inset-right));
    display: flex;
    flex-direction: column;
    animation: fadeIn 0.2s ease-out;
  }
  .library-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 10px;
    overflow-x: hidden;
    overflow-y: scroll;
    -webkit-overflow-scrolling: touch;
    touch-action: pan-y;
    flex: 1;
    padding: 8px;
    box-sizing: border-box;
    width: 100%;
    scrollbar-width: auto;
    scrollbar-color: ${u.teal}99 ${u.bgHigh};
  }
  .library-grid::-webkit-scrollbar { width: 10px; }
  .library-grid::-webkit-scrollbar-track { background: ${u.bgHigh}; }
  .library-grid::-webkit-scrollbar-thumb { background: ${u.teal}99; border-radius: 4px; min-height: 40px; }
  .library-item {
    background: ${u.bgPanel};
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 0;
    padding: 7px 7px 9px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    aspect-ratio: 1 / 1;
    transition: all 0.18s;
    cursor: grab;
    position: relative;
    min-width: 0;
    box-sizing: border-box;
    touch-action: pan-y; /* container scrolls; only piece cells override to none */
  }
  .library-piece-cell {
    touch-action: none; /* this cell is a drag target — block scroll here */
  }
  .library-item-label {
    font-size: 0.75rem; font-weight: 900;
    font-family: 'Space Grotesk', sans-serif;
    color: ${u.blue};
    letter-spacing: 0.5px;
    align-self: flex-start;
    line-height: 1;
    flex-shrink: 0;
  }

  /* Settings */
  .settings-row {
    background: ${u.bgPanel};
    border-radius: 0;
    padding: 18px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .settings-row:active { opacity: 0.7; }

  /* Tutorial */
  .tutorial-screen {
    width: 100%;
    max-width: 500px;
    height: 100%;
    display: flex;
    flex-direction: column;
    box-sizing: border-box;
    padding: max(24px, env(safe-area-inset-top)) max(20px, env(safe-area-inset-right)) max(24px, env(safe-area-inset-bottom)) max(20px, env(safe-area-inset-left));
    animation: fadeIn 0.3s ease-out;
  }
  .tut-progress-dots {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  .tut-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    transition: all 0.25s;
  }
  .tut-card {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    overflow: hidden;
  }
  .tut-icon-circle {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: rgba(74,122,200,0.15);
    border: 2px solid rgba(74,122,200,0.35);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 18px;
  }
  .tut-title {
    font-size: 1.35rem;
    font-weight: 800;
    color: #fff;
    text-align: center;
    margin: 0 0 12px;
    letter-spacing: 0.5px;
  }
  .tut-body {
    font-size: 0.92rem;
    color: ${u.offWhite};
    text-align: center;
    line-height: 1.65;
    margin: 0 0 20px;
    opacity: 0.85;
  }
  .tut-visual {
    margin: 6px 0 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 18px;
  }
  .tut-mini-board {
    display: grid;
    gap: 3px;
    background: #111118;
    padding: 7px;
    border-radius: 0;
    box-shadow: 0 6px 24px rgba(0,0,0,0.5);
  }
  .tut-cell {
    width: 44px;
    height: 44px;
    border-radius: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 1rem;
    transition: all 0.35s;
    position: relative;
  }
  .tut-piece-grid {
    display: grid;
    gap: 3px;
  }
  .tut-piece-cell {
    width: 44px;
    height: 44px;
    border-radius: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 0.95rem;
    color: #fff;
    position: relative;
  }
  .tut-label {
    position: absolute;
    top: 3px;
    left: 4px;
    font-size: 0.5rem;
    font-weight: 900;
    color: #fff;
    opacity: 0.9;
    letter-spacing: 0.3px;
    pointer-events: none;
  }
  @keyframes tutSlideGhost {
    0%   { transform: translate(0px, 80px);  opacity: 0; }
    15%  { opacity: 1; }
    50%  { transform: translate(48px, 44px); opacity: 1; }
    80%  { transform: translate(48px, 0px);  opacity: 1; }
    100% { transform: translate(48px, 0px);  opacity: 0.4; }
  }
  .tut-ghost-piece {
    animation: tutSlideGhost 2.4s ease-in-out infinite;
    pointer-events: none;
    position: absolute;
  }
  .tut-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-top: 4px;
    padding-top: 8px;
  }

  /* Info / About */
  .info-section {
    margin-bottom: 24px;
  }
  .info-section h3 {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: ${u.blue};
    margin: 0 0 10px;
  }
  .info-section p {
    font-size: 0.9rem;
    color: ${u.offWhite};
    line-height: 1.7;
    margin: 0 0 8px;
    opacity: 0.85;
  }
  .info-op-row {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 10px 0;
    margin-bottom: 4px;
  }
  .info-op-badge {
    width: 36px;
    height: 36px;
    border-radius: 0;
    background: ${u.bgCell};
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    font-weight: bold;
    font-family: 'Space Grotesk', sans-serif;
    color: ${u.blue};
    flex-shrink: 0;
  }
  @keyframes movePieceHint {
    0%   { transform: translate(0, 0);                  opacity: 0.9; }
    10%  { transform: translate(0, 0);                  opacity: 0.9; }
    45%  { transform: translate(var(--dx), var(--dy));  opacity: 0.9; }
    55%  { transform: translate(var(--dx), var(--dy));  opacity: 0.4; }
    90%  { transform: translate(0, 0);                  opacity: 0.4; }
    100% { transform: translate(0, 0);                  opacity: 0.9; }
  }
  @keyframes suggestPulse {
    0%, 100% { outline: 2px solid rgba(46,196,182,0.55); outline-offset: -2px; }
    50%       { outline: 3px solid rgba(46,196,182,1);    outline-offset: -3px;
                box-shadow: inset 0 0 10px rgba(46,196,182,0.4); }
  }
  .board-cell.hint-blocking {
    outline: 2px solid rgba(255,140,0,0.85) !important;
    outline-offset: -2px;
    background: rgba(255,140,0,0.18) !important;
  }
  /* outline renders above any background/fill so it's visible on teal or red pieces */
  .board-cell.hint-suggest {
    animation: suggestPulse 1.3s ease-in-out infinite;
  }
  @keyframes bounceIn {
    0%   { transform: scale(0.3); opacity: 0; }
    60%  { transform: scale(1.08); opacity: 1; }
    100% { transform: scale(1); }
  }
  @keyframes floatTrophy {
    0%, 100% { transform: translateY(0px); }
    50%       { transform: translateY(-12px); }
  }
  @keyframes winFadeIn {
    from { opacity:0; transform: translateY(20px); }
    to   { opacity:1; transform: translateY(0); }
  }
  @keyframes hintPulse {
    0%, 100% { color: inherit; transform: scale(1);    filter: drop-shadow(0 0 0px transparent); }
    50%       { color: #FFD700; transform: scale(1.25); filter: drop-shadow(0 0 6px rgba(255,215,0,0.8)); }
  }
  @keyframes penaltyPop {
    0%   { opacity:0; transform: translateY(0)   scale(0.8); }
    15%  { opacity:1; transform: translateY(-4px) scale(1.15); }
    70%  { opacity:1; transform: translateY(-10px) scale(1); }
    100% { opacity:0; transform: translateY(-18px) scale(0.9); }
  }

/* Achievement Toast */
.achievement-toast {
  position: fixed;
  top: max(16px, env(safe-area-inset-top));
  left: 50%;
  transform: translateX(-50%) translateY(-110px);
  background: rgba(18, 21, 30, 0.85);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 0.5px solid rgba(255,255,255,0.12);
  border-radius: 0;
  padding: 12px 18px;
  display: flex;
  align-items: center;
  gap: 12px;
  z-index: 2000;
  transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
  min-width: 240px;
  max-width: 300px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.5), 0 0 0 0.5px rgba(128,244,174,0.12) inset;
  pointer-events: none;
}
.achievement-toast.visible {
  transform: translateX(-50%) translateY(0);
}
.achievement-toast-icon { display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.achievement-toast-text { flex: 1; }
.achievement-toast-title { font-size: 9px; color: ${u.teal}; letter-spacing: 1.5px; font-weight: 700; text-transform: uppercase; font-family: 'Space Grotesk', sans-serif; }
.achievement-toast-name { font-size: 13px; color: ${u.offWhite}; font-weight: 700; margin-top: 2px; font-family: 'Space Grotesk', sans-serif; }

/* Achievements Screen */
.achievements-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  padding: 16px;
  overflow-y: auto;
  flex: 1;
}
.achievement-card {
  background: ${u.bgPanel};
  border-radius: 0;
  padding: 14px 12px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  border-left: 2px solid transparent;
}
.achievement-card.locked { opacity: 0.35; filter: grayscale(1); }
.achievement-card-icon { font-size: 22px; }
.achievement-card-label { font-size: 11px; font-weight: 700; color: ${u.offWhite}; font-family: 'Space Grotesk', sans-serif; }
.achievement-card-desc { font-size: 10px; color: ${u.textDim}; line-height: 1.3; }
.achievement-card-date { font-size: 9px; color: ${u.teal}; margin-top: 2px; }

/* Level Trail */
.level-trail {
  display: flex;
  flex-direction: column-reverse;
  align-items: center;
  padding: 16px;
  gap: 0;
  overflow-y: auto;
  flex: 1;
}
.level-node-row {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
}
.level-connector {
  width: 2px;
  height: 18px;
  background: repeating-linear-gradient(to bottom, ${u.bgCell} 0px, ${u.bgCell} 4px, transparent 4px, transparent 8px);
}
.level-node {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  max-width: 320px;
  padding: 10px 14px;
  background: ${u.bgPanel};
  border-radius: 0;
  border: 1.5px solid transparent;
  cursor: pointer;
  transition: border-color 0.2s, transform 0.1s;
  gap: 10px;
}
.level-node:active { transform: scale(0.97); }
.level-node.current { border-color: ${u.teal}; animation: pulse-border 2s ease-in-out infinite; }
.level-node.completed { border-color: rgba(128,244,174,0.25); }
.level-node.locked { opacity: 0.35; cursor: default; }
@keyframes pulse-border {
  0%, 100% { box-shadow: 0 0 0 0 rgba(128,244,174,0); }
  50% { box-shadow: 0 0 0 6px rgba(128,244,174,0.18); }
}
.level-node-num { font-size: 11px; color: ${u.textDim}; min-width: 28px; }
.level-node-title { flex: 1; font-size: 13px; font-weight: 600; color: ${u.offWhite}; font-family: 'Space Grotesk', sans-serif; }
.level-node-stars { font-size: 13px; min-width: 48px; text-align: right; }
.level-node-badge { font-size: 16px; }

/* Streak display */
.streak-display {
  font-size: 13px;
  color: ${u.textDim};
  margin-top: 4px;
  display: flex;
  align-items: center;
  gap: 4px;
  font-family: 'Inter', sans-serif;
}
.streak-display.active { color: ${u.tertiary}; }
